<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>简易地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

    #map { width: 100%; height: 100vh; }

    /* 定位按钮 */
    .locate-btn {
      position: absolute;
      top: 80px;
      right: 10px;
      z-index: 1000;
      background: #fff;
      border: 2px solid rgba(0,0,0,.2);
      border-radius: 4px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 1px 5px rgba(0,0,0,.4);
      transition: background .2s;
    }
    .locate-btn:hover { background: #f4f4f4; }

    /* 底图切换面板 */
    .tile-switcher {
      position: absolute;
      top: 130px;
      right: 10px;
      z-index: 1000;
      background: #fff;
      border: 2px solid rgba(0,0,0,.2);
      border-radius: 6px;
      padding: 10px;
      box-shadow: 0 1px 5px rgba(0,0,0,.4);
      font-size: 13px;
      min-width: 120px;
    }
    .tile-switcher h4 {
      margin-bottom: 8px;
      font-size: 13px;
      color: #333;
    }
    .tile-switcher label {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      cursor: pointer;
    }
    .tile-switcher input[type="radio"] {
      margin: 0;
    }
  </style>
</head>
<body>

<!-- 定位按钮 -->
<button class="locate-btn" id="locateBtn">📍 定位</button>

<!-- 底图切换 -->
<div class="tile-switcher">
  <h4>底图样式</h4>
  <label><input type="radio" name="tile" value="osm" checked> 标准地图</label>
  <label><input type="radio" name="tile" value="satellite"> 卫星图</label>
  <label><input type="radio" name="tile" value="dark"> 暗色地图</label>
  <label><input type="radio" name="tile" value="topo"> 地形图</label>
</div>

<div id="map"></div>

<script>
// ---- 底图图层 ----
const tileLayers = {
  osm: {
    url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    options: { attribution: '&copy; OpenStreetMap', maxZoom: 19 }
  },
  satellite: {
    url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    options: { attribution: '&copy; Esri', maxZoom: 18 }
  },
  dark: {
    url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
    options: { attribution: '&copy; CARTO', maxZoom: 20 }
  },
  topo: {
    url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
    options: { attribution: '&copy; OpenTopoMap', maxZoom: 17 }
  }
};

// 初始化地图
const map = L.map('map').setView([39.9042, 116.4074], 12);
let currentTile = L.tileLayer(tileLayers.osm.url, tileLayers.osm.options).addTo(map);

// 切换底图
document.querySelectorAll('input[name="tile"]').forEach(radio => {
  radio.addEventListener('change', (e) => {
    const key = e.target.value;
    map.removeLayer(currentTile);
    currentTile = L.tileLayer(tileLayers[key].url, tileLayers[key].options).addTo(map);
  });
});

// ---- 标记点数据 ----
const markers = [
  {
    lat: 39.9042, lng: 116.4074,
    title: '北京故宫',
    desc: '中国明清两代的皇家宫殿，旧称紫禁城。1987年被列为世界文化遗产。'
  },
  {
    lat: 39.8826, lng: 116.3917,
    title: '天坛公园',
    desc: '明清两代皇帝祭天的场所，中国现存最大的古代祭祀性建筑群。'
  },
  {
    lat: 39.9905, lng: 116.3969,
    title: '颐和园',
    desc: '中国古典园林之首，以昆明湖、万寿山为基址的大型天然山水园。'
  },
  {
    lat: 39.9289, lng: 116.4174,
    title: '景山公园',
    desc: '位于北京中轴线上，万春亭可俯瞰故宫全景和北京城。'
  },
  {
    lat: 39.9367, lng: 116.3187,
    title: '香山公园',
    desc: '北京著名森林公园，以秋季红叶景观闻名，有"西山晴雪"之美誉。'
  }
];

// ---- 添加标记 ----
markers.forEach(m => {
  const marker = L.marker([m.lat, m.lng]).addTo(map);
  marker.bindPopup(`
    <div style="min-width:200px;">
      <h3 style="margin:0 0 6px;font-size:16px;">${m.title}</h3>
      <p style="margin:0;font-size:13px;line-height:1.5;color:#555;">${m.desc}</p>
      <p style="margin:6px 0 0;font-size:11px;color:#999;">坐标: ${m.lat.toFixed(4)}, ${m.lng.toFixed(4)}</p>
    </div>
  `);
});

// ---- 定位功能 ----
const locateBtn = document.getElementById('locateBtn');
locateBtn.addEventListener('click', () => {
  locateBtn.textContent = '定位中...';
  map.locate({ setView: true, maxZoom: 16 });
});

map.on('locationfound', (e) => {
  locateBtn.textContent = '📍 定位';
  const radius = e.accuracy;

  L.circle(e.latlng, { radius, color: '#3388ff', fillOpacity: 0.1 }).addTo(map);

  const userMarker = L.marker(e.latlng).addTo(map);
  userMarker.bindPopup(`<b>你的位置</b><p>精度: 约 ${Math.round(radius)} 米</p>`).openPopup();
});

map.on('locationerror', () => {
  locateBtn.textContent = '📍 定位';
  alert('无法获取您的位置，请检查浏览器定位权限。');
});
</script>
</body>
</html>
