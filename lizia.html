<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>磁力连线粒子背景</title>
<style>
  * { margin: 0; padding: 0; }
  body {
    overflow: hidden;
    background: #0a0a1a;
    cursor: none;
  }
  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }
  .cursor-glow {
    position: fixed;
    pointer-events: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(100,180,255,0.6), transparent 70%);
    transform: translate(-50%, -50%);
    z-index: 10;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="cursor-glow" id="cursorGlow"></div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cursorGlow = document.getElementById('cursorGlow');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 鼠标位置
const mouse = { x: -9999, y: -9999 };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursorGlow.style.left = e.clientX + 'px';
  cursorGlow.style.top = e.clientY + 'px';
  cursorGlow.style.opacity = '1';
});
window.addEventListener('mouseleave', () => {
  mouse.x = -9999;
  mouse.y = -9999;
  cursorGlow.style.opacity = '0';
});

// 配置参数
const CONFIG = {
  particleCount: 160,
  maxLinkDist: 150,
  mouseRepelDist: 160,
  mouseRepelForce: 8,
  friction: 0.94,
  baseSpeed: 0.5,
  minRadius: 1,
  maxRadius: 2.5,
};

// 颜色主题 - 科技蓝紫
function lerpColor(ratio) {
  // 从蓝 #4488ff 到紫 #aa44ff
  const r = Math.round(68 + (170 - 68) * ratio);
  const g = Math.round(136 + (68 - 136) * ratio);
  const b = 255;
  return { r, g, b };
}

class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * CONFIG.baseSpeed * 2;
    this.vy = (Math.random() - 0.5) * CONFIG.baseSpeed * 2;
    this.radius = CONFIG.minRadius + Math.random() * (CONFIG.maxRadius - CONFIG.minRadius);
    this.colorOffset = Math.random(); // 用于颜色差异
    this.alpha = 0.4 + Math.random() * 0.4;
  }

  update() {
    // 鼠标排斥力
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < CONFIG.mouseRepelDist && dist > 0) {
      const force = (1 - dist / CONFIG.mouseRepelDist) * CONFIG.mouseRepelForce;
      const angle = Math.atan2(dy, dx);
      this.vx += Math.cos(angle) * force * 0.3;
      this.vy += Math.sin(angle) * force * 0.3;
    }

    this.vx *= CONFIG.friction;
    this.vy *= CONFIG.friction;

    // 保持最低速度
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed < CONFIG.baseSpeed * 0.2) {
      const angle = Math.atan2(this.vy, this.vx) || Math.random() * Math.PI * 2;
      this.vx += Math.cos(angle) * 0.05;
      this.vy += Math.sin(angle) * 0.05;
    }

    this.x += this.vx;
    this.y += this.vy;

    // 边界反弹
    if (this.x < 0) { this.x = 0; this.vx *= -1; }
    if (this.x > W) { this.x = W; this.vx *= -1; }
    if (this.y < 0) { this.y = 0; this.vy *= -1; }
    if (this.y > H) { this.y = H; this.vy *= -1; }
  }

  draw() {
    const c = lerpColor(this.colorOffset);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${c.r},${c.g},${c.b},${this.alpha})`;
    ctx.fill();

    // 发光效果
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
    const glow = ctx.createRadialGradient(
      this.x, this.y, 0,
      this.x, this.y, this.radius * 3
    );
    glow.addColorStop(0, `rgba(${c.r},${c.g},${c.b},0.15)`);
    glow.addColorStop(1, `rgba(${c.r},${c.g},${c.b},0)`);
    ctx.fillStyle = glow;
    ctx.fill();
  }
}

// 创建粒子
const particles = [];
for (let i = 0; i < CONFIG.particleCount; i++) {
  particles.push(new Particle());
}

// 空间哈希网格 - 优化连线检测性能
class SpatialGrid {
  constructor(cellSize) {
    this.cellSize = cellSize;
    this.grid = new Map();
  }

  clear() {
    this.grid.clear();
  }

  getKey(x, y) {
    const cx = Math.floor(x / this.cellSize);
    const cy = Math.floor(y / this.cellSize);
    return `${cx},${cy}`;
  }

  insert(particle) {
    const key = this.getKey(particle.x, particle.y);
    if (!this.grid.has(key)) this.grid.set(key, []);
    this.grid.get(key).push(particle);
  }

  getNearby(particle) {
    const cx = Math.floor(particle.x / this.cellSize);
    const cy = Math.floor(particle.y / this.cellSize);
    const nearby = [];
    for (let dx = -1; dx <= 1; dx++) {
      for (let dy = -1; dy <= 1; dy++) {
        const key = `${cx + dx},${cy + dy}`;
        const cell = this.grid.get(key);
        if (cell) nearby.push(...cell);
      }
    }
    return nearby;
  }
}

const grid = new SpatialGrid(CONFIG.maxLinkDist);

function drawLinks() {
  grid.clear();
  for (const p of particles) grid.insert(p);

  for (let i = 0; i < particles.length; i++) {
    const p = particles[i];
    const nearby = grid.getNearby(p);

    for (const q of nearby) {
      if (q === p) continue;
      // 避免重复绘制
      if (particles.indexOf(q) <= particles.indexOf(p)) continue;

      const dx = p.x - q.x;
      const dy = p.y - q.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist < CONFIG.maxLinkDist) {
        const ratio = 1 - dist / CONFIG.maxLinkDist; // 0(远) -> 1(近)
        const c1 = lerpColor(p.colorOffset);
        const c2 = lerpColor(q.colorOffset);
        const mr = Math.round((c1.r + c2.r) / 2);
        const mg = Math.round((c1.g + c2.g) / 2);
        const mb = Math.round((c1.b + c2.b) / 2);

        // 距离越近，线条越粗越亮
        const lineWidth = ratio * 2;
        const alpha = ratio * 0.6;

        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = `rgba(${mr},${mg},${mb},${alpha})`;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }
    }
  }
}

// 鼠标排斥范围可视化
function drawMouseField() {
  if (mouse.x < 0) return;
  const gradient = ctx.createRadialGradient(
    mouse.x, mouse.y, 0,
    mouse.x, mouse.y, CONFIG.mouseRepelDist
  );
  gradient.addColorStop(0, 'rgba(100,180,255,0.04)');
  gradient.addColorStop(0.5, 'rgba(100,180,255,0.02)');
  gradient.addColorStop(1, 'rgba(100,180,255,0)');
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, CONFIG.mouseRepelDist, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();
}

// 主循环
function animate() {
  ctx.clearRect(0, 0, W, H);

  drawMouseField();

  for (const p of particles) {
    p.update();
  }

  drawLinks();

  for (const p of particles) {
    p.draw();
  }

  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
