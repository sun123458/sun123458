<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineVault - 电影数据库</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- API Key Modal -->
  <div id="api-key-modal" class="modal-overlay">
    <div class="modal-content">
      <h2>欢迎使用 CineVault</h2>
      <p>请输入您的 TMDB API Key 以开始使用</p>
      <p class="modal-hint">您可以在 <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener">TMDB 官网</a> 免费申请 API Key</p>
      <input type="text" id="api-key-input" placeholder="请输入 API Key (v3 auth)">
      <button id="api-key-submit" class="btn btn-primary">开始探索</button>
    </div>
  </div>

  <!-- Navigation -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="#/" class="nav-logo">
        <span class="logo-icon">🎬</span> CineVault
      </a>
      <div class="nav-search">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="search-input" placeholder="搜索电影..." autocomplete="off">
          <button id="search-clear" class="search-clear hidden">&times;</button>
          <div id="search-suggestions" class="search-suggestions hidden"></div>
        </div>
      </div>
      <div class="nav-actions">
        <a href="#/watchlist" class="nav-link" id="nav-watchlist">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
          </svg>
          <span class="watchlist-count" id="watchlist-count">0</span>
        </a>
        <button id="dark-mode-toggle" class="btn-icon" title="切换深色模式">
          <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </nav>

  <!-- Main Content -->
  <main id="app">
    <div class="loading-spinner" id="initial-loader">
      <div class="spinner"></div>
    </div>
  </main>

  <!-- Movie Detail Modal -->
  <div id="movie-modal" class="modal-overlay hidden">
    <div class="modal-movie-detail" id="movie-detail-content">
    </div>
  </div>

  <!-- Toast Notification -->
  <div id="toast-container"></div>

  <!-- Scripts -->
  <script src="js/cache.js"></script>
  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/recommender.js"></script>
  <script src="js/components.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
