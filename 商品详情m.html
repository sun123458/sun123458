<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品详情页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
      line-height: 1.5;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .product-detail {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* 图片轮播 */
    .product-gallery {
      position: relative;
    }

    .main-image {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      overflow: hidden;
      background: #f0f0f0;
    }

    .main-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease;
    }

    .main-image:hover img {
      transform: scale(1.05);
    }

    .thumbnail-list {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      overflow-x: auto;
    }

    .thumbnail {
      width: 80px;
      height: 80px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .thumbnail:hover {
      border-color: #ddd;
    }

    .thumbnail.active {
      border-color: #ff4d4f;
    }

    .thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 商品信息 */
    .product-info {
      display: flex;
      flex-direction: column;
    }

    .product-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .product-subtitle {
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }

    .price-section {
      background: #fff9f0;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 25px;
    }

    .price-label {
      font-size: 14px;
      color: #666;
    }

    .price {
      font-size: 32px;
      font-weight: 700;
      color: #ff4d4f;
    }

    .price .unit {
      font-size: 16px;
      font-weight: 400;
    }

    .original-price {
      font-size: 14px;
      color: #999;
      text-decoration: line-through;
      margin-top: 5px;
    }

    /* 规格选择 */
    .spec-section {
      margin-bottom: 25px;
    }

    .spec-title {
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 12px;
    }

    .spec-options {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .spec-option {
      padding: 10px 20px;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
    }

    .spec-option:hover {
      border-color: #ff4d4f;
    }

    .spec-option.active {
      border-color: #ff4d4f;
      background: #fff1f0;
      color: #ff4d4f;
    }

    .spec-option.disabled {
      opacity: 0.5;
      cursor: not-allowed;
      background: #f5f5f5;
    }

    /* 数量选择 */
    .quantity-section {
      margin-bottom: 25px;
    }

    .quantity-selector {
      display: flex;
      align-items: center;
      gap: 0;
      width: fit-content;
      border: 1px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }

    .quantity-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: #f5f5f5;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .quantity-btn:hover:not(:disabled) {
      background: #e5e5e5;
    }

    .quantity-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .quantity-input {
      width: 60px;
      height: 40px;
      border: none;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
      text-align: center;
      font-size: 16px;
      outline: none;
    }

    /* 总价 */
    .total-section {
      padding: 20px;
      background: #f8f8f8;
      border-radius: 8px;
      margin-bottom: 25px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .total-label {
      font-size: 16px;
      color: #666;
    }

    .total-price {
      font-size: 28px;
      font-weight: 700;
      color: #ff4d4f;
    }

    .total-price .unit {
      font-size: 14px;
      font-weight: 400;
    }

    /* 按钮 */
    .action-buttons {
      display: flex;
      gap: 15px;
    }

    .btn {
      flex: 1;
      padding: 14px 24px;
      font-size: 16px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-add-cart {
      background: #fff1f0;
      color: #ff4d4f;
      border: 1px solid #ff4d4f;
    }

    .btn-add-cart:hover {
      background: #ff4d4f;
      color: #fff;
    }

    .btn-buy-now {
      background: #ff4d4f;
      color: #fff;
    }

    .btn-buy-now:hover {
      background: #ff3b3b;
    }

    /* 提示信息 */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      transition: transform 0.3s ease;
      z-index: 1000;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .product-detail {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 20px;
      }

      .product-title {
        font-size: 20px;
      }

      .price {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="product-detail">
      <!-- 图片轮播 -->
      <div class="product-gallery">
        <div class="main-image">
          <img id="mainImage" src="https://picsum.photos/600/600?random=1" alt="商品图片">
        </div>
        <div class="thumbnail-list" id="thumbnailList"></div>
      </div>

      <!-- 商品信息 -->
      <div class="product-info">
        <h1 class="product-title" id="productTitle">运动智能手表 Pro</h1>
        <p class="product-subtitle">精准心率监测 | 7天续航 | GPS定位 | 防水50米</p>

        <!-- 价格 -->
        <div class="price-section">
          <p class="price-label">价格</p>
          <p class="price"><span class="unit">¥</span><span id="unitPrice">1299</span></p>
          <p class="original-price">原价: ¥1999</p>
        </div>

        <!-- 规格选择 -->
        <div class="spec-section">
          <p class="spec-title">选择颜色</p>
          <div class="spec-options" id="colorOptions"></div>
        </div>

        <div class="spec-section">
          <p class="spec-title">选择尺寸</p>
          <div class="spec-options" id="sizeOptions"></div>
        </div>

        <!-- 数量选择 -->
        <div class="quantity-section">
          <p class="spec-title">购买数量</p>
          <div class="quantity-selector">
            <button class="quantity-btn" id="decreaseBtn">−</button>
            <input type="number" class="quantity-input" id="quantityInput" value="1" min="1" max="99">
            <button class="quantity-btn" id="increaseBtn">+</button>
          </div>
        </div>

        <!-- 总价 -->
        <div class="total-section">
          <div class="total-row">
            <span class="total-label">合计</span>
            <span class="total-price"><span class="unit">¥</span><span id="totalPrice">1299</span></span>
          </div>
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
          <button class="btn btn-add-cart" id="addCartBtn">加入购物车</button>
          <button class="btn btn-buy-now" id="buyNowBtn">立即购买</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast 提示 -->
  <div class="toast" id="toast"></div>

  <script>
    // 商品数据
    const productData = {
      id: 1,
      title: '运动智能手表 Pro',
      subtitle: '精准心率监测 | 7天续航 | GPS定位 | 防水50米',
      basePrice: 1299,
      images: [
        'https://picsum.photos/600/600?random=1',
        'https://picsum.photos/600/600?random=2',
        'https://picsum.photos/600/600?random=3',
        'https://picsum.photos/600/600?random=4',
        'https://picsum.photos/600/600?random=5'
      ],
      colors: [
        { id: 'black', name: '暗夜黑', price: 0 },
        { id: 'silver', name: '星光银', price: 0 },
        { id: 'gold', name: '玫瑰金', price: 100 }
      ],
      sizes: [
        { id: '40mm', name: '40mm', stock: 10, price: 0 },
        { id: '44mm', name: '44mm', stock: 5, price: 200 },
        { id: '49mm', name: '49mm', stock: 0, price: 400 }
      ]
    };

    // 状态
    let selectedColor = productData.colors[0];
    let selectedSize = null;
    let quantity = 1;

    // DOM 元素
    const mainImage = document.getElementById('mainImage');
    const thumbnailList = document.getElementById('thumbnailList');
    const unitPriceEl = document.getElementById('unitPrice');
    const totalPriceEl = document.getElementById('totalPrice');
    const quantityInput = document.getElementById('quantityInput');
    const decreaseBtn = document.getElementById('decreaseBtn');
    const increaseBtn = document.getElementById('increaseBtn');
    const addCartBtn = document.getElementById('addCartBtn');
    const buyNowBtn = document.getElementById('buyNowBtn');
    const toast = document.getElementById('toast');

    // 初始化图片轮播
    function initGallery() {
      productData.images.forEach((src, index) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumbnail' + (index === 0 ? ' active' : '');
        thumb.innerHTML = `<img src="${src}" alt="缩略图 ${index + 1}">`;
        thumb.addEventListener('click', () => selectImage(index, src));
        thumbnailList.appendChild(thumb);
      });
    }

    function selectImage(index, src) {
      mainImage.querySelector('img').src = src;
      document.querySelectorAll('.thumbnail').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
    }

    // 初始化规格选项
    function initSpecs() {
      const colorContainer = document.getElementById('colorOptions');
      productData.colors.forEach(color => {
        const option = document.createElement('div');
        option.className = 'spec-option' + (color.id === 'black' ? ' active' : '');
        option.textContent = color.name + (color.price > 0 ? ` (+¥${color.price})` : '');
        option.addEventListener('click', () => selectColor(color, option));
        colorContainer.appendChild(option);
      });

      const sizeContainer = document.getElementById('sizeOptions');
      productData.sizes.forEach(size => {
        const option = document.createElement('div');
        option.className = 'spec-option' + (size.stock === 0 ? ' disabled' : '');
        option.textContent = size.name + (size.price > 0 ? ` (+¥${size.price})` : '') + (size.stock === 0 ? ' (缺货)' : '');
        if (size.stock > 0) {
          option.addEventListener('click', () => selectSize(size, option));
        }
        sizeContainer.appendChild(option);
      });
    }

    function selectColor(color, element) {
      document.querySelectorAll('#colorOptions .spec-option').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      selectedColor = color;
      updatePrice();
    }

    function selectSize(size, element) {
      document.querySelectorAll('#sizeOptions .spec-option:not(.disabled)').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      selectedSize = size;
      updatePrice();
    }

    // 计算单价
    function getUnitPrice() {
      let price = productData.basePrice;
      if (selectedColor) {
        price += selectedColor.price;
      }
      if (selectedSize) {
        price += selectedSize.price;
      }
      return price;
    }

    // 更新价格
    function updatePrice() {
      const unitPrice = getUnitPrice();
      const total = unitPrice * quantity;
      unitPriceEl.textContent = unitPrice;
      totalPriceEl.textContent = total;
    }

    // 数量控制
    function updateQuantity(newQuantity) {
      if (newQuantity < 1) newQuantity = 1;
      if (selectedSize && newQuantity > selectedSize.stock) {
        newQuantity = selectedSize.stock;
        showToast('库存不足');
      }
      quantity = newQuantity;
      quantityInput.value = quantity;
      decreaseBtn.disabled = quantity <= 1;
      increaseBtn.disabled = selectedSize && quantity >= selectedSize.stock;
      updatePrice();
    }

    // Toast 提示
    function showToast(message) {
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 事件绑定
    decreaseBtn.addEventListener('click', () => updateQuantity(quantity - 1));
    increaseBtn.addEventListener('click', () => updateQuantity(quantity + 1));
    quantityInput.addEventListener('change', () => updateQuantity(parseInt(quantityInput.value) || 1));

    addCartBtn.addEventListener('click', () => {
      if (!selectedSize) {
        showToast('请选择尺寸');
        return;
      }
      showToast(`已加入购物车: ${productData.title} x${quantity}`);
    });

    buyNowBtn.addEventListener('click', () => {
      if (!selectedSize) {
        showToast('请选择尺寸');
        return;
      }
      const total = getUnitPrice() * quantity;
      showToast(`即将购买: ${productData.title} x${quantity}, 共¥${total}`);
    });

    // 初始化
    initGallery();
    initSpecs();
    selectedSize = productData.sizes[0];
    document.querySelector('#sizeOptions .spec-option:not(.disabled)').classList.add('active');
    updatePrice();
  </script>
</body>
</html>
