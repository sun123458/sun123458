<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即时聊天</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .chat-container {
      width: 420px;
      height: 700px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 16px 20px;
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .unread-badge {
      background: #ef4444;
      color: #fff;
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 9999px;
      display: none;
    }
    .unread-badge.show { display: inline-block; }
    .message-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      background: #fafafa;
    }
    .message {
      display: flex;
      margin-bottom: 14px;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.self { flex-direction: row-reverse; }
    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      color: #374151;
      flex-shrink: 0;
    }
    .message.self .avatar { background: #4f46e5; color: #fff; }
    .bubble-wrap { max-width: 70%; margin: 0 10px; }
    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
      position: relative;
    }
    .message.other .bubble {
      background: #fff;
      color: #111827;
      border: 1px solid #e5e7eb;
      border-top-left-radius: 4px;
    }
    .message.self .bubble {
      background: #4f46e5;
      color: #fff;
      border-top-right-radius: 4px;
    }
    .message.unread .bubble {
      background: #fee2e2;
      color: #991b1b;
      border-color: #fca5a5;
    }
    .message.unread.self .bubble {
      background: #ef4444;
      color: #fff;
      border-color: #ef4444;
    }
    .time {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
      text-align: right;
    }
    .input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e7eb;
      background: #fff;
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-area input:focus { border-color: #4f46e5; }
    .btn-emoji, .btn-send {
      border: none;
      cursor: pointer;
      font-size: 18px;
      background: transparent;
      padding: 6px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .btn-emoji:hover, .btn-send:hover { background: #f3f4f6; }
    .btn-send {
      background: #4f46e5;
      color: #fff;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-send:hover { background: #4338ca; }
    .emoji-picker {
      position: absolute;
      bottom: 70px;
      right: 20px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: none;
      grid-template-columns: repeat(8, 1fr);
      gap: 6px;
      width: 280px;
    }
    .emoji-picker.show { display: grid; }
    .emoji-picker span {
      cursor: pointer;
      font-size: 20px;
      text-align: center;
      padding: 4px;
      border-radius: 6px;
    }
    .emoji-picker span:hover { background: #f3f4f6; }
    .chat-wrapper { position: relative; }
    .empty-tip {
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-container">
      <div class="chat-header">
        <span>即时聊天</span>
        <span class="unread-badge" id="unreadBadge">0</span>
      </div>
      <div class="message-list" id="messageList">
        <div class="empty-tip">暂无消息，开始聊天吧~</div>
      </div>
      <div class="input-area">
        <button class="btn-emoji" id="emojiBtn" title="表情">😊</button>
        <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
        <button class="btn-send" id="sendBtn" title="发送">➤</button>
      </div>
    </div>
    <div class="emoji-picker" id="emojiPicker"></div>
  </div>

  <script>
    const messageList = document.getElementById('messageList');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPicker = document.getElementById('emojiPicker');
    const unreadBadge = document.getElementById('unreadBadge');

    const emojis = ['😀','😂','🥰','😎','🤔','😭','😡','👍','👎','🙏','🔥','❤️','🎉','🤣','😍','🥳','👀','🤯','😴','😅'];
    let unreadCount = 0;
    let isAtBottom = true;

    // 初始化表情面板
    emojis.forEach(e => {
      const span = document.createElement('span');
      span.textContent = e;
      span.onclick = () => {
        msgInput.value += e;
        msgInput.focus();
        emojiPicker.classList.remove('show');
      };
      emojiPicker.appendChild(span);
    });

    emojiBtn.addEventListener('click', () => emojiPicker.classList.toggle('show'));
    document.addEventListener('click', (e) => {
      if (!emojiBtn.contains(e.target) && !emojiPicker.contains(e.target)) {
        emojiPicker.classList.remove('show');
      }
    });

    function nowTime() {
      const d = new Date();
      return `${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
    }

    function checkAtBottom() {
      const threshold = 20;
      isAtBottom = messageList.scrollHeight - messageList.scrollTop - messageList.clientHeight < threshold;
    }

    messageList.addEventListener('scroll', checkAtBottom);

    function scrollToBottom() {
      messageList.scrollTop = messageList.scrollHeight;
    }

    function updateUnread(count) {
      unreadCount = count;
      unreadBadge.textContent = count;
      unreadBadge.classList.toggle('show', count > 0);
    }

    function addMessage(text, isSelf = true, unread = false) {
      const empty = messageList.querySelector('.empty-tip');
      if (empty) empty.remove();

      const msg = document.createElement('div');
      msg.className = `message ${isSelf ? 'self' : 'other'} ${unread ? 'unread' : ''}`;
      msg.innerHTML = `
        <div class="avatar">${isSelf ? '我' : 'TA'}</div>
        <div class="bubble-wrap">
          <div class="bubble">${escapeHtml(text)}</div>
          <div class="time">${nowTime()}</div>
        </div>
      `;
      messageList.appendChild(msg);

      if (isAtBottom) {
        scrollToBottom();
      }

      if (unread) {
        updateUnread(unreadCount + 1);
      }
    }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, m => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      })[m]);
    }

    function send() {
      const text = msgInput.value.trim();
      if (!text) return;
      addMessage(text, true, false);
      msgInput.value = '';
      // 模拟收到对方消息（5%概率未读）
      setTimeout(() => {
        const reply = Math.random() > 0.5 ? '收到 👍' : '明白了~';
        const unread = Math.random() < 0.05;
        addMessage(reply, false, unread);
      }, 800 + Math.random() * 1000);
    }

    sendBtn.addEventListener('click', send);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });

    // 点击未读标记消除：点击消息列表时把所有未读标记清除
    messageList.addEventListener('click', () => {
      document.querySelectorAll('.message.unread').forEach(el => el.classList.remove('unread'));
      updateUnread(0);
    });

    // 初始模拟一条未读消息
    setTimeout(() => addMessage('你好，欢迎来到即时聊天！', false, true), 500);
  </script>
</body>
</html>
