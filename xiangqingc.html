<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品详情页</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif; background: #f5f5f5; color: #333; }

  /* ---- 布局 ---- */
  .page { max-width: 960px; margin: 0 auto; padding: 24px; display: flex; gap: 32px; }
  @media (max-width: 700px) { .page { flex-direction: column; padding: 12px; gap: 16px; } }

  /* ---- 左侧：图片轮播 ---- */
  .gallery { flex: 0 0 400px; max-width: 100%; }
  .carousel { position: relative; border-radius: 12px; overflow: hidden; background: #fff; aspect-ratio: 1; }
  .carousel-track { display: flex; transition: transform .4s ease; height: 100%; }
  .carousel-track img { min-width: 100%; height: 100%; object-fit: cover; user-select: none; pointer-events: none; }
  .carousel-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,.35); color: #fff; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 18px; cursor: pointer; transition: background .2s; z-index: 2; }
  .carousel-btn:hover { background: rgba(0,0,0,.55); }
  .carousel-btn.prev { left: 10px; }
  .carousel-btn.next { right: 10px; }
  .dots { display: flex; justify-content: center; gap: 6px; margin-top: 12px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; cursor: pointer; transition: all .3s; border: none; }
  .dot.active { background: #ff6b00; width: 20px; border-radius: 4px; }

  /* ---- 右侧：商品信息 ---- */
  .info { flex: 1; min-width: 0; }
  .info h1 { font-size: 22px; font-weight: 600; line-height: 1.4; margin-bottom: 8px; }
  .info .desc { color: #888; font-size: 14px; margin-bottom: 16px; line-height: 1.5; }
  .price-bar { background: linear-gradient(135deg, #ff6b00, #ff4500); border-radius: 10px; padding: 16px 20px; color: #fff; margin-bottom: 20px; display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  .price-bar .current { font-size: 32px; font-weight: 700; }
  .price-bar .current span { font-size: 16px; }
  .price-bar .original { font-size: 15px; text-decoration: line-through; opacity: .75; }
  .price-bar .tag { background: rgba(255,255,255,.25); padding: 2px 8px; border-radius: 4px; font-size: 12px; }

  /* ---- 规格选择 ---- */
  .spec-section { margin-bottom: 20px; }
  .spec-section label { display: block; font-size: 13px; color: #666; margin-bottom: 8px; font-weight: 500; }
  .spec-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .spec-btn { padding: 6px 16px; border-radius: 20px; border: 1.5px solid #ddd; background: #fff; font-size: 13px; cursor: pointer; transition: all .2s; user-select: none; }
  .spec-btn:hover { border-color: #ff6b00; color: #ff6b00; }
  .spec-btn.active { border-color: #ff6b00; background: #fff5ee; color: #ff6b00; font-weight: 600; }

  /* ---- 数量选择 ---- */
  .qty-section { margin-bottom: 24px; display: flex; align-items: center; gap: 16px; }
  .qty-section label { font-size: 13px; color: #666; font-weight: 500; }
  .qty-ctrl { display: flex; align-items: center; border: 1.5px solid #ddd; border-radius: 8px; overflow: hidden; }
  .qty-ctrl button { width: 36px; height: 36px; border: none; background: #f9f9f9; font-size: 18px; cursor: pointer; transition: background .15s; color: #333; }
  .qty-ctrl button:hover:not(:disabled) { background: #eee; }
  .qty-ctrl button:disabled { color: #ccc; cursor: not-allowed; }
  .qty-ctrl .qty-val { width: 48px; text-align: center; font-size: 15px; font-weight: 600; border: none; outline: none; background: transparent; }

  /* ---- 小计 ---- */
  .subtotal { font-size: 16px; margin-bottom: 20px; color: #ff4500; font-weight: 600; }

  /* ---- 操作按钮 ---- */
  .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .actions button { flex: 1; min-width: 120px; padding: 13px 0; border-radius: 24px; font-size: 16px; font-weight: 600; cursor: pointer; border: none; transition: all .2s; }
  .btn-cart { background: linear-gradient(135deg, #ffb347, #ff6b00); color: #fff; }
  .btn-cart:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(255,107,0,.35); }
  .btn-cart:active { transform: translateY(0); }
  .btn-buy { background: linear-gradient(135deg, #ff4500, #d63600); color: #fff; }
  .btn-buy:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(255,69,0,.35); }
  .btn-buy:active { transform: translateY(0); }

  /* ---- Toast 提示 ---- */
  .toast { position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-80px); background: rgba(0,0,0,.78); color: #fff; padding: 10px 28px; border-radius: 8px; font-size: 14px; opacity: 0; transition: all .35s ease; z-index: 999; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="page">
  <!-- 左：图片轮播 -->
  <div class="gallery">
    <div class="carousel">
      <button class="carousel-btn prev" onclick="slideBy(-1)">&#10094;</button>
      <button class="carousel-btn next" onclick="slideBy(1)">&#10095;</button>
      <div class="carousel-track" id="track"></div>
    </div>
    <div class="dots" id="dots"></div>
  </div>

  <!-- 右：商品信息 -->
  <div class="info">
    <h1 id="productName"></h1>
    <p class="desc" id="productDesc"></p>

    <!-- 价格 -->
    <div class="price-bar">
      <div class="current"><span>¥</span><span id="priceVal">0</span></div>
      <div class="original" id="origPrice"></div>
      <div class="tag" id="discountTag"></div>
    </div>

    <!-- 规格选择：颜色 -->
    <div class="spec-section">
      <label>颜色</label>
      <div class="spec-group" id="colorGroup"></div>
    </div>

    <!-- 规格选择：存储 -->
    <div class="spec-section">
      <label>存储容量</label>
      <div class="spec-group" id="storageGroup"></div>
    </div>

    <!-- 数量 -->
    <div class="qty-section">
      <label>数量</label>
      <div class="qty-ctrl">
        <button id="btnMinus" onclick="changeQty(-1)">−</button>
        <input class="qty-val" id="qtyInput" value="1" readonly>
        <button id="btnPlus" onclick="changeQty(1)">+</button>
      </div>
    </div>

    <!-- 小计 -->
    <div class="subtotal">小计：¥<span id="subtotalVal">0</span></div>

    <!-- 按钮 -->
    <div class="actions">
      <button class="btn-cart" onclick="addToCart()">加入购物车</button>
      <button class="btn-buy" onclick="buyNow()">立即购买</button>
    </div>
  </div>
</div>

<script>
/* ========== 商品数据（可通过接口替换） ========== */
const product = {
  name: 'Xiaomi 15 Ultra 旗舰智能手机',
  desc: '第三代骁龙8旗舰芯片 | 5000万像素徕卡四摄 | 6000mAh硅碳负极电池 | IP68防水 | 2K超感屏',
  images: [
    'https://picsum.photos/seed/phone1/600/600',
    'https://picsum.photos/seed/phone2/600/600',
    'https://picsum.photos/seed/phone3/600/600',
    'https://picsum.photos/seed/phone4/600/600',
    'https://picsum.photos/seed/phone5/600/600',
  ],
  basePrice: 4999,
  originalPrice: 5999,
  specs: {
    color: ['云端白', '星空黑', '远峰蓝', '橄榄绿'],
    storage: [
      { label: '256GB', extra: 0 },
      { label: '512GB', extra: 500 },
      { label: '1TB',   extra: 1200 },
    ],
  },
};

/* ========== 状态 ========== */
const state = { colorIdx: 0, storageIdx: 0, qty: 1, slideIdx: 0 };

/* ========== 初始化页面 ========== */
function init() {
  document.getElementById('productName').textContent = product.name;
  document.getElementById('productDesc').textContent = product.desc;

  /* 轮播 */
  const track = document.getElementById('track');
  const dots   = document.getElementById('dots');
  product.images.forEach((src, i) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = `商品图片 ${i + 1}`;
    track.appendChild(img);

    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.onclick = () => goToSlide(i);
    dots.appendChild(dot);
  });

  /* 颜色规格 */
  const colorGroup = document.getElementById('colorGroup');
  product.specs.color.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'spec-btn' + (i === 0 ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => pickSpec('colorIdx', i, colorGroup);
    colorGroup.appendChild(btn);
  });

  /* 存储规格 */
  const storageGroup = document.getElementById('storageGroup');
  product.specs.storage.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'spec-btn' + (i === 0 ? ' active' : '');
    btn.textContent = `${s.label}  +¥${s.extra}`;
    btn.onclick = () => pickSpec('storageIdx', i, storageGroup);
    storageGroup.appendChild(btn);
  });

  updateOriginalPrice();
  recalc();
}

/* ========== 轮播逻辑 ========== */
function goToSlide(i) {
  state.slideIdx = Math.max(0, Math.min(i, product.images.length - 1));
  document.getElementById('track').style.transform = `translateX(-${state.slideIdx * 100}%)`;
  document.querySelectorAll('.dot').forEach((d, idx) => d.classList.toggle('active', idx === state.slideIdx));
}
function slideBy(delta) { goToSlide(state.slideIdx + delta); }

/* 自动轮播 */
let autoTimer = setInterval(() => slideBy(1), 4000);
document.querySelector('.carousel').addEventListener('pointerenter', () => clearInterval(autoTimer));
document.querySelector('.carousel').addEventListener('pointerleave', () => { autoTimer = setInterval(() => slideBy(1), 4000); });

/* ========== 规格选择 ========== */
function pickSpec(key, idx, container) {
  state[key] = idx;
  container.querySelectorAll('.spec-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  updateOriginalPrice();
  recalc();
}

/* ========== 数量 & 价格 ========== */
function changeQty(d) {
  state.qty = Math.max(1, Math.min(state.qty + d, 99));
  document.getElementById('qtyInput').value = state.qty;
  document.getElementById('btnMinus').disabled = state.qty <= 1;
  recalc();
}

function unitPrice() {
  return product.basePrice + product.specs.storage[state.storageIdx].extra;
}

function updateOriginalPrice() {
  const orig = product.originalPrice + product.specs.storage[state.storageIdx].extra;
  document.getElementById('origPrice').textContent = `¥${orig}`;
  const saved = orig - unitPrice();
  document.getElementById('discountTag').textContent = `省 ¥${saved}`;
}

function recalc() {
  const total = unitPrice() * state.qty;
  document.getElementById('priceVal').textContent = unitPrice();
  document.getElementById('subtotalVal').textContent = total.toLocaleString();
}

/* ========== Toast ========== */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

/* ========== 操作 ========== */
function addToCart() {
  const c = product.specs.color[state.colorIdx];
  const s = product.specs.storage[state.storageIdx].label;
  showToast(`已加入购物车：${c} / ${s} × ${state.qty}`);
}

function buyNow() {
  const c = product.specs.color[state.colorIdx];
  const s = product.specs.storage[state.storageIdx].label;
  const total = unitPrice() * state.qty;
  showToast(`立即购买：${c} / ${s} × ${state.qty}，共 ¥${total.toLocaleString()}`);
}

/* 启动 */
init();
</script>
</body>
</html>
