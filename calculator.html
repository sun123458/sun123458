<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科学计算器</title>
<style>
/* ========== CSS Variables - Light Theme (Default) ========== */
:root {
  --bg-primary: #f0f2f5;
  --bg-secondary: #ffffff;
  --bg-display: #1a1a2e;
  --text-primary: #16213e;
  --text-secondary: #555;
  --text-display: #00ff88;
  --text-display-expr: #aabcff;
  --accent: #4361ee;
  --accent-hover: #3a56d4;
  --btn-number: #ffffff;
  --btn-number-hover: #e8eaed;
  --btn-number-text: #1a1a2e;
  --btn-op: #e9ecef;
  --btn-op-hover: #dee2e6;
  --btn-op-text: #1a1a2e;
  --btn-func: #d0d8ff;
  --btn-func-hover: #b8c4ff;
  --btn-func-text: #1a1a2e;
  --btn-equal: #4361ee;
  --btn-equal-hover: #3a56d4;
  --btn-equal-text: #ffffff;
  --btn-clear: #ff6b6b;
  --btn-clear-hover: #ee5a5a;
  --btn-clear-text: #ffffff;
  --border: #dee2e6;
  --shadow: rgba(0,0,0,0.1);
  --history-bg: #ffffff;
  --history-header: #f8f9fa;
  --plot-bg: #ffffff;
  --plot-grid: #e0e0e0;
  --plot-axis: #333;
  --plot-line: #4361ee;
  --scrollbar-thumb: #c1c1c1;
  --theme-transition: background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
}

/* ========== Dark Theme ========== */
[data-theme="dark"] {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-display: #0d0d20;
  --text-primary: #e0e0e0;
  --text-secondary: #aaa;
  --text-display: #00ff88;
  --text-display-expr: #aabcff;
  --accent: #6c63ff;
  --accent-hover: #5a52e0;
  --btn-number: #1e1e3a;
  --btn-number-hover: #2a2a4a;
  --btn-number-text: #e0e0e0;
  --btn-op: #252545;
  --btn-op-hover: #303055;
  --btn-op-text: #e0e0e0;
  --btn-func: #1a1a3e;
  --btn-func-hover: #252560;
  --btn-func-text: #b0b0ff;
  --btn-equal: #6c63ff;
  --btn-equal-hover: #5a52e0;
  --btn-equal-text: #ffffff;
  --btn-clear: #ff4757;
  --btn-clear-hover: #ff6b81;
  --btn-clear-text: #ffffff;
  --border: #2a2a4a;
  --shadow: rgba(0,0,0,0.4);
  --history-bg: #12122a;
  --history-header: #1a1a3a;
  --plot-bg: #0d0d20;
  --plot-grid: #1e1e3e;
  --plot-axis: #555;
  --plot-line: #00ff88;
  --scrollbar-thumb: #3a3a5a;
}

/* ========== Retro Theme ========== */
[data-theme="retro"] {
  --bg-primary: #2c2c34;
  --bg-secondary: #3c3c46;
  --bg-display: #1a1a24;
  --text-primary: #33ff33;
  --text-secondary: #228822;
  --text-display: #33ff33;
  --text-display-expr: #22bb22;
  --accent: #33ff33;
  --accent-hover: #22cc22;
  --btn-number: #2c2c38;
  --btn-number-hover: #3c3c4a;
  --btn-number-text: #33ff33;
  --btn-op: #24243a;
  --btn-op-hover: #34344a;
  --btn-op-text: #33ff33;
  --btn-func: #2a2a44;
  --btn-func-hover: #3a3a54;
  --btn-func-text: #00dd00;
  --btn-equal: #33ff33;
  --btn-equal-hover: #22cc22;
  --btn-equal-text: #1a1a24;
  --btn-clear: #ff3344;
  --btn-clear-hover: #ff5566;
  --btn-clear-text: #1a1a24;
  --border: #3c3c4a;
  --shadow: rgba(0,255,51,0.1);
  --history-bg: #2c2c34;
  --history-header: #3c3c46;
  --plot-bg: #1a1a24;
  --plot-grid: #223322;
  --plot-axis: #33ff33;
  --plot-line: #ffaa00;
  --scrollbar-thumb: #338833;
}

/* ========== Base Reset ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: var(--theme-transition);
  overflow-x: hidden;
}

/* ========== Layout ========== */
.app-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
  min-height: 100vh;
  align-items: flex-start;
}

/* ========== Theme Selector ========== */
.theme-selector {
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 14px;
  color: var(--text-secondary);
}
.theme-selector select {
  padding: 6px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  cursor: pointer;
  font-size: 14px;
}

/* ========== Button Styles ========== */
.btn {
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  padding: 14px 8px;
  transition: all 0.15s ease;
  user-select: none;
  position: relative;
  outline: none;
  font-family: inherit;
}
.btn:focus-visible {
  box-shadow: 0 0 0 3px var(--accent);
}
.btn:active {
  transform: scale(0.95);
}
.btn-number { background: var(--btn-number); color: var(--btn-number-text); }
.btn-number:hover { background: var(--btn-number-hover); }
.btn-op { background: var(--btn-op); color: var(--btn-op-text); }
.btn-op:hover { background: var(--btn-op-hover); }
.btn-func { background: var(--btn-func); color: var(--btn-func-text); font-size: 13px; }
.btn-func:hover { background: var(--btn-func-hover); }
.btn-equal { background: var(--btn-equal); color: var(--btn-equal-text); }
.btn-equal:hover { background: var(--btn-equal-hover); }
.btn-clear { background: var(--btn-clear); color: var(--btn-clear-text); }
.btn-clear:hover { background: var(--btn-clear-hover); }

/* ========== Calculator ========== */
.calculator {
  width: 380px;
  background: var(--bg-secondary);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 8px 32px var(--shadow);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.calculator-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.calculator-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-primary);
}

/* ========== Display ========== */
.display {
  background: var(--bg-display);
  border-radius: 16px;
  padding: 20px;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 4px;
  overflow: hidden;
}
.display-expression {
  font-size: 14px;
  color: var(--text-display-expr);
  text-align: right;
  word-break: break-all;
  min-height: 20px;
  font-family: 'Courier New', monospace;
}
.display-result {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-display);
  text-align: right;
  word-break: break-all;
  font-family: 'Courier New', monospace;
  transition: color 0.2s;
}
.display-result.error {
  color: var(--btn-clear);
  font-size: 18px;
}
.display-result.calculated {
  color: var(--accent);
}

/* ========== Button Grid (scientific) ========== */
.btn-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
}

.btn-grid .btn.ac-span {
  grid-column: span 2;
}

/* ========== History ========== */
.history-panel {
  width: 340px;
  max-height: 600px;
  background: var(--history-bg);
  border-radius: 20px;
  box-shadow: 0 8px 32px var(--shadow);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: var(--theme-transition);
}
.history-header {
  padding: 16px 20px;
  background: var(--history-header);
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
}
.history-header h3 {
  font-size: 16px;
  font-weight: 700;
}
.history-clear {
  background: none;
  border: none;
  color: var(--btn-clear);
  cursor: pointer;
  font-size: 13px;
  padding: 4px 8px;
  border-radius: 6px;
}
.history-clear:hover { background: rgba(255,107,107,0.1); }
.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar-thumb) transparent;
}
.history-list::-webkit-scrollbar { width: 6px; }
.history-list::-webkit-scrollbar-track { background: transparent; }
.history-list::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 3px; }

.history-item {
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: background 0.15s;
}
.history-item:hover { background: var(--bg-primary); }
.history-expr {
  font-size: 13px;
  color: var(--text-secondary);
  font-family: 'Courier New', monospace;
}
.history-result {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-primary);
  font-family: 'Courier New', monospace;
}
.history-empty {
  text-align: center;
  color: var(--text-secondary);
  padding: 40px 20px;
  font-size: 14px;
}

/* ========== Function Plotter ========== */
.plotter-panel {
  width: 100%;
  background: var(--plot-bg);
  border-radius: 20px;
  box-shadow: 0 8px 32px var(--shadow);
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: var(--theme-transition);
}
.plotter-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}
.plotter-header h3 {
  font-size: 18px;
  font-weight: 700;
}
.plotter-controls {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.plotter-controls input {
  padding: 8px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-family: 'Courier New', monospace;
  font-size: 14px;
  width: 240px;
  outline: none;
}
.plotter-controls input:focus { border-color: var(--accent); }
.plotter-controls input::placeholder { color: var(--text-secondary); }
.plotter-controls .btn { padding: 8px 16px; font-size: 14px; }
.plotter-hint {
  font-size: 12px;
  color: var(--text-secondary);
}
.plotter-hint code {
  background: var(--bg-primary);
  padding: 1px 5px;
  border-radius: 4px;
  font-family: 'Courier New', monospace;
}

.plotter-zoom-controls {
  display: flex;
  gap: 6px;
  align-items: center;
}
.plotter-zoom-controls .btn {
  padding: 6px 12px;
  font-size: 14px;
  min-width: 36px;
}

.plot-canvas-wrapper {
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  background: var(--plot-bg);
}
.plot-canvas {
  display: block;
  width: 100%;
  cursor: crosshair;
}

/* ========== Toast ========== */
.toast-container {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: 10px;
  background: var(--bg-secondary);
  color: var(--text-primary);
  box-shadow: 0 4px 20px var(--shadow);
  font-size: 14px;
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  border-left: 4px solid var(--btn-clear);
}
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } }
@keyframes toastOut { to { transform: translateX(100%); opacity: 0; } }

/* ========== Responsive ========== */
@media (max-width: 800px) {
  .app-container { padding: 10px; gap: 14px; }
  .calculator { width: 100%; max-width: 400px; }
  .history-panel { width: 100%; max-width: 400px; max-height: 250px; }
  .plotter-panel { width: 100%; }
  .display-result { font-size: 26px; }
  .btn { padding: 12px 6px; font-size: 14px; }
  .btn-func { font-size: 11px; }
}
@media (max-width: 400px) {
  .btn-grid { gap: 5px; }
  .btn { padding: 10px 4px; font-size: 13px; border-radius: 8px; }
  .btn-func { font-size: 10px; }
  .display-result { font-size: 22px; }
  .display-expression { font-size: 12px; }
  .calculator { padding: 14px; border-radius: 14px; }
}
</style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>

<div class="app-container">

  <!-- ===== Calculator ===== -->
  <div class="calculator" id="calculator" tabindex="0" aria-label="科学计算器">
    <div class="calculator-header">
      <span class="calculator-title">科学计算器</span>
      <div class="theme-selector">
        <span>主题:</span>
        <select id="themeSelect" aria-label="选择主题">
          <option value="light">浅色</option>
          <option value="dark">深色</option>
          <option value="retro">复古</option>
        </select>
      </div>
    </div>

    <div class="display">
      <div class="display-expression" id="displayExpr"></div>
      <div class="display-result" id="displayResult">0</div>
    </div>

    <div class="btn-grid" id="btnGrid">
      <button class="btn btn-clear" data-action="clear">AC</button>
      <button class="btn btn-clear" data-action="backspace">&#9003;</button>
      <button class="btn btn-op"   data-action="input" data-value="(">(</button>
      <button class="btn btn-op"   data-action="input" data-value=")">)</button>
      <button class="btn btn-op"   data-action="input" data-value="^">^</button>

      <button class="btn btn-func" data-action="input" data-value="sin(">sin</button>
      <button class="btn btn-func" data-action="input" data-value="cos(">cos</button>
      <button class="btn btn-func" data-action="input" data-value="tan(">tan</button>
      <button class="btn btn-func" data-action="input" data-value="log(">log</button>
      <button class="btn btn-func" data-action="input" data-value="ln(">ln</button>

      <button class="btn btn-func" data-action="input" data-value="sqrt(">√</button>
      <button class="btn btn-func" data-action="input" data-value="abs(">|x|</button>
      <button class="btn btn-func" data-action="input" data-value="π">π</button>
      <button class="btn btn-func" data-action="input" data-value="e">e</button>
      <button class="btn btn-op"   data-action="input" data-value="!">n!</button>

      <button class="btn btn-number" data-action="input" data-value="7">7</button>
      <button class="btn btn-number" data-action="input" data-value="8">8</button>
      <button class="btn btn-number" data-action="input" data-value="9">9</button>
      <button class="btn btn-op"     data-action="input" data-value="/">÷</button>
      <button class="btn btn-op"     data-action="input" data-value="%">%</button>

      <button class="btn btn-number" data-action="input" data-value="4">4</button>
      <button class="btn btn-number" data-action="input" data-value="5">5</button>
      <button class="btn btn-number" data-action="input" data-value="6">6</button>
      <button class="btn btn-op"     data-action="input" data-value="*">×</button>
      <button class="btn btn-func"   data-action="input" data-value="**2">x²</button>

      <button class="btn btn-number" data-action="input" data-value="1">1</button>
      <button class="btn btn-number" data-action="input" data-value="2">2</button>
      <button class="btn btn-number" data-action="input" data-value="3">3</button>
      <button class="btn btn-op"     data-action="input" data-value="-">−</button>
      <button class="btn btn-func"   data-action="input" data-value="**-1">1/x</button>

      <button class="btn btn-number" data-action="input" data-value="0">0</button>
      <button class="btn btn-number" data-action="input" data-value=".">.</button>
      <button class="btn btn-equal"  data-action="calculate" style="grid-column: span 3;">=</button>
    </div>
  </div>

  <!-- ===== History ===== -->
  <div class="history-panel">
    <div class="history-header">
      <h3>计算历史</h3>
      <button class="history-clear" id="historyClear" aria-label="清除历史">清除</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">暂无计算历史</div>
    </div>
  </div>

  <!-- ===== Function Plotter ===== -->
  <div class="plotter-panel">
    <div class="plotter-header">
      <h3>函数绘图</h3>
      <div class="plotter-controls">
        <input type="text" id="plotInput" placeholder="输入函数，例如: x^2, sin(x)" aria-label="函数表达式">
        <button class="btn btn-equal" data-action="plot">绘制</button>
      </div>
    </div>
    <div class="plotter-hint">
      支持: <code>+ - * / ^ sin cos tan log ln sqrt abs pi e</code> &nbsp;|&nbsp;
      示例: <code>sin(x) * x</code>, <code>x^3 - 3*x</code>, <code>1/x</code>
    </div>
    <div class="plotter-zoom-controls">
      <button class="btn btn-func" data-action="zoom-in">+ 放大</button>
      <button class="btn btn-func" data-action="zoom-out">− 缩小</button>
      <button class="btn btn-func" data-action="zoom-reset">重置</button>
      <span style="font-size:12px; color:var(--text-secondary); margin-left:4px;" id="zoomLevel">缩放: 1x</span>
    </div>
    <div class="plot-canvas-wrapper">
      <canvas id="plotCanvas" class="plot-canvas" width="800" height="400"></canvas>
    </div>
  </div>

</div>

<script>
/* ================================================================
 *  Shunting-Yard Expression Parser & Evaluator
 * ================================================================ */
(function() {
  'use strict';

  /* ---------- Constants ---------- */
  const CONSTANTS = {
    'pi': Math.PI,
    'π':  Math.PI,
    'e':  Math.E,
  };

  const FUNCTIONS = {
    'sin':  Math.sin,
    'cos':  Math.cos,
    'tan':  Math.tan,
    'asin': Math.asin,
    'acos': Math.acos,
    'atan': Math.atan,
    'log':  Math.log10,
    'ln':   Math.log,
    'sqrt': Math.sqrt,
    'abs':  Math.abs,
    'ceil': Math.ceil,
    'floor':Math.floor,
  };

  /* Operator table: [precedence, right-associative?, token] */
  const OPERATORS = {
    '+':  [2, false], '-':  [2, false],
    '*':  [3, false], '/':  [3, false], '%': [3, false],
    '^':  [4, true],  '**': [4, true],
    '!':  [5, true],  // postfix unary
  };

  /* ---------- Tokeniser ---------- */
  function tokenize(expr) {
    const tokens = [];
    let i = 0;
    while (i < expr.length) {
      const ch = expr[i];
      if (/\s/.test(ch)) { i++; continue; }

      /* number (integer / decimal) */
      if (/\d/.test(ch) || (ch === '.' && i + 1 < expr.length && /\d/.test(expr[i+1]))) {
        let num = '';
        while (i < expr.length && (/\d/.test(expr[i]) || expr[i] === '.')) num += expr[i++];
        tokens.push({ type: 'number', value: num });
        continue;
      }

      /* identifiers: functions or constants */
      if (/[a-zA-Zπ]/.test(ch)) {
        let id = '';
        while (i < expr.length && /[a-zA-Zπ]/.test(expr[i])) id += expr[i++];
        if (FUNCTIONS[id]) {
          tokens.push({ type: 'function', value: id });
        } else if (CONSTANTS[id] !== undefined) {
          tokens.push({ type: 'number', value: String(CONSTANTS[id]) });
        } else {
          throw new Error(`未知标识符: "${id}"`);
        }
        continue;
      }

      /* two-char operator ** */
      if (ch === '*' && expr[i+1] === '*') {
        tokens.push({ type: 'operator', value: '**' }); i += 2; continue;
      }
      if ((ch === '*' && expr[i+1] === '-') || (ch === '*' && expr[i+1] === '2')) {
        // handle implicit patterns like **-1, **2 — already covered by ** above
      }

      /* single-char operators & parentheses */
      if ('+-*/%^!'.includes(ch)) {
        /* treat unary minus: if start, after '(' or after operator */
        if (ch === '-' && (tokens.length === 0 ||
            tokens[tokens.length-1].type === 'operator' ||
            tokens[tokens.length-1].value === '(')) {
          tokens.push({ type: 'number', value: '0' });
        }
        tokens.push({ type: 'operator', value: ch }); i++; continue;
      }

      if (ch === '(') { tokens.push({ type: 'left-paren', value: '(' }); i++; continue; }
      if (ch === ')') {
        /* implicitly multiply before ')', e.g. 2(3) => 2*(3) */
        const last = tokens[tokens.length - 1];
        if (last && (last.type === 'number' || last.value === ')' || last.type === 'function')) {
          tokens.push({ type: 'operator', value: '*' });
        }
        tokens.push({ type: 'right-paren', value: ')' }); i++; continue;
      }

      /* implicit multiplication: number directly before '(' or function */
      const last = tokens[tokens.length - 1];
      if ((ch === '(' || /[a-zA-Zπ]/.test(ch)) && last && (last.type === 'number' || last.value === ')')) {
        tokens.push({ type: 'operator', value: '*' });
      }
      throw new Error(`未知字符: "${ch}"`);
    }
    return tokens;
  }

  /* ---------- Shunting-Yard ---------- */
  function shuntingYard(tokens) {
    const output = [];
    const opStack = [];

    for (let i = 0; i < tokens.length; i++) {
      const tok = tokens[i];

      if (tok.type === 'number') {
        output.push(tok);
      } else if (tok.type === 'function') {
        opStack.push(tok);
      } else if (tok.type === 'operator') {
        while (opStack.length > 0) {
          const top = opStack[opStack.length - 1];
          if (top.type === 'operator') {
            const [p1] = OPERATORS[tok.value];
            const [p2, rAssoc] = OPERATORS[top.value];
            if ((rAssoc ? p1 < p2 : p1 <= p2)) {
              output.push(opStack.pop());
              continue;
            }
          } else if (top.type === 'function') {
            output.push(opStack.pop());
            continue;
          }
          break;
        }
        opStack.push(tok);
      } else if (tok.type === 'left-paren') {
        opStack.push(tok);
      } else if (tok.type === 'right-paren') {
        let found = false;
        while (opStack.length > 0) {
          const top = opStack.pop();
          if (top.value === '(') { found = true; break; }
          output.push(top);
        }
        if (!found) throw new Error('括号不匹配');
      }
    }
    while (opStack.length > 0) {
      const top = opStack.pop();
      if (top.value === '(' || top.value === ')') throw new Error('括号不匹配');
      output.push(top);
    }
    return output;
  }

  /* ---------- Evaluator ---------- */
  function factorial(n) {
    if (n < 0) throw new Error('负数没有阶乘');
    if (n !== Math.floor(n)) throw new Error('阶乘仅支持整数');
    if (n > 170) throw new Error('数值溢出');
    let r = 1;
    for (let i = 2; i <= n; i++) r *= i;
    return r;
  }

  function evaluatePostfix(postfix) {
    const stack = [];

    for (const tok of postfix) {
      if (tok.type === 'number') {
        stack.push(parseFloat(tok.value));
      } else if (tok.type === 'function') {
        if (stack.length < 1) throw new Error(`函数 ${tok.value} 参数不足`);
        const arg = stack.pop();
        const fn = FUNCTIONS[tok.value];
        if (!fn) throw new Error(`未知函数: ${tok.value}`);
        const result = fn(arg);
        if (typeof result !== 'number' || !isFinite(result)) {
          throw new Error(`${tok.value}(${arg}) 结果无效`);
        }
        stack.push(result);
      } else if (tok.type === 'operator') {
        if (tok.value === '!') {
          const a = stack.pop();
          stack.push(factorial(a));
        } else {
          if (stack.length < 2) throw new Error('运算符参数不足');
          const b = stack.pop();
          const a = stack.pop();
          let result;
          switch (tok.value) {
            case '+':  result = a + b; break;
            case '-':  result = a - b; break;
            case '*':  result = a * b; break;
            case '/':
              if (b === 0) throw new Error('除数不能为零');
              result = a / b;
              break;
            case '%':  result = a % b; break;
            case '^': case '**':
              if (a === 0 && b < 0) throw new Error('0 的负数次幂未定义');
              result = Math.pow(a, b);
              break;
            default: throw new Error(`未知运算符: ${tok.value}`);
          }
          if (!isFinite(result) && !isNaN(result)) {
            // pass through
          }
          stack.push(result);
        }
      }
    }
    if (stack.length !== 1) throw new Error('表达式错误');
    return stack[0];
  }

  /* ---------- Public API ---------- */
  window.CalcEngine = {
    evaluate(expr) {
      if (!expr || !expr.trim()) throw new Error('请输入表达式');
      const tokens = tokenize(expr);
      const rpn = shuntingYard(tokens);
      const result = evaluatePostfix(rpn);
      return result;
    },

    /* For the plotter: evaluate an expression with x as variable */
    evaluateWithX(expr, x) {
      const substituted = expr.replace(/\bx\b/g, `(${x})`);
      return this.evaluate(substituted);
    }
  };
})();


/* ================================================================
 *  Calculator UI Controller
 * ================================================================ */
(function() {
  'use strict';

  const displayExpr  = document.getElementById('displayExpr');
  const displayResult = document.getElementById('displayResult');
  const btnGrid      = document.getElementById('btnGrid');
  const historyList  = document.getElementById('historyList');
  const historyClear = document.getElementById('historyClear');
  const themeSelect  = document.getElementById('themeSelect');
  const toastContainer = document.getElementById('toastContainer');

  let currentExpr = '';
  let lastAnswer = null;
  let history = [];

  /* ---------- UI Helpers ---------- */
  function setDisplay(expr, result, isError) {
    displayExpr.textContent = expr || '';
    if (isError) {
      displayResult.textContent = result;
      displayResult.className = 'display-result error';
    } else {
      displayResult.textContent = result;
      displayResult.className = 'display-result';
    }
  }

  function showToast(msg) {
    const t = document.createElement('div');
    t.className = 'toast';
    t.textContent = msg;
    toastContainer.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  /* ---------- Expression Formatting ---------- */
  function formatExpression(expr) {
    return expr
      .replace(/\*/g, '×')
      .replace(/\//g, '÷')
      .replace(/\*\*/g, '^');
  }

  function formatResult(num) {
    if (Number.isInteger(num) && Math.abs(num) < 1e15) return num.toString();
    const s = parseFloat(num.toPrecision(12));
    if (Math.abs(s) < 1e-10 && s !== 0) return s.toExponential(6);
    if (Math.abs(s) > 1e12) return s.toExponential(6);
    return String(s);
  }

  /* ---------- History ---------- */
  function addHistory(expr, result) {
    history.unshift({ expr, result, time: new Date() });
    if (history.length > 100) history.pop();
    renderHistory();
  }

  function renderHistory() {
    if (history.length === 0) {
      historyList.innerHTML = '<div class="history-empty">暂无计算历史</div>';
      return;
    }
    historyList.innerHTML = history.map((h, i) => `
      <div class="history-item" data-index="${i}" title="点击使用此结果">
        <div class="history-expr">${formatExpression(h.expr)}</div>
        <div class="history-result">= ${h.result}</div>
      </div>
    `).join('');
    historyList.querySelectorAll('.history-item').forEach(item => {
      item.addEventListener('click', () => {
        const idx = parseInt(item.dataset.index);
        const val = history[idx].result;
        currentExpr = val;
        setDisplay(formatExpression(val), val);
        document.getElementById('calculator').focus();
      });
    });
  }

  historyClear.addEventListener('click', () => {
    history = [];
    renderHistory();
    showToast('历史已清除');
  });

  /* ---------- Actions ---------- */
  function inputChar(value) {
    /* If a result was just shown, start fresh unless appending operator/function */
    if (displayResult.classList.contains('calculated')) {
      if (/^[\d.]$/.test(value)) {
        currentExpr = '';
        displayResult.className = 'display-result';
      }
    }
    currentExpr += value;
    setDisplay(formatExpression(currentExpr), currentExpr.replace(/\*\*/g,'^'));
  }

  function calculate() {
    try {
      const result = CalcEngine.evaluate(currentExpr);
      const formatted = formatResult(result);
      addHistory(currentExpr, formatted);
      setDisplay(formatExpression(currentExpr) + ' =', formatted, false);
      displayResult.classList.add('calculated');
      currentExpr = String(result);
      lastAnswer = result;
    } catch (err) {
      setDisplay(formatExpression(currentExpr), err.message, true);
      currentExpr = '';
    }
  }

  function clearAll() {
    currentExpr = '';
    lastAnswer = null;
    setDisplay('', '0');
    displayResult.className = 'display-result';
  }

  function backspace() {
    if (currentExpr.length === 0) return;
    /* Remove trailing function name like "sin(" */
    const funcMatch = currentExpr.match(/(sin|cos|tan|log|ln|sqrt|abs)\($/);
    if (funcMatch) {
      currentExpr = currentExpr.slice(0, -funcMatch[0].length);
    } else {
      currentExpr = currentExpr.slice(0, -1);
    }
    setDisplay(formatExpression(currentExpr), currentExpr.replace(/\*\*/g,'^') || '0');
  }

  /* ---------- Button Clicks ---------- */
  btnGrid.addEventListener('click', e => {
    const btn = e.target.closest('.btn');
    if (!btn) return;
    const action = btn.dataset.action;
    const value = btn.dataset.value;
    switch (action) {
      case 'input':    inputChar(value); break;
      case 'calculate': calculate(); break;
      case 'clear':    clearAll(); break;
      case 'backspace': backspace(); break;
    }
    document.getElementById('calculator').focus();
  });

  /* ---------- Keyboard Support ---------- */
  document.getElementById('calculator').addEventListener('keydown', e => {
    const key = e.key;
    if (/^[0-9]$/.test(key)) { inputChar(key); e.preventDefault(); return; }
    if (key === '.') { inputChar('.'); e.preventDefault(); return; }
    if (key === '+') { inputChar('+'); e.preventDefault(); return; }
    if (key === '-') { inputChar('-'); e.preventDefault(); return; }
    if (key === '*') { inputChar('*'); e.preventDefault(); return; }
    if (key === '/') { inputChar('/'); e.preventDefault(); return; }
    if (key === '%') { inputChar('%'); e.preventDefault(); return; }
    if (key === '(') { inputChar('('); e.preventDefault(); return; }
    if (key === ')') { inputChar(')'); e.preventDefault(); return; }
    if (key === '^') { inputChar('^'); e.preventDefault(); return; }
    if (key === '!') { inputChar('!'); e.preventDefault(); return; }
    if (key === 'Enter' || key === '=') { calculate(); e.preventDefault(); return; }
    if (key === 'Backspace') { backspace(); e.preventDefault(); return; }
    if (key === 'Escape' || key === 'Delete') { clearAll(); e.preventDefault(); return; }
    if (key === 'Ans' || key === 'a') {
      if (lastAnswer !== null) { inputChar(String(lastAnswer)); }
      e.preventDefault(); return;
    }
  });

  /* ---------- Theme ---------- */
  themeSelect.addEventListener('change', () => {
    document.documentElement.setAttribute('data-theme', themeSelect.value);
    localStorage.setItem('calc-theme', themeSelect.value);
    drawPlot(); // redraw with new colors
  });
  // load saved theme
  const savedTheme = localStorage.getItem('calc-theme');
  if (savedTheme) {
    themeSelect.value = savedTheme;
    document.documentElement.setAttribute('data-theme', savedTheme);
  }

  /* ---------- Init ---------- */
  setDisplay('', '0');

})();


/* ================================================================
 *  Function Plotter
 * ================================================================ */
(function() {
  'use strict';

  const canvas      = document.getElementById('plotCanvas');
  const ctx         = canvas.getContext('2d');
  const plotInput   = document.getElementById('plotInput');
  const zoomLabel   = document.getElementById('zoomLevel');
  const toastContainer = document.getElementById('toastContainer');

  let plotExpr     = null;
  let scale         = 50;  // pixels per unit
  let offsetX       = 0;
  let offsetY       = 0;
  let isDragging    = false;
  let dragStartX, dragStartY, dragOffsetX, dragOffsetY;

  function resizeCanvas() {
    const wrapper = canvas.parentElement;
    const w = wrapper.clientWidth;
    const h = Math.max(300, Math.min(400, w * 0.5));
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    drawPlot();
  }

  function getCSS(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  }

  function drawPlot() {
    const W = canvas.width / (window.devicePixelRatio || 1);
    const H = canvas.height / (window.devicePixelRatio || 1);

    const bgColor     = getCSS('--plot-bg')    || '#ffffff';
    const gridColor   = getCSS('--plot-grid')   || '#e0e0e0';
    const axisColor   = getCSS('--plot-axis')   || '#333';
    const lineColor   = getCSS('--plot-line')   || '#4361ee';
    const textColor   = getCSS('--text-secondary') || '#888';

    ctx.fillStyle = bgColor;
    ctx.fillRect(0, 0, W, H);

    const cx = W / 2 + offsetX;
    const cy = H / 2 + offsetY;

    /* Grid lines */
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    ctx.beginPath();

    // Determine grid spacing
    let gridStep = 1;
    if (scale < 20) gridStep = 5;
    if (scale < 8) gridStep = 10;
    if (scale > 100) gridStep = 0.5;
    if (scale > 300) gridStep = 0.2;

    // Vertical grid lines
    const xMin = Math.floor((-cx) / (scale * gridStep)) * gridStep;
    const xMax = Math.ceil((W - cx) / (scale * gridStep)) * gridStep;
    for (let x = xMin; x <= xMax; x += gridStep) {
      const px = cx + x * scale;
      ctx.moveTo(px, 0);
      ctx.lineTo(px, H);
    }

    // Horizontal grid lines
    const yMin = Math.floor((-cy) / (scale * gridStep)) * gridStep;
    const yMax = Math.ceil((H - cy) / (scale * gridStep)) * gridStep;
    for (let y = yMin; y <= yMax; y += gridStep) {
      const py = cy + y * scale;
      ctx.moveTo(0, py);
      ctx.lineTo(W, py);
    }
    ctx.stroke();

    /* Axes */
    ctx.strokeStyle = axisColor;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    // X axis
    if (cy >= 0 && cy <= H) {
      ctx.moveTo(0, cy);
      ctx.lineTo(W, cy - 6);
      ctx.moveTo(W - 2, cy - 10);
      ctx.lineTo(W, cy);
      ctx.lineTo(W - 2, cy + 10);
    }
    // Y axis
    if (cx >= 0 && cx <= W) {
      ctx.moveTo(cx, H);
      ctx.lineTo(cx, 4);
      ctx.moveTo(cx - 5, 8);
      ctx.lineTo(cx, 0);
      ctx.lineTo(cx + 5, 8);
    }
    ctx.stroke();

    /* Axis labels */
    ctx.fillStyle = textColor;
    ctx.font = '11px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    // X labels
    for (let x = xMin; x <= xMax; x += gridStep) {
      if (Math.abs(x) < 1e-9) continue;
      const px = cx + x * scale;
      if (px > 30 && px < W - 30) {
        const label = Number.isInteger(x) ? String(x) : x.toFixed(1);
        ctx.fillText(label, px, cy + 6 > H - 14 ? cy - 18 : cy + 6);
      }
    }
    // Y labels
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    for (let y = yMin; y <= yMax; y += gridStep) {
      if (Math.abs(y) < 1e-9) continue;
      const py = cy + y * scale;
      if (py > 14 && py < H - 14) {
        const label = Number.isInteger(y) ? String(y) : y.toFixed(1);
        ctx.fillText(label, cx + 6 < 40 ? cx - 6 : cx > W - 40 ? cx + 30 : cx - 6, py);
      }
    }
    // Origin
    ctx.textAlign = 'right';
    ctx.textBaseline = 'top';
    if (cx > 10 && cx < W - 10 && cy > 10 && cy < H - 10) {
      ctx.fillText('0', cx - 6, cy + 6);
    }

    /* Plot function */
    if (plotExpr) {
      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 2;
      ctx.lineJoin = 'round';
      ctx.beginPath();
      let started = false;
      const step = 1 / scale; // one pixel step in math units

      for (let px = 0; px <= W; px += 0.5) {
        const mathX = (px - cx) / scale;
        try {
          const mathY = CalcEngine.evaluateWithX(plotExpr, mathX);
          if (!isFinite(mathY) || isNaN(mathY)) { started = false; continue; }
          const py = cy - mathY * scale;
          if (py < -2000 || py > H + 2000) { started = false; continue; }
          if (!started) { ctx.moveTo(px, py); started = true; }
          else { ctx.lineTo(px, py); }
        } catch {
          started = false;
        }
      }
      ctx.stroke();
    }

    /* Coordinate display on hover */
    zoomLabel.textContent = `缩放: ${(scale / 50).toFixed(1)}x`;
  }

  function plotFunction(expr) {
    if (!expr.trim()) { showToast('请输入函数表达式'); return; }
    // Test the expression is valid
    try {
      CalcEngine.evaluateWithX(expr, 1);
    } catch (err) {
      showToast(err.message);
      return;
    }
    plotExpr = expr.trim();
    drawPlot();
  }

  /* ---------- Plot controls ---------- */
  document.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    switch (btn.dataset.action) {
      case 'plot':
        plotFunction(plotInput.value);
        break;
      case 'zoom-in':
        scale *= 1.3;
        drawPlot();
        break;
      case 'zoom-out':
        scale /= 1.3;
        if (scale < 2) scale = 2;
        drawPlot();
        break;
      case 'zoom-reset':
        scale = 50; offsetX = 0; offsetY = 0;
        drawPlot();
        break;
    }
  });

  plotInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { plotFunction(plotInput.value); e.preventDefault(); }
  });

  /* ---------- Mouse drag & zoom ---------- */
  canvas.addEventListener('mousedown', e => {
    isDragging = true;
    dragStartX = e.clientX;
    dragStartY = e.clientY;
    dragOffsetX = offsetX;
    dragOffsetY = offsetY;
    canvas.style.cursor = 'grabbing';
  });
  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    offsetX = dragOffsetX + (e.clientX - dragStartX);
    offsetY = dragOffsetY + (e.clientY - dragStartY);
    drawPlot();
  });
  window.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = 'crosshair';
  });
  canvas.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    scale = Math.max(2, Math.min(2000, scale * factor));
    drawPlot();
  }, { passive: false });

  /* Touch support */
  let touchStartX, touchStartY, touchOffX, touchOffY;
  canvas.addEventListener('touchstart', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchOffX = offsetX;
      touchOffY = offsetY;
    }
  }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      offsetX = touchOffX + (t.clientX - touchStartX);
      offsetY = touchOffY + (t.clientY - touchStartY);
      drawPlot();
    }
  }, { passive: true });

  window.addEventListener('resize', resizeCanvas);

  /* Init */
  resizeCanvas();

})();
</script>
