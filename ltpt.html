<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>即时聊天</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #e8e8e8;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .chat-container {
    width: 420px;
    height: 640px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,.12);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ===== 头部 ===== */
  .chat-header {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .chat-header .avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .chat-header .info h3 { font-size: 16px; font-weight: 600; }
  .chat-header .info p  { font-size: 12px; opacity: .8; }

  /* ===== 消息区域 ===== */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }
  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  /* 消息气泡 */
  .message {
    display: flex;
    gap: 8px;
    max-width: 80%;
    animation: fadeUp .3s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .message.self { align-self: flex-end; flex-direction: row-reverse; }
  .message .m-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #ddd;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
  }
  .message.self .m-avatar { background: #667eea; color: #fff; }

  .bubble {
    padding: 10px 14px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    position: relative;
  }
  .message:not(.self) .bubble {
    background: #f1f0f0;
    color: #333;
    border-top-left-radius: 4px;
  }
  .message.self .bubble {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border-top-right-radius: 4px;
  }

  /* 未读消息标红 */
  .message.unread .bubble {
    border-left: 3px solid #ff4757;
  }
  .message.unread .m-avatar {
    box-shadow: 0 0 0 2px #ff4757;
  }

  .m-time {
    font-size: 11px;
    color: #999;
    margin-top: 4px;
  }
  .message.self .m-time { text-align: right; }

  /* ===== 底部输入区 ===== */
  .chat-input-area {
    border-top: 1px solid #eee;
    padding: 12px 16px;
    display: flex;
    align-items: flex-end;
    gap: 10px;
    flex-shrink: 0;
    background: #fafafa;
  }

  .emoji-btn {
    width: 36px; height: 36px;
    border: none; background: none; cursor: pointer;
    font-size: 22px;
    border-radius: 8px;
    transition: background .2s;
    flex-shrink: 0;
  }
  .emoji-btn:hover { background: #eee; }

  .input-wrap {
    flex: 1;
    position: relative;
  }
  .input-wrap textarea {
    width: 100%;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 8px 14px;
    font-size: 14px;
    resize: none;
    outline: none;
    font-family: inherit;
    line-height: 1.5;
    max-height: 100px;
    transition: border-color .2s;
  }
  .input-wrap textarea:focus { border-color: #667eea; }

  /* Emoji 面板 */
  .emoji-panel {
    display: none;
    position: absolute;
    bottom: 46px;
    left: 0;
    background: #fff;
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 10px;
    box-shadow: 0 4px 16px rgba(0,0,0,.1);
    width: 280px;
    z-index: 10;
  }
  .emoji-panel.show { display: block; }
  .emoji-panel .emoji-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .emoji-panel span {
    font-size: 24px;
    text-align: center;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: background .15s, transform .15s;
  }
  .emoji-panel span:hover {
    background: #f0f0f0;
    transform: scale(1.2);
  }

  .send-btn {
    height: 36px;
    padding: 0 18px;
    border: none;
    border-radius: 18px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity .2s, transform .1s;
  }
  .send-btn:hover { opacity: .9; }
  .send-btn:active { transform: scale(.95); }
  .send-btn:disabled { opacity: .4; cursor: not-allowed; }
</style>
</head>
<body>

<div class="chat-container">
  <!-- 头部 -->
  <div class="chat-header">
    <div class="avatar">🤖</div>
    <div class="info">
      <h3>智能助手</h3>
      <p id="status-text">在线</p>
    </div>
  </div>

  <!-- 消息列表 -->
  <div class="chat-messages" id="messages"></div>

  <!-- 输入区 -->
  <div class="chat-input-area">
    <button class="emoji-btn" id="emojiToggle" title="表情">😊</button>
    <div class="input-wrap">
      <div class="emoji-panel" id="emojiPanel">
        <div class="emoji-grid" id="emojiGrid"></div>
      </div>
      <textarea id="input" rows="1" placeholder="输入消息..."></textarea>
    </div>
    <button class="send-btn" id="sendBtn">发送</button>
  </div>
</div>

<script>
// ===== 数据 =====
const EMOJIS = [
  "😀","😂","🤣","😍","😎","🥺","😭","😡",
  "🤔","👍","👎","❤️","🔥","🎉","💯","✨",
  "🙏","💪","👀","💤","🍕","☕","🌈","🦄",
  "🐱","🐶","🎵","📸",
];

const BOT_REPLIES = [
  "你好！有什么可以帮你的吗？😊",
  "收到～我正在思考中 🤔",
  "这是个好问题！让我想想... 💡",
  "哈哈哈，太有趣了！😂",
  "没问题，交给我吧！💪",
  "了解了，我会尽快处理的 ⚡",
  "谢谢你的消息！❤️",
  "嗯嗯，我明白你的意思了 👍",
];

let unreadCount = 0;
let messages = [];
let isAtBottom = true;

// DOM
const $messages   = document.getElementById('messages');
const $input      = document.getElementById('input');
const $sendBtn    = document.getElementById('sendBtn');
const $emojiToggle = document.getElementById('emojiToggle');
const $emojiPanel = document.getElementById('emojiPanel');
const $emojiGrid  = document.getElementById('emojiGrid');
const $statusText = document.getElementById('status-text');

// ===== Emoji 面板 =====
EMOJIS.forEach(e => {
  const span = document.createElement('span');
  span.textContent = e;
  span.addEventListener('click', () => {
    $input.value += e;
    $input.focus();
    autoResize();
  });
  $emojiGrid.appendChild(span);
});

$emojiToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  $emojiPanel.classList.toggle('show');
});
document.addEventListener('click', (e) => {
  if (!$emojiPanel.contains(e.target) && e.target !== $emojiToggle) {
    $emojiPanel.classList.remove('show');
  }
});

// ===== 滚动检测 =====
$messages.addEventListener('scroll', () => {
  const threshold = 60;
  isAtBottom = $messages.scrollHeight - $messages.scrollTop - $messages.clientHeight < threshold;
});

function scrollToBottom(force) {
  requestAnimationFrame(() => {
    $messages.scrollTop = $messages.scrollHeight;
  });
}

// ===== 时间格式化 =====
function now() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

// ===== 渲染消息 =====
function renderMessage(msg) {
  const div = document.createElement('div');
  div.className = `message ${msg.self ? 'self' : ''} ${msg.unread ? 'unread' : ''}`;
  div.innerHTML = `
    <div class="m-avatar">${msg.self ? '我' : '🤖'}</div>
    <div>
      <div class="bubble">${escapeHtml(msg.text)}</div>
      <div class="m-time">${msg.time}</div>
    </div>`;
  $messages.appendChild(div);
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== 发送消息 =====
function send() {
  const text = $input.value.trim();
  if (!text) return;

  // 清除未读
  clearUnread();

  const msg = { text, self: true, unread: false, time: now() };
  messages.push(msg);
  renderMessage(msg);
  scrollToBottom();

  $input.value = '';
  $input.style.height = 'auto';
  $sendBtn.disabled = true;

  // 模拟回复
  setTimeout(() => botReply(), 800 + Math.random() * 1200);
}

function botReply() {
  const text = BOT_REPLIES[Math.floor(Math.random() * BOT_REPLIES.length)];
  const msg = { text, self: false, unread: !isAtBottom, time: now() };
  messages.push(msg);
  renderMessage(msg);

  if (msg.unread) {
    unreadCount++;
    updateStatus();
  } else {
    scrollToBottom();
  }
}

function clearUnread() {
  unreadCount = 0;
  updateStatus();
  document.querySelectorAll('.message.unread').forEach(el => el.classList.remove('unread'));
}

function updateStatus() {
  $statusText.textContent = unreadCount > 0 ? `${unreadCount} 条未读消息` : '在线';
  $statusText.style.color = unreadCount > 0 ? '#ff6b81' : '';
}

// 点击消息区域时清除未读
$messages.addEventListener('click', () => {
  if (unreadCount > 0) {
    clearUnread();
    scrollToBottom();
  }
});

// ===== 输入框自适应高度 =====
function autoResize() {
  $input.style.height = 'auto';
  $input.style.height = Math.min($input.scrollHeight, 100) + 'px';
}
$input.addEventListener('input', () => {
  autoResize();
  $sendBtn.disabled = !$input.value.trim();
});

// 回车发送 / Shift+回车换行
$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

$sendBtn.addEventListener('click', send);

// ===== 初始欢迎消息 =====
addWelcome();
function addWelcome() {
  const welcome = { text: '你好！我是智能助手，欢迎随时和我聊天 🎉', self: false, unread: false, time: now() };
  messages.push(welcome);
  renderMessage(welcome);
}
</script>
</body>
</html>
