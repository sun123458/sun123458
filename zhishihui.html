<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指示剂变色实验模拟器</title>
<style>
  :root {
    --bg: #0f1923;
    --card: #162130;
    --border: #2a3a4e;
    --accent: #00e5a0;
    --text: #e8edf2;
    --muted: #7a8ea0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* 背景粒子 */
  .bg-particles {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(1.5px 1.5px at 20% 30%, rgba(0,229,160,.15), transparent),
      radial-gradient(1px 1px at 60% 20%, rgba(0,229,160,.1), transparent),
      radial-gradient(1.5px 1.5px at 80% 70%, rgba(0,229,160,.12), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(100,160,255,.1), transparent),
      radial-gradient(1px 1px at 10% 60%, rgba(100,160,255,.08), transparent);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 900px; width: 100%; padding: 30px 20px 60px;
  }

  h1 {
    text-align: center;
    font-size: 28px; font-weight: 700;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #00e5a0, #00b4d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    text-align: center; color: var(--muted); font-size: 14px; margin-bottom: 32px;
  }

  /* 选择面板 */
  .panel {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .panel-title {
    font-size: 15px; font-weight: 600; margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }

  .panel-title::before {
    content: ''; display: inline-block;
    width: 4px; height: 18px; border-radius: 2px;
    background: var(--accent);
  }

  .option-group {
    display: flex; gap: 12px; flex-wrap: wrap;
  }

  .option-btn {
    flex: 1; min-width: 140px;
    padding: 14px 20px;
    background: rgba(255,255,255,.04);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px; font-weight: 500;
    cursor: pointer;
    transition: all .3s ease;
    text-align: center;
    user-select: none;
  }

  .option-btn:hover {
    border-color: rgba(0,229,160,.4);
    background: rgba(0,229,160,.06);
  }

  .option-btn.active {
    border-color: var(--accent);
    background: rgba(0,229,160,.1);
    box-shadow: 0 0 20px rgba(0,229,160,.15);
  }

  .option-btn .icon { font-size: 28px; display: block; margin-bottom: 6px; }
  .option-btn .label { font-size: 15px; }
  .option-btn .desc { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* 实验区域 */
  .experiment {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 30px 24px;
    display: flex; flex-direction: column; align-items: center;
    gap: 24px;
  }

  /* 试管区域 */
  .tubes-area {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 40px; padding: 20px 0 0;
  }

  .tube-wrapper {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
  }

  /* 试管 */
  .tube {
    position: relative;
    width: 64px; height: 200px;
  }

  /* 试管玻璃壁 */
  .tube-body {
    position: absolute;
    bottom: 0; left: 50%; transform: translateX(-50%);
    width: 56px; height: 180px;
    border: 3px solid rgba(180, 210, 240, .35);
    border-top: none;
    border-radius: 0 0 28px 28px;
    background: rgba(180, 210, 240, .04);
    overflow: hidden;
  }

  /* 试管口 */
  .tube-rim {
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 66px; height: 14px;
    border: 3px solid rgba(180, 210, 240, .35);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    background: rgba(180, 210, 240, .06);
  }

  /* 试管内液体 */
  .liquid {
    position: absolute;
    bottom: 3px; left: 3px; right: 3px;
    height: 0%;
    border-radius: 0 0 25px 25px;
    transition: height 1.2s cubic-bezier(.4,0,.2,1),
                background-color 1.8s cubic-bezier(.4,0,.2,1);
    opacity: .85;
  }

  /* 液面高光 */
  .liquid::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 6px;
    background: linear-gradient(180deg, rgba(255,255,255,.2), transparent);
    border-radius: 50%;
  }

  /* 液体波纹 */
  .liquid::after {
    content: '';
    position: absolute; top: -2px; left: -2px; right: -2px; height: 10px;
    background: inherit; border-radius: 50%;
    filter: blur(4px);
    opacity: .5;
    animation: none;
  }

  .liquid.mixing::after {
    animation: ripple .8s ease-in-out 3;
  }

  @keyframes ripple {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px) scaleY(1.5); }
  }

  /* 气泡 */
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,.25);
    animation: bubble-rise linear forwards;
  }

  @keyframes bubble-rise {
    0% { transform: translateY(0) scale(1); opacity: .6; }
    80% { opacity: .3; }
    100% { transform: translateY(-160px) scale(.3); opacity: 0; }
  }

  .tube-label {
    font-size: 13px; font-weight: 600; color: var(--muted);
    text-align: center; max-width: 80px;
  }

  /* 混合按钮 */
  .mix-btn {
    padding: 14px 56px;
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, #00e5a0, #00b4d8);
    color: #0f1923;
    border: none; border-radius: 50px;
    cursor: pointer;
    transition: all .3s ease;
    letter-spacing: 1px;
    position: relative; overflow: hidden;
  }

  .mix-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,229,160,.3);
  }

  .mix-btn:active { transform: scale(.97); }

  .mix-btn:disabled {
    opacity: .35; cursor: not-allowed;
    transform: none; box-shadow: none;
  }

  .mix-btn .arrow { display: inline-block; transition: transform .3s; }
  .mix-btn:hover .arrow { transform: translateX(4px); }

  /* 原理面板 */
  .result-panel {
    background: rgba(0,229,160,.05);
    border: 1px solid rgba(0,229,160,.2);
    border-radius: 14px;
    padding: 22px 26px;
    width: 100%;
    max-width: 600px;
    opacity: 0;
    transform: translateY(12px);
    transition: all .5s ease;
  }

  .result-panel.visible {
    opacity: 1; transform: translateY(0);
  }

  .result-title {
    font-size: 16px; font-weight: 700; margin-bottom: 12px;
    color: var(--accent);
    display: flex; align-items: center; gap: 8px;
  }

  .result-body {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
  }

  .color-swatch {
    width: 48px; height: 48px; border-radius: 12px;
    border: 2px solid rgba(255,255,255,.15);
    flex-shrink: 0;
    transition: background-color 1.8s ease;
  }

  .result-text { font-size: 14px; line-height: 1.8; color: var(--text); flex: 1; min-width: 260px; }
  .result-text .formula { color: var(--accent); font-weight: 600; }
  .result-text .arrow-text { color: #ff6b8a; font-weight: 600; }

  .neutral-tag {
    display: inline-block;
    padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 600;
  }
  .tag-acid { background: rgba(255,107,138,.15); color: #ff6b8a; }
  .tag-base { background: rgba(100,160,255,.15); color: #64a0ff; }
  .tag-neutral { background: rgba(255,200,60,.15); color: #ffc83c; }

  /* 重置 */
  .reset-btn {
    margin-top: 10px;
    padding: 10px 32px;
    font-size: 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    cursor: pointer;
    transition: all .3s;
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* 响应式 */
  @media (max-width: 600px) {
    .tubes-area { gap: 24px; }
    .tube { transform: scale(.85); }
    .option-btn { min-width: 100px; padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="bg-particles"></div>

<div class="container">
  <h1>指示剂变色实验模拟器</h1>
  <p class="subtitle">选择指示剂与溶液，观察混合后的颜色变化</p>

  <!-- 指示剂选择 -->
  <div class="panel">
    <div class="panel-title">选择指示剂</div>
    <div class="option-group" id="indicatorGroup">
      <div class="option-btn" data-id="litmus" onclick="selectOption('indicator','litmus')">
        <span class="icon">🧪</span>
        <span class="label">石蕊</span>
        <span class="desc">紫色指示剂</span>
      </div>
      <div class="option-btn" data-id="phenolphthalein" onclick="selectOption('indicator','phenolphthalein')">
        <span class="icon">💧</span>
        <span class="label">酚酞</span>
        <span class="desc">无色指示剂</span>
      </div>
    </div>
  </div>

  <!-- 溶液选择 -->
  <div class="panel">
    <div class="panel-title">选择溶液</div>
    <div class="option-group" id="solutionGroup">
      <div class="option-btn" data-id="vinegar" onclick="selectOption('solution','vinegar')">
        <span class="icon">🍶</span>
        <span class="label">醋</span>
        <span class="desc">酸性 · pH ≈ 3</span>
      </div>
      <div class="option-btn" data-id="lime" onclick="selectOption('solution','lime')">
        <span class="icon">🥛</span>
        <span class="label">石灰水</span>
        <span class="desc">碱性 · pH ≈ 12</span>
      </div>
      <div class="option-btn" data-id="salt" onclick="selectOption('solution','salt')">
        <span class="icon">🧂</span>
        <span class="label">盐水</span>
        <span class="desc">中性 · pH ≈ 7</span>
      </div>
    </div>
  </div>

  <!-- 实验区域 -->
  <div class="experiment">
    <div class="tubes-area">
      <!-- 指示剂试管 -->
      <div class="tube-wrapper">
        <div class="tube">
          <div class="tube-rim"></div>
          <div class="tube-body">
            <div class="liquid" id="liquidIndicator"></div>
          </div>
        </div>
        <div class="tube-label" id="labelIndicator">指示剂</div>
      </div>

      <!-- 混合试管 -->
      <div class="tube-wrapper">
        <div class="tube">
          <div class="tube-rim"></div>
          <div class="tube-body">
            <div class="liquid" id="liquidResult"></div>
          </div>
        </div>
        <div class="tube-label">混合结果</div>
      </div>

      <!-- 溶液试管 -->
      <div class="tube-wrapper">
        <div class="tube">
          <div class="tube-rim"></div>
          <div class="tube-body">
            <div class="liquid" id="liquidSolution"></div>
          </div>
        </div>
        <div class="tube-label" id="labelSolution">溶液</div>
      </div>
    </div>

    <button class="mix-btn" id="mixBtn" disabled onclick="doMix()">
      开始混合 <span class="arrow">→</span>
    </button>

    <div class="result-panel" id="resultPanel">
      <div class="result-title">&#x1f52c; 变色原理</div>
      <div class="result-body">
        <div class="color-swatch" id="resultSwatch"></div>
        <div class="result-text" id="resultText"></div>
      </div>
    </div>

    <button class="reset-btn" id="resetBtn" style="display:none" onclick="doReset()">
      重新实验
    </button>
  </div>
</div>

<script>
// ── 数据 ──────────────────────────────────────────
const DATA = {
  indicators: {
    litmus:           { name: '石蕊',     baseColor: 'rgba(128, 80, 160, 0.85)' },
    phenolphthalein:  { name: '酚酞',     baseColor: 'rgba(230, 235, 240, 0.45)' }
  },
  solutions: {
    vinegar: { name: '醋（醋酸）', color: 'rgba(200, 195, 140, 0.7)', tag: '酸性', tagClass: 'tag-acid' },
    lime:    { name: '石灰水',   color: 'rgba(210, 230, 250, 0.65)', tag: '碱性', tagClass: 'tag-base' },
    salt:    { name: '盐水',     color: 'rgba(200, 220, 240, 0.5)',  tag: '中性', tagClass: 'tag-neutral' }
  },
  // 组合结果
  results: {
    'litmus-vinegar': {
      color: 'rgba(230, 50, 50, 0.9)',
      title: '石蕊 + 醋酸',
      text: `<span class="formula">H⁺（来自醋酸 CH₃COOH）</span> 使石蕊中的酚类色素分子结构发生改变。<br>
             变色过程：<span class="arrow-text">紫色 → 红色</span><br>
             结论：石蕊遇<strong>酸性</strong>溶液变<span style="color:#e83232;font-weight:700">红</span>。`
    },
    'litmus-lime': {
      color: 'rgba(40, 80, 230, 0.9)',
      title: '石蕊 + 石灰水',
      text: `<span class="formula">OH⁻（来自 Ca(OH)₂）</span> 使石蕊分子中的共轭体系发生改变。<br>
             变色过程：<span class="arrow-text">紫色 → 蓝色</span><br>
             结论：石蕊遇<strong>碱性</strong>溶液变<span style="color:#5080ff;font-weight:700">蓝</span>。`
    },
    'litmus-salt': {
      color: 'rgba(128, 80, 160, 0.85)',
      title: '石蕊 + 盐水',
      text: `<span class="formula">NaCl</span> 溶液呈中性（pH ≈ 7），不含大量 H⁺ 或 OH⁻。<br>
             变色过程：<span class="arrow-text">紫色 → 不变色</span><br>
             结论：石蕊遇<strong>中性</strong>溶液保持<span style="color:#8050a0;font-weight:700">紫色</span>。`
    },
    'phenolphthalein-vinegar': {
      color: 'rgba(230, 235, 240, 0.45)',
      title: '酚酞 + 醋酸',
      text: `<span class="formula">H⁺（来自醋酸 CH₃COOH）</span> 使酚酞以内酯型（无色）结构存在。<br>
             变色过程：<span class="arrow-text">无色 → 不变色</span><br>
             结论：酚酞遇<strong>酸性</strong>溶液保持<span style="color:#aaa;font-weight:700">无色</span>。`
    },
    'phenolphthalein-lime': {
      color: 'rgba(230, 40, 90, 0.85)',
      title: '酚酞 + 石灰水',
      text: `<span class="formula">OH⁻（来自 Ca(OH)₂）</span> 使酚酞的嗅型内酯结构打开，生成醌式结构。<br>
             变色过程：<span class="arrow-text">无色 → 玫红色</span><br>
             结论：酚酞遇<strong>碱性</strong>溶液变<span style="color:#e6285a;font-weight:700">玫红色</span>。`
    },
    'phenolphthalein-salt': {
      color: 'rgba(230, 235, 240, 0.45)',
      title: '酚酞 + 盐水',
      text: `<span class="formula">NaCl</span> 溶液呈中性（pH ≈ 7），不含足够的 OH⁻ 使酚酞变色。<br>
             变色过程：<span class="arrow-text">无色 → 不变色</span><br>
             结论：酚酞遇<strong>中性</strong>溶液保持<span style="color:#aaa;font-weight:700">无色</span>。`
    }
  }
};

// ── 状态 ──────────────────────────────────────────
let selected = { indicator: null, solution: null };
let isMixed = false;

// ── 选择 ──────────────────────────────────────────
function selectOption(type, id) {
  if (isMixed) return;
  selected[type] = id;

  const group = document.getElementById(type === 'indicator' ? 'indicatorGroup' : 'solutionGroup');
  group.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
  group.querySelector(`[data-id="${id}"]`).classList.add('active');

  updatePreview();
  checkReady();
}

function updatePreview() {
  const lI = document.getElementById('liquidIndicator');
  const lS = document.getElementById('liquidSolution');

  if (selected.indicator) {
    lI.style.backgroundColor = DATA.indicators[selected.indicator].baseColor;
    lI.style.height = '70%';
    document.getElementById('labelIndicator').textContent = DATA.indicators[selected.indicator].name;
  }
  if (selected.solution) {
    lS.style.backgroundColor = DATA.solutions[selected.solution].color;
    lS.style.height = '70%';
    document.getElementById('labelSolution').textContent = DATA.solutions[selected.solution].name;
  }
}

function checkReady() {
  document.getElementById('mixBtn').disabled = !(selected.indicator && selected.solution);
}

// ── 混合 ──────────────────────────────────────────
function doMix() {
  if (!selected.indicator || !selected.solution) return;
  isMixed = true;

  const btn = document.getElementById('mixBtn');
  btn.disabled = true;
  btn.textContent = '混合中...';

  const lR = document.getElementById('liquidResult');
  const key = `${selected.indicator}-${selected.solution}`;
  const result = DATA.results[key];
  const solutionData = DATA.solutions[selected.solution];

  // 阶段1：先把溶液颜色倒入结果试管
  lR.style.height = '70%';
  lR.style.backgroundColor = solutionData.color;

  // 阶段2：经过过渡色 → 最终变色
  setTimeout(() => {
    lR.classList.add('mixing');
    spawnBubbles(lR);

    // 中间过渡色（混合中的模糊态）
    const midColor = blendMidColor(solutionData.color, result.color, 0.4);
    lR.style.backgroundColor = midColor;

    // 阶段3：最终变色
    setTimeout(() => {
      lR.style.backgroundColor = result.color;
      btn.textContent = '实验完成 ✓';

      showResult(result);
      document.getElementById('resetBtn').style.display = '';
    }, 900);
  }, 800);
}

function blendMidColor(c1, c2, t) {
  // 简单混合两个 rgba 颜色
  const p = (s, i) => {
    const nums = s.match(/[\d.]+/g);
    return nums ? parseFloat(nums[i]) : 0;
  };
  const r = Math.round(p(c1,0)*t + p(c2,0)*(1-t));
  const g = Math.round(p(c1,1)*t + p(c2,1)*(1-t));
  const b = Math.round(p(c1,2)*t + p(c2,2)*(1-t));
  const a = (p(c1,3)*t + p(c2,3)*(1-t)).toFixed(2);
  return `rgba(${r},${g},${b},${a})`;
}

function spawnBubbles(container) {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'bubble';
      const size = 4 + Math.random() * 8;
      b.style.cssText = `
        width:${size}px; height:${size}px;
        left:${20 + Math.random()*60}%;
        bottom:${10 + Math.random()*30}%;
        animation-duration:${1.2 + Math.random()*1.2}s;
      `;
      container.appendChild(b);
      b.addEventListener('animationend', () => b.remove());
    }, i * 250);
  }
}

function showResult(result) {
  const panel = document.getElementById('resultPanel');
  const swatch = document.getElementById('resultSwatch');
  const text = document.getElementById('resultText');
  const solData = DATA.solutions[selected.solution];

  swatch.style.backgroundColor = result.color;
  text.innerHTML = `
    <strong>${result.title}</strong>
    <span class="neutral-tag ${solData.tagClass}" style="margin-left:8px">${solData.tag}</span>
    <br><br>${result.text}
  `;

  panel.classList.add('visible');
}

// ── 重置 ──────────────────────────────────────────
function doReset() {
  isMixed = false;
  selected = { indicator: null, solution: null };

  // 清空试管
  ['liquidIndicator', 'liquidSolution', 'liquidResult'].forEach(id => {
    const el = document.getElementById(id);
    el.style.height = '0%';
    el.style.backgroundColor = 'transparent';
    el.classList.remove('mixing');
  });

  // 清空标签
  document.getElementById('labelIndicator').textContent = '指示剂';
  document.getElementById('labelSolution').textContent = '溶液';

  // 清空选择
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));

  // 隐藏结果
  document.getElementById('resultPanel').classList.remove('visible');
  document.getElementById('resetBtn').style.display = 'none';

  // 恢复按钮
  const btn = document.getElementById('mixBtn');
  btn.disabled = true;
  btn.innerHTML = '开始混合 <span class="arrow">→</span>';
}
</script>
</body>
</html>
