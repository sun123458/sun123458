<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>虚拟教室平台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 录制指示器 -->
    <div id="recordingIndicator" class="recording-indicator hidden">
        <div class="recording-dot"></div>
        <span>录制中</span>
    </div>

    <!-- 顶部导航栏 -->
    <header class="header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
            </svg>
            <h1>虚拟教室</h1>
        </div>
        <div class="header-controls">
            <button id="recordBtn" class="btn-record" title="开始/停止录制">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <circle cx="12" cy="12" r="8"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-container">
        <!-- 左侧面板 -->
        <aside class="side-panel">
            <!-- 参与者列表 -->
            <div class="panel-section">
                <div class="panel-header">
                    <h2>参与者</h2>
                    <span class="participant-count" id="participantCount">4</span>
                </div>
                <div class="participants-list" id="participantsList">
                    <div class="participant">
                        <div class="avatar">👨‍🏫</div>
                        <div class="info">
                            <span class="name">老师 (您)</span>
                            <span class="role host">主持人</span>
                        </div>
                    </div>
                    <div class="participant">
                        <div class="avatar">👩‍🎓</div>
                        <div class="info">
                            <span class="name">小明</span>
                            <span class="role">学生</span>
                        </div>
                    </div>
                    <div class="participant">
                        <div class="avatar">👨‍🎓</div>
                        <div class="info">
                            <span class="name">小红</span>
                            <span class="role">学生</span>
                        </div>
                    </div>
                    <div class="participant">
                        <div class="avatar">👧</div>
                        <div class="info">
                            <span class="name">小华</span>
                            <span class="role">学生</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 屏幕共享区 -->
            <div class="panel-section">
                <div class="panel-header">
                    <h2>屏幕共享</h2>
                    <button id="shareScreenBtn" class="btn-share">选择区域</button>
                </div>
                <div id="shareContainer" class="share-container">
                    <div class="share-placeholder">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="2" y="3" width="20" height="14" rx="2"/>
                            <line x1="8" y1="21" x2="16" y2="21"/>
                            <line x1="12" y1="17" x2="12" y2="21"/>
                        </svg>
                        <p>点击"选择区域"开始共享</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 白板区域 -->
        <section class="whiteboard-section">
            <div class="whiteboard-toolbar">
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="pen" title="画笔">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="橡皮擦">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 20H7L3 16c-1.5-1.5-1.5-4 0-5.5l7-7c1.5-1.5 4-1.5 5.5 0l4 4c1.5 1.5 1.5 4 0 5.5L20 20z"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="line" title="直线">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="19" x2="19" y2="5"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="rect" title="矩形">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="circle" title="圆形">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="9"/>
                        </svg>
                    </button>
                </div>
                <div class="divider"></div>
                <div class="tool-group">
                    <input type="color" id="colorPicker" class="color-picker" value="#000000" title="颜色">
                    <input type="range" id="brushSize" class="brush-size" min="1" max="20" value="3" title="笔刷大小">
                    <span id="brushSizeLabel" class="brush-size-label">3px</span>
                </div>
                <div class="divider"></div>
                <div class="tool-group">
                    <button id="undoBtn" class="tool-btn" title="撤销">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"/>
                            <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/>
                        </svg>
                    </button>
                    <button id="redoBtn" class="tool-btn" title="重做">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 7v6h-6"/>
                            <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"/>
                        </svg>
                    </button>
                    <button id="clearBtn" class="tool-btn" title="清空画布">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"/>
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="canvas-container" id="canvasContainer">
                <canvas id="whiteboard"></canvas>
            </div>
        </section>

        <!-- 聊天区域 -->
        <aside class="chat-panel">
            <div class="panel-header">
                <h2>聊天</h2>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-message">
                    <div class="message-header">
                        <span class="message-author">小明</span>
                        <span class="message-time">10:30</span>
                    </div>
                    <div class="message-content">老师好！👋</div>
                </div>
                <div class="chat-message">
                    <div class="message-header">
                        <span class="message-author">小红</span>
                        <span class="message-time">10:31</span>
                    </div>
                    <div class="message-content">今天学习什么内容呢？🤔</div>
                </div>
                <div class="chat-message own">
                    <div class="message-header">
                        <span class="message-author">老师</span>
                        <span class="message-time">10:32</span>
                    </div>
                    <div class="message-content">我们今天学习Canvas绘图 🎨</div>
                </div>
                <div class="chat-message">
                    <div class="message-header">
                        <span class="message-author">小华</span>
                        <span class="message-time">10:33</span>
                    </div>
                    <div class="message-content">好的！期待学习 📚✨</div>
                </div>
            </div>
            <div class="emoji-picker" id="emojiPicker">
                <button class="emoji-btn" data-emoji="😀">😀</button>
                <button class="emoji-btn" data-emoji="👍">👍</button>
                <button class="emoji-btn" data-emoji="❤️">❤️</button>
                <button class="emoji-btn" data-emoji="😂">😂</button>
                <button class="emoji-btn" data-emoji="🎉">🎉</button>
                <button class="emoji-btn" data-emoji="🙏">🙏</button>
                <button class="emoji-btn" data-emoji="💯">💯</button>
                <button class="emoji-btn" data-emoji="👏">👏</button>
            </div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="输入消息...">
                <button id="sendBtn" class="btn-send">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </aside>
    </main>

    <script src="app.js"></script>
</body>
</html>
