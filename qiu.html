<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>两个小球同时下落 - 物理科普实验</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #eee;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.2rem;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: #aaa;
            margin-top: 8px;
            font-size: 1rem;
        }

        .main-content {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .control-panel {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .control-panel h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: #00d4ff;
            border-bottom: 2px solid rgba(0, 212, 255, 0.3);
            padding-bottom: 10px;
        }

        .control-group {
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-group:last-of-type {
            border-bottom: none;
        }

        .control-label {
            display: block;
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .control-label span {
            color: #888;
            font-size: 0.8rem;
        }

        select, input[type="range"] {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 0.95rem;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s;
        }

        select:focus, input[type="range"]:focus {
            border-color: #00d4ff;
        }

        select option {
            background: #1a1a2e;
            color: #fff;
        }

        input[type="range"] {
            padding: 0;
            height: 6px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.1);
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #00d4ff;
            cursor: pointer;
            border: none;
        }

        .range-value {
            display: inline-block;
            float: right;
            color: #00d4ff;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .experiment-area {
            flex: 2;
            min-width: 400px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #canvas {
            width: 100%;
            flex: 1;
            min-height: 450px;
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            display: block;
        }

        .bottom-bar {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 12px;
        }

        button {
            padding: 12px 28px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start {
            background: linear-gradient(90deg, #00d4ff, #0099cc);
            color: #000;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
        }

        .btn-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .results {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .result-item {
            text-align: center;
        }

        .result-item .label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }

        .result-item .value {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }

        .result-item .value.ball1 {
            color: #ff6b6b;
        }

        .result-item .value.ball2 {
            color: #4ecdc4;
        }

        .ball-preview {
            display: inline-block;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin-right: 6px;
            vertical-align: middle;
        }

        .ball-preview.ball1 { background: #ff6b6b; }
        .ball-preview.ball2 { background: #4ecdc4; }

        .env-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #ccc;
            pointer-events: none;
        }

        .canvas-container {
            position: relative;
            flex: 1;
        }

        @media (max-width: 900px) {
            .main-content {
                flex-direction: column;
            }
            .control-panel, .experiment-area {
                max-width: 100%;
                min-width: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>两个小球同时下落</h1>
            <p>探索重力与空气阻力对物体下落的影响</p>
        </header>

        <div class="main-content">
            <div class="control-panel">
                <h2>实验参数设置</h2>

                <div class="control-group">
                    <label class="control-label">
                        <span class="ball-preview ball1"></span>物体 A 类型
                    </label>
                    <select id="obj1Type">
                        <option value="ball">铁球</option>
                        <option value="feather">羽毛</option>
                        <option value="wood">木球</option>
                        <option value="paper">纸片</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        <span class="ball-preview ball2"></span>物体 B 类型
                    </label>
                    <select id="obj2Type">
                        <option value="ball">铁球</option>
                        <option value="feather" selected>羽毛</option>
                        <option value="wood">木球</option>
                        <option value="paper">纸片</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">环境类型</label>
                    <select id="envType">
                        <option value="air">空气环境</option>
                        <option value="vacuum">真空环境</option>
                    </select>
                </div>

                <div class="control-group">
                    <label class="control-label">
                        重力加速度 (m/s²)
                        <span class="range-value" id="gravityValue">9.8</span>
                    </label>
                    <input type="range" id="gravity" min="1.6" max="20" step="0.1" value="9.8">
                </div>

                <div class="control-group">
                    <label class="control-label">
                        风阻系数
                        <span class="range-value" id="dragValue">0.5</span>
                    </label>
                    <input type="range" id="dragCoeff" min="0" max="2" step="0.05" value="0.5">
                </div>

                <div class="control-group">
                    <label class="control-label">
                        物体 A 质量 (kg)
                        <span class="range-value" id="mass1Value">1.0</span>
                    </label>
                    <input type="range" id="mass1" min="0.001" max="10" step="0.001" value="1.0">
                </div>

                <div class="control-group">
                    <label class="control-label">
                        物体 B 质量 (kg)
                        <span class="range-value" id="mass2Value">0.005</span>
                    </label>
                    <input type="range" id="mass2" min="0.001" max="10" step="0.001" value="0.005">
                </div>
            </div>

            <div class="experiment-area">
                <div class="canvas-container">
                    <canvas id="canvas"></canvas>
                    <div class="env-indicator" id="envIndicator">空气环境 | 有空气阻力</div>
                </div>
                <div class="bottom-bar">
                    <div class="btn-group">
                        <button class="btn-start" id="startBtn">开始实验</button>
                        <button class="btn-reset" id="resetBtn">重置</button>
                    </div>
                    <div class="results">
                        <div class="result-item">
                            <div class="label"><span class="ball-preview ball1"></span>物体 A 落地时间</div>
                            <div class="value ball1" id="time1">-- s</div>
                        </div>
                        <div class="result-item">
                            <div class="label"><span class="ball-preview ball2"></span>物体 B 落地时间</div>
                            <div class="value ball2" id="time2">-- s</div>
                        </div>
                        <div class="result-item">
                            <div class="label">高度</div>
                            <div class="value" id="heightDisplay">50 m</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 物体类型预设
        const PRESETS = {
            ball: { mass: 1.0, dragArea: 0.01, label: '铁球', color: '#ff6b6b', radius: 12 },
            feather: { mass: 0.005, dragArea: 0.05, label: '羽毛', color: '#4ecdc4', radius: 16 },
            wood: { mass: 0.3, dragArea: 0.015, label: '木球', color: '#d4a373', radius: 14 },
            paper: { mass: 0.002, dragArea: 0.08, label: '纸片', color: '#f8f9fa', radius: 18 }
        };

        // DOM 元素
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const envIndicator = document.getElementById('envIndicator');

        // 控制元素
        const controls = {
            obj1Type: document.getElementById('obj1Type'),
            obj2Type: document.getElementById('obj2Type'),
            envType: document.getElementById('envType'),
            gravity: document.getElementById('gravity'),
            dragCoeff: document.getElementById('dragCoeff'),
            mass1: document.getElementById('mass1'),
            mass2: document.getElementById('mass2')
        };

        // 显示元素
        const displays = {
            gravity: document.getElementById('gravityValue'),
            drag: document.getElementById('dragValue'),
            mass1: document.getElementById('mass1Value'),
            mass2: document.getElementById('mass2Value'),
            time1: document.getElementById('time1'),
            time2: document.getElementById('time2'),
            height: document.getElementById('heightDisplay')
        };

        // 状态
        let isRunning = false;
        let animationId = null;
        let startTime = null;
        let simTime = 0;
        const dropHeight = 50; // 米
        const timeScale = 1; // 1秒模拟1秒
        let pixelsPerMeter = 0;

        // 物体状态
        let obj1 = { y: 0, v: 0, a: 0, landed: false, landTime: null };
        let obj2 = { y: 0, v: 0, a: 0, landed: false, landTime: null };

        // 初始化 Canvas 尺寸
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            pixelsPerMeter = canvas.height / (dropHeight + 10); // 留一些边距
            draw();
        }

        window.addEventListener('resize', resizeCanvas);

        // 更新显示值
        function updateDisplays() {
            displays.gravity.textContent = parseFloat(controls.gravity.value).toFixed(1);
            displays.drag.textContent = parseFloat(controls.dragCoeff.value).toFixed(2);
            displays.mass1.textContent = parseFloat(controls.mass1.value).toFixed(3);
            displays.mass2.textContent = parseFloat(controls.mass2.value).toFixed(3);
        }

        // 绑定控制事件
        Object.values(controls).forEach(el => {
            el.addEventListener('input', () => {
                updateDisplays();
                if (!isRunning) {
                    resetSimulation();
                }
            });
        });

        // 预设切换自动更新质量
        controls.obj1Type.addEventListener('change', () => {
            const preset = PRESETS[controls.obj1Type.value];
            controls.mass1.value = preset.mass;
            updateDisplays();
            if (!isRunning) resetSimulation();
        });

        controls.obj2Type.addEventListener('change', () => {
            const preset = PRESETS[controls.obj2Type.value];
            controls.mass2.value = preset.mass;
            updateDisplays();
            if (!isRunning) resetSimulation();
        });

        controls.envType.addEventListener('change', () => {
            envIndicator.textContent = controls.envType.value === 'vacuum'
                ? '真空环境 | 无空气阻力'
                : '空气环境 | 有空气阻力';
            if (!isRunning) resetSimulation();
        });

        // 获取当前参数
        function getParams() {
            return {
                g: parseFloat(controls.gravity.value),
                isVacuum: controls.envType.value === 'vacuum',
                dragCoeff: parseFloat(controls.dragCoeff.value),
                mass1: parseFloat(controls.mass1.value),
                mass2: parseFloat(controls.mass2.value),
                type1: controls.obj1Type.value,
                type2: controls.obj2Type.value
            };
        }

        // 计算加速度 (使用简化的空气阻力模型)
        function computeAcceleration(v, mass, dragArea, dragCoeff, g, isVacuum) {
            if (isVacuum) return g;
            // 空气阻力: F_d = 0.5 * rho * v^2 * C_d * A
            // 这里简化为 a_drag = (dragCoeff * dragArea / mass) * v^2
            const dragFactor = (dragCoeff * dragArea) / mass;
            const dragAccel = dragFactor * v * v;
            return Math.max(0, g - dragAccel);
        }

        // 重置模拟
        function resetSimulation() {
            stopAnimation();
            simTime = 0;
            obj1 = { y: 0, v: 0, a: 0, landed: false, landTime: null };
            obj2 = { y: 0, v: 0, a: 0, landed: false, landTime: null };
            isRunning = false;
            startBtn.textContent = '开始实验';
            displays.time1.textContent = '-- s';
            displays.time2.textContent = '-- s';
            draw();
        }

        // 停止动画
        function stopAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        // 绘制场景
        function draw() {
            const { width, height } = canvas;
            const params = getParams();
            const p1 = PRESETS[params.type1];
            const p2 = PRESETS[params.type2];

            // 清空画布
            ctx.clearRect(0, 0, width, height);

            // 绘制背景网格（高度标尺）
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
            ctx.lineWidth = 1;
            for (let h = 0; h <= dropHeight; h += 10) {
                const y = height - 40 - h * pixelsPerMeter;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(width, y);
                ctx.stroke();

                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = '12px sans-serif';
                ctx.fillText(h + 'm', 10, y - 2);
            }

            // 地面
            ctx.fillStyle = '#334155';
            ctx.fillRect(0, height - 30, width, 30);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(0, height - 30);
            ctx.lineTo(width, height - 30);
            ctx.stroke();

            // 绘制物体
            drawObject(width * 0.35, obj1.y, p1, params.mass1, obj1.landed);
            drawObject(width * 0.65, obj2.y, p2, params.mass2, obj2.landed);

            // 绘制速度矢量
            if (isRunning || obj1.landed || obj2.landed) {
                drawVelocityArrow(width * 0.35, obj1.y, obj1.v, '#ff6b6b');
                drawVelocityArrow(width * 0.65, obj2.y, obj2.v, '#4ecdc4');
            }

            // 空气粒子效果（仅在空气环境且运行时）
            if (isRunning && !params.isVacuum) {
                drawAirParticles();
            }
        }

        function drawObject(x, yMeters, preset, mass, landed) {
            const y = canvas.height - 30 - yMeters * pixelsPerMeter;
            const r = preset.radius * (1 + Math.log10(mass * 10 + 1) * 0.15);

            // 阴影
            if (yMeters > 0) {
                const shadowY = canvas.height - 30;
                const opacity = Math.max(0, 0.3 - yMeters / dropHeight * 0.3);
                const shadowWidth = r * 2 * (1 + yMeters / dropHeight);
                ctx.fillStyle = `rgba(0, 0, 0, ${opacity})`;
                ctx.beginPath();
                ctx.ellipse(x, shadowY, shadowWidth / 2, shadowWidth / 6, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            // 物体本体
            ctx.save();
            ctx.translate(x, y);

            // 羽毛旋转效果
            if (preset.label === '羽毛' && isRunning && !landed) {
                ctx.rotate(Math.sin(simTime * 3) * 0.3);
            }
            if (preset.label === '纸片' && isRunning && !landed) {
                ctx.rotate(Math.sin(simTime * 2) * 0.5);
            }

            const gradient = ctx.createRadialGradient(-r/3, -r/3, r/4, 0, 0, r);
            gradient.addColorStop(0, lightenColor(preset.color, 40));
            gradient.addColorStop(1, preset.color);

            ctx.fillStyle = gradient;
            ctx.beginPath();

            if (preset.label === '羽毛') {
                // 羽毛形状
                ctx.ellipse(0, 0, r * 0.6, r * 1.5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.3)';
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(0, -r * 1.2);
                ctx.lineTo(0, r * 1.2);
                ctx.stroke();
            } else if (preset.label === '纸片') {
                // 纸片形状
                ctx.rect(-r, -r * 1.3, r * 2, r * 2.6);
                ctx.fill();
            } else {
                ctx.arc(0, 0, r, 0, Math.PI * 2);
                ctx.fill();
            }

            // 边框
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 标签
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(preset.label, 0, 0);

            ctx.restore();
        }

        function drawVelocityArrow(x, yMeters, v, color) {
            if (v < 0.5) return;
            const y = canvas.height - 30 - yMeters * pixelsPerMeter;
            const arrowLength = Math.min(v * 8, 80);

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(x + 25, y);
            ctx.lineTo(x + 25, y + arrowLength);
            ctx.stroke();

            // 箭头
            ctx.beginPath();
            ctx.moveTo(x + 25 - 5, y + arrowLength - 5);
            ctx.lineTo(x + 25, y + arrowLength);
            ctx.lineTo(x + 25 + 5, y + arrowLength - 5);
            ctx.stroke();

            // 速度数值
            ctx.fillStyle = color;
            ctx.font = '11px sans-serif';
            ctx.fillText(v.toFixed(1) + ' m/s', x + 45, y + arrowLength / 2);
        }

        let airParticles = [];
        function drawAirParticles() {
            // 更新粒子
            if (Math.random() > 0.7) {
                airParticles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 1,
                    speed: Math.random() * 0.5 + 0.2,
                    life: 1
                });
            }

            ctx.fillStyle = 'rgba(200, 220, 255, 0.15)';
            for (let i = airParticles.length - 1; i >= 0; i--) {
                const p = airParticles[i];
                p.y -= p.speed;
                p.life -= 0.01;
                if (p.life <= 0) {
                    airParticles.splice(i, 1);
                    continue;
                }
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function lightenColor(color, percent) {
            const num = parseInt(color.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x00FF) + amt);
            return '#' + (0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1);
        }

        // 物理模拟主循环
        let lastFrameTime = 0;
        function loop(timestamp) {
            if (!lastFrameTime) lastFrameTime = timestamp;
            const dt = Math.min((timestamp - lastFrameTime) / 1000, 0.05); // 限制最大时间步长
            lastFrameTime = timestamp;

            const params = getParams();
            const p1 = PRESETS[params.type1];
            const p2 = PRESETS[params.type2];

            // 子步进，提高精度
            const subSteps = 8;
            const subDt = dt * timeScale / subSteps;

            for (let i = 0; i < subSteps; i++) {
                simTime += subDt;

                if (!obj1.landed) {
                    const a1 = computeAcceleration(obj1.v, params.mass1, p1.dragArea, params.dragCoeff, params.g, params.isVacuum);
                    obj1.v += a1 * subDt;
                    obj1.y += obj1.v * subDt;
                    if (obj1.y >= dropHeight) {
                        obj1.y = dropHeight;
                        obj1.v = 0;
                        obj1.landed = true;
                        obj1.landTime = simTime;
                        displays.time1.textContent = simTime.toFixed(3) + ' s';
                    }
                }

                if (!obj2.landed) {
                    const a2 = computeAcceleration(obj2.v, params.mass2, p2.dragArea, params.dragCoeff, params.g, params.isVacuum);
                    obj2.v += a2 * subDt;
                    obj2.y += obj2.v * subDt;
                    if (obj2.y >= dropHeight) {
                        obj2.y = dropHeight;
                        obj2.v = 0;
                        obj2.landed = true;
                        obj2.landTime = simTime;
                        displays.time2.textContent = simTime.toFixed(3) + ' s';
                    }
                }
            }

            draw();

            if (obj1.landed && obj2.landed) {
                isRunning = false;
                startBtn.textContent = '再次实验';
                return;
            }

            animationId = requestAnimationFrame(loop);
        }

        // 按钮事件
        startBtn.addEventListener('click', () => {
            if (isRunning) return;

            if (obj1.landed && obj2.landed) {
                resetSimulation();
                setTimeout(startSimulation, 50);
                return;
            }

            startSimulation();
        });

        function startSimulation() {
            isRunning = true;
            startBtn.textContent = '实验中...';
            lastFrameTime = 0;
            animationId = requestAnimationFrame(loop);
        }

        resetBtn.addEventListener('click', resetSimulation);

        // 初始化
        updateDisplays();
        resizeCanvas();
        resetSimulation();
    </script>
</body>
</html>
