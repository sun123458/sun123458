<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕虫游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
        }

        #gameContainer {
            position: relative;
        }

        #gameCanvas {
            border: 4px solid #34495e;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ecf0f1;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 15px;
            border-radius: 5px;
        }

        #dialogBox {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 400px;
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #3498db;
            border-radius: 8px;
            padding: 20px;
            color: #ecf0f1;
            display: none;
        }

        #dialogBox.active {
            display: block;
        }

        #dialogBox h3 {
            margin-bottom: 10px;
            color: #3498db;
        }

        #dialogBox p {
            line-height: 1.6;
        }

        #controls {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #ecf0f1;
            font-size: 12px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 12px;
            border-radius: 5px;
        }

        #controls p {
            margin: 2px 0;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <p>🦋 捕虫数: <span id="bugCount">0</span></p>
        </div>
        <div id="dialogBox">
            <h3 id="dialogTitle">NPC</h3>
            <p id="dialogText">你好！欢迎来到捕虫游戏！</p>
        </div>
        <div id="controls">
            <p>移动: 方向键 / WASD</p>
            <p>互动: E</p>
            <p>捕虫: Space</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
