<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>月度消费统计</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f7fa;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      color: #2c3e50;
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 40px;
    }

    .chart-card {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
    }

    .chart-title {
      text-align: center;
      color: #34495e;
      font-size: 16px;
      font-weight: 500;
      margin-bottom: 20px;
    }

    canvas {
      max-height: 320px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>2026年3月消费统计</h1>

    <div class="chart-card">
      <div class="chart-title">每日消费趋势</div>
      <canvas id="lineChart"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-title">品类占比</div>
      <canvas id="barChart"></canvas>
    </div>
  </div>

  <script>
    const colors = {
      primary: '#5b8def',
      primaryLight: 'rgba(91, 141, 239, 0.2)',
      food: '#5b8def',
      transport: '#36b9a8',
      shopping: '#f6a545',
      entertainment: '#e96d76',
      other: '#8c9bb3'
    };

    const dailyLabels = ['1日', '3日', '5日', '7日', '9日', '11日', '13日', '15日', '17日', '19日', '21日', '23日', '25日', '27日', '29日', '31日'];
    const dailyData = [128, 85, 156, 92, 203, 167, 78, 234, 145, 189, 112, 276, 98, 165, 143, 112];

    const lineCtx = document.getElementById('lineChart').getContext('2d');
    new Chart(lineCtx, {
      type: 'line',
      data: {
        labels: dailyLabels,
        datasets: [{
          label: '每日消费',
          data: dailyData,
          borderColor: colors.primary,
          backgroundColor: colors.primaryLight,
          borderWidth: 2,
          fill: true,
          tension: 0.3,
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBackgroundColor: '#fff',
          pointBorderColor: colors.primary,
          pointBorderWidth: 2
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(44, 62, 80, 0.9)',
            padding: 12,
            titleFont: { size: 14 },
            bodyFont: { size: 13 },
            callbacks: {
              label: ctx => `消费: ¥${ctx.raw}`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#8c9bb3' }
          },
          y: {
            grid: { color: '#f0f2f5' },
            ticks: {
              color: '#8c9bb3',
              callback: v => '¥' + v
            }
          }
        }
      }
    });

    const categoryLabels = ['餐饮', '交通', '购物', '娱乐', '其他'];
    const categoryData = [2840, 960, 1850, 720, 430];

    const barCtx = document.getElementById('barChart').getContext('2d');
    new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: categoryLabels,
        datasets: [{
          label: '消费金额',
          data: categoryData,
          backgroundColor: [colors.food, colors.transport, colors.shopping, colors.entertainment, colors.other],
          borderRadius: 6,
          borderSkipped: false
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: 'rgba(44, 62, 80, 0.9)',
            padding: 12,
            callbacks: {
              label: ctx => `${ctx.label}: ¥${ctx.raw}`
            }
          }
        },
        scales: {
          x: {
            grid: { display: false },
            ticks: { color: '#8c9bb3' }
          },
          y: {
            grid: { color: '#f0f2f5' },
            ticks: {
              color: '#8c9bb3',
              callback: v => '¥' + v
            }
          }
        },
        onHover: (event, elements) => {
          if (elements.length) {
            event.native.target.style.cursor = 'pointer';
          } else {
            event.native.target.style.cursor = 'default';
          }
        }
      }
    });
  </script>
</body>
</html>
