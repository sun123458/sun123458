<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SoulMate - 发现心动</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="url(#logoGradient)"/>
                    <defs>
                        <linearGradient id="logoGradient" x1="2" y1="3" x2="22" y2="21">
                            <stop offset="0%" stop-color="#ff6b6b"/>
                            <stop offset="100%" stop-color="#ff8e8e"/>
                        </linearGradient>
                    </defs>
                </svg>
                <span class="logo-text">SoulMate</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn matches-btn" id="matchesBtn">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span class="badge" id="matchCount">0</span>
                </button>
            </div>
        </header>

        <!-- Card Container -->
        <main class="card-container" id="cardContainer">
            <!-- Cards will be generated by JavaScript -->
        </main>

        <!-- Action Buttons -->
        <div class="action-buttons">
            <button class="action-btn skip-btn" id="skipBtn">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="currentColor"/>
                </svg>
                <span>跳过</span>
            </button>
            <button class="action-btn info-btn" id="infoBtn">
                <svg viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/>
                    <path d="M12 16v-4M12 8h.01" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>详情</span>
            </button>
            <button class="action-btn like-btn" id="likeBtn">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
                </svg>
                <span>喜欢</span>
            </button>
        </div>

        <!-- Match Banner -->
        <div class="match-banner" id="matchBanner">
            <div class="match-content">
                <div class="match-avatars">
                    <div class="my-avatar"></div>
                    <div class="match-avatar"></div>
                </div>
                <p class="match-title">匹配成功!</p>
                <p class="match-subtitle">你和新朋友开始聊天吧</p>
                <div class="match-actions">
                    <button class="match-btn secondary" id="keepSwipingBtn">继续滑动</button>
                    <button class="match-btn primary" id="sendMessageBtn">发送消息</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal-content profile-modal">
            <button class="modal-close" id="modalClose">
                <svg viewBox="0 0 24 24" fill="none">
                    <path d="M6 18L18 6M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="modal-header">
                <div class="modal-avatar" id="modalAvatar"></div>
                <div class="modal-user-info">
                    <h2 id="modalName"></h2>
                    <p id="modalAge"></p>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h3>关于我</h3>
                    <p id="modalBio"></p>
                </div>
                <div class="modal-section">
                    <h3>兴趣标签</h3>
                    <div class="tags" id="modalTags"></div>
                </div>
                <div class="modal-section">
                    <h3>基本信息</h3>
                    <div class="info-grid" id="modalInfo"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-action-btn like" id="modalLike">
                    <svg viewBox="0 0 24 24" fill="none">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" fill="currentColor"/>
                    </svg>
                    喜欢
                </button>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState" style="display: none;">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" stroke="currentColor" stroke-width="1.5"/>
        </svg>
        <h2>暂时没有更多用户了</h2>
        <p>明天再来发现新朋友吧~</p>
        <button class="refresh-btn" id="refreshBtn">
            <svg viewBox="0 0 24 24" fill="none">
                <path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" fill="currentColor"/>
            </svg>
            重新加载
        </button>
    </div>

    <script src="app.js"></script>
</body>
</html>
