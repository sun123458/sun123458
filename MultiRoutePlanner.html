<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多路线规划对比组件</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; background: #f5f7fa; }

    .route-planner {
      display: flex;
      height: 100vh;
      position: relative;
    }

    .panel {
      width: 380px;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .panel-header {
      padding: 18px 20px 14px;
      border-bottom: 1px solid #eef0f3;
    }
    .panel-header h2 {
      font-size: 17px;
      color: #1f2937;
      margin-bottom: 14px;
      font-weight: 600;
    }
    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .input-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #f5f7fa;
      border-radius: 8px;
      padding: 10px 12px;
      transition: all 0.25s;
    }
    .input-row:focus-within { background: #fff; box-shadow: 0 0 0 2px #3b82f6; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.start { background: #22c55e; }
    .dot.end { background: #ef4444; }
    .input-row input {
      flex: 1; border: none; outline: none; background: transparent;
      font-size: 14px; color: #1f2937;
    }
    .plan-btn {
      margin-top: 12px; width: 100%; padding: 11px;
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      color: #fff; border: none; border-radius: 8px;
      font-size: 14px; font-weight: 500; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .plan-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59,130,246,0.4); }
    .plan-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .route-tabs {
      display: flex;
      padding: 14px 16px 0;
      gap: 8px;
      border-bottom: 1px solid #eef0f3;
    }
    .route-tab {
      flex: 1; padding: 10px 6px; border: 2px solid transparent;
      border-radius: 8px 8px 0 0; cursor: pointer; text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: #fafbfc;
    }
    .route-tab.active { background: #fff; border-color: currentColor; border-bottom-color: #fff; margin-bottom: -1px; }
    .route-tab:hover:not(.active) { background: #f0f3f7; }
    .tab-icon { font-size: 20px; margin-bottom: 4px; }
    .tab-label { font-size: 12px; color: #6b7280; font-weight: 500; }
    .route-tab.active .tab-label { font-weight: 600; }

    .route-summary {
      padding: 16px 20px;
      border-bottom: 1px solid #eef0f3;
      display: flex;
      justify-content: space-around;
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .route-summary.show { opacity: 1; transform: translateY(0); }
    .summary-item { text-align: center; }
    .summary-value { font-size: 20px; font-weight: 600; color: #1f2937; }
    .summary-value .unit { font-size: 12px; color: #6b7280; margin-left: 2px; font-weight: 400; }
    .summary-label { font-size: 12px; color: #6b7280; margin-top: 2px; }

    .route-steps {
      flex: 1; overflow-y: auto; padding: 8px 0;
    }
    .route-steps::-webkit-scrollbar { width: 6px; }
    .route-steps::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    .step-item {
      padding: 12px 20px; display: flex; gap: 12px;
      cursor: pointer; border-left: 3px solid transparent;
      transition: all 0.2s;
      animation: slideIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    .step-item:hover { background: #f8fafc; }
    .step-item.active { background: #eff6ff; border-left-color: #3b82f6; }
    .step-index {
      width: 22px; height: 22px; border-radius: 50%;
      background: #e5e7eb; color: #4b5563; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 600;
    }
    .step-item.active .step-index { background: #3b82f6; color: #fff; }
    .step-body { flex: 1; min-width: 0; }
    .step-instruction { font-size: 13px; color: #1f2937; line-height: 1.5; }
    .step-meta { font-size: 11px; color: #9ca3af; margin-top: 4px; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .map-container { flex: 1; position: relative; background: #e5e7eb; }
    #map { width: 100%; height: 100%; }

    .map-overlay-hint {
      position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
      padding: 8px 16px; background: rgba(31,41,55,0.88); color: #fff;
      border-radius: 20px; font-size: 12px;
      pointer-events: none; opacity: 0; transition: opacity 0.3s;
    }
    .map-overlay-hint.show { opacity: 1; }

    .loading {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center;
      background: rgba(255,255,255,0.75); z-index: 20;
    }
    .loading.show { display: flex; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #e5e7eb;
      border-top-color: #3b82f6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 40px;
      color: #9ca3af; text-align: center;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state .text { font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="route-planner">
    <aside class="panel">
      <div class="panel-header">
        <h2>多路线规划对比</h2>
        <div class="input-group">
          <div class="input-row">
            <span class="dot start"></span>
            <input id="start-input" type="text" placeholder="请输入起点" value="北京南站" />
          </div>
          <div class="input-row">
            <span class="dot end"></span>
            <input id="end-input" type="text" placeholder="请输入终点" value="天安门" />
          </div>
        </div>
        <button id="plan-btn" class="plan-btn">开始规划</button>
      </div>

      <div id="route-tabs" class="route-tabs" style="display:none;"></div>
      <div id="route-summary" class="route-summary"></div>
      <div id="route-content" class="empty-state">
        <div class="icon">🗺️</div>
        <div class="text">输入起点和终点<br/>对比步行 / 骑行 / 驾车路线</div>
      </div>
    </aside>

    <div class="map-container">
      <div id="map"></div>
      <div id="map-hint" class="map-overlay-hint">点击路线段可查看详细指引</div>
      <div id="loading" class="loading"><div class="spinner"></div></div>
    </div>
  </div>

  <script>
    window._AMapSecurityConfig = { securityJsCode: 'YOUR_SECURITY_CODE' };
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY&plugin=AMap.Driving,AMap.Walking,AMap.Riding,AMap.Geocoder"></script>
  <script src="./MultiRoutePlanner.js"></script>
</body>
</html>
