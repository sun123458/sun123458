<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多路线规划对比</title>
<script src="https://webapi.amap.com/maps?v=2.0&key=9c8894b4e9043949f7ff4a78c4de622a&plugin=AMap.Geocoder,AMap.Driving,AMap.Walking,AMap.Riding,AMap.ToolBar"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; overflow: hidden; }

/* 搜索面板 */
.search-panel {
  position: fixed; top: 16px; left: 16px; z-index: 100;
  background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.12);
  padding: 16px; width: 340px;
}
.search-panel h3 {
  font-size: 15px; color: #333; margin-bottom: 12px; font-weight: 600;
}
.input-row {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.input-row input {
  flex: 1; height: 38px; border: 1px solid #e0e0e0; border-radius: 8px;
  padding: 0 12px; font-size: 14px; outline: none; transition: border-color .2s;
}
.input-row input:focus { border-color: #2B7DE9; }
.input-row input::placeholder { color: #bbb; }
.btn-swap {
  width: 38px; height: 38px; border: 1px solid #e0e0e0; border-radius: 8px;
  background: #f8f9fa; cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .2s;
}
.btn-swap:hover { background: #eef1f5; }
.btn-swap svg { width: 18px; height: 18px; fill: #666; }
.btn-row {
  display: flex; gap: 8px;
}
.btn-row button {
  flex: 1; height: 38px; border: none; border-radius: 8px; font-size: 14px;
  cursor: pointer; font-weight: 500; transition: opacity .2s;
}
.btn-row button:hover { opacity: .85; }
.btn-search { background: #2B7DE9; color: #fff; }
.btn-locate { background: #f0f4f8; color: #555; }

/* 地图容器 */
#map-container {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;
}

/* 路线对比面板 */
.route-panel {
  position: fixed; left: 16px; right: 16px; bottom: 16px; z-index: 100;
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
}
.route-card {
  background: #fff; border-radius: 12px; padding: 14px 18px; min-width: 180px;
  cursor: pointer; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  transition: transform .2s, box-shadow .2s, border .2s; border: 2px solid transparent;
  user-select: none;
}
.route-card:hover {
  transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.14);
}
.route-card.active { border-color: var(--route-color); }
.route-card .card-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.route-card .icon-dot {
  width: 10px; height: 10px; border-radius: 50%; background: var(--route-color);
}
.route-card .card-title {
  font-size: 14px; font-weight: 600; color: #333;
}
.route-card .card-body {
  display: flex; align-items: baseline; gap: 4px; margin-bottom: 4px;
}
.route-card .card-body .value {
  font-size: 22px; font-weight: 700; color: #222;
}
.route-card .card-body .unit {
  font-size: 12px; color: #999;
}
.route-card .card-meta {
  font-size: 12px; color: #888; display: flex; align-items: center; gap: 12px;
}
.route-card .badge {
  display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px;
  font-weight: 600; margin-left: 4px;
}
.badge-fastest { background: #e8f5e9; color: #2e7d32; }
.badge-shortest { background: #e3f2fd; color: #1565c0; }

/* 详情面板 */
.detail-panel {
  position: fixed; top: 0; right: 0; width: 380px; height: 100%; z-index: 200;
  background: #fff; box-shadow: -4px 0 20px rgba(0,0,0,0.15);
  transform: translateX(100%); transition: transform .35s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
.detail-panel.open { transform: translateX(0); }
.detail-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid #eee;
}
.detail-header h3 {
  font-size: 16px; font-weight: 600; color: #333;
}
.btn-close {
  width: 32px; height: 32px; border: none; background: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; border-radius: 8px;
  transition: background .2s;
}
.btn-close:hover { background: #f0f0f0; }
.btn-close svg { width: 16px; height: 16px; fill: #666; }
.detail-list {
  flex: 1; overflow-y: auto; padding: 12px 0;
}
.detail-item {
  display: flex; align-items: flex-start; gap: 12px; padding: 12px 20px;
  cursor: pointer; transition: background .15s;
  border-left: 3px solid transparent;
}
.detail-item:hover { background: #f8f9fa; }
.detail-item.active {
  background: #eef5ff; border-left-color: var(--route-color);
}
.step-icon {
  width: 32px; height: 32px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  font-size: 12px; font-weight: 600; color: #fff;
  background: var(--route-color); opacity: .8;
}
.step-icon.start-icon { background: #2A9D8F; }
.step-icon.end-icon { background: #E76F51; }
.step-content { flex: 1; min-width: 0; }
.step-instruction {
  font-size: 14px; color: #333; line-height: 1.5; margin-bottom: 2px;
}
.step-info {
  font-size: 12px; color: #999;
}

/* 加载遮罩 */
.loading-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,.7); z-index: 150;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .3s;
}
.loading-overlay.show { opacity: 1; pointer-events: auto; }
.loading-spinner {
  width: 40px; height: 40px; border: 3px solid #e0e0e0;
  border-top-color: #2B7DE9; border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* 响应式 */
@media (max-width: 768px) {
  .search-panel { width: calc(100% - 32px); }
  .route-panel { left: 8px; right: 8px; }
  .route-card { min-width: 140px; flex: 1; }
  .detail-panel { width: 100%; }
}

/* 避免地图点击穿透 */
.amap-container { cursor: grab; }
.amap-container:active { cursor: grabbing; }
</style>
</head>
<body>

<div id="map-container"></div>

<!-- 搜索面板 -->
<div class="search-panel">
  <h3>路线规划</h3>
  <div class="input-row">
    <input type="text" id="start-input" placeholder="输入起点" value="天安门广场">
    <button class="btn-swap" id="btn-swap" title="交换起终点">
      <svg viewBox="0 0 24 24"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3L5 6.99h3V14h2V6.99h3L9 3z"/></svg>
    </button>
  </div>
  <div class="input-row">
    <input type="text" id="end-input" placeholder="输入终点" value="北京首都国际机场">
  </div>
  <div class="btn-row">
    <button class="btn-search" id="btn-search">搜索</button>
    <button class="btn-locate" id="btn-locate">定位</button>
  </div>
</div>

<!-- 路线对比面板 -->
<div class="route-panel" id="route-panel"></div>

<!-- 详情面板 -->
<div class="detail-panel" id="detail-panel">
  <div class="detail-header">
    <h3 id="detail-title">路线详情</h3>
    <button class="btn-close" id="btn-close-detail">
      <svg viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
    </button>
  </div>
  <div class="detail-list" id="detail-list"></div>
</div>

<!-- 加载遮罩 -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
</div>

<script>
/* ==================== 配置常量 ==================== */
var ROUTE_COLORS = {
  walking: '#2A9D8F',
  riding:  '#E76F51',
  driving: '#2B7DE9'
};
var ROUTE_LABELS = { walking: '步行', riding: '骑行', driving: '驾车' };
var ROUTE_LINE_WIDTHS = { walking: 4, riding: 4, driving: 5 };

/* ==================== 全局状态 ==================== */
var map = null;
var drivingPlugin = null;
var walkingPlugin = null;
var ridingPlugin = null;
var geocoder = null;

// 路线数据: { type: { result, polylines, steps, distance, duration, trafficLights } }
var routeData = {};
var startMarker = null;
var endMarker = null;
var selectedRouteType = 'driving';
var currentStepPolyline = null;
var stepHighlightPolyline = null;

/* ==================== 初始化地图 ==================== */
function initMap() {
  map = new AMap.Map('map-container', {
    zoom: 12,
    viewMode: '2D'
  });

  drivingPlugin = new AMap.Driving({ policy: AMap.DrivingPolicy.LEAST_TIME });
  walkingPlugin = new AMap.Walking();
  ridingPlugin = new AMap.Riding();
  geocoder = new AMap.Geocoder({ city: '全国' });

  map.addControl(new AMap.ToolBar({ position: 'RT' }));

  // 地图加载完成后自动搜索
  map.on('complete', function () {
    var startVal = document.getElementById('start-input').value;
    var endVal = document.getElementById('end-input').value;
    if (startVal && endVal) {
      searchAllRoutes();
    }
  });
}

/* ==================== 地址解析 ==================== */
function geocodeAddress(address) {
  return new Promise(function (resolve, reject) {
    geocoder.getLocation(address, function (status, result) {
      if (status === 'complete' && result.geocodes.length > 0) {
        resolve(result.geocodes[0].getLocation());
      } else {
        reject(new Error('地址解析失败: ' + address));
      }
    });
  });
}

/* ==================== 驾车路线 ==================== */
function searchDrivingRoute(startPos, endPos) {
  return new Promise(function (resolve, reject) {
    drivingPlugin.search(startPos, endPos, function (status, result) {
      if (status === 'complete' && result.routes && result.routes.length > 0) {
        resolve(result);
      } else {
        reject(new Error('驾车路线规划失败'));
      }
    });
  });
}

/* ==================== 步行路线 ==================== */
function searchWalkingRoute(startPos, endPos) {
  return new Promise(function (resolve, reject) {
    walkingPlugin.search(startPos, endPos, function (status, result) {
      if (status === 'complete' && result.routes && result.routes.length > 0) {
        resolve(result);
      } else {
        reject(new Error('步行路线规划失败'));
      }
    });
  });
}

/* ==================== 骑行路线 ==================== */
function searchRidingRoute(startPos, endPos) {
  return new Promise(function (resolve, reject) {
    ridingPlugin.search(startPos, endPos, function (status, result) {
      if (status === 'complete' && result.routes && result.routes.length > 0) {
        resolve(result);
      } else {
        reject(new Error('骑行路线规划失败'));
      }
    });
  });
}

/* ==================== 解析路线结果 ==================== */
function parseRouteResult(result) {
  if (!result.routes || result.routes.length === 0) return null;
  var route = result.routes[0];
  var steps = [];
  var totalDistance = 0;
  var totalDuration = 0;
  var totalTrafficLights = 0;

  for (var i = 0; i < route.steps.length; i++) {
    var step = route.steps[i];
    totalDistance += (step.distance || 0);
    totalDuration += (step.duration || 0);
    var trafficLights = step.traffic_lights || 0;
    totalTrafficLights += trafficLights;

    var instruction = step.instruction || '';
    if (!instruction && step.road) {
      instruction = '沿' + step.road + '行驶';
    }
    steps.push({
      instruction: instruction,
      distance: step.distance || 0,
      duration: step.duration || 0,
      trafficLights: trafficLights,
      path: step.path || [],
      road: step.road || ''
    });
  }

  return {
    distance: totalDistance,
    duration: totalDuration,
    trafficLights: totalTrafficLights,
    steps: steps
  };
}

/* ==================== 搜索所有路线 ==================== */
function searchAllRoutes() {
  var startAddr = document.getElementById('start-input').value.trim();
  var endAddr = document.getElementById('end-input').value.trim();

  if (!startAddr || !endAddr) {
    alert('请输入起点和终点');
    return;
  }

  showLoading(true);

  Promise.all([geocodeAddress(startAddr), geocodeAddress(endAddr)])
    .then(function (positions) {
      var startPos = positions[0];
      var endPos = positions[1];

      // 清除之前的路线
      clearPreviousRoutes();
      // 放置起终点标记
      placeStartEndMarkers(startPos, endPos);
      // 适配视野
      map.setFitView(null, false, [100, 100, 100, 350]);

      return Promise.allSettled([
        searchDrivingRoute(startPos, endPos),
        searchWalkingRoute(startPos, endPos),
        searchRidingRoute(startPos, endPos)
      ]);
    })
    .then(function (results) {
      var hasData = false;
      results.forEach(function (item, idx) {
        var types = ['driving', 'walking', 'riding'];
        var type = types[idx];
        if (item.status === 'fulfilled') {
          var parsed = parseRouteResult(item.value);
          if (parsed) {
            routeData[type] = parsed;
            drawRouteOnMap(type, parsed);
            hasData = true;
          }
        }
      });

      if (!hasData) {
        alert('未能规划出任何路线，请检查地址是否正确');
        showLoading(false);
        return;
      }

      updateRoutePanel();
      determineBestRoutes();
      selectRoute('driving');
      showLoading(false);
    })
    .catch(function (err) {
      alert('地址解析失败: ' + err.message);
      showLoading(false);
    });
}

/* ==================== 在地图上绘制路线 ==================== */
function drawRouteOnMap(type, data) {
  var color = ROUTE_COLORS[type];
  var lineWidth = ROUTE_LINE_WIDTHS[type];
  var polylines = [];

  for (var i = 0; i < data.steps.length; i++) {
    var step = data.steps[i];
    if (!step.path || step.path.length === 0) continue;

    var pl = new AMap.Polyline({
      path: step.path,
      strokeColor: color,
      strokeWeight: lineWidth,
      strokeOpacity: type === selectedRouteType ? 0.9 : 0.25,
      lineJoin: 'round',
      lineCap: 'round',
      zIndex: type === selectedRouteType ? 50 : 30,
      extData: { type: type, stepIndex: i }
    });

    pl.on('click', function (e) {
      var ed = e.target.getExtData();
      showStepDetail(ed.type, ed.stepIndex);
    });

    pl.setMap(map);
    polylines.push(pl);
  }

  data.polylines = polylines;
}

/* ==================== 选择路线（切换高亮） ==================== */
function selectRoute(type) {
  if (!routeData[type]) return;

  // 隐藏旧路线
  var oldType = selectedRouteType;
  if (routeData[oldType] && routeData[oldType].polylines) {
    animatePolyline(routeData[oldType].polylines, ROUTE_LINE_WIDTHS[oldType], 0.25, ROUTE_LINE_WIDTHS[oldType], 30);
    routeData[oldType].polylines.forEach(function (pl) { pl.setzIndex(30); });
  }

  // 显示新路线
  if (routeData[type] && routeData[type].polylines) {
    animatePolyline(routeData[type].polylines, ROUTE_LINE_WIDTHS[type], 0.9, ROUTE_LINE_WIDTHS[type], 50);
    routeData[type].polylines.forEach(function (pl) { pl.setzIndex(50); });
  }

  selectedRouteType = type;
  updateRoutePanel();
}

/* ==================== Polyline 动画 ==================== */
function animatePolyline(polylines, width, fromOpacity, targetOpacity, targetZIndex) {
  var steps = 12;
  var duration = 300;
  var interval = duration / steps;
  var step = 0;

  var timer = setInterval(function () {
    step++;
    var t = step / steps;
    // cubic ease-out
    var ease = 1 - Math.pow(1 - t, 3);
    var currentOpacity = fromOpacity + (targetOpacity - fromOpacity) * ease;

    polylines.forEach(function (pl) {
      pl.setOptions({ strokeOpacity: currentOpacity, strokeWeight: width });
      if (targetZIndex !== undefined && step === steps) {
        pl.setzIndex(targetZIndex);
      }
    });

    if (step >= steps) {
      clearInterval(timer);
    }
  }, interval);
}

/* ==================== 更新路线卡片面板 ==================== */
function updateRoutePanel() {
  var panel = document.getElementById('route-panel');
  var types = ['walking', 'riding', 'driving'];
  var html = '';

  types.forEach(function (type) {
    var data = routeData[type];
    var isActive = selectedRouteType === type;
    var color = ROUTE_COLORS[type];
    var label = ROUTE_LABELS[type];

    if (!data) {
      html += '<div class="route-card" style="opacity:.5;cursor:default" data-type="' + type + '">' +
        '<div class="card-header"><span class="icon-dot" style="background:' + color + '"></span>' +
        '<span class="card-title">' + label + '</span></div>' +
        '<div class="card-body"><span class="value">--</span><span class="unit">--</span></div>' +
        '<div class="card-meta">暂无数据</div></div>';
      return;
    }

    var distStr = formatDistance(data.distance);
    var durStr = formatDuration(data.duration);
    var trafficStr = data.trafficLights > 0 ? data.trafficLights + '个红绿灯' : '--';
    var fastestBadge = data.badgeFastest ? '<span class="badge badge-fastest">最快</span>' : '';
    var shortestBadge = data.badgeShortest ? '<span class="badge badge-shortest">最短</span>' : '';

    html += '<div class="route-card' + (isActive ? ' active' : '') + '" data-type="' + type +
      '" style="--route-color:' + color + '" onclick="selectRoute(\'' + type + '\')">' +
      '<div class="card-header"><span class="icon-dot" style="background:' + color + '"></span>' +
      '<span class="card-title">' + label + fastestBadge + shortestBadge + '</span></div>' +
      '<div class="card-body"><span class="value">' + distStr + '</span></div>' +
      '<div class="card-meta"><span>' + durStr + '</span><span>' + trafficStr + '</span></div></div>';
  });

  panel.innerHTML = html;
}

/* ==================== 判断最快/最短路线 ==================== */
function determineBestRoutes() {
  var types = [];
  var keys = Object.keys(routeData);
  keys.forEach(function (k) { if (routeData[k]) types.push(k); });

  if (types.length === 0) return;

  var fastest = types[0];
  var shortest = types[0];
  types.forEach(function (type) {
    if (routeData[type].duration < routeData[fastest].duration) fastest = type;
    if (routeData[type].distance < routeData[shortest].distance) shortest = type;
  });

  types.forEach(function (type) {
    routeData[type].badgeFastest = (type === fastest);
    routeData[type].badgeShortest = (type === shortest);
  });
}

/* ==================== 步骤详情 ==================== */
function showStepDetail(type, stepIndex) {
  var data = routeData[type];
  if (!data) return;

  var steps = data.steps;
  var color = ROUTE_COLORS[type];
  var label = ROUTE_LABELS[type];

  document.getElementById('detail-title').textContent = label + '路线详情';
  document.getElementById('detail-panel').style.setProperty('--route-color', color);

  var listHtml = '';

  // 起点
  listHtml += '<div class="detail-item" onclick="focusOnStep(\'' + type + '\', -1)">' +
    '<div class="step-icon start-icon">起</div>' +
    '<div class="step-content">' +
    '<div class="step-instruction">起点</div>' +
    '<div class="step-info">' + escapeHtml(document.getElementById('start-input').value) + '</div>' +
    '</div></div>';

  // 各步骤
  for (var i = 0; i < steps.length; i++) {
    var isActive = (i === stepIndex);
    var step = steps[i];
    listHtml += '<div class="detail-item' + (isActive ? ' active' : '') +
      '" onclick="focusOnStep(\'' + type + '\', ' + i + ')" data-type="' + type + '" data-step="' + i + '">' +
      '<div class="step-icon">' + (i + 1) + '</div>' +
      '<div class="step-content">' +
      '<div class="step-instruction">' + escapeHtml(step.instruction) + '</div>' +
      '<div class="step-info">' + formatDistance(step.distance) +
      (step.trafficLights > 0 ? ' · ' + step.trafficLights + '个红绿灯' : '') +
      '</div></div></div>';
  }

  // 终点
  listHtml += '<div class="detail-item" onclick="focusOnStep(\'' + type + '\', ' + steps.length + ')">' +
    '<div class="step-icon end-icon">终</div>' +
    '<div class="step-content">' +
    '<div class="step-instruction">终点</div>' +
    '<div class="step-info">' + escapeHtml(document.getElementById('end-input').value) + '</div>' +
    '</div></div>';

  document.getElementById('detail-list').innerHTML = listHtml;
  document.getElementById('detail-panel').classList.add('open');

  // 高亮当前步骤
  focusOnStep(type, stepIndex);
}

function closeDetailPanel() {
  document.getElementById('detail-panel').classList.remove('open');
  if (stepHighlightPolyline) {
    stepHighlightPolyline.setMap(null);
    stepHighlightPolyline = null;
  }
}

function focusOnStep(type, stepIndex) {
  // 更新列表激活状态
  var items = document.querySelectorAll('.detail-item');
  items.forEach(function (item) {
    item.classList.remove('active');
    var itemType = item.getAttribute('data-type');
    var itemStep = item.getAttribute('data-step');
    if (itemType === type && itemStep === String(stepIndex)) {
      item.classList.add('active');
    }
  });

  // 清除之前的高亮
  if (stepHighlightPolyline) {
    stepHighlightPolyline.setMap(null);
    stepHighlightPolyline = null;
  }

  var data = routeData[type];
  if (!data || !data.steps) return;

  // 高亮对应的步骤 polyline
  if (stepIndex >= 0 && stepIndex < data.steps.length) {
    var step = data.steps[stepIndex];
    if (step.path && step.path.length > 0) {
      stepHighlightPolyline = new AMap.Polyline({
        path: step.path,
        strokeColor: '#FFC107',
        strokeWeight: 7,
        strokeOpacity: 1,
        lineJoin: 'round',
        lineCap: 'round',
        zIndex: 60
      });
      stepHighlightPolyline.setMap(map);
      map.setFitView([stepHighlightPolyline], false, [80, 80, 80, 80]);
    }
  }
}

/* ==================== 清除之前的路线 ==================== */
function clearPreviousRoutes() {
  var types = ['walking', 'riding', 'driving'];
  types.forEach(function (type) {
    if (routeData[type] && routeData[type].polylines) {
      routeData[type].polylines.forEach(function (pl) { pl.setMap(null); });
    }
  });
  routeData = {};
  selectedRouteType = 'driving';
  closeDetailPanel();
}

/* ==================== 放置起终点标记 ==================== */
function placeStartEndMarkers(startPos, endPos) {
  // 清除旧标记
  if (startMarker) { startMarker.setMap(null); startMarker = null; }
  if (endMarker) { endMarker.setMap(null); endMarker = null; }

  // SVG data URI 图标
  var startIcon = new AMap.Icon({
    size: new AMap.Size(28, 40),
    imageSize: new AMap.Size(28, 40),
    image: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">' +
      '<path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.27 21.73 0 14 0z" fill="#2A9D8F"/>' +
      '<circle cx="14" cy="14" r="5" fill="#fff"/></svg>'
    ),
    imageOffset: new AMap.Pixel(-14, -40)
  });

  var endIcon = new AMap.Icon({
    size: new AMap.Size(28, 40),
    imageSize: new AMap.Size(28, 40),
    image: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(
      '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="40" viewBox="0 0 28 40">' +
      '<path d="M14 0C6.27 0 0 6.27 0 14c0 10.5 14 26 14 26s14-15.5 14-26C28 6.27 21.73 0 14 0z" fill="#E76F51"/>' +
      '<circle cx="14" cy="14" r="5" fill="#fff"/></svg>'
    ),
    imageOffset: new AMap.Pixel(-14, -40)
  });

  startMarker = new AMap.Marker({ position: startPos, icon: startIcon, zIndex: 100, offset: new AMap.Pixel(-14, -40) });
  endMarker = new AMap.Marker({ position: endPos, icon: endIcon, zIndex: 100, offset: new AMap.Pixel(-14, -40) });

  startMarker.setMap(map);
  endMarker.setMap(map);
}

/* ==================== 格式化距离 ==================== */
function formatDistance(meters) {
  if (meters >= 1000) {
    return (meters / 1000).toFixed(1) + 'km';
  }
  return meters + 'm';
}

/* ==================== 格式化时长 ==================== */
function formatDuration(seconds) {
  if (seconds < 0) return '--';
  if (seconds < 60) return Math.round(seconds) + '秒';
  var hours = Math.floor(seconds / 3600);
  var minutes = Math.floor((seconds % 3600) / 60);
  if (hours > 0) {
    return hours + '小时' + (minutes > 0 ? minutes + '分' : '');
  }
  return minutes + '分';
}

/* ==================== HTML 转义 ==================== */
function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

/* ==================== 显示/隐藏加载遮罩 ==================== */
function showLoading(show) {
  document.getElementById('loading-overlay').classList.toggle('show', show);
}

/* ==================== 事件绑定 ==================== */
function bindEvents() {
  document.getElementById('btn-search').addEventListener('click', searchAllRoutes);
  document.getElementById('btn-swap').addEventListener('click', function () {
    var startInput = document.getElementById('start-input');
    var endInput = document.getElementById('end-input');
    var temp = startInput.value;
    startInput.value = endInput.value;
    endInput.value = temp;
  });
  document.getElementById('btn-locate').addEventListener('click', function () {
    if (!navigator.geolocation) {
      alert('浏览器不支持定位功能');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        var lng = pos.coords.longitude;
        var lat = pos.coords.latitude;
        geocoder.getAddress([lng, lat], function (status, result) {
          if (status === 'complete' && result.regeocode) {
            document.getElementById('start-input').value = result.regeocode.formattedAddress;
          } else {
            document.getElementById('start-input').value = lat.toFixed(6) + ',' + lng.toFixed(6);
          }
        });
      },
      function () {
        alert('定位失败，请检查是否允许定位权限');
      },
      { enableHighAccuracy: true }
    );
  });
  document.getElementById('btn-close-detail').addEventListener('click', closeDetailPanel);
}

/* ==================== 入口 ==================== */
window.onload = function () {
  initMap();
  bindEvents();
};
</script>
