<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2196F3">
    <title>交互式旅行地图</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🗺️ 交互式旅行地图</h1>
            <p>点击地图添加景点标记，规划你的旅行路线</p>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>添加景点</h3>
                    <div class="form-group">
                        <label for="attractionName">景点名称</label>
                        <input type="text" id="attractionName" placeholder="输入景点名称">
                    </div>
                    <div class="form-group">
                        <label for="attractionDesc">景点描述</label>
                        <textarea id="attractionDesc" rows="3" placeholder="描述这个景点..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="attractionIcon">图标类型</label>
                        <select id="attractionIcon">
                            <option value="🏛️">🏛️ 景点</option>
                            <option value="🏨">🏨 住宿</option>
                            <option value="🍽️">🍽️ 餐饮</option>
                            <option value="🛍️">🛍️ 购物</option>
                            <option value="🎭">🎭 娱乐</option>
                            <option value="⛰️">⛰️ 自然景观</option>
                            <option value="🏖️">🏖️ 海滩</option>
                            <option value="🏔️">🏔️ 山脉</option>
                        </select>
                    </div>
                    <p class="hint">点击地图添加标记，或使用搜索定位</p>
                </div>

                <div class="sidebar-section">
                    <h3>搜索地点</h3>
                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="搜索地点...">
                        <button id="searchBtn">🔍</button>
                    </div>
                    <div id="searchResults" class="search-results"></div>
                </div>

                <div class="sidebar-section">
                    <h3>已添加景点</h3>
                    <ul id="attractionsList" class="attractions-list"></ul>
                </div>

                <div class="sidebar-section">
                    <h3>路线规划</h3>
                    <button id="calculateRouteBtn" class="btn-primary" disabled>
                        📏 计算路线距离
                    </button>
                    <div id="routeInfo" class="route-info"></div>
                </div>

                <div class="sidebar-section">
                    <h3>操作</h3>
                    <div class="button-group">
                        <button id="clearAllBtn" class="btn-danger">🗑️ 清除所有</button>
                        <button id="exportBtn" class="btn-secondary">📥 导出数据</button>
                        <button id="importBtn" class="btn-secondary">📤 导入数据</button>
                    </div>
                    <input type="file" id="importFile" accept=".json" style="display: none;">
                </div>
            </aside>

            <main class="map-container">
                <div id="map"></div>
                <div class="map-controls">
                    <button id="locateBtn" class="map-control-btn" title="定位我的位置">
                        📍
                    </button>
                    <button id="zoomInBtn" class="map-control-btn" title="放大">
                        ➕
                    </button>
                    <button id="zoomOutBtn" class="map-control-btn" title="缩小">
                        ➖
                    </button>
                    <button id="toggleRouteBtn" class="map-control-btn" title="显示/隐藏路线">
                        🔗
                    </button>
                </div>
            </main>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker 注册成功'))
                    .catch(err => console.log('Service Worker 注册失败:', err));
            });
        }
    </script>
</body>
</html>
