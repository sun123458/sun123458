<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>磁力连线粒子背景</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #0a0a2e; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height, particles = [];
let mouse = { x: -9999, y: -9999, active: false };

// 配置参数
const CONFIG = {
  particleCount: 120,       // 粒子数量
  particleMinR: 1.5,        // 粒子最小半径
  particleMaxR: 3.5,        // 粒子最大半径
  linkDistance: 150,         // 连线最大距离
  mouseRadius: 180,          // 鼠标影响半径
  mouseForce: 8,             // 鼠标排斥力强度
  speed: 0.4,               // 粒子基础速度
  particleColor: [180, 220, 255],  // 粒子颜色 RGB
  lineColor: [100, 180, 255],      // 连线颜色 RGB
};

function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}

class Particle {
  constructor() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * CONFIG.speed * 2;
    this.vy = (Math.random() - 0.5) * CONFIG.speed * 2;
    this.radius = CONFIG.particleMinR + Math.random() * (CONFIG.particleMaxR - CONFIG.particleMinR);
    this.baseAlpha = 0.4 + Math.random() * 0.6;
  }

  update() {
    // 鼠标排斥力
    if (mouse.active) {
      const dx = this.x - mouse.x;
      const dy = this.y - mouse.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < CONFIG.mouseRadius && dist > 0) {
        const force = (1 - dist / CONFIG.mouseRadius) * CONFIG.mouseForce;
        this.vx += (dx / dist) * force * 0.05;
        this.vy += (dy / dist) * force * 0.05;
      }
    }

    // 阻尼，防止速度无限增长
    this.vx *= 0.99;
    this.vy *= 0.99;

    // 保持最低速度
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed < CONFIG.speed * 0.5) {
      const angle = Math.atan2(this.vy, this.vx);
      this.vx = Math.cos(angle) * CONFIG.speed * 0.5;
      this.vy = Math.sin(angle) * CONFIG.speed * 0.5;
    }

    // 限速
    if (speed > CONFIG.speed * 4) {
      this.vx = (this.vx / speed) * CONFIG.speed * 4;
      this.vy = (this.vy / speed) * CONFIG.speed * 4;
    }

    this.x += this.vx;
    this.y += this.vy;

    // 边界反弹
    if (this.x < 0) { this.x = 0; this.vx *= -1; }
    if (this.x > width) { this.x = width; this.vx *= -1; }
    if (this.y < 0) { this.y = 0; this.vy *= -1; }
    if (this.y > height) { this.y = height; this.vy *= -1; }
  }

  draw() {
    const [r, g, b] = CONFIG.particleColor;
    // 粒子光晕
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius * 3);
    gradient.addColorStop(0, `rgba(${r},${g},${b},${this.baseAlpha})`);
    gradient.addColorStop(0.5, `rgba(${r},${g},${b},${this.baseAlpha * 0.3})`);
    gradient.addColorStop(1, `rgba(${r},${g},${b},0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();

    // 粒子核心
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${this.baseAlpha})`;
    ctx.fill();
  }
}

function init() {
  particles = [];
  for (let i = 0; i < CONFIG.particleCount; i++) {
    particles.push(new Particle());
  }
}

function drawLinks() {
  const [r, g, b] = CONFIG.lineColor;
  const linkDist = CONFIG.linkDistance;
  const linkDistSq = linkDist * linkDist;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distSq = dx * dx + dy * dy;

      if (distSq < linkDistSq) {
        const dist = Math.sqrt(distSq);
        const t = dist / linkDist; // 0~1, 越小越近

        // 距离越近: 线越粗、越亮
        const lineWidth = Math.max(0.2, (1 - t) * 2.5);
        const alpha = (1 - t) * 0.6;

        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }
    }
  }
}

function drawMouseLinks() {
  if (!mouse.active) return;
  const [r, g, b] = CONFIG.lineColor;

  for (const p of particles) {
    const dx = p.x - mouse.x;
    const dy = p.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < CONFIG.mouseRadius) {
      const t = dist / CONFIG.mouseRadius;
      const lineWidth = Math.max(0.2, (1 - t) * 1.5);
      const alpha = (1 - t) * 0.35;
      ctx.beginPath();
      ctx.moveTo(mouse.x, mouse.y);
      ctx.lineTo(p.x, p.y);
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
      ctx.lineWidth = lineWidth;
      ctx.stroke();
    }
  }
}

function animate() {
  ctx.clearRect(0, 0, width, height);

  // 更新粒子
  for (const p of particles) {
    p.update();
  }

  // 画连线
  drawLinks();
  drawMouseLinks();

  // 画粒子
  for (const p of particles) {
    p.draw();
  }

  requestAnimationFrame(animate);
}

// 事件监听
window.addEventListener('resize', () => {
  resize();
});

canvas.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});

canvas.addEventListener('mouseleave', () => {
  mouse.active = false;
});

// 触摸支持
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
  mouse.active = true;
}, { passive: false });

canvas.addEventListener('touchend', () => {
  mouse.active = false;
});

// 启动
resize();
init();
animate();
</script>
</body>
</html>
