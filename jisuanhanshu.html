<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学函数计算器</title>
    <style>
        /* ====== Theme Variables ====== */
        [data-theme="dark"] {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-display: #0f3460;
            --bg-button: #1a1a3e;
            --bg-button-hover: #2a2a5e;
            --bg-button-active: #3a3a7e;
            --bg-button-func: #0f3460;
            --bg-button-func-hover: #1a4a80;
            --bg-button-op: #e94560;
            --bg-button-op-hover: #ff5a75;
            --bg-button-eq: #00d2ff;
            --bg-button-eq-hover: #33dbff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0c0;
            --text-display: #00d2ff;
            --text-button: #e0e0e0;
            --text-button-op: #ffffff;
            --border-color: #2a2a5e;
            --history-bg: #16213e;
            --history-item: #1a1a3e;
            --history-item-hover: #2a2a5e;
            --canvas-bg: #0a0a1e;
            --canvas-grid: #1a1a3e;
            --canvas-axis: #3a3a7e;
            --canvas-line: #00d2ff;
            --shadow: rgba(0, 0, 0, 0.4);
            --error-color: #e94560;
            --scrollbar-track: #1a1a2e;
            --scrollbar-thumb: #3a3a7e;
        }

        [data-theme="light"] {
            --bg-primary: #f0f2f5;
            --bg-secondary: #ffffff;
            --bg-display: #ffffff;
            --bg-button: #e8ecf1;
            --bg-button-hover: #d0d5dc;
            --bg-button-active: #b8bfc8;
            --bg-button-func: #dbeafe;
            --bg-button-func-hover: #bfdbfe;
            --bg-button-op: #f97316;
            --bg-button-op-hover: #fb923c;
            --bg-button-eq: #3b82f6;
            --bg-button-eq-hover: #60a5fa;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-display: #1e293b;
            --text-button: #334155;
            --text-button-op: #ffffff;
            --border-color: #d0d5dc;
            --history-bg: #ffffff;
            --history-item: #f0f2f5;
            --history-item-hover: #e8ecf1;
            --canvas-bg: #ffffff;
            --canvas-grid: #e8ecf1;
            --canvas-axis: #94a3b8;
            --canvas-line: #3b82f6;
            --shadow: rgba(0, 0, 0, 0.1);
            --error-color: #ef4444;
            --scrollbar-track: #e8ecf1;
            --scrollbar-thumb: #94a3b8;
        }

        [data-theme="retro"] {
            --bg-primary: #2c2c00;
            --bg-secondary: #3a3a00;
            --bg-display: #1a1a00;
            --bg-button: #4a4a10;
            --bg-button-hover: #5a5a20;
            --bg-button-active: #6a6a30;
            --bg-button-func: #3a4a10;
            --bg-button-func-hover: #4a5a20;
            --bg-button-op: #8b6914;
            --bg-button-op-hover: #a07a1e;
            --bg-button-eq: #b8860b;
            --bg-button-eq-hover: #d4a017;
            --text-primary: #33ff00;
            --text-secondary: #22aa00;
            --text-display: #33ff00;
            --text-button: #33ff00;
            --text-button-op: #1a1a00;
            --border-color: #5a5a20;
            --history-bg: #2c2c00;
            --history-item: #3a3a00;
            --history-item-hover: #4a4a10;
            --canvas-bg: #1a1a00;
            --canvas-grid: #2c2c00;
            --canvas-axis: #4a4a10;
            --canvas-line: #33ff00;
            --shadow: rgba(0, 0, 0, 0.6);
            --error-color: #ff4444;
            --scrollbar-track: #2c2c00;
            --scrollbar-thumb: #5a5a20;
        }

        /* ====== Reset & Base ====== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }

        [data-theme="retro"] body {
            font-family: 'VT323', 'Courier New', monospace;
            text-shadow: 0 0 4px var(--text-primary);
        }

        /* ====== Layout ====== */
        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 100vh;
        }

        /* ====== Header ====== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .theme-switcher {
            display: flex;
            gap: 8px;
        }

        .theme-btn {
            padding: 6px 14px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-button);
            color: var(--text-button);
            cursor: pointer;
            font-size: 0.8rem;
            font-family: inherit;
            transition: all 0.2s;
        }

        .theme-btn:hover {
            background: var(--bg-button-hover);
        }

        .theme-btn.active {
            background: var(--bg-button-op);
            color: var(--text-button-op);
            border-color: transparent;
        }

        /* ====== Main Layout ====== */
        .main-content {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }

        /* ====== Calculator ====== */
        .calculator {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border-color);
        }

        /* Display */
        .display {
            background: var(--bg-display);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 16px;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid var(--border-color);
        }

        .display-expression {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-align: right;
            min-height: 1.2em;
            word-break: break-all;
            margin-bottom: 4px;
        }

        .display-result {
            color: var(--text-display);
            font-size: 2rem;
            font-weight: 700;
            text-align: right;
            word-break: break-all;
            line-height: 1.2;
        }

        .display-result.error {
            color: var(--error-color);
            font-size: 1.2rem;
        }

        /* Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }

        .btn {
            padding: 14px 4px;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text-button);
            background: var(--bg-button);
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:hover {
            background: var(--bg-button-hover);
            transform: translateY(-1px);
        }

        .btn:active {
            background: var(--bg-button-active);
            transform: translateY(0);
        }

        .btn.func {
            background: var(--bg-button-func);
            font-size: 0.78rem;
        }

        .btn.func:hover {
            background: var(--bg-button-func-hover);
        }

        .btn.op {
            background: var(--bg-button-op);
            color: var(--text-button-op);
            font-size: 1.1rem;
        }

        .btn.op:hover {
            background: var(--bg-button-op-hover);
        }

        .btn.equals {
            background: var(--bg-button-eq);
            color: var(--bg-primary);
            font-size: 1.2rem;
        }

        .btn.equals:hover {
            background: var(--bg-button-eq-hover);
        }

        .btn.wide {
            grid-column: span 2;
        }

        .btn.active-key {
            outline: 2px solid var(--text-display);
            outline-offset: -2px;
        }

        /* ====== Right Panel ====== */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        /* Function Plotter */
        .plotter {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border-color);
        }

        .plotter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .plotter-header h2 {
            font-size: 1rem;
            color: var(--text-primary);
        }

        .plotter-input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .plotter-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-display);
            color: var(--text-display);
            font-family: inherit;
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .plotter-input:focus {
            border-color: var(--bg-button-eq);
        }

        .plotter-input::placeholder {
            color: var(--text-secondary);
        }

        .plot-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: var(--bg-button-eq);
            color: var(--bg-primary);
            font-family: inherit;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .plot-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .plot-controls {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .plot-control-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .plot-control-group label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .plot-control-input {
            width: 70px;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: var(--bg-display);
            color: var(--text-display);
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
            text-align: center;
        }

        .canvas-container {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--canvas-bg);
        }

        #plotCanvas {
            display: block;
            width: 100%;
            cursor: crosshair;
        }

        .canvas-coords {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            border-radius: 6px;
            font-size: 0.75rem;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .canvas-container:hover .canvas-coords {
            opacity: 1;
        }

        /* ====== History ====== */
        .history {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid var(--border-color);
            flex: 1;
            min-height: 200px;
            display: flex;
            flex-direction: column;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .history-header h2 {
            font-size: 1rem;
            color: var(--text-primary);
        }

        .clear-history-btn {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--bg-button);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-history-btn:hover {
            background: var(--bg-button-hover);
            color: var(--text-button);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: var(--scrollbar-track);
            border-radius: 3px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
            border-radius: 3px;
        }

        .history-item {
            padding: 10px 14px;
            border-radius: 8px;
            background: var(--history-item);
            cursor: pointer;
            transition: background 0.2s;
        }

        .history-item:hover {
            background: var(--history-item-hover);
        }

        .history-expr {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }

        .history-result {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .history-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* ====== Keyboard Hint ====== */
        .keyboard-hint {
            text-align: center;
            font-size: 0.72rem;
            color: var(--text-secondary);
            padding: 4px 0;
            opacity: 0.7;
        }

        kbd {
            display: inline-block;
            padding: 1px 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.7rem;
            background: var(--bg-button);
        }

        /* ====== Responsive ====== */
        @media (max-width: 850px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .calculator {
                max-width: 500px;
                margin: 0 auto;
                width: 100%;
            }

            .right-panel {
                width: 100%;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 12px;
            }

            .calculator {
                padding: 14px;
            }

            .display-result {
                font-size: 1.5rem;
            }

            .btn {
                padding: 12px 2px;
                font-size: 0.78rem;
            }

            .btn.func {
                font-size: 0.68rem;
            }

            .button-grid {
                gap: 5px;
            }

            .header {
                flex-direction: column;
                gap: 10px;
            }

            .theme-switcher {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <h1>Scientific Calculator</h1>
            <div class="theme-switcher">
                <button class="theme-btn" data-themeval="light">Light</button>
                <button class="theme-btn active" data-themeval="dark">Dark</button>
                <button class="theme-btn" data-themeval="retro">Retro</button>
            </div>
        </header>

        <!-- Main -->
        <main class="main-content">
            <!-- Calculator -->
            <section class="calculator">
                <div class="display">
                    <div class="display-expression" id="displayExpr"></div>
                    <div class="display-result" id="displayResult">0</div>
                </div>

                <div class="button-grid">
                    <!-- Row 1: Scientific functions -->
                    <button class="btn func" data-action="func" data-val="sin(">sin</button>
                    <button class="btn func" data-action="func" data-val="cos(">cos</button>
                    <button class="btn func" data-action="func" data-val="tan(">tan</button>
                    <button class="btn func" data-action="func" data-val="log(">log</button>
                    <button class="btn func" data-action="func" data-val="ln(">ln</button>

                    <!-- Row 2 -->
                    <button class="btn func" data-action="func" data-val="asin(">asin</button>
                    <button class="btn func" data-action="func" data-val="acos(">acos</button>
                    <button class="btn func" data-action="func" data-val="atan(">atan</button>
                    <button class="btn func" data-action="func" data-val="sqrt(">sqrt</button>
                    <button class="btn func" data-action="func" data-val="abs(">abs</button>

                    <!-- Row 3 -->
                    <button class="btn func" data-action="const" data-val="pi">&pi;</button>
                    <button class="btn func" data-action="const" data-val="e">e</button>
                    <button class="btn func" data-action="append" data-val="^">x^y</button>
                    <button class="btn func" data-action="append" data-val="!">n!</button>
                    <button class="btn op" data-action="backspace">&larr;</button>

                    <!-- Row 4 -->
                    <button class="btn" data-action="lparen">(</button>
                    <button class="btn" data-action="rparen">)</button>
                    <button class="btn" data-action="append" data-val="%">%</button>
                    <button class="btn op" data-action="clear">C</button>
                    <button class="btn op" data-action="clear-all">AC</button>

                    <!-- Row 5 -->
                    <button class="btn" data-action="digit" data-val="7">7</button>
                    <button class="btn" data-action="digit" data-val="8">8</button>
                    <button class="btn" data-action="digit" data-val="9">9</button>
                    <button class="btn op" data-action="append" data-val="&divide;">&divide;</button>
                    <button class="btn op" data-action="append" data-val="*">&times;</button>

                    <!-- Row 6 -->
                    <button class="btn" data-action="digit" data-val="4">4</button>
                    <button class="btn" data-action="digit" data-val="5">5</button>
                    <button class="btn" data-action="digit" data-val="6">6</button>
                    <button class="btn op" data-action="append" data-val="-">&minus;</button>
                    <button class="btn op" data-action="append" data-val="+">+</button>

                    <!-- Row 7 -->
                    <button class="btn" data-action="digit" data-val="1">1</button>
                    <button class="btn" data-action="digit" data-val="2">2</button>
                    <button class="btn" data-action="digit" data-val="3">3</button>
                    <button class="btn equals wide" data-action="equals">=</button>
                    <button class="btn op" data-action="negate">&plusmn;</button>
                </div>

                <div class="keyboard-hint">
                    Keyboard: <kbd>0-9</kbd> <kbd>+ - * /</kbd> <kbd>Enter</kbd>= <kbd>Esc</kbd>=clear <kbd>Backspace</kbd>
                </div>
            </section>

            <!-- Right Panel -->
            <div class="right-panel">
                <!-- Function Plotter -->
                <section class="plotter">
                    <div class="plotter-header">
                        <h2>Function Plotter</h2>
                    </div>
                    <div class="plotter-input-row">
                        <input type="text" class="plotter-input" id="funcInput"
                               placeholder="e.g. x^2, sin(x), log(x)" value="x^2">
                        <button class="plot-btn" id="plotBtn">Plot</button>
                    </div>
                    <div class="plot-controls">
                        <div class="plot-control-group">
                            <label>X min:</label>
                            <input type="number" class="plot-control-input" id="xMin" value="-10">
                        </div>
                        <div class="plot-control-group">
                            <label>X max:</label>
                            <input type="number" class="plot-control-input" id="xMax" value="10">
                        </div>
                        <div class="plot-control-group">
                            <label>Y min:</label>
                            <input type="number" class="plot-control-input" id="yMin" value="-10">
                        </div>
                        <div class="plot-control-group">
                            <label>Y max:</label>
                            <input type="number" class="plot-control-input" id="yMax" value="10">
                        </div>
                    </div>
                    <div class="canvas-container">
                        <canvas id="plotCanvas" width="600" height="400"></canvas>
                        <div class="canvas-coords" id="canvasCoords">x: 0, y: 0</div>
                    </div>
                </section>

                <!-- History -->
                <section class="history">
                    <div class="history-header">
                        <h2>History</h2>
                        <button class="clear-history-btn" id="clearHistoryBtn">Clear</button>
                    </div>
                    <div class="history-list" id="historyList">
                        <div class="history-empty">No calculations yet</div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
    (() => {
        'use strict';

        // ============================
        // Shunting-Yard Expression Parser
        // ============================
        const OPERATORS = {
            '+': { prec: 2, assoc: 'left', fn: (a, b) => a + b },
            '-': { prec: 2, assoc: 'left', fn: (a, b) => a - b },
            '*': { prec: 3, assoc: 'left', fn: (a, b) => a * b },
            '/': { prec: 3, assoc: 'left', fn: (a, b) => {
                if (b === 0) throw new Error('Division by zero');
                return a / b;
            }},
            '%': { prec: 3, assoc: 'left', fn: (a, b) => a % b },
            '^': { prec: 4, assoc: 'right', fn: (a, b) => Math.pow(a, b) },
            '_' : { prec: 5, assoc: 'right', unary: true, fn: a => -a }
        };

        const FUNCTIONS = {
            'sin':  x => Math.sin(x),
            'cos':  x => Math.cos(x),
            'tan':  x => {
                const c = Math.cos(x);
                if (Math.abs(c) < 1e-10) throw new Error('tan undefined');
                return Math.tan(x);
            },
            'asin': x => {
                if (x < -1 || x > 1) throw new Error('asin domain error');
                return Math.asin(x);
            },
            'acos': x => {
                if (x < -1 || x > 1) throw new Error('acos domain error');
                return Math.acos(x);
            },
            'atan': x => Math.atan(x),
            'log':  x => {
                if (x <= 0) throw new Error('log domain error');
                return Math.log10(x);
            },
            'ln':   x => {
                if (x <= 0) throw new Error('ln domain error');
                return Math.log(x);
            },
            'sqrt': x => {
                if (x < 0) throw new Error('sqrt domain error');
                return Math.sqrt(x);
            },
            'abs':  x => Math.abs(x),
            'fact': x => {
                if (x < 0 || !Number.isInteger(x)) throw new Error('Factorial needs non-negative integer');
                if (x > 170) throw new Error('Factorial overflow');
                let r = 1;
                for (let i = 2; i <= x; i++) r *= i;
                return r;
            }
        };

        const CONSTANTS = {
            'pi': Math.PI,
            'e':  Math.E
        };

        // Tokenize the expression string
        function tokenize(expr) {
            const tokens = [];
            let i = 0;
            const s = expr.replace(/\s+/g, '');

            while (i < s.length) {
                // Number (including decimals)
                if (/[0-9.]/.test(s[i])) {
                    let num = '';
                    while (i < s.length && /[0-9.]/.test(s[i])) {
                        num += s[i++];
                    }
                    tokens.push({ type: 'number', value: parseFloat(num) });
                }
                // Identifier (function or constant)
                else if (/[a-zA-Z]/.test(s[i])) {
                    let id = '';
                    while (i < s.length && /[a-zA-Z]/.test(s[i])) {
                        id += s[i++];
                    }
                    if (id === 'PI' || id === 'Pi') id = 'pi';
                    if (FUNCTIONS[id]) {
                        tokens.push({ type: 'function', value: id });
                    } else if (CONSTANTS[id]) {
                        tokens.push({ type: 'constant', value: id });
                    } else {
                        throw new Error(`Unknown identifier: ${id}`);
                    }
                }
                // Operators
                else if ('+-*/%^'.includes(s[i])) {
                    tokens.push({ type: 'operator', value: s[i] });
                    i++;
                }
                // Parentheses & comma
                else if (s[i] === '(') {
                    tokens.push({ type: 'lparen' });
                    i++;
                }
                else if (s[i] === ')') {
                    tokens.push({ type: 'rparen' });
                    i++;
                }
                else if (s[i] === ',') {
                    tokens.push({ type: 'comma' });
                    i++;
                }
                else if (s[i] === '!') {
                    tokens.push({ type: 'factorial' });
                    i++;
                }
                else {
                    throw new Error(`Unexpected character: ${s[i]}`);
                }
            }
            return tokens;
        }

        // Handle unary minus: convert "-" to unary "_" when appropriate
        function handleUnaryMinus(tokens) {
            const result = [];
            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i].type === 'operator' && tokens[i].value === '-') {
                    const prev = result[result.length - 1];
                    if (!prev || prev.type === 'operator' || prev.type === 'lparen' || prev.type === 'function' || prev.type === 'comma') {
                        // This is a unary minus
                        result.push({ type: 'operator', value: '_' });
                        continue;
                    }
                }
                result.push(tokens[i]);
            }
            return result;
        }

        // Handle factorial: number! -> function
        function handleFactorials(tokens) {
            const result = [];
            for (let i = 0; i < tokens.length; i++) {
                if (tokens[i].type === 'factorial') {
                    const prev = result[result.length - 1];
                    if (prev && prev.type === 'number') {
                        prev.value = FUNCTIONS.fact(prev.value);
                    } else {
                        // Factorial after a sub-expression - we evaluate it
                        result.push({ type: 'function', value: 'fact' });
                        continue;
                    }
                } else {
                    result.push(tokens[i]);
                }
            }
            return result;
        }

        // Handle implicit multiplication: 2pi -> 2*pi, 3sin -> 3*sin, )( -> )*(
        function insertImplicitMult(tokens) {
            const result = [];
            for (let i = 0; i < tokens.length; i++) {
                result.push(tokens[i]);
                if (i < tokens.length - 1) {
                    const cur = tokens[i];
                    const next = tokens[i + 1];
                    const needsMult =
                        (cur.type === 'number' && (next.type === 'constant' || next.type === 'function' || next.type === 'lparen')) ||
                        (cur.type === 'constant' && (next.type === 'number' || next.type === 'constant' || next.type === 'function' || next.type === 'lparen')) ||
                        (cur.type === 'rparen' && (next.type === 'number' || next.type === 'constant' || next.type === 'function' || next.type === 'lparen'));
                    if (needsMult) {
                        result.push({ type: 'operator', value: '*' });
                    }
                }
            }
            return result;
        }

        // Shunting-yard algorithm
        function shuntingYard(tokens) {
            const output = [];
            const opStack = [];

            for (let i = 0; i < tokens.length; i++) {
                const token = tokens[i];

                if (token.type === 'number') {
                    output.push(token.value);
                }
                else if (token.type === 'constant') {
                    output.push(CONSTANTS[token.value]);
                }
                else if (token.type === 'function') {
                    opStack.push(token);
                }
                else if (token.type === 'operator') {
                    const op = OPERATORS[token.value];
                    while (opStack.length > 0) {
                        const top = opStack[opStack.length - 1];
                        if (top.type === 'operator') {
                            const topOp = OPERATORS[top.value];
                            if ((op.assoc === 'left' && op.prec <= topOp.prec) ||
                                (op.assoc === 'right' && op.prec < topOp.prec)) {
                                output.push(opStack.pop());
                            } else {
                                break;
                            }
                        } else {
                            break;
                        }
                    }
                    opStack.push(token);
                }
                else if (token.type === 'lparen') {
                    opStack.push(token);
                }
                else if (token.type === 'rparen') {
                    while (opStack.length > 0 && opStack[opStack.length - 1].type !== 'lparen') {
                        output.push(opStack.pop());
                    }
                    if (opStack.length === 0) {
                        throw new Error('Mismatched parentheses');
                    }
                    opStack.pop(); // Remove '('
                    // If there's a function on the stack, pop it
                    if (opStack.length > 0 && opStack[opStack.length - 1].type === 'function') {
                        output.push(opStack.pop());
                    }
                }
            }

            while (opStack.length > 0) {
                const op = opStack.pop();
                if (op.type === 'lparen' || op.type === 'rparen') {
                    throw new Error('Mismatched parentheses');
                }
                output.push(op);
            }

            return output;
        }

        // Evaluate RPN output
        function evalRPN(rpn) {
            const stack = [];
            for (const item of rpn) {
                if (typeof item === 'number') {
                    stack.push(item);
                }
                else if (item.type === 'operator') {
                    const op = OPERATORS[item.value];
                    if (op.unary) {
                        const a = stack.pop();
                        if (a === undefined) throw new Error('Invalid expression');
                        stack.push(op.fn(a));
                    } else {
                        const b = stack.pop();
                        const a = stack.pop();
                        if (a === undefined || b === undefined) throw new Error('Invalid expression');
                        stack.push(op.fn(a, b));
                    }
                }
                else if (item.type === 'function') {
                    const a = stack.pop();
                    if (a === undefined) throw new Error('Invalid expression');
                    if (!FUNCTIONS[item.value]) throw new Error(`Unknown function: ${item.value}`);
                    stack.push(FUNCTIONS[item.value](a));
                }
            }
            if (stack.length !== 1) throw new Error('Invalid expression');
            return stack[0];
        }

        // Main evaluate function
        function evaluate(expr) {
            try {
                let tokens = tokenize(expr);
                tokens = handleUnaryMinus(tokens);
                tokens = handleFactorials(tokens);
                tokens = insertImplicitMult(tokens);
                const rpn = shuntingYard(tokens);
                let result = evalRPN(rpn);

                if (!isFinite(result)) {
                    if (result === Infinity) throw new Error('Result is infinity');
                    if (result === -Infinity) throw new Error('Result is negative infinity');
                    throw new Error('Result is not a number');
                }

                // Round to avoid floating point display issues
                result = Math.round(result * 1e12) / 1e12;
                return { success: true, result };
            } catch (err) {
                return { success: false, error: err.message };
            }
        }

        // Evaluate for plotter (accepts x value)
        function evaluateWithX(exprStr, xVal) {
            const expr = exprStr.replace(/\^/g, '**');
            const scope = { x: xVal, pi: Math.PI, e: Math.E, PI: Math.PI, E: Math.E };
            // Also support function names
            const mathFns = ['sin','cos','tan','asin','acos','atan','log','ln','sqrt','abs'];
            for (const fn of mathFns) {
                scope[fn] = Math[fn] || (fn === 'ln' ? Math.log : fn === 'log' ? Math.log10 : Math[fn]);
            }
            const scopeKeys = Object.keys(scope);
            const scopeVals = Object.values(scope);
            try {
                const fn = new Function(...scopeKeys, `"use strict"; return (${expr});`);
                return fn(...scopeVals);
            } catch {
                return NaN;
            }
        }

        // ============================
        // Calculator State
        // ============================
        let expression = '';
        let lastResult = null;
        let history = [];

        const displayExpr = document.getElementById('displayExpr');
        const displayResult = document.getElementById('displayResult');
        const historyList = document.getElementById('historyList');

        function updateDisplay() {
            displayExpr.textContent = formatExpression(expression);
            if (expression === '') {
                displayResult.textContent = '0';
                displayResult.classList.remove('error');
            }
        }

        function formatExpression(expr) {
            return expr
                .replace(/\*/g, ' \u00D7 ')
                .replace(/\//g, ' \u00F7 ')
                .replace(/\+/g, ' + ')
                .replace(/(?<=\d)-/g, ' \u2212 ')
                .replace(/\^/g, '^');
        }

        function formatNumber(n) {
            if (Number.isInteger(n) && Math.abs(n) < 1e15) {
                return n.toString();
            }
            const str = n.toPrecision(10);
            return parseFloat(str).toString();
        }

        function showResult(value) {
            displayResult.classList.remove('error');
            displayResult.textContent = formatNumber(value);
        }

        function showError(msg) {
            displayResult.classList.add('error');
            displayResult.textContent = msg;
        }

        function addToHistory(expr, result) {
            history.unshift({ expr, result, time: new Date() });
            if (history.length > 50) history.pop();
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyList.innerHTML = '<div class="history-empty">No calculations yet</div>';
                return;
            }
            historyList.innerHTML = history.map((item, i) => `
                <div class="history-item" data-index="${i}" title="Click to reuse result">
                    <div class="history-expr">${formatExpression(item.expr)}</div>
                    <div class="history-result">= ${formatNumber(item.result)}</div>
                </div>
            `).join('');
        }

        // ============================
        // Calculator Actions
        // ============================
        function inputDigit(d) {
            expression += d;
            updateDisplay();
        }

        function inputOperator(op) {
            expression += op;
            updateDisplay();
        }

        function inputFunction(fn) {
            expression += fn;
            updateDisplay();
        }

        function inputConstant(name) {
            expression += name;
            updateDisplay();
        }

        function inputParen(p) {
            expression += p;
            updateDisplay();
        }

        function inputNegate() {
            if (lastResult !== null && expression === '') {
                expression = String(-lastResult);
                lastResult = null;
            } else {
                expression += '(-';
            }
            updateDisplay();
        }

        function doBackspace() {
            // Check if the last token is a function name like "sin("
            const funcMatch = expression.match(/(sin|cos|tan|log|asin|acos|atan|sqrt|abs|ln)\($/);
            if (funcMatch) {
                expression = expression.slice(0, -funcMatch[0].length);
            } else {
                expression = expression.slice(0, -1);
            }
            updateDisplay();
        }

        function doClear() {
            expression = '';
            lastResult = null;
            displayResult.classList.remove('error');
            displayResult.textContent = '0';
            displayExpr.textContent = '';
        }

        function doEquals() {
            if (expression === '') return;

            const result = evaluate(expression);
            if (result.success) {
                displayExpr.textContent = formatExpression(expression) + ' =';
                showResult(result.result);
                addToHistory(expression, result.result);
                lastResult = result.result;
                expression = '';
            } else {
                showError(result.error);
            }
        }

        // ============================
        // Button Click Handlers
        // ============================
        document.querySelector('.button-grid').addEventListener('click', (e) => {
            const btn = e.target.closest('.btn');
            if (!btn) return;

            const action = btn.dataset.action;
            const val = btn.dataset.val;

            // Visual feedback
            btn.classList.add('active-key');
            setTimeout(() => btn.classList.remove('active-key'), 120);

            switch (action) {
                case 'digit':
                    // If last action was equals, start fresh
                    if (lastResult !== null && expression === '') {
                        expression = '';
                        lastResult = null;
                        displayExpr.textContent = '';
                    }
                    inputDigit(val);
                    break;
                case 'append':
                    inputOperator(val);
                    break;
                case 'func':
                    inputFunction(val);
                    break;
                case 'const':
                    inputConstant(val);
                    break;
                case 'lparen':
                    inputParen('(');
                    break;
                case 'rparen':
                    inputParen(')');
                    break;
                case 'equals':
                    doEquals();
                    break;
                case 'backspace':
                    doBackspace();
                    break;
                case 'clear':
                    doClear();
                    break;
                case 'clear-all':
                    history = [];
                    renderHistory();
                    doClear();
                    break;
                case 'negate':
                    inputNegate();
                    break;
            }
        });

        // ============================
        // History Click
        // ============================
        historyList.addEventListener('click', (e) => {
            const item = e.target.closest('.history-item');
            if (!item) return;
            const idx = parseInt(item.dataset.index);
            if (history[idx]) {
                expression = String(history[idx].result);
                lastResult = null;
                updateDisplay();
                showResult(history[idx].result);
            }
        });

        document.getElementById('clearHistoryBtn').addEventListener('click', () => {
            history = [];
            renderHistory();
        });

        // ============================
        // Keyboard Support
        // ============================
        document.addEventListener('keydown', (e) => {
            // Don't capture when typing in input fields
            if (e.target.tagName === 'INPUT') return;

            const key = e.key;

            // Find and highlight the matching button
            let targetBtn = null;

            if (/^[0-9]$/.test(key)) {
                targetBtn = document.querySelector(`.btn[data-action="digit"][data-val="${key}"]`);
                if (lastResult !== null && expression === '') {
                    expression = '';
                    lastResult = null;
                    displayExpr.textContent = '';
                }
                inputDigit(key);
            }
            else if (key === '+') {
                targetBtn = document.querySelector('.btn[data-val="+"]');
                inputOperator('+');
            }
            else if (key === '-') {
                targetBtn = document.querySelector('.btn[data-val="-"]');
                inputOperator('-');
            }
            else if (key === '*') {
                targetBtn = document.querySelector('.btn[data-val="*"]');
                inputOperator('*');
            }
            else if (key === '/') {
                e.preventDefault();
                targetBtn = document.querySelector('.btn[data-val="/"]');
                inputOperator('/');
            }
            else if (key === '%') {
                targetBtn = document.querySelector('.btn[data-val="%"]');
                inputOperator('%');
            }
            else if (key === '^') {
                targetBtn = document.querySelector('.btn[data-val="^"]');
                inputOperator('^');
            }
            else if (key === '!') {
                targetBtn = document.querySelector('.btn[data-val="!"]');
                inputOperator('!');
            }
            else if (key === '(') {
                targetBtn = document.querySelector('.btn[data-action="lparen"]');
                inputParen('(');
            }
            else if (key === ')') {
                targetBtn = document.querySelector('.btn[data-action="rparen"]');
                inputParen(')');
            }
            else if (key === '.' || key === ',') {
                e.preventDefault();
                inputDigit('.');
            }
            else if (key === 'Enter' || key === '=') {
                e.preventDefault();
                targetBtn = document.querySelector('.btn[data-action="equals"]');
                doEquals();
            }
            else if (key === 'Backspace') {
                targetBtn = document.querySelector('.btn[data-action="backspace"]');
                doBackspace();
            }
            else if (key === 'Escape' || key === 'Delete') {
                targetBtn = document.querySelector('.btn[data-action="clear"]');
                doClear();
            }
            else if (key === 'p') {
                inputConstant('pi');
            }
            else if (key === 's') {
                inputFunction('sin(');
            }
            else if (key === 'c') {
                inputFunction('cos(');
            }
            else if (key === 't') {
                inputFunction('tan(');
            }
            else if (key === 'l') {
                inputFunction('log(');
            }

            if (targetBtn) {
                targetBtn.classList.add('active-key');
                setTimeout(() => targetBtn.classList.remove('active-key'), 120);
            }
        });

        // ============================
        // Theme Switcher
        // ============================
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.documentElement.setAttribute('data-theme', btn.dataset.themeval);
                document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                // Re-plot with new theme colors
                plotFunction();
            });
        });

        // ============================
        // Function Plotter (Canvas)
        // ============================
        const canvas = document.getElementById('plotCanvas');
        const ctx = canvas.getContext('2d');
        const funcInput = document.getElementById('funcInput');
        const coordsDisplay = document.getElementById('canvasCoords');

        function getCanvasThemeColors() {
            const style = getComputedStyle(document.documentElement);
            return {
                bg: style.getPropertyValue('--canvas-bg').trim(),
                grid: style.getPropertyValue('--canvas-grid').trim(),
                axis: style.getPropertyValue('--canvas-axis').trim(),
                line: style.getPropertyValue('--canvas-line').trim(),
                text: style.getPropertyValue('--text-secondary').trim()
            };
        }

        function resizeCanvas() {
            const container = canvas.parentElement;
            const rect = container.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;
            canvas.width = rect.width * dpr;
            canvas.height = Math.max(300, Math.min(rect.width * 0.65, 400)) * dpr;
            canvas.style.height = Math.max(300, Math.min(rect.width * 0.65, 400)) + 'px';
            ctx.scale(dpr, dpr);
        }

        function plotFunction() {
            resizeCanvas();
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            const colors = getCanvasThemeColors();

            const xMin = parseFloat(document.getElementById('xMin').value) || -10;
            const xMax = parseFloat(document.getElementById('xMax').value) || 10;
            const yMin = parseFloat(document.getElementById('yMin').value) || -10;
            const yMax = parseFloat(document.getElementById('yMax').value) || 10;

            const expr = funcInput.value.trim() || 'x';

            // Clear
            ctx.fillStyle = colors.bg;
            ctx.fillRect(0, 0, w, h);

            // Mapping functions
            const mapX = x => ((x - xMin) / (xMax - xMin)) * w;
            const mapY = y => h - ((y - yMin) / (yMax - yMin)) * h;

            // Draw grid
            ctx.strokeStyle = colors.grid;
            ctx.lineWidth = 1;
            const gridStepX = niceStep((xMax - xMin) / 10);
            const gridStepY = niceStep((yMax - yMin) / 8);

            ctx.font = '10px monospace';
            ctx.fillStyle = colors.text;

            // Vertical grid lines
            for (let x = Math.ceil(xMin / gridStepX) * gridStepX; x <= xMax; x += gridStepX) {
                const px = mapX(x);
                ctx.beginPath();
                ctx.moveTo(px, 0);
                ctx.lineTo(px, h);
                ctx.stroke();
                if (Math.abs(x) > gridStepX * 0.1) {
                    ctx.fillText(formatAxis(x), px + 3, mapY(0) - 5);
                }
            }

            // Horizontal grid lines
            for (let y = Math.ceil(yMin / gridStepY) * gridStepY; y <= yMax; y += gridStepY) {
                const py = mapY(y);
                ctx.beginPath();
                ctx.moveTo(0, py);
                ctx.lineTo(w, py);
                ctx.stroke();
                if (Math.abs(y) > gridStepY * 0.1) {
                    ctx.fillText(formatAxis(y), mapX(0) + 4, py - 4);
                }
            }

            // Draw axes
            ctx.strokeStyle = colors.axis;
            ctx.lineWidth = 2;

            // X axis
            if (yMin <= 0 && yMax >= 0) {
                const y0 = mapY(0);
                ctx.beginPath();
                ctx.moveTo(0, y0);
                ctx.lineTo(w, y0);
                ctx.stroke();
            }

            // Y axis
            if (xMin <= 0 && xMax >= 0) {
                const x0 = mapX(0);
                ctx.beginPath();
                ctx.moveTo(x0, 0);
                ctx.lineTo(x0, h);
                ctx.stroke();
            }

            // Draw function
            ctx.strokeStyle = colors.line;
            ctx.lineWidth = 2.5;
            ctx.lineJoin = 'round';

            let firstPoint = true;
            const steps = w * 2; // High resolution

            ctx.beginPath();
            for (let i = 0; i <= steps; i++) {
                const x = xMin + (xMax - xMin) * (i / steps);
                let y;
                try {
                    y = evaluateWithX(expr, x);
                } catch {
                    firstPoint = true;
                    continue;
                }

                if (!isFinite(y) || isNaN(y)) {
                    firstPoint = true;
                    continue;
                }

                const px = mapX(x);
                const py = mapY(y);

                // Clip to reasonable y range to avoid wild lines
                if (py < -h * 2 || py > h * 3) {
                    firstPoint = true;
                    continue;
                }

                if (firstPoint) {
                    ctx.moveTo(px, py);
                    firstPoint = false;
                } else {
                    ctx.lineTo(px, py);
                }
            }
            ctx.stroke();

            // Draw function label
            ctx.fillStyle = colors.line;
            ctx.font = 'bold 13px monospace';
            ctx.fillText(`y = ${expr}`, 10, 20);
        }

        function niceStep(rough) {
            const pow = Math.pow(10, Math.floor(Math.log10(rough)));
            const norm = rough / pow;
            let nice;
            if (norm <= 1.5) nice = 1;
            else if (norm <= 3) nice = 2;
            else if (norm <= 7) nice = 5;
            else nice = 10;
            return nice * pow;
        }

        function formatAxis(n) {
            if (Math.abs(n) < 1e-10) return '0';
            if (Math.abs(n) >= 1000) return n.toExponential(0);
            return parseFloat(n.toPrecision(4)).toString();
        }

        // Plot button
        document.getElementById('plotBtn').addEventListener('click', plotFunction);
        funcInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') plotFunction();
        });

        // Canvas mouse tracking
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const w = canvas.width / (window.devicePixelRatio || 1);
            const h = canvas.height / (window.devicePixelRatio || 1);
            const xMin = parseFloat(document.getElementById('xMin').value) || -10;
            const xMax = parseFloat(document.getElementById('xMax').value) || 10;
            const yMin = parseFloat(document.getElementById('yMin').value) || -10;
            const yMax = parseFloat(document.getElementById('yMax').value) || 10;

            const mx = e.clientX - rect.left;
            const my = e.clientY - rect.top;
            const x = xMin + (mx / w) * (xMax - xMin);
            const y = yMax - (my / h) * (yMax - yMin);

            coordsDisplay.textContent = `x: ${x.toFixed(2)}, y: ${y.toFixed(2)}`;
        });

        // Window resize
        window.addEventListener('resize', () => {
            plotFunction();
        });

        // Initial plot
        plotFunction();
    })();
    </script>
</body>
</html>
