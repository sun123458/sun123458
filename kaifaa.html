<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Virtual Fitting Room</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>3D Virtual Fitting Room</h1>
      <p>Click on a clothing item to try it on. Drag to rotate, scroll to zoom.</p>
    </header>

    <main id="viewport">
      <div id="loading">Loading 3D Scene...</div>
      <div id="canvas-container"></div>
    </main>

    <footer id="controls">
      <div class="clothing-selector">
        <button data-clothing="tshirt" class="clothing-btn active">
          <span class="icon">&#128085;</span>
          <span>T-Shirt</span>
        </button>
        <button data-clothing="dress" class="clothing-btn">
          <span class="icon">&#128110;</span>
          <span>Dress</span>
        </button>
        <button data-clothing="jacket" class="clothing-btn">
          <span class="icon">&#129681;</span>
          <span>Jacket</span>
        </button>
        <button data-clothing="pants" class="clothing-btn">
          <span class="icon">&#128098;</span>
          <span>Pants</span>
        </button>
        <button data-clothing="skirt" class="clothing-btn">
          <span class="icon">&#128110;&#65039;</span>
          <span>Skirt</span>
        </button>
      </div>

      <div class="action-buttons">
        <button id="btn-auto-rotate" class="action-btn">
          <span class="btn-icon">&#8635;</span>
          Auto Rotate: ON
        </button>
        <button id="btn-reset" class="action-btn">
          <span class="btn-icon">&#8634;</span>
          Reset View
        </button>
        <button id="btn-wind" class="action-btn">
          <span class="btn-icon">&#127788;</span>
          Wind: OFF
        </button>
      </div>
    </footer>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="app.js"></script>
</body>
</html>
