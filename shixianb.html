<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>磁力连线粒子背景</title>
  <style>
    * { margin: 0; padding: 0; }
    body { overflow: hidden; background: #0a0a1a; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    let W, H;
    const particles = [];
    const mouse = { x: null, y: null, active: false };

    // 配置
    const CONFIG = {
      count: 150,
      maxSpeed: 1.2,
      linkDist: 120,
      mouseRadius: 150,
      mouseForce: 80,
      particleRadius: 2,
    };

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    window.addEventListener('mousemove', e => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });
    window.addEventListener('mouseleave', () => { mouse.active = false; });
    window.addEventListener('touchmove', e => {
      mouse.x = e.touches[0].clientX;
      mouse.y = e.touches[0].clientY;
      mouse.active = true;
    });
    window.addEventListener('touchend', () => { mouse.active = false; });

    class Particle {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * W;
        this.y = Math.random() * H;
        this.vx = (Math.random() - 0.5) * CONFIG.maxSpeed * 2;
        this.vy = (Math.random() - 0.5) * CONFIG.maxSpeed * 2;
        this.baseRadius = CONFIG.particleRadius * (0.5 + Math.random() * 0.8);
        // 粒子颜色：随机冷色调
        const hue = 200 + Math.random() * 80;
        this.color = `hsla(${hue}, 80%, 65%, 1)`;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;

        // 边界反弹
        if (this.x < 0 || this.x > W) this.vx *= -1;
        if (this.y < 0 || this.y > H) this.vy *= -1;

        // 鼠标排斥力
        if (mouse.active) {
          const dx = this.x - mouse.x;
          const dy = this.y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONFIG.mouseRadius && dist > 0) {
            const force = (CONFIG.mouseRadius - dist) / CONFIG.mouseRadius;
            const angle = Math.atan2(dy, dx);
            this.vx += Math.cos(angle) * force * CONFIG.mouseForce * 0.01;
            this.vy += Math.sin(angle) * force * CONFIG.mouseForce * 0.01;
          }
        }

        // 速度限制
        const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
        if (speed > CONFIG.maxSpeed * 3) {
          this.vx = (this.vx / speed) * CONFIG.maxSpeed * 3;
          this.vy = (this.vy / speed) * CONFIG.maxSpeed * 3;
        }

        // 阻尼
        this.vx *= 0.99;
        this.vy *= 0.99;

        // 如果速度太低，给一点随机扰动保持运动
        if (Math.abs(this.vx) < 0.1) this.vx += (Math.random() - 0.5) * 0.3;
        if (Math.abs(this.vy) < 0.1) this.vy += (Math.random() - 0.5) * 0.3;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.baseRadius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
      }
    }

    function init() {
      particles.length = 0;
      for (let i = 0; i < CONFIG.count; i++) {
        particles.push(new Particle());
      }
    }

    function drawLink(p1, p2, dist) {
      const ratio = 1 - dist / CONFIG.linkDist;
      const alpha = ratio * 0.8;
      const width = ratio * 2.5 + 0.3;

      ctx.beginPath();
      ctx.moveTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.strokeStyle = `rgba(100, 180, 255, ${alpha})`;
      ctx.lineWidth = width;
      ctx.stroke();
    }

    function animate() {
      ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
      ctx.fillRect(0, 0, W, H);

      // 绘制连线
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONFIG.linkDist) {
            drawLink(particles[i], particles[j], dist);
          }
        }
      }

      // 更新并绘制粒子
      for (const p of particles) {
        p.update();
        p.draw();
      }

      requestAnimationFrame(animate);
    }

    init();
    animate();
  </script>
</body>
</html>
