<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台游戏状态机演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
        }
        h1 {
            margin-bottom: 16px;
            font-size: 24px;
            color: #e0e0e0;
            letter-spacing: 2px;
        }
        canvas {
            border: 3px solid #333;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .controls {
            margin-top: 16px;
            font-size: 14px;
            color: #888;
        }
        .controls span {
            margin: 0 12px;
            padding: 4px 8px;
            background: #222;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>平台游戏状态机演示</h1>
    <canvas id="game" width="800" height="500"></canvas>
    <div class="controls">
        <span>← → 移动</span>
        <span>Shift 跑步</span>
        <span>空格 跳跃</span>
        <span>H 受伤</span>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');

        // 状态常量
        const State = {
            IDLE: 0,
            WALK: 1,
            RUN: 2,
            JUMP: 3,
            HURT: 4
        };

        const stateNames = ['空闲', '行走', '跑步', '跳跃', '受伤'];

        // 状态颜色
        const stateColors = {
            [State.IDLE]: '#4CAF50',
            [State.WALK]: '#2196F3',
            [State.RUN]: '#FF9800',
            [State.JUMP]: '#9C27B0',
            [State.HURT]: '#F44336'
        };

        // 角色配置
        const player = {
            x: 400,
            y: 300,
            vx: 0,
            vy: 0,
            width: 32,
            height: 48,
            speed: 5,
            runSpeed: 10,
            jumpForce: -15,
            gravity: 0.6,
            grounded: false,
            state: State.IDLE,
            prevState: State.IDLE,
            animFrame: 0,
            animTimer: 0,
            facingRight: true
        };

        // 物理
        const ground = 400;
        const platforms = [
            { x: 100, y: 320, w: 150, h: 20 },
            { x: 350, y: 280, w: 150, h: 20 },
            { x: 550, y: 240, w: 150, h: 20 }
        ];

        // 相机震动
        let cameraShake = { active: false, timer: 0, duration: 500 };

        // 受伤闪烁
        let hurtFlash = { active: false, timer: 0, visible: true };

        // 输入状态
        const keys = {
            left: false,
            right: false,
            shift: false,
            space: false,
            h: false
        };

        // 动画配置
        const animConfig = {
            [State.IDLE]: { fps: 2, interval: 500 },
            [State.WALK]: { fps: 8, interval: 125 },
            [State.RUN]: { fps: 15, interval: 67 },
            [State.JUMP]: { fps: 4, interval: 250 },
            [State.HURT]: { fps: 10, interval: 100 }
        };

        // 云朵
        const clouds = [
            { x: 100, y: 80, size: 1.2 },
            { x: 300, y: 50, size: 0.8 },
            { x: 550, y: 100, size: 1.0 },
            { x: 700, y: 60, size: 0.6 }
        ];

        // 星星
        const stars = [];
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * 800,
                y: Math.random() * 200,
                size: Math.random() * 2 + 1,
                twinkle: Math.random() * Math.PI * 2
            });
        }

        // 输入处理
        document.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'ArrowLeft': keys.left = true; break;
                case 'ArrowRight': keys.right = true; break;
                case 'ShiftLeft': case 'ShiftRight': keys.shift = true; break;
                case 'Space':
                    if (!keys.space) {
                        keys.space = true;
                        if (player.grounded && player.state !== State.HURT) {
                            player.vy = player.jumpForce;
                            player.grounded = false;
                            player.state = State.JUMP;
                        }
                    }
                    e.preventDefault();
                    break;
                case 'KeyH':
                    if (!keys.h && player.state !== State.HURT) {
                        keys.h = true;
                        triggerHurt();
                    }
                    break;
            }
        });

        document.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'ArrowLeft': keys.left = false; break;
                case 'ArrowRight': keys.right = false; break;
                case 'ShiftLeft': case 'ShiftRight': keys.shift = false; break;
                case 'Space': keys.space = false; break;
                case 'KeyH': keys.h = false; break;
            }
        });

        function triggerHurt() {
            player.prevState = player.state;
            player.state = State.HURT;
            hurtFlash.active = true;
            hurtFlash.timer = 500;
            hurtFlash.visible = true;
            cameraShake.active = true;
            cameraShake.timer = 500;
        }

        function updateStateMachine(dt) {
            if (player.state === State.HURT) return;

            let targetState = player.state;

            if (!player.grounded) {
                targetState = State.JUMP;
            } else if (keys.shift && (keys.left || keys.right)) {
                targetState = State.RUN;
            } else if (keys.left || keys.right) {
                targetState = State.WALK;
            } else {
                targetState = State.IDLE;
            }

            if (targetState !== player.state) {
                player.state = targetState;
                player.animFrame = 0;
                player.animTimer = 0;
            }
        }

        function updatePlayer(dt) {
            // 水平移动
            if (player.state !== State.HURT) {
                if (keys.left) {
                    player.vx = player.state === State.RUN ? -player.runSpeed : -player.speed;
                    player.facingRight = false;
                } else if (keys.right) {
                    player.vx = player.state === State.RUN ? player.runSpeed : player.speed;
                    player.facingRight = true;
                } else {
                    player.vx *= 0.8;
                    if (Math.abs(player.vx) < 0.1) player.vx = 0;
                }
            }

            // 重力
            if (!player.grounded) {
                player.vy += player.gravity;
            }

            // 应用速度
            player.x += player.vx;
            player.y += player.vy;

            // 地面碰撞
            player.grounded = false;
            if (player.y + player.height >= ground) {
                player.y = ground - player.height;
                player.vy = 0;
                player.grounded = true;
            }

            // 平台碰撞
            for (const plat of platforms) {
                if (player.vy >= 0 &&
                    player.x + player.width > plat.x &&
                    player.x < plat.x + plat.w &&
                    player.y + player.height >= plat.y &&
                    player.y + player.height <= plat.y + plat.h + player.vy) {
                    player.y = plat.y - player.height;
                    player.vy = 0;
                    player.grounded = true;
                }
            }

            // 边界
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // 更新动画帧
            const cfg = animConfig[player.state];
            player.animTimer += dt;
            if (player.animTimer >= cfg.interval) {
                player.animTimer = 0;
                player.animFrame = (player.animFrame + 1) % 4;
            }
        }

        function updateEffects(dt) {
            // 受伤闪烁
            if (hurtFlash.active) {
                hurtFlash.timer -= dt;
                if (hurtFlash.timer <= 0) {
                    hurtFlash.active = false;
                    if (player.state === State.HURT) {
                        player.state = player.prevState;
                    }
                } else {
                    hurtFlash.visible = Math.floor(hurtFlash.timer / 100) % 2 === 0;
                }
            }

            // 相机震动
            if (cameraShake.active) {
                cameraShake.timer -= dt;
                if (cameraShake.timer <= 0) {
                    cameraShake.active = false;
                }
            }
        }

        function drawBackground() {
            // 天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#1a1a2e');
            gradient.addColorStop(1, '#16213e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 星星
            const time = Date.now() / 1000;
            for (const star of stars) {
                const alpha = 0.5 + 0.5 * Math.sin(time * 2 + star.twinkle);
                ctx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }

            // 云朵
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            for (const cloud of clouds) {
                const cx = (cloud.x + time * 10) % (canvas.width + 100) - 50;
                drawCloud(cx, cloud.y, cloud.size);
            }
        }

        function drawCloud(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.beginPath();
            ctx.arc(0, 0, 25, 0, Math.PI * 2);
            ctx.arc(25, -5, 20, 0, Math.PI * 2);
            ctx.arc(50, 0, 25, 0, Math.PI * 2);
            ctx.arc(25, 10, 22, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        function drawGround() {
            // 主地面
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(0, ground, canvas.width, canvas.height - ground);

            // 草地
            ctx.fillStyle = '#388E3C';
            ctx.fillRect(0, ground, canvas.width, 8);

            // 地面纹理
            ctx.fillStyle = '#4E342E';
            for (let i = 0; i < 20; i++) {
                const gx = (i * 47 + 10) % canvas.width;
                ctx.fillRect(gx, ground + 15, 30, 4);
                ctx.fillRect(gx + 10, ground + 30, 20, 3);
            }
        }

        function drawPlatforms() {
            for (const plat of platforms) {
                // 平台主体
                ctx.fillStyle = '#6D4C41';
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);

                // 平台顶部草地
                ctx.fillStyle = '#43A047';
                ctx.fillRect(plat.x, plat.y, plat.w, 5);

                // 平台阴影
                ctx.fillStyle = '#4E342E';
                ctx.fillRect(plat.x, plat.y + plat.h - 3, plat.w, 3);
            }
        }

        function drawPlayer() {
            ctx.save();

            const px = player.x + player.width / 2;
            const py = player.y + player.height / 2;

            // 翻转方向
            if (!player.facingRight) {
                ctx.translate(px, py);
                ctx.scale(-1, 1);
                ctx.translate(-px, -py);
            }

            // 状态颜色
            let bodyColor = stateColors[player.state];
            if (hurtFlash.active && !hurtFlash.visible) {
                bodyColor = '#F44336';
            }

            // 跑步速度线
            if (player.state === State.RUN) {
                ctx.strokeStyle = 'rgba(255, 152, 0, 0.6)';
                ctx.lineWidth = 2;
                for (let i = 0; i < 3; i++) {
                    const ly = player.y + 10 + i * 15;
                    ctx.beginPath();
                    ctx.moveTo(player.x - 15 - i * 5, ly);
                    ctx.lineTo(player.x - 25 - i * 8, ly);
                    ctx.stroke();
                }
            }

            // 身体动画偏移
            let bodyOffsetY = 0;
            let legOffset = 0;

            switch(player.state) {
                case State.IDLE:
                    bodyOffsetY = Math.sin(Date.now() / 500) * 2;
                    break;
                case State.WALK:
                    legOffset = Math.sin(Date.now() / 100) * 6;
                    bodyOffsetY = Math.abs(Math.sin(Date.now() / 100)) * 2;
                    break;
                case State.RUN:
                    legOffset = Math.sin(Date.now() / 50) * 8;
                    bodyOffsetY = Math.abs(Math.sin(Date.now() / 50)) * 3;
                    break;
                case State.JUMP:
                    bodyOffsetY = player.vy < 0 ? -3 : 2;
                    break;
            }

            // 腿部
            ctx.fillStyle = '#5D4037';
            ctx.fillRect(player.x + 6, player.y + 32 + bodyOffsetY + legOffset, 8, 16);
            ctx.fillRect(player.x + 18, player.y + 32 + bodyOffsetY - legOffset, 8, 16);

            // 身体
            ctx.fillStyle = bodyColor;
            ctx.fillRect(player.x + 4, player.y + 12 + bodyOffsetY, 24, 22);

            // 头部
            ctx.fillStyle = '#FFCC80';
            ctx.beginPath();
            ctx.arc(player.x + 16, player.y + 10 + bodyOffsetY, 12, 0, Math.PI * 2);
            ctx.fill();

            // 眼睛
            ctx.fillStyle = '#333';
            ctx.fillRect(player.x + 18, player.y + 8 + bodyOffsetY, 4, 4);

            // 受伤遮罩
            if (hurtFlash.active && hurtFlash.visible) {
                ctx.fillStyle = 'rgba(244, 67, 54, 0.5)';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            ctx.restore();
        }

        function drawUI() {
            // 状态显示
            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(10, 10, 120, 100);

            ctx.font = '14px Courier New';
            ctx.fillStyle = '#fff';
            ctx.fillText('状态:', 20, 32);

            for (let i = 0; i < stateNames.length; i++) {
                const isActive = player.state === i;
                ctx.fillStyle = isActive ? stateColors[i] : '#666';
                ctx.fillText((isActive ? '> ' : '  ') + stateNames[i], 20, 52 + i * 18);
            }

            // 速度指示
            ctx.fillStyle = '#888';
            ctx.font = '12px Courier New';
            ctx.fillText(`速度: ${Math.abs(player.vx).toFixed(1)}`, 20, 95);
        }

        function gameLoop(timestamp) {
            const dt = Math.min(32, timestamp - lastTime);
            lastTime = timestamp;

            // 更新
            updateStateMachine(dt);
            updatePlayer(dt);
            updateEffects(dt);

            // 应用相机震动
            ctx.save();
            if (cameraShake.active) {
                const shakeX = (Math.random() - 0.5) * 16;
                const shakeY = (Math.random() - 0.5) * 16;
                ctx.translate(shakeX, shakeY);
            }

            // 绘制
            drawBackground();
            drawGround();
            drawPlatforms();
            drawPlayer();

            ctx.restore();

            drawUI();

            requestAnimationFrame(gameLoop);
        }

        let lastTime = 0;
        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
