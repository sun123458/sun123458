<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁力连线粒子背景</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a1a;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // 鼠标位置
        const mouse = {
            x: null,
            y: null,
            radius: 150
        };

        // 粒子配置
        const particleConfig = {
            count: 100,
            minSpeed: 0.5,
            maxSpeed: 2,
            minSize: 2,
            maxSize: 4,
            connectionDistance: 120,
            colors: ['#00d4ff', '#7b2cbf', '#e040fb', '#00ff88']
        };

        // 粒子数组
        let particles = [];

        // 粒子类
        class Particle {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * (particleConfig.maxSize - particleConfig.minSize) + particleConfig.minSize;
                this.speedX = (Math.random() - 0.5) * particleConfig.maxSpeed;
                this.speedY = (Math.random() - 0.5) * particleConfig.maxSpeed;
                this.color = particleConfig.colors[Math.floor(Math.random() * particleConfig.colors.length)];
                this.originalSpeedX = this.speedX;
                this.originalSpeedY = this.speedY;
            }

            update() {
                // 边界检测
                if (this.x < 0 || this.x > width) this.speedX *= -1;
                if (this.y < 0 || this.y > height) this.speedY *= -1;

                // 鼠标排斥力
                if (mouse.x !== null && mouse.y !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < mouse.radius) {
                        const forceDirectionX = dx / distance;
                        const forceDirectionY = dy / distance;
                        const force = (mouse.radius - distance) / mouse.radius;
                        const repulsionStrength = 3;

                        this.x += forceDirectionX * force * repulsionStrength;
                        this.y += forceDirectionY * force * repulsionStrength;
                    }
                }

                // 更新位置
                this.x += this.speedX;
                this.y += this.speedY;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        // 初始化粒子
        function init() {
            particles = [];
            for (let i = 0; i < particleConfig.count; i++) {
                particles.push(new Particle());
            }
        }

        // 绘制连线
        function drawConnections() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const distance = Math.sqrt(dx * dx + dy * dy);

                    if (distance < particleConfig.connectionDistance) {
                        // 距离越近，线条越粗越亮
                        const opacity = 1 - distance / particleConfig.connectionDistance;
                        const lineWidth = opacity * 2;

                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(0, 212, 255, ${opacity})`;
                        ctx.lineWidth = lineWidth;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // 动画循环
        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 26, 0.1)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            drawConnections();

            requestAnimationFrame(animate);
        }

        // 鼠标移动事件
        window.addEventListener('mousemove', (e) => {
            mouse.x = e.x;
            mouse.y = e.y;
        });

        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });

        // 窗口大小改变
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            init();
        });

        // 初始化并启动
        init();
        animate();
    </script>
</body>
</html>
