<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 虚拟试衣间</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- 3D预览区域 -->
        <div class="preview-area">
            <div id="canvas-container"></div>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在加载3D场景...</p>
            </div>
        </div>

        <!-- 控制面板 -->
        <div class="control-panel">
            <h2>虚拟试衣间</h2>
            <p class="subtitle">选择服装进行试穿体验</p>

            <div class="dress-selection">
                <h3>服装选择</h3>
                <div class="dress-grid">
                    <button class="dress-btn active" data-dress="dress1">
                        <div class="dress-icon" style="background: linear-gradient(135deg, #e74c3c, #c0392b);"></div>
                        <span>连衣裙</span>
                    </button>
                    <button class="dress-btn" data-dress="dress2">
                        <div class="dress-icon" style="background: linear-gradient(135deg, #3498db, #2980b9);"></div>
                        <span>衬衫</span>
                    </button>
                    <button class="dress-btn" data-dress="dress3">
                        <div class="dress-icon" style="background: linear-gradient(135deg, #2ecc71, #27ae60);"></div>
                        <span>T恤</span>
                    </button>
                    <button class="dress-btn" data-dress="dress4">
                        <div class="dress-icon" style="background: linear-gradient(135deg, #9b59b6, #8e44ad);"></div>
                        <span>半身裙</span>
                    </button>
                    <button class="dress-btn" data-dress="dress5">
                        <div class="dress-icon" style="background: linear-gradient(135deg, #34495e, #2c3e50);"></div>
                        <span>西装外套</span>
                    </button>
                </div>
            </div>

            <div class="controls">
                <h3>颜色选择</h3>
                <div class="color-palette">
                    <button class="color-btn active" data-color="#e74c3c" style="background: #e74c3c;"></button>
                    <button class="color-btn" data-color="#3498db" style="background: #3498db;"></button>
                    <button class="color-btn" data-color="#2ecc71" style="background: #2ecc71;"></button>
                    <button class="color-btn" data-color="#9b59b6" style="background: #9b59b6;"></button>
                    <button class="color-btn" data-color="#f39c12" style="background: #f39c12;"></button>
                    <button class="color-btn" data-color="#1abc9c" style="background: #1abc9c;"></button>
                    <button class="color-btn" data-color="#ecf0f1" style="background: #ecf0f1;"></button>
                    <button class="color-btn" data-color="#34495e" style="background: #34495e;"></button>
                </div>
            </div>

            <div class="physics-controls">
                <h3>物理参数</h3>
                <div class="control-group">
                    <label>风力强度</label>
                    <input type="range" id="wind-strength" min="0" max="100" value="30">
                </div>
                <div class="control-group">
                    <label>布料弹性</label>
                    <input type="range" id="elasticity" min="0" max="100" value="50">
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-primary" id="reset-view">重置视角</button>
                <button class="btn btn-secondary" id="reset-physics">重置物理</button>
            </div>

            <div class="info">
                <p><strong>操作说明：</strong></p>
                <ul>
                    <li>🖱️ 左键拖拽：旋转视角</li>
                    <li>🖱️ 右键拖拽：平移视角</li>
                    <li>🖱️ 滚轮：缩放</li>
                    <li>👆 点击服装切换款式</li>
                </ul>
            </div>
        </div>
    </div>

    <!-- Three.js Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.157.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Application Scripts -->
    <script src="js/camera.js"></script>
    <script src="js/cloth.js"></script>
    <script src="js/dress.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
