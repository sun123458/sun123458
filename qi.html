<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --display-bg: #0a0f14;
      --primary: #58a6ff;
      --accent: #7ee787;
      --operator: #ff7b72;
      --function: #d2a8ff;
      --number: #c9d1d9;
      --grid: rgba(88, 166, 255, 0.1);
      --text-muted: #8b949e;
      --shadow: rgba(0, 0, 0, 0.3);
    }

    [data-theme="light"] {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --display-bg: #f0f3f6;
      --primary: #0969da;
      --accent: #1a7f37;
      --operator: #cf222e;
      --function: #8250df;
      --number: #24292f;
      --grid: rgba(9, 105, 218, 0.1);
      --text-muted: #57606a;
      --shadow: rgba(0, 0, 0, 0.1);
    }

    [data-theme="retro"] {
      --bg: #2d2a24;
      --surface: #3d3830;
      --display-bg: #1a1814;
      --primary: #f0c040;
      --accent: #80ff80;
      --operator: #ff8080;
      --function: #80c0ff;
      --number: #e8d8b8;
      --grid: rgba(240, 192, 64, 0.15);
      --text-muted: #a09080;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--number);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      transition: background 0.3s, color 0.3s;
    }

    .calculator {
      width: 100%;
      max-width: 420px;
      background: var(--surface);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 40px var(--shadow);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--grid);
    }

    .title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--primary);
      letter-spacing: 2px;
    }

    .theme-toggle {
      display: flex;
      gap: 8px;
    }

    .theme-btn {
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 8px;
      background: var(--display-bg);
      color: var(--number);
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .theme-btn:hover {
      background: var(--primary);
      color: var(--bg);
    }

    .theme-btn.active {
      background: var(--primary);
      color: var(--bg);
    }

    .display {
      background: var(--display-bg);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
      min-height: 100px;
      position: relative;
      overflow: hidden;
    }

    .display::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.5;
    }

    .expression {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      color: var(--text-muted);
      min-height: 24px;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .result {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--accent);
      transition: all 0.2s;
    }

    .result.error {
      color: var(--operator);
      animation: shake 0.3s;
    }

    .result.pulse {
      animation: pulse 0.3s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }

    .mode-toggle {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-btn {
      padding: 6px 12px;
      border: 1px solid var(--grid);
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.75rem;
      font-family: 'Space Grotesk', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
    }

    .mode-btn.active {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }

    .btn {
      height: 50px;
      border: none;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-number {
      background: var(--display-bg);
      color: var(--number);
    }

    .btn-number:hover {
      background: var(--number);
      color: var(--bg);
    }

    .btn-operator {
      background: var(--operator);
      color: #fff;
    }

    .btn-operator:hover {
      filter: brightness(1.1);
    }

    .btn-function {
      background: var(--function);
      color: #fff;
      font-size: 0.85rem;
    }

    .btn-function:hover {
      filter: brightness(1.1);
    }

    .btn-special {
      background: var(--primary);
      color: #fff;
    }

    .btn-special:hover {
      filter: brightness(1.1);
    }

    .btn-wide {
      grid-column: span 2;
    }

    .history-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--grid);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .clear-btn {
      background: transparent;
      border: 1px solid var(--grid);
      color: var(--text-muted);
      font-size: 0.7rem;
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: var(--operator);
      color: #fff;
      border-color: var(--operator);
    }

    .history-list {
      max-height: 150px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-list::-webkit-scrollbar {
      width: 4px;
    }

    .history-list::-webkit-scrollbar-track {
      background: var(--display-bg);
      border-radius: 2px;
    }

    .history-list::-webkit-scrollbar-thumb {
      background: var(--primary);
      border-radius: 2px;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: var(--display-bg);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      animation: slideIn 0.2s;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .history-item:hover {
      background: var(--primary);
      color: var(--bg);
    }

    .history-item:hover .history-expr,
    .history-item:hover .history-result {
      color: inherit;
    }

    .history-expr {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .history-result {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      color: var(--accent);
    }

    .graph-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--grid);
    }

    .graph-input {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .graph-input input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--grid);
      border-radius: 8px;
      background: var(--display-bg);
      color: var(--number);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.9rem;
    }

    .graph-input input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .graph-input input::placeholder {
      color: var(--text-muted);
    }

    .graph-btn {
      padding: 10px 20px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .graph-btn:hover {
      filter: brightness(1.1);
    }

    .canvas-container {
      position: relative;
      background: var(--display-bg);
      border-radius: 8px;
      overflow: hidden;
    }

    #graphCanvas {
      width: 100%;
      height: 250px;
      display: block;
    }

    .canvas-controls {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
    }

    .canvas-btn {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 4px;
      background: var(--surface);
      color: var(--number);
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .canvas-btn:hover {
      background: var(--primary);
      color: #fff;
    }

    .color-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .color-item {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .calculator {
        padding: 12px;
      }

      .btn {
        height: 45px;
        font-size: 0.9rem;
      }

      .btn-function {
        font-size: 0.75rem;
      }

      .result {
        font-size: 1.8rem;
      }

      .expression {
        font-size: 0.85rem;
      }
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="header">
      <div class="title">SCIENTIFIC CALC</div>
      <div class="theme-toggle">
        <button class="theme-btn" data-theme="light" title="Light theme">☀</button>
        <button class="theme-btn active" data-theme="dark" title="Dark theme">🌙</button>
        <button class="theme-btn" data-theme="retro" title="Retro theme">📺</button>
      </div>
    </div>

    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <div class="mode-toggle">
      <button class="mode-btn active" data-mode="deg">DEG</button>
      <button class="mode-btn" data-mode="rad">RAD</button>
    </div>

    <div class="buttons">
      <button class="btn btn-function" data-action="sin">sin</button>
      <button class="btn btn-function" data-action="cos">cos</button>
      <button class="btn btn-function" data-action="tan">tan</button>
      <button class="btn btn-function" data-action="log">log</button>
      <button class="btn btn-function" data-action="ln">ln</button>
      
      <button class="btn btn-special" data-action="sqrt">√</button>
      <button class="btn btn-special" data-action="pow2">x²</button>
      <button class="btn btn-special" data-action="pow">xʸ</button>
      <button class="btn btn-special" data-value="π">π</button>
      <button class="btn btn-special" data-value="e">e</button>

      <button class="btn btn-number" data-value="7">7</button>
      <button class="btn btn-number" data-value="8">8</button>
      <button class="btn btn-number" data-value="9">9</button>
      <button class="btn btn-operator" data-action="divide">÷</button>
      <button class="btn btn-operator" data-action="backspace">⌫</button>

      <button class="btn btn-operator" data-action="clear">C</button>
      <button class="btn btn-operator" data-action="clearAll">AC</button>
      <button class="btn btn-number" data-value="(">(</button>
      <button class="btn btn-number" data-value=")">)</button>
      <button class="btn btn-operator" data-action="percent">%</button>

      <button class="btn btn-number" data-value="4">4</button>
      <button class="btn btn-number" data-value="5">5</button>
      <button class="btn btn-number" data-value="6">6</button>
      <button class="btn btn-operator" data-action="multiply">×</button>
      <button class="btn btn-operator" data-action="power">^</button>

      <button class="btn btn-number" data-value="1">1</button>
      <button class="btn btn-number" data-value="2">2</button>
      <button class="btn btn-number" data-value="3">3</button>
      <button class="btn btn-operator" data-action="subtract">−</button>
      <button class="btn btn-special" data-action="factorial">n!</button>

      <button class="btn btn-number btn-wide" data-value="0">0</button>
      <button class="btn btn-number" data-value=".">.</button>
      <button class="btn btn-operator" data-action="add">+</button>
      <button class="btn btn-special btn-wide" data-action="calculate">=</button>
    </div>

    <div class="history-section">
      <div class="section-header">
        <span class="section-title">HISTORY</span>
        <button class="clear-btn" id="clearHistory">Clear</button>
      </div>
      <div class="history-list" id="historyList"></div>
    </div>

    <div class="graph-section">
      <div class="section-header">
        <span class="section-title">FUNCTION PLOTTER</span>
      </div>
      <div class="graph-input">
        <input type="text" id="graphInput" placeholder="y = x^2, sin(x), log(x)...">
        <button class="graph-btn" id="plotBtn">Plot</button>
      </div>
      <div class="canvas-container">
        <canvas id="graphCanvas"></canvas>
        <div class="canvas-controls">
          <button class="canvas-btn" id="zoomIn">+</button>
          <button class="canvas-btn" id="zoomOut">−</button>
          <button class="canvas-btn" id="resetZoom">⟲</button>
        </div>
      </div>
      <div class="color-legend" id="colorLegend"></div>
    </div>
  </div>

  <script>
    class CalculatorEngine {
      constructor() {
        this.angleMode = 'deg';
        this.functions = ['sin', 'cos', 'tan', 'asin', 'acos', 'atan', 'log', 'ln', 'sqrt', 'abs', 'floor', 'ceil', 'round'];
        this.operators = {
          '+': { precedence: 1, associativity: 'left' },
          '-': { precedence: 1, associativity: 'left' },
          '*': { precedence: 2, associativity: 'left' },
          '/': { precedence: 2, associativity: 'left' },
          '%': { precedence: 2, associativity: 'left' },
          '^': { precedence: 3, associativity: 'right' }
        };
        this.constants = {
          'π': Math.PI,
          'pi': Math.PI,
          'e': Math.E
        };
      }

      toRPN(tokens) {
        const output = [];
        const opStack = [];

        for (let i = 0; i < tokens.length; i++) {
          const token = tokens[i];

          if (this.constants[token]) {
            output.push(this.constants[token]);
          } else if (!isNaN(parseFloat(token))) {
            output.push(parseFloat(token));
          } else if (this.functions.includes(token)) {
            opStack.push(token);
          } else if (token === '(') {
            opStack.push(token);
          } else if (token === ')') {
            while (opStack.length > 0 && opStack[opStack.length - 1] !== '(') {
              output.push(opStack.pop());
            }
            if (opStack.length > 0 && opStack[opStack.length - 1] === '(') {
              opStack.pop();
            }
            if (opStack.length > 0 && this.functions.includes(opStack[opStack.length - 1])) {
              output.push(opStack.pop());
            }
          } else if (this.operators[token]) {
            const op1 = this.operators[token];
            while (opStack.length > 0) {
              const top = opStack[opStack.length - 1];
              if (top === '(') break;
              if (this.functions.includes(top)) {
                output.push(opStack.pop());
                continue;
              }
              const op2 = this.operators[top];
              if (op2 && (
                (op1.associativity === 'left' && op1.precedence <= op2.precedence) ||
                (op1.associativity === 'right' && op1.precedence < op2.precedence)
              )) {
                output.push(opStack.pop());
              } else {
                break;
              }
            }
            opStack.push(token);
          }
        }

        while (opStack.length > 0) {
          const top = opStack.pop();
          if (top === '(' || top === ')') {
            throw new Error('Mismatched parentheses');
          }
          output.push(top);
        }

        return output;
      }

      evaluateRPN(rpn) {
        const stack = [];

        for (let i = 0; i < rpn.length; i++) {
          const token = rpn[i];

          if (typeof token === 'number') {
            stack.push(token);
          } else if (this.operators[token]) {
            if (stack.length < 2) {
              throw new Error('Invalid expression');
            }
            const b = stack.pop();
            const a = stack.pop();
            let result;

            switch (token) {
              case '+': result = a + b; break;
              case '-': result = a - b; break;
              case '*': result = a * b; break;
              case '/':
                if (b === 0) throw new Error('Cannot divide by zero');
                result = a / b;
                break;
              case '%':
                if (b === 0) throw new Error('Cannot divide by zero');
                result = a % b;
                break;
              case '^': result = Math.pow(a, b); break;
            }
            stack.push(result);
          } else if (this.functions.includes(token)) {
            if (stack.length < 1) throw new Error('Invalid expression');
            let arg = stack.pop();
            let result;

            switch (token) {
              case 'sin': result = this.angleMode === 'deg' ? Math.sin(arg * Math.PI / 180) : Math.sin(arg); break;
              case 'cos': result = this.angleMode === 'deg' ? Math.cos(arg * Math.PI / 180) : Math.cos(arg); break;
              case 'tan':
                const tanVal = this.angleMode === 'deg' ? Math.tan(arg * Math.PI / 180) : Math.tan(arg);
                if (!isFinite(tanVal)) throw new Error('Undefined');
                result = tanVal;
                break;
              case 'asin': result = this.angleMode === 'deg' ? Math.asin(arg) * 180 / Math.PI : Math.asin(arg); break;
              case 'acos': result = this.angleMode === 'deg' ? Math.acos(arg) * 180 / Math.PI : Math.acos(arg); break;
              case 'atan': result = this.angleMode === 'deg' ? Math.atan(arg) * 180 / Math.PI : Math.atan(arg); break;
              case 'log': result = Math.log10(arg); break;
              case 'ln': result = Math.log(arg); break;
              case 'sqrt':
                if (arg < 0) throw new Error('Cannot calculate square root of negative number');
                result = Math.sqrt(arg);
                break;
              case 'abs': result = Math.abs(arg); break;
              case 'floor': result = Math.floor(arg); break;
              case 'ceil': result = Math.ceil(arg); break;
              case 'round': result = Math.round(arg); break;
            }
            stack.push(result);
          }
        }

        if (stack.length !== 1) throw new Error('Invalid expression');
        return stack[0];
      }

      tokenize(expression) {
        let expr = expression
          .replace(/\s+/g, '')
          .replace(/×/g, '*')
          .replace(/÷/g, '/')
          .replace(/−/g, '-')
          .replace(/π/g, 'π')
          .replace(/(\d)π/g, '$1*π')
          .replace(/π(\d)/g, 'π*$1')
          .replace(/(\d)\(/g, '$1*(')
          .replace(/\)(\d)/g, ')*$1')
          .replace(/\)\(/g, ')*(');

        for (const [name, val] of Object.entries(this.constants)) {
          if (name !== 'π') {
            expr = expr.replace(new RegExp(name, 'g'), val.toString());
          }
        }

        const tokens = [];
        const regex = /(\d+\.?\d*|\.\d+)|([a-zA-Z]+)|([+\-*/^%()])/g;
        let match;

        while ((match = regex.exec(expr)) !== null) {
          if (match[1] !== undefined) {
            tokens.push(match[1]);
          } else if (match[2] !== undefined) {
            tokens.push(match[2].toLowerCase());
          } else if (match[3] !== undefined) {
            if (tokens.length === 0 || tokens[tokens.length - 1] === '(' || this.operators[tokens[tokens.length - 1]]) {
              if (match[3] === '-' && tokens[tokens.length - 1] !== ')') {
                tokens.push(match[3]);
              } else {
                tokens.push(match[3]);
              }
            } else {
              tokens.push(match[3]);
            }
          }
        }

        return tokens;
      }

      evaluate(expression) {
        if (!expression || expression.trim() === '') {
          return { result: 0, error: false };
        }

        try {
          const tokens = this.tokenize(expression);
          const rpn = this.toRPN(tokens);
          const result = this.evaluateRPN(rpn);

          if (!isFinite(result)) {
            return { result: 'Undefined', error: true };
          }

          if (Math.abs(result) > 1e15) {
            return { result: result.toExponential(6), error: false };
          }

          if (Math.abs(result) < 1e-10 && result !== 0) {
            return { result: 0, error: false };
          }

          const rounded = Math.round(result * 1e10) / 1e10;
          return { result: rounded, error: false };
        } catch (e) {
          return { result: e.message, error: true };
        }
      }

      factorial(n) {
        if (n < 0) throw new Error('Cannot calculate factorial of negative number');
        if (!Number.isInteger(n)) throw new Error('Factorial requires integer');
        if (n > 170) throw new Error('Number too large');
        if (n === 0 || n === 1) return 1;
        let result = 1;
        for (let i = 2; i <= n; i++) result *= i;
        return result;
      }

      setAngleMode(mode) {
        this.angleMode = mode;
      }
    }

    class GraphPlotter {
      constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.functions = [];
        this.colors = ['#58a6ff', '#7ee787', '#ff7b72', '#d2a8ff', '#f0c040'];
        this.scale = 25;
        this.offsetX = 0;
        this.offsetY = 0;
        this.colorIndex = 0;
        this.resize();
      }

      resize() {
        const rect = this.canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = rect.width * dpr;
        this.canvas.height = rect.height * dpr;
        this.ctx.scale(dpr, dpr);
        this.width = rect.width;
        this.height = rect.height;
        this.draw();
      }

      toCanvasX(x) {
        return this.width / 2 + (x + this.offsetX) * this.scale;
      }

      toCanvasY(y) {
        return this.height / 2 - (y + this.offsetY) * this.scale;
      }

      drawGrid() {
        const theme = document.documentElement.dataset.theme;
        const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--grid').trim();
        const axisColor = theme === 'light' ? '#57606a' : (theme === 'retro' ? '#f0c040' : '#8b949e');

        this.ctx.strokeStyle = gridColor;
        this.ctx.lineWidth = 1;

        const xRange = this.width / this.scale;
        const yRange = this.height / this.scale;
        const xMin = -this.width / 2 / this.scale - this.offsetX;
        const xMax = this.width / 2 / this.scale - this.offsetX;
        const yMin = -this.height / 2 / this.scale - this.offsetY;
        const yMax = this.height / 2 / this.scale - this.offsetY;

        for (let x = Math.floor(xMin); x <= xMax; x++) {
          const canvasX = this.toCanvasX(x);
          this.ctx.beginPath();
          this.ctx.moveTo(canvasX, 0);
          this.ctx.lineTo(canvasX, this.height);
          this.ctx.stroke();
        }

        for (let y = Math.floor(yMin); y <= yMax; y++) {
          const canvasY = this.toCanvasY(y);
          this.ctx.beginPath();
          this.ctx.moveTo(0, canvasY);
          this.ctx.lineTo(this.width, canvasY);
          this.ctx.stroke();
        }

        this.ctx.strokeStyle = axisColor;
        this.ctx.lineWidth = 1.5;

        this.ctx.beginPath();
        this.ctx.moveTo(0, this.toCanvasY(0));
        this.ctx.lineTo(this.width, this.toCanvasY(0));
        this.ctx.stroke();

        this.ctx.beginPath();
        this.ctx.moveTo(this.toCanvasX(0), 0);
        this.ctx.lineTo(this.toCanvasX(0), this.height);
        this.ctx.stroke();

        this.ctx.fillStyle = axisColor;
        this.ctx.font = '10px IBM Plex Mono';
        this.ctx.textAlign = 'center';

        for (let x = Math.floor(xMin); x <= xMax; x++) {
          if (x !== 0) {
            this.ctx.fillText(x.toString(), this.toCanvasX(x), this.toCanvasY(0) + 14);
          }
        }

        this.ctx.textAlign = 'right';
        for (let y = Math.floor(yMin); y <= yMax; y++) {
          if (y !== 0) {
            this.ctx.fillText(y.toString(), this.toCanvasX(0) - 6, this.toCanvasY(y) + 4);
          }
        }
      }

      evaluateFunction(expr, x) {
        try {
          let safeExpr = expr
            .replace(/x/gi, `(${x})`)
            .replace(/π|pi/gi, Math.PI.toString())
            .replace(/e(?![xp])/gi, Math.E.toString());

          const funcNames = ['sin', 'cos', 'tan', 'log', 'ln', 'sqrt', 'abs', 'exp', 'pow', 'floor', 'ceil', 'round', 'abs'];
          for (const name of funcNames) {
            const regex = new RegExp(`\\b${name}\\b`, 'gi');
            safeExpr = safeExpr.replace(regex, `Math.${name}`);
          }

          const result = eval(safeExpr);
          return isFinite(result) ? result : NaN;
        } catch {
          return NaN;
        }
      }

      plot(expr) {
        const color = this.colors[this.colorIndex % this.colors.length];
        this.colorIndex++;
        this.functions.push({ expr, color });
        this.draw();
        return color;
      }

      draw() {
        const theme = document.documentElement.dataset.theme;
        const bg = getComputedStyle(document.documentElement).getPropertyValue('--display-bg').trim();
        
        this.ctx.fillStyle = bg;
        this.ctx.fillRect(0, 0, this.width, this.height);
        this.drawGrid();

        for (const { expr, color } of this.functions) {
          this.ctx.strokeStyle = color;
          this.ctx.lineWidth = 2;
          this.ctx.shadowColor = color;
          this.ctx.shadowBlur = 4;
          this.ctx.beginPath();

          const xMin = -this.width / 2 / this.scale - this.offsetX;
          const xMax = this.width / 2 / this.scale - this.offsetX;
          const step = (xMax - xMin) / this.width * 2;
          let started = false;

          for (let x = xMin; x <= xMax; x += step) {
            const y = this.evaluateFunction(expr, x);
            if (!isNaN(y) && Math.abs(y) < 1e6) {
              const canvasX = this.toCanvasX(x);
              const canvasY = this.toCanvasY(y);
              if (!started) {
                this.ctx.moveTo(canvasX, canvasY);
                started = true;
              } else {
                this.ctx.lineTo(canvasX, canvasY);
              }
            } else {
              started = false;
            }
          }
          this.ctx.stroke();
        }
        this.ctx.shadowBlur = 0;
      }

      clear() {
        this.functions = [];
        this.colorIndex = 0;
        this.draw();
      }

      zoom(factor) {
        this.scale *= factor;
        this.scale = Math.max(5, Math.min(100, this.scale));
        this.draw();
      }

      reset() {
        this.scale = 25;
        this.offsetX = 0;
        this.offsetY = 0;
        this.draw();
      }

      getLegend() {
        return this.functions.map(f => ({ expr: f.expr, color: f.color }));
      }
    }

    class HistoryManager {
      constructor() {
        this.history = JSON.parse(localStorage.getItem('calc_history') || '[]');
        this.maxItems = 20;
      }

      add(expression, result) {
        this.history.unshift({ expression, result, timestamp: new Date().toISOString() });
        if (this.history.length > this.maxItems) {
          this.history = this.history.slice(0, this.maxItems);
        }
        localStorage.setItem('calc_history', JSON.stringify(this.history));
      }

      getAll() {
        return this.history;
      }

      clear() {
        this.history = [];
        localStorage.setItem('calc_history', '[]');
      }

      remove(index) {
        this.history.splice(index, 1);
        localStorage.setItem('calc_history', JSON.stringify(this.history));
      }
    }

    class UIController {
      constructor() {
        this.engine = new CalculatorEngine();
        this.historyManager = new HistoryManager();
        this.expression = '';
        this.canvas = document.getElementById('graphCanvas');
        this.plotter = new GraphPlotter(this.canvas);
        this.initElements();
        this.initEventListeners();
        this.loadTheme();
        this.renderHistory();
        this.plotter.draw();
      }

      initElements() {
        this.expressionEl = document.getElementById('expression');
        this.resultEl = document.getElementById('result');
        this.historyListEl = document.getElementById('historyList');
        this.graphInputEl = document.getElementById('graphInput');
      }

      initEventListeners() {
        document.querySelectorAll('.btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.handleButtonClick(e.target));
        });

        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.handleThemeChange(e.target.dataset.theme));
        });

        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.handleModeChange(e.target.dataset.mode));
        });

        document.getElementById('clearHistory').addEventListener('click', () => {
          this.historyManager.clear();
          this.renderHistory();
        });

        document.getElementById('plotBtn').addEventListener('click', () => this.handlePlot());
        document.getElementById('zoomIn').addEventListener('click', () => this.plotter.zoom(1.2));
        document.getElementById('zoomOut').addEventListener('click', () => this.plotter.zoom(0.8));
        document.getElementById('resetZoom').addEventListener('click', () => this.plotter.reset());

        window.addEventListener('resize', () => {
          this.plotter.resize();
          this.updateLegend();
        });

        document.addEventListener('keydown', (e) => this.handleKeydown(e));
      }

      handleButtonClick(btn) {
        if (btn.dataset.value !== undefined) {
          this.appendValue(btn.dataset.value);
        } else if (btn.dataset.action) {
          this.handleAction(btn.dataset.action);
        }
        this.updateDisplay();
      }

      appendValue(value) {
        this.expression += value;
      }

      handleAction(action) {
        switch (action) {
          case 'calculate':
            this.calculate();
            break;
          case 'clear':
            this.expression = '';
            this.resultEl.textContent = '0';
            break;
          case 'clearAll':
            this.expression = '';
            this.resultEl.textContent = '0';
            break;
          case 'backspace':
            this.expression = this.expression.slice(0, -1);
            break;
          case 'sqrt':
            this.expression += 'sqrt(';
            break;
          case 'pow2':
            this.appendValue('^2');
            break;
          case 'pow':
            this.appendValue('^');
            break;
          case 'factorial':
            this.expression += '!';
            this.calculateFactorial();
            break;
          case 'percent':
            if (this.expression) {
              const result = this.engine.evaluate(this.expression);
              if (!result.error) {
                this.expression = (result.result / 100).toString();
              }
            }
            break;
          case 'sin':
          case 'cos':
          case 'tan':
          case 'log':
          case 'ln':
            this.expression += `${action}(`;
            break;
        }
        this.updateDisplay();
      }

      calculateFactorial() {
        try {
          const match = this.expression.match(/(\d+)\s*!?$/);
          if (match) {
            const num = parseInt(match[1]);
            const result = this.engine.factorial(num);
            this.expression = this.expression.replace(/(\d+)\s*!$/, result.toString());
            this.updateDisplay();
          }
        } catch (e) {
          this.showError(e.message);
        }
      }

      calculate() {
        if (!this.expression) return;

        let expr = this.expression;
        const factorialMatch = expr.match(/(\d+)!/g);
        if (factorialMatch) {
          for (const match of factorialMatch) {
            const num = parseInt(match);
            const result = this.engine.factorial(num);
            expr = expr.replace(match, result.toString());
          }
        }

        const result = this.engine.evaluate(expr);

        if (result.error) {
          this.showError(result.result);
        } else {
          this.showResult(result.result);
          this.historyManager.add(this.expression, result.result);
          this.renderHistory();
        }
      }

      showResult(value) {
        this.resultEl.textContent = value;
        this.resultEl.classList.remove('error');
        this.resultEl.classList.add('pulse');
        setTimeout(() => this.resultEl.classList.remove('pulse'), 300);
        this.expression = value.toString();
        this.updateDisplay();
      }

      showError(message) {
        this.resultEl.textContent = message;
        this.resultEl.classList.add('error');
        setTimeout(() => this.resultEl.classList.remove('error'), 500);
      }

      updateDisplay() {
        this.expressionEl.textContent = this.expression || '';
      }

      handleThemeChange(theme) {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('calc_theme', theme);
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.theme === theme);
        });
        this.plotter.draw();
      }

      loadTheme() {
        const savedTheme = localStorage.getItem('calc_theme') || 'dark';
        this.handleThemeChange(savedTheme);
      }

      handleModeChange(mode) {
        this.engine.setAngleMode(mode);
        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.mode === mode);
        });
      }

      handlePlot() {
        const expr = this.graphInputEl.value.trim();
        if (!expr) return;

        let funcExpr = expr.replace(/^y\s*=\s*/i, '').trim();
        if (!funcExpr.includes('x')) {
          funcExpr = funcExpr.replace(/^/, '');
        }

        this.plotter.plot(funcExpr);
        this.updateLegend();
        this.graphInputEl.value = '';
      }

      updateLegend() {
        const legend = this.plotter.getLegend();
        const legendEl = document.getElementById('colorLegend');
        legendEl.innerHTML = legend.map(f => `
          <div class="color-item">
            <span class="color-dot" style="background: ${f.color}"></span>
            <span>y = ${f.expr}</span>
          </div>
        `).join('');
      }

      renderHistory() {
        const history = this.historyManager.getAll();
        this.historyListEl.innerHTML = history.map((item, index) => `
          <div class="history-item" data-index="${index}">
            <span class="history-expr">${item.expression}</span>
            <span class="history-result">= ${item.result}</span>
          </div>
        `).join('');

        this.historyListEl.querySelectorAll('.history-item').forEach(item => {
          item.addEventListener('click', () => {
            const index = parseInt(item.dataset.index);
            const historyItem = this.historyManager.getAll()[index];
            if (historyItem) {
              this.expression = historyItem.expression;
              this.resultEl.textContent = historyItem.result;
              this.updateDisplay();
            }
          });
        });
      }

      handleKeydown(e) {
        const key = e.key;
        const isModifier = e.ctrlKey || e.metaKey;

        if (key >= '0' && key <= '9') {
          this.appendValue(key);
        } else if (key === '.') {
          this.appendValue('.');
        } else if (key === '+') {
          this.appendValue('+');
        } else if (key === '-') {
          this.appendValue('-');
        } else if (key === '*') {
          this.appendValue('*');
        } else if (key === '/') {
          e.preventDefault();
          this.appendValue('/');
        } else if (key === '^') {
          this.appendValue('^');
        } else if (key === '(' || key === ')') {
          this.appendValue(key);
        } else if (key === 'Enter' || key === '=') {
          e.preventDefault();
          this.calculate();
        } else if (key === 'Backspace') {
          this.expression = this.expression.slice(0, -1);
        } else if (key === 'Escape' || key.toLowerCase() === 'c') {
          this.expression = '';
          this.resultEl.textContent = '0';
        } else if (key.toLowerCase() === 's') {
          this.appendValue('sin(');
        } else if (key.toLowerCase() === 'o' && e.shiftKey) {
          this.appendValue('log(');
        } else if (key.toLowerCase() === 'l') {
          this.appendValue('ln(');
        } else if (key.toLowerCase() === 'q') {
          this.appendValue('sqrt(');
        } else if (key.toLowerCase() === 'p' && !e.shiftKey) {
          this.appendValue('π');
        } else if (key.toLowerCase() === 'h') {
          document.querySelector('.history-section').scrollIntoView({ behavior: 'smooth' });
        } else if (key.toLowerCase() === 'g') {
          document.querySelector('.graph-section').scrollIntoView({ behavior: 'smooth' });
        }

        this.updateDisplay();
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      new UIController();
    });
  </script>
</body>
</html>
