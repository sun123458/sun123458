<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mingle - 遇见心动</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">♥</span>
                <span class="logo-text">Mingle</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="filterBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="4" y1="21" x2="4" y2="14"></line>
                        <line x1="4" y1="10" x2="4" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12" y2="3"></line>
                        <line x1="20" y1="21" x2="20" y2="16"></line>
                        <line x1="20" y1="12" x2="20" y2="3"></line>
                        <circle cx="4" cy="12" r="2"></circle>
                        <circle cx="12" cy="8" r="2"></circle>
                        <circle cx="20" cy="16" r="2"></circle>
                    </svg>
                </button>
                <button class="icon-btn" id="profileBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="8" r="4"></circle>
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 卡片区域 -->
        <main class="card-container">
            <div class="card-stack" id="cardStack">
                <!-- 卡片将通过JS动态生成 -->
            </div>

            <!-- 没有更多卡片 -->
            <div class="no-cards" id="noCards" style="display: none;">
                <div class="no-cards-icon">💫</div>
                <h3>暂时没有更多推荐</h3>
                <p>明天再来发现新的心动吧</p>
                <button class="refresh-btn" id="refreshBtn">刷新推荐</button>
            </div>
        </main>

        <!-- 操作按钮 -->
        <footer class="actions">
            <button class="action-btn dislike-btn" id="dislikeBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <button class="action-btn info-btn" id="infoBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="16" x2="12" y2="12"></line>
                    <line x1="12" y1="8" x2="12.01" y2="8"></line>
                </svg>
            </button>
            <button class="action-btn super-like-btn" id="superLikeBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                </svg>
            </button>
            <button class="action-btn like-btn" id="likeBtn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                </svg>
            </button>
        </footer>
    </div>

    <!-- 用户简介弹窗 -->
    <div class="modal-overlay" id="profileModal">
        <div class="profile-modal">
            <button class="modal-close" id="closeProfileModal">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="profile-content" id="profileContent">
                <!-- 动态内容 -->
            </div>
        </div>
    </div>

    <!-- 匹配成功弹窗 -->
    <div class="match-overlay" id="matchOverlay">
        <div class="match-modal">
            <div class="match-content">
                <div class="match-title">
                    <span class="match-text">It's a Match!</span>
                    <div class="match-emoji">💕</div>
                </div>
                <div class="match-avatars" id="matchAvatars">
                    <!-- 动态头像 -->
                </div>
                <p class="match-message">你们互相喜欢了对方！</p>
                <div class="match-actions">
                    <button class="match-btn secondary" id="continueMatching">继续配对</button>
                    <button class="match-btn primary" id="sendMessage">发消息</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
