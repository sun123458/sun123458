<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时区地图工具</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
.header {
  height: 56px; background: #1a1a2e; color: #fff; display: flex;
  align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; z-index: 1000;
}
.header h1 { font-size: 18px; white-space: nowrap; }
.search-box {
  flex: 1; max-width: 360px; position: relative; margin-left: auto;
}
.search-box input {
  width: 100%; padding: 8px 12px 8px 36px; border: 1px solid #444;
  border-radius: 20px; background: #16213e; color: #eee; font-size: 14px; outline: none;
}
.search-box input::placeholder { color: #888; }
.search-box input:focus { border-color: #e94560; }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; font-size: 14px; }
.search-dropdown {
  position: absolute; top: 100%; left: 0; right: 0; background: #16213e;
  border: 1px solid #444; border-radius: 8px; margin-top: 4px;
  max-height: 300px; overflow-y: auto; display: none; z-index: 1001;
}
.search-dropdown.show { display: block; }
.search-item {
  padding: 10px 14px; cursor: pointer; color: #ccc; font-size: 14px;
  border-bottom: 1px solid #333;
}
.search-item:last-child { border-bottom: none; }
.search-item:hover, .search-item.active { background: #0f3460; color: #fff; }
.search-item .tz-hint { font-size: 12px; color: #888; margin-left: 8px; }

/* Main area */
.main { flex: 1; display: flex; overflow: hidden; position: relative; }

/* Sidebar */
.sidebar {
  width: 260px; background: #16213e; color: #fff; display: flex; flex-direction: column;
  flex-shrink: 0; z-index: 800; transition: width 0.3s;
}
.sidebar.collapsed { width: 0; overflow: hidden; }
.sidebar-header {
  padding: 12px 16px; background: #1a1a2e; display: flex; align-items: center; justify-content: space-between;
  font-size: 14px; font-weight: 600;
}
.sidebar-header button {
  background: none; border: none; color: #888; cursor: pointer; font-size: 18px;
}
.sidebar-cities {
  flex: 1; overflow-y: auto; padding: 8px;
}
.city-card {
  background: #0f3460; border-radius: 10px; padding: 12px; margin-bottom: 8px;
  display: flex; align-items: center; justify-content: space-between; position: relative;
}
.city-card:hover { background: #1a3a6a; }
.city-card .city-info { flex: 1; }
.city-card .city-name { font-size: 14px; font-weight: 600; }
.city-card .city-time { font-size: 22px; font-weight: 700; font-variant-numeric: tabular-nums; margin-top: 2px; }
.city-card .city-date { font-size: 11px; color: #aaa; margin-top: 2px; }
.city-card .city-tz { font-size: 12px; color: #e94560; margin-top: 2px; }
.city-card .city-offset { font-size: 11px; color: #888; }
.city-card .remove-btn {
  background: none; border: none; color: #666; cursor: pointer;
  font-size: 18px; padding: 4px 8px; border-radius: 4px;
}
.city-card .remove-btn:hover { color: #e94560; background: rgba(233,69,96,0.15); }
.sidebar-empty {
  text-align: center; padding: 40px 20px; color: #666; font-size: 13px;
}
.sidebar-empty .hint { font-size: 28px; margin-bottom: 12px; }

/* Toggle sidebar btn */
.toggle-sidebar {
  position: absolute; left: 260px; top: 50%; transform: translateY(-50%);
  z-index: 801; background: #1a1a2e; border: 1px solid #333;
  color: #aaa; cursor: pointer; padding: 8px 4px; border-radius: 0 6px 6px 0;
  font-size: 12px; transition: left 0.3s;
}
.toggle-sidebar.shifted { left: 0; }

/* Map */
#map { flex: 1; z-index: 1; }

/* Custom Leaflet popup */
.leaflet-popup-content-wrapper { background: #1a1a2e; color: #fff; border-radius: 10px; }
.leaflet-popup-tip { background: #1a1a2e; }
.leaflet-popup-content { margin: 12px 16px; min-width: 180px; }
.popup-city { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.popup-time { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; color: #e94560; }
.popup-date { font-size: 12px; color: #aaa; margin: 2px 0; }
.popup-tz { font-size: 13px; color: #53c4f7; }
.popup-offset { font-size: 12px; color: #888; margin-top: 4px; }
.popup-add-btn {
  margin-top: 10px; background: #e94560; color: #fff; border: none;
  padding: 6px 16px; border-radius: 16px; cursor: pointer; font-size: 13px; width: 100%;
}
.popup-add-btn:hover { background: #d43d56; }
.popup-remove-btn {
  margin-top: 6px; background: transparent; color: #888; border: 1px solid #555;
  padding: 5px 16px; border-radius: 16px; cursor: pointer; font-size: 12px; width: 100%;
}
.popup-remove-btn:hover { border-color: #e94560; color: #e94560; }

/* City markers */
.city-marker {
  background: var(--marker-color, #e94560);
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid #fff; box-shadow: 0 0 6px rgba(0,0,0,0.5);
  transition: transform 0.2s, box-shadow 0.2s;
}
.city-marker:hover { transform: scale(1.6); box-shadow: 0 0 12px rgba(233,69,96,0.8); }
.city-marker.selected { box-shadow: 0 0 0 3px #e94560, 0 0 12px rgba(233,69,96,0.6); }
.city-marker-label {
  position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
  background: rgba(26,26,46,0.9); color: #fff; padding: 2px 8px;
  border-radius: 4px; font-size: 11px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.2s;
}
.city-marker:hover .city-marker-label { opacity: 1; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }

/* Responsive */
@media (max-width: 768px) {
  .sidebar { position: absolute; left: 0; top: 0; bottom: 0; z-index: 900; width: 260px; }
  .sidebar.collapsed { width: 0; }
  .toggle-sidebar { left: 260px; }
  .toggle-sidebar.shifted { left: 0; }
  .search-box { max-width: 200px; }
}

// ==================== Time Utilities ====================
function getTimeInCity(tz) {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('zh-CN', {
    timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
  return formatter.format(now);
}

function getDateInCity(tz) {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('zh-CN', {
    timeZone: tz, year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
  });
  return formatter.format(now);
}

function getUTCOffset(tz) {
  const now = new Date();
  const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
  const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const diffMinutes = (tzDate - utcDate) / 60000;
  const sign = diffMinutes >= 0 ? '+' : '-';
  const absMinutes = Math.abs(diffMinutes);
  const hours = Math.floor(absMinutes / 60);
  const minutes = absMinutes % 60;
  return `UTC${sign}${hours}${minutes ? ':' + String(minutes).padStart(2, '0') : ''}`;
}

function getLocalOffset() {
  return getUTCOffset(Intl.DateTimeFormat().resolvedOptions().timeZone);
}

function getTimeDiff(tz) {
  const now = new Date();
  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const utcDate = new Date(now.toLocaleString('en-US', { timeZone: 'UTC' }));
  const localDate = new Date(now.toLocaleString('en-US', { timeZone: localTz }));
  const tzDate = new Date(now.toLocaleString('en-US', { timeZone: tz }));
  const diffHours = Math.round(((tzDate - localDate) / 3600000) * 10) / 10;
  if (diffHours === 0) return '与本地相同';
  const sign = diffHours > 0 ? '+' : '';
  return `与本地 ${sign}${diffHours} 小时`;
}

function isWorkingHours(tz) {
  const now = new Date();
  const hour = parseInt(new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: 'numeric', hour12: false }).format(now));
  return hour >= 9 && hour < 18;
}

function getDayNightColor(tz) {
  const now = new Date();
  const hour = parseInt(new Intl.DateTimeFormat('en-US', { timeZone: tz, hour: 'numeric', hour12: false }).format(now));
  if (hour >= 6 && hour < 8) return '#f39c12';  // sunrise
  if (hour >= 8 && hour < 18) return '#e94560';  // day
  if (hour >= 18 && hour < 20) return '#e67e22'; // sunset
  return '#3498db';  // night
}

  center: [25, 0],
  zoom: 2,
  minZoom: 2,
  maxZoom: 10,
  worldCopyJump: true,
  zoomControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18,
}).addTo(map);

// ==================== Selected Cities ====================

const cityMarkers = {};

// ==================== Create City Markers ====================

  const color = getDayNightColor(city.tz);
  const icon = L.divIcon({
    className: '',
    html: `<div class="city-marker" style="--marker-color:${color}" data-city="${city.nameEn}"><div class="city-marker-label">${city.name}</div></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6],
  });

  const marker = L.marker([city.lat, city.lng], { icon }).addTo(map);

  marker.on('click', () => {
    showCityPopup(city);
  });

  marker.bindTooltip(city.name, {
    direction: 'top', offset: [0, -10],
    className: 'city-tooltip'
  });

  cityMarkers[city.nameEn] = marker;
});

function showCityPopup(city) {

  const diff = getTimeDiff(city.tz);
  const isSelected = selectedCities.some(c => c.nameEn === city.nameEn);

  const popup = L.popup({ closeButton: true, className: 'city-popup' })
    .setLatLng([city.lat, city.lng])
    .setContent(`
      <div class="popup-city">${city.name} <span style="font-size:12px;color:#888;font-weight:400">${city.country}</span></div>
      <div class="popup-time">${time}</div>
      <div class="popup-date">${date}</div>
      <div class="popup-tz">${city.tz}</div>
      <div class="popup-offset">${offset} &middot; ${diff}</div>
      ${isSelected
        ? '<button class="popup-remove-btn" onclick="removeCity(\'' + city.nameEn + '\')">&#10005; 从对比面板移除</button>'
        : '<button class="popup-add-btn" onclick="addSelectedCity(\'' + city.nameEn + '\')">&#43; 添加到对比面板</button>'
      }
    `)
    .openOn(map);
}

// Popup auto-refresh
let currentPopupCity = null;
map.on('popupopen', (e) => {
  const city = CITIES.find(c =>
    Math.abs(c.lat - e.popup.getLatLng().lat) < 0.1 &&
    Math.abs(c.lng - e.popup.getLatLng().lng) < 0.1
  );
  if (city) {
    currentPopupCity = city;
    updatePopupContent(city);
  }
});
map.on('popupclose', () => { currentPopupCity = null; });

function updatePopupContent(city) {
  if (!currentPopupCity || currentPopupCity.nameEn !== city.nameEn) return;
  const popup = map._popup;
  if (!popup || !popup.isOpen()) return;

  const time = getTimeInCity(city.tz);
  const date = getDateInCity(city.tz);
  const offset = getUTCOffset(city.tz);
  const diff = getTimeDiff(city.tz);
  const isSelected = selectedCities.some(c => c.nameEn === city.nameEn);

  popup.setContent(`
    <div class="popup-city">${city.name} <span style="font-size:12px;color:#888;font-weight:400">${city.country}</span></div>
    <div class="popup-time">${time}</div>
    <div class="popup-date">${date}</div>
    <div class="popup-tz">${city.tz}</div>
    <div class="popup-offset">${offset} &middot; ${diff}</div>
    ${isSelected
      ? '<button class="popup-remove-btn" onclick="removeCity(\'' + city.nameEn + '\')">&#10005; 从对比面板移除</button>'
      : '<button class="popup-add-btn" onclick="addSelectedCity(\'' + city.nameEn + '\')">&#43; 添加到对比面板</button>'
    }
  `);
}

// ==================== Sidebar ====================
function addSelectedCity(cityName) {
  const city = CITIES.find(c => c.nameEn === cityName);
  if (!city || selectedCities.some(c => c.nameEn === cityName)) return;
  selectedCities.push(city);
  updateSidebar();
  updateMarkerStyles();
  if (currentPopupCity) updatePopupContent(currentPopupCity);
}

function removeCity(cityName) {
  selectedCities = selectedCities.filter(c => c.nameEn !== cityName);
  updateSidebar();
  updateMarkerStyles();
  if (currentPopupCity) updatePopupContent(currentPopupCity);
}

function updateSidebar() {
  const container = document.getElementById('sidebarCities');
  const empty = document.getElementById('sidebarEmpty');
  const count = document.getElementById('sidebarCount');

  if (selectedCities.length === 0) {
    container.innerHTML = '';
    container.appendChild(empty);
    empty.style.display = 'block';
    count.textContent = '';
  } else {
    empty.style.display = 'none';
    count.textContent = `(${selectedCities.length})`;
    // Sort by UTC offset
    const sorted = [...selectedCities].sort((a, b) => {
      const now = new Date();
      const aDate = new Date(now.toLocaleString('en-US', { timeZone: a.tz }));
      const bDate = new Date(now.toLocaleString('en-US', { timeZone: b.tz }));
      return aDate - bDate;
    });
    container.innerHTML = sorted.map(city => `
      <div class="city-card" data-city="${city.nameEn}" onclick="flyToCity('${city.nameEn}')">
        <div class="city-info">
          <div class="city-name">${city.name} <span style="font-size:11px;color:#888;font-weight:400">${city.country}</span></div>
          <div class="city-time" data-tz="${city.tz}">${getTimeInCity(city.tz)}</div>
          <div class="city-date" data-tz-date="${city.tz}">${getDateInCity(city.tz)}</div>
          <div class="city-tz">${city.tz}</div>
          <div class="city-offset">${getUTCOffset(city.tz)} &middot; ${getTimeDiff(city.tz)}</div>
        </div>
        <button class="remove-btn" onclick="event.stopPropagation();removeCity('${city.nameEn}')" title="移除">&#10005;</button>
      </div>
    `).join('');
  }
}

function flyToCity(cityName) {
  const city = CITIES.find(c => c.nameEn === cityName);
  if (city) {
    map.flyTo([city.lat, city.lng], 6, { duration: 1 });
    showCityPopup(city);
  }
}

function updateMarkerStyles() {
  CITIES.forEach(city => {
    const marker = cityMarkers[city.nameEn];
    if (!marker) return;
    const el = marker.getElement();
    if (!el) return;
    const dot = el.querySelector('.city-marker');
    if (dot) {
      const isSelected = selectedCities.some(c => c.nameEn === city.nameEn);
      dot.classList.toggle('selected', isSelected);
    }
  });
}

// ==================== Toggle Sidebar ====================
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('toggleSidebar');
let sidebarCollapsed = false;

toggleBtn.addEventListener('click', () => {
  sidebarCollapsed = !sidebarCollapsed;
  sidebar.classList.toggle('collapsed', sidebarCollapsed);
  toggleBtn.classList.toggle('shifted', sidebarCollapsed);
  toggleBtn.innerHTML = sidebarCollapsed ? '&#9654;' : '&#9664;';
  setTimeout(() => map.invalidateSize(), 350);
});

// ==================== Search ====================
const searchInput = document.getElementById('searchInput');
const searchDropdown = document.getElementById('searchDropdown');
let searchIndex = -1;

searchInput.addEventListener('input', () => {
  const query = searchInput.value.trim().toLowerCase();
  searchIndex = -1;
  if (!query) {
    searchDropdown.classList.remove('show');
    return;
  }
  const results = CITIES.filter(c =>
    c.name.toLowerCase().includes(query) ||
    c.nameEn.toLowerCase().includes(query) ||
    c.country.toLowerCase().includes(query) ||
    c.tz.toLowerCase().includes(query)
  ).slice(0, 10);

  if (results.length === 0) {
    searchDropdown.innerHTML = '<div class="search-item" style="color:#666">未找到匹配城市</div>';
  } else {
    searchDropdown.innerHTML = results.map((c, i) => `
      <div class="search-item" data-index="${i}" data-city="${c.nameEn}"
           onclick="selectSearchCity('${c.nameEn}')">
        ${c.name} <span style="color:#666">${c.country}</span>
        <span class="tz-hint">${getUTCOffset(c.tz)}</span>
      </div>
    `).join('');
  }
  searchDropdown.classList.add('show');
});

searchInput.addEventListener('keydown', (e) => {
  const items = searchDropdown.querySelectorAll('.search-item[data-city]');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    searchIndex = Math.min(searchIndex + 1, items.length - 1);
    updateSearchHighlight(items);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    searchIndex = Math.max(searchIndex - 1, 0);
    updateSearchHighlight(items);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (searchIndex >= 0 && items[searchIndex]) {
      const city = items[searchIndex].dataset.city;
      selectSearchCity(city);
    }
  } else if (e.key === 'Escape') {
    searchDropdown.classList.remove('show');
    searchInput.blur();
  }
});

function updateSearchHighlight(items) {
  items.forEach((item, i) => item.classList.toggle('active', i === searchIndex));
}

function selectSearchCity(cityName) {
  const city = CITIES.find(c => c.nameEn === cityName);
  if (!city) return;
  map.flyTo([city.lat, city.lng], 6, { duration: 1 });
  searchDropdown.classList.remove('show');
  searchInput.value = '';
  setTimeout(() => showCityPopup(city), 1100);
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.search-box')) {
    searchDropdown.classList.remove('show');
  }
});

// ==================== Real-time Update ====================
function updateClocks() {
  // Update sidebar cards
  document.querySelectorAll('.city-time[data-tz]').forEach(el => {
    el.textContent = getTimeInCity(el.dataset.tz);
  });
  document.querySelectorAll('[data-tz-date]').forEach(el => {
    el.textContent = getDateInCity(el.dataset.tz);
  });
  // Update popup if open
  if (currentPopupCity) {
    updatePopupContent(currentPopupCity);
  }
  // Update marker colors (day/night)
  CITIES.forEach(city => {
    const marker = cityMarkers[city.nameEn];
    if (!marker) return;
    const el = marker.getElement();
    if (!el) return;
    const dot = el.querySelector('.city-marker');
    if (dot) {
      dot.style.setProperty('--marker-color', getDayNightColor(city.tz));
    }
  });
}

setInterval(updateClocks, 1000);

// ==================== Initialize ====================
updateSidebar();
</script>
</body>
</html>
