<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR增强现实展厅</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- AR Scene Container -->
    <div id="ar-container"></div>

    <!-- UI Overlay -->
    <div id="ui-overlay">
        <!-- Header -->
        <header class="app-header">
            <h1>AR展厅</h1>
            <div id="marker-status" class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">正在寻找标记...</span>
            </div>
        </header>

        <!-- Exhibit Info Panel -->
        <div id="exhibit-info" class="info-panel hidden">
            <h2 id="exhibit-name"></h2>
            <p id="exhibit-description"></p>
        </div>

        <!-- Loading Indicator -->
        <div id="loading" class="loading-overlay">
            <div class="spinner"></div>
            <p id="loading-text">加载中...</p>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <!-- Exhibit Navigation -->
        <nav class="exhibit-nav">
            <button id="prev-btn" class="nav-btn" aria-label="上一个展品">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>
            <div class="exhibit-counter">
                <span id="current-index">1</span> / <span id="total-count">3</span>
            </div>
            <button id="next-btn" class="nav-btn" aria-label="下一个展品">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </nav>

        <!-- Instructions -->
        <div id="instructions" class="instructions">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
            </svg>
            <p>将摄像头对准 Hiro 标记</p>
            <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/data/hiro.png" target="_blank" class="marker-link">查看标记图案</a>
        </div>
    </div>

    <!-- Three.js Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- GLTFLoader for loading 3D models -->
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- AR.js for augmented reality -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/three.js/build/ar.js"></script>

    <!-- Application Scripts -->
    <script src="js/models.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
