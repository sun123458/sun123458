<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易地图 - Leaflet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
    #map { width: 100%; height: 100%; }

    /* 顶部工具栏 */
    .toolbar {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      display: flex;
      gap: 8px;
    }
    .toolbar button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #333;
      transition: all 0.2s;
    }
    .toolbar button:hover { background: #f0f0f0; }
    .toolbar button.active {
      background: #2196F3;
      color: #fff;
    }

    /* 定位按钮 */
    .locate-btn {
      position: absolute;
      bottom: 30px;
      left: 12px;
      z-index: 1000;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.2s;
    }
    .locate-btn:hover { background: #f0f0f0; }
    .locate-btn.active { background: #2196F3; color: #fff; }

    /* 弹窗样式 */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
    }
    .popup-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #333;
    }
    .popup-desc {
      font-size: 13px;
      color: #666;
      margin-bottom: 4px;
    }
    .popup-meta {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
    .popup-img {
      width: 100%;
      border-radius: 6px;
      margin-top: 6px;
      display: block;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- 底图切换工具栏 -->
  <div class="toolbar">
    <button class="active" data-layer="streets">街道图</button>
    <button data-layer="satellite">卫星图</button>
    <button data-layer="dark">暗色模式</button>
  </div>

  <!-- 定位按钮 -->
  <button class="locate-btn" id="locateBtn" title="定位当前位置">&#9352;</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ========== 底图配置 ==========
    const baseLayers = {
      streets: {
        url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        options: { attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors' }
      },
      satellite: {
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        options: { attribution: '&copy; Esri' }
      },
      dark: {
        url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
        options: { attribution: '&copy; <a href="https://carto.com/">CARTO</a>' }
      }
    };

    // ========== 初始化地图 ==========
    const map = L.map('map', {
      center: [39.9042, 116.4074], // 北京
      zoom: 12,
      zoomControl: false,
    });

    L.control.zoom({ position: 'bottomright' }).addTo(map);

    let currentLayer = L.tileLayer(baseLayers.streets.url, baseLayers.streets.options).addTo(map);

    // ========== 标记数据 ==========
    const markersData = [
      {
        lat: 39.9087,
        lng: 116.3975,
        title: '天安门广场',
        desc: '北京市中心的著名广场，是世界上最大的城市广场之一。',
        category: '景点',
        image: 'https://picsum.photos/seed/tiananmen/300/150'
      },
      {
        lat: 39.9163,
        lng: 116.3972,
        title: '故宫博物院',
        desc: '明清两代的皇家宫殿，现为世界上现存规模最大的宫殿建筑群。',
        category: '景点',
        image: 'https://picsum.photos/seed/gugong/300/150'
      },
      {
        lat: 39.8836,
        lng: 116.3948,
        title: '天坛公园',
        desc: '明清两代帝王祭祀皇天、祈五谷丰登之场所。',
        category: '景点',
        image: 'https://picsum.photos/seed/tiantan/300/150'
      },
      {
        lat: 39.9231,
        lng: 116.4148,
        title: '王府井步行街',
        desc: '北京著名的商业步行街，汇集了众多商场和老字号。',
        category: '购物',
        image: 'https://picsum.photos/seed/wangfujing/300/150'
      },
      {
        lat: 39.9100,
        lng: 116.4100,
        title: '中国国家博物馆',
        desc: '世界上单体建筑面积最大的博物馆之一，馆藏文物丰富。',
        category: '文化',
        image: 'https://picsum.photos/seed/museum/300/150'
      }
    ];

    // ========== 创建自定义图标 ==========
    function createIcon(category) {
      const colors = { '景点': '#e74c3c', '购物': '#2ecc71', '文化': '#3498db' };
      return L.divIcon({
        className: 'custom-marker',
        html: `<div style="
          width: 28px; height: 36px;
          background: ${colors[category] || '#2196F3'};
          border-radius: 50% 50% 50% 0;
          transform: rotate(-45deg);
          border: 2px solid #fff;
          box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        "></div>`,
        iconSize: [28, 36],
        iconAnchor: [14, 36],
        popupAnchor: [0, -36]
      });
    }

    // ========== 添加标记 ==========
    const markers = [];
    markersData.forEach(data => {
      const marker = L.marker([data.lat, data.lng], { icon: createIcon(data.category) })
        .addTo(map)
        .bindPopup(`
          <div class="popup-title">${data.title}</div>
          <div class="popup-desc">${data.desc}</div>
          <div class="popup-meta">&#128205; ${data.lat.toFixed(4)}, ${data.lng.toFixed(4)} | &#128197; ${data.category}</div>
          ${data.image ? `<img class="popup-img" src="${data.image}" alt="${data.title}" />` : ''}
        `, { maxWidth: 260 });
      markers.push(marker);
    });

    // ========== 底图切换 ==========
    document.querySelectorAll('.toolbar button').forEach(btn => {
      btn.addEventListener('click', () => {
        const layer = btn.dataset.layer;
        if (!baseLayers[layer]) return;

        document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        map.removeLayer(currentLayer);
        currentLayer = L.tileLayer(baseLayers[layer].url, baseLayers[layer].options).addTo(map);
      });
    });

    // ========== 定位功能 ==========
    const locateBtn = document.getElementById('locateBtn');

    locateBtn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        alert('您的浏览器不支持地理定位');
        return;
      }

      locateBtn.classList.add('active');

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          map.setView([latitude, longitude], 15);

          // 添加当前位置标记
          const myIcon = L.divIcon({
            className: 'my-location-marker',
            html: `<div style="
              width: 20px; height: 20px;
              background: #2196F3;
              border: 3px solid #fff;
              border-radius: 50%;
              box-shadow: 0 0 0 4px rgba(33,150,243,0.3), 0 2px 6px rgba(0,0,0,0.3);
              animation: pulse 1.5s infinite;
            "></div>`,
            iconSize: [20, 20],
            iconAnchor: [10, 10]
          });

          L.marker([latitude, longitude], { icon: myIcon })
            .addTo(map)
            .bindPopup('<div class="popup-title">&#128205; 我的位置</div><div class="popup-desc">这是您当前所在的位置</div>')
            .openPopup();

          locateBtn.classList.remove('active');
        },
        (err) => {
          alert('定位失败：' + err.message);
          locateBtn.classList.remove('active');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    // ========== 添加脉冲动画样式 ==========
    const style = document.createElement('style');
    style.textContent = `
      @keyframes pulse {
        0% { box-shadow: 0 0 0 4px rgba(33,150,243,0.3); }
        70% { box-shadow: 0 0 0 12px rgba(33,150,243,0); }
        100% { box-shadow: 0 0 0 4px rgba(33,150,243,0); }
      }
    `;
    document.head.appendChild(style);
  </script>
</body>
</html>
