<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>科学函数计算器</title>
<style>
/* ========== CSS 变量 & 主题 ========== */
:root {
  --transition-speed: 0.3s;
}

[data-theme="dark"] {
  --bg-primary: #1a1a2e;
  --bg-secondary: #16213e;
  --bg-display: #0f3460;
  --bg-button: #1a1a2e;
  --bg-button-hover: #16213e;
  --bg-button-active: #533483;
  --bg-scientific: #1b1b3a;
  --text-primary: #e0e0e0;
  --text-secondary: #a0a0b0;
  --text-accent: #e94560;
  --text-display: #ffffff;
  --border-color: #333355;
  --history-bg: #16213e;
  --canvas-bg: #0f3460;
  --grid-color: rgba(233, 69, 96, 0.15);
  --plot-color: #e94560;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --scrollbar-track: #16213e;
  --scrollbar-thumb: #333355;
}

[data-theme="light"] {
  --bg-primary: #f0f2f5;
  --bg-secondary: #ffffff;
  --bg-display: #e8edf2;
  --bg-button: #ffffff;
  --bg-button-hover: #e8edf2;
  --bg-button-active: #4361ee;
  --bg-scientific: #e8edf2;
  --text-primary: #2b2d42;
  --text-secondary: #8d99ae;
  --text-accent: #4361ee;
  --text-display: #2b2d42;
  --border-color: #d1d5db;
  --history-bg: #ffffff;
  --canvas-bg: #e8edf2;
  --grid-color: rgba(67, 97, 238, 0.15);
  --plot-color: #4361ee;
  --shadow: 0 8px 32px rgba(0,0,0,0.1);
  --scrollbar-track: #f0f2f5;
  --scrollbar-thumb: #c1c5cb;
}

[data-theme="retro"] {
  --bg-primary: #2b2b2b;
  --bg-secondary: #1e1e1e;
  --bg-display: #003300;
  --bg-button: #333333;
  --bg-button-hover: #444444;
  --bg-button-active: #006600;
  --bg-scientific: #2a2a2a;
  --text-primary: #00ff00;
  --text-secondary: #00aa00;
  --text-accent: #00ff00;
  --text-display: #00ff00;
  --border-color: #555555;
  --history-bg: #1e1e1e;
  --canvas-bg: #001a00;
  --grid-color: rgba(0, 255, 0, 0.1);
  --plot-color: #00ff00;
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
  --scrollbar-track: #1e1e1e;
  --scrollbar-thumb: #555555;
}

/* ========== 全局样式 ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  transition: background var(--transition-speed), color var(--transition-speed);
  display: flex;
  flex-direction: column;
  align-items: center;
}

::-webkit-scrollbar {
  width: 6px;
}
::-webkit-scrollbar-track {
  background: var(--scrollbar-track);
}
::-webkit-scrollbar-thumb {
  background: var(--scrollbar-thumb);
  border-radius: 3px;
}

/* ========== 头部 & 主题切换 ========== */
.header {
  width: 100%;
  max-width: 820px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  flex-wrap: wrap;
  gap: 10px;
}

.header h1 {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-accent);
  letter-spacing: 1px;
}

.theme-switcher {
  display: flex;
  gap: 6px;
}

.theme-btn {
  padding: 6px 14px;
  border: 2px solid var(--border-color);
  background: var(--bg-button);
  color: var(--text-primary);
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all var(--transition-speed);
}
.theme-btn:hover {
  border-color: var(--text-accent);
}
.theme-btn.active {
  background: var(--text-accent);
  color: #fff;
  border-color: var(--text-accent);
}

/* ========== 主容器 ========== */
.main-container {
  display: flex;
  gap: 20px;
  max-width: 820px;
  width: 100%;
  padding: 0 20px 20px;
  flex: 1;
  max-height: calc(100vh - 70px);
}

/* ========== 计算器面板 ========== */
.calculator {
  flex: 0 0 380px;
  display: flex;
  flex-direction: column;
  gap: 0;
  background: var(--bg-secondary);
  border-radius: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
  border: 1px solid var(--border-color);
}

/* --- 显示屏 --- */
.display {
  padding: 20px 20px 16px;
  background: var(--bg-display);
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 6px;
}

.display-expression {
  font-size: 0.95rem;
  color: var(--text-secondary);
  word-break: break-all;
  min-height: 22px;
  text-align: right;
}

.display-result {
  font-size: 2.4rem;
  font-weight: 700;
  color: var(--text-display);
  word-break: break-all;
  text-align: right;
  transition: color 0.2s;
}
.display-result.error {
  color: #ff6b6b;
  font-size: 1.3rem;
}

/* --- 科学函数按钮区 --- */
.scientific-buttons {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 1px;
  background: var(--border-color);
  border-top: 1px solid var(--border-color);
}

/* --- 主按钮区 --- */
.main-buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border-color);
}

/* --- 按钮通用 --- */
.btn {
  padding: 16px 8px;
  border: none;
  font-size: 1rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  background: var(--bg-button);
  color: var(--text-primary);
  user-select: none;
  position: relative;
}

.btn:hover {
  background: var(--bg-button-hover);
}

.btn:active {
  background: var(--bg-button-active);
  color: #fff;
  transform: scale(0.96);
}

.btn.scientific {
  background: var(--bg-scientific);
  font-size: 0.85rem;
  padding: 12px 4px;
}
.btn.scientific:hover {
  background: var(--bg-button-hover);
}

.btn.operator {
  color: var(--text-accent);
  font-weight: 700;
  font-size: 1.2rem;
}

.btn.equals {
  background: var(--text-accent);
  color: #fff;
  font-weight: 700;
  font-size: 1.3rem;
}
.btn.equals:hover {
  filter: brightness(1.15);
}

.btn.clear {
  color: #ff6b6b;
  font-weight: 600;
}

.btn.wide {
  grid-column: span 2;
}

/* ========== 右侧面板 ========== */
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  min-width: 0;
}

/* --- 历史记录 --- */
.history-panel {
  flex: 1;
  background: var(--bg-secondary);
  border-radius: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-height: 0;
}

.history-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-color);
}

.history-header h3 {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-accent);
}

.clear-history-btn {
  padding: 4px 12px;
  font-size: 0.75rem;
  border: 1px solid var(--border-color);
  background: transparent;
  color: var(--text-secondary);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.clear-history-btn:hover {
  border-color: #ff6b6b;
  color: #ff6b6b;
}

.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px 0;
}

.history-item {
  padding: 10px 16px;
  cursor: pointer;
  transition: background 0.15s;
  border-bottom: 1px solid var(--border-color);
}
.history-item:last-child {
  border-bottom: none;
}
.history-item:hover {
  background: var(--bg-button-hover);
}

.history-expr {
  font-size: 0.8rem;
  color: var(--text-secondary);
  margin-bottom: 2px;
  word-break: break-all;
}

.history-result {
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text-primary);
  word-break: break-all;
}

.history-empty {
  padding: 30px;
  text-align: center;
  color: var(--text-secondary);
  font-size: 0.85rem;
}

/* --- 函数绘图面板 --- */
.plotter-panel {
  background: var(--bg-secondary);
  border-radius: 16px;
  box-shadow: var(--shadow);
  border: 1px solid var(--border-color);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.plotter-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-color);
}

.plotter-header h3 {
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text-accent);
  margin-bottom: 8px;
}

.plot-input-row {
  display: flex;
  gap: 8px;
}

.plot-input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid var(--border-color);
  border-radius: 8px;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-size: 0.85rem;
  outline: none;
  transition: border-color 0.2s;
}
.plot-input:focus {
  border-color: var(--text-accent);
}
.plot-input::placeholder {
  color: var(--text-secondary);
}

.plot-btn {
  padding: 8px 16px;
  border: none;
  border-radius: 8px;
  background: var(--text-accent);
  color: #fff;
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  transition: filter 0.2s;
  white-space: nowrap;
}
.plot-btn:hover {
  filter: brightness(1.15);
}

.plotter-canvas-wrap {
  padding: 8px;
  flex: 1;
  min-height: 250px;
}

.plotter-canvas-wrap canvas {
  width: 100%;
  height: 100%;
  border-radius: 8px;
  display: block;
  background: var(--canvas-bg);
  cursor: grab;
}
.plotter-canvas-wrap canvas:active {
  cursor: grabbing;
}

/* ========== 键盘提示 ========== */
.keyboard-hint {
  padding: 8px 16px;
  text-align: center;
  font-size: 0.72rem;
  color: var(--text-secondary);
  max-width: 820px;
  width: 100%;
}

/* ========== 响应式 ========== */
@media (max-width: 768px) {
  .main-container {
    flex-direction: column;
    max-height: none;
    padding: 0 10px 10px;
  }
  .calculator {
    flex: none;
    width: 100%;
  }
  .right-panel {
    flex: none;
    width: 100%;
  }
  .history-panel {
    max-height: 200px;
  }
  .plotter-canvas-wrap {
    min-height: 220px;
  }
  .btn {
    padding: 14px 6px;
    font-size: 0.9rem;
  }
  .btn.scientific {
    padding: 10px 2px;
    font-size: 0.75rem;
  }
  .display-result {
    font-size: 2rem;
  }
}

@media (max-width: 400px) {
  .header h1 {
    font-size: 1rem;
  }
  .btn {
    padding: 12px 4px;
    font-size: 0.82rem;
  }
  .btn.scientific {
    font-size: 0.68rem;
    padding: 9px 2px;
  }
  .display-result {
    font-size: 1.6rem;
  }
}

/* ========== 动画 ========== */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}
.history-item {
  animation: fadeIn 0.2s ease;
}

/* ========== 模式指示器 ========== */
.angle-mode-label {
  position: absolute;
  top: 4px;
  left: 8px;
  font-size: 0.6rem;
  color: var(--text-secondary);
  pointer-events: none;
}
</style>
</head>
<body>

<!-- 头部 -->
<header class="header">
  <h1>科学函数计算器</h1>
  <div class="theme-switcher">
    <button class="theme-btn active" data-theme="dark">暗色</button>
    <button class="theme-btn" data-theme="light">浅色</button>
    <button class="theme-btn" data-theme="retro">复古</button>
  </div>
</header>

<!-- 主体 -->
<div class="main-container">
  <!-- 计算器 -->
  <div class="calculator">
    <div class="display">
      <div class="display-expression" id="expression"></div>
      <div class="display-result" id="result">0</div>
    </div>

    <!-- 科学函数按钮 -->
    <div class="scientific-buttons">
      <button class="btn scientific" data-action="sin">sin</button>
      <button class="btn scientific" data-action="cos">cos</button>
      <button class="btn scientific" data-action="tan">tan</button>
      <button class="btn scientific" data-action="log">log</button>
      <button class="btn scientific" data-action="ln">ln</button>

      <button class="btn scientific" data-action="asin">sin⁻¹</button>
      <button class="btn scientific" data-action="acos">cos⁻¹</button>
      <button class="btn scientific" data-action="atan">tan⁻¹</button>
      <button class="btn scientific" data-action="sqrt">√</button>
      <button class="btn scientific" data-action="cbrt">∛</button>

      <button class="btn scientific" data-action="pow2">x²</button>
      <button class="btn scientific" data-action="pow3">x³</button>
      <button class="btn scientific" data-action="inv">1/x</button>
      <button class="btn scientific" data-action="abs">|x|</button>
      <button class="btn scientific" data-action="fact">x!</button>

      <button class="btn scientific" data-action="pi">π</button>
      <button class="btn scientific" data-action="e">e</button>
      <button class="btn scientific" data-action="parentheses">( )</button>
      <button class="btn scientific" data-action="pow">x^n</button>
      <button class="btn scientific" data-action="percent">%</button>

      <button class="btn scientific" data-action="exp">EXP</button>
      <button class="btn scientific" data-action="mod">mod</button>
      <button class="btn scientific" data-action="floor">⌊x⌋</button>
      <button class="btn scientific" data-action="ceil">⌈x⌉</button>
      <button class="btn scientific" data-action="deg" id="degBtn">DEG</button>
    </div>

    <!-- 主按钮 -->
    <div class="main-buttons">
      <button class="btn clear" data-action="clear">AC</button>
      <button class="btn clear" data-action="backspace">⌫</button>
      <button class="btn operator" data-action="input" data-value="(">(</button>
      <button class="btn operator" data-action="input" data-value=")">)</button>

      <button class="btn" data-action="input" data-value="7">7</button>
      <button class="btn" data-action="input" data-value="8">8</button>
      <button class="btn" data-action="input" data-value="9">9</button>
      <button class="btn operator" data-action="input" data-value="/">÷</button>

      <button class="btn" data-action="input" data-value="4">4</button>
      <button class="btn" data-action="input" data-value="5">5</button>
      <button class="btn" data-action="input" data-value="6">6</button>
      <button class="btn operator" data-action="input" data-value="*">×</button>

      <button class="btn" data-action="input" data-value="1">1</button>
      <button class="btn" data-action="input" data-value="2">2</button>
      <button class="btn" data-action="input" data-value="3">3</button>
      <button class="btn operator" data-action="input" data-value="-">−</button>

      <button class="btn" data-action="negate">+/−</button>
      <button class="btn" data-action="input" data-value="0">0</button>
      <button class="btn" data-action="dot">.</button>
      <button class="btn operator" data-action="input" data-value="+">+</button>

      <button class="btn equals" data-action="evaluate">=</button>
    </div>
  </div>

  <!-- 右侧面板 -->
  <div class="right-panel">
    <!-- 历史记录 -->
    <div class="history-panel">
      <div class="history-header">
        <h3>历史记录</h3>
        <button class="clear-history-btn" id="clearHistory">清空</button>
      </div>
      <div class="history-list" id="historyList">
        <div class="history-empty">暂无计算记录</div>
      </div>
    </div>

    <!-- 函数绘图 -->
    <div class="plotter-panel">
      <div class="plotter-header">
        <h3>函数绘图</h3>
        <div class="plot-input-row">
          <input type="text" class="plot-input" id="plotInput" placeholder="输入函数，如 x^2, sin(x), x^3-3*x" />
          <button class="plot-btn" id="plotBtn">绘制</button>
        </div>
      </div>
      <div class="plotter-canvas-wrap">
        <canvas id="plotCanvas"></canvas>
      </div>
    </div>
  </div>
</div>

<div class="keyboard-hint">支持键盘输入：数字、运算符、Enter=计算、Backspace=删除、Escape=清空</div>

<script>
/* =====================================================
   科学函数计算器 - 核心逻辑
   ===================================================== */

// ==================== 状态 ====================
const state = {
  expression: '',       // 当前输入的表达式（原始显示用）
  tokens: [],           // token 列表
  currentNumber: '',    // 当前正在输入的数字
  lastResult: null,     // 上次计算结果
  justEvaluated: false, // 刚刚按了等号
  degMode: true,        // true=度, false=弧度
  history: [],          // 历史记录
  openParens: 0,        // 未关闭的括号数
};

// ==================== DOM ====================
const $expr = document.getElementById('expression');
const $result = document.getElementById('result');
const $historyList = document.getElementById('historyList');
const $clearHistory = document.getElementById('clearHistory');
const $plotInput = document.getElementById('plotInput');
const $plotBtn = document.getElementById('plotBtn');
const $plotCanvas = document.getElementById('plotCanvas');
const $degBtn = document.getElementById('degBtn');

// ==================== 按钮事件 ====================
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.dataset.action;
    const value = btn.dataset.value;
    handleAction(action, value);
  });
});

function handleAction(action, value) {
  switch (action) {
    case 'input':
      inputChar(value);
      break;
    case 'dot':
      inputDot();
      break;
    case 'clear':
      clearAll();
      break;
    case 'backspace':
      backspace();
      break;
    case 'evaluate':
      evaluate();
      break;
    case 'negate':
      negate();
      break;
    // 科学函数
    case 'sin': applyFunction('sin('); break;
    case 'cos': applyFunction('cos('); break;
    case 'tan': applyFunction('tan('); break;
    case 'asin': applyFunction('asin('); break;
    case 'acos': applyFunction('acos('); break;
    case 'atan': applyFunction('atan('); break;
    case 'log': applyFunction('log('); break;
    case 'ln': applyFunction('ln('); break;
    case 'sqrt': applyFunction('sqrt('); break;
    case 'cbrt': applyFunction('cbrt('); break;
    case 'abs': applyFunction('abs('); break;
    case 'floor': applyFunction('floor('); break;
    case 'ceil': applyFunction('ceil('); break;
    case 'fact': applyFunction('fact('); break;
    case 'pow2': applyPostfix('^2'); break;
    case 'pow3': applyPostfix('^3'); break;
    case 'inv': applyPostfix('^(-1)'); break;
    case 'percent': applyPostfix('/100'); break;
    case 'pow': inputChar('^'); break;
    case 'mod': inputChar('%'); break;
    case 'parentheses': smartParen(); break;
    case 'pi': inputConstant('π', String(Math.PI)); break;
    case 'e': inputConstant('e', String(Math.E)); break;
    case 'exp': inputChar('e'); break;
    case 'deg':
      state.degMode = !state.degMode;
      $degBtn.textContent = state.degMode ? 'DEG' : 'RAD';
      break;
  }
  updateDisplay();
}

// ==================== 输入处理 ====================
function inputChar(ch) {
  if (state.justEvaluated && /[0-9(π]/.test(ch)) {
    clearAll();
  }
  state.justEvaluated = false;
  state.expression += ch;
}

function inputDot() {
  if (state.justEvaluated) clearAll();
  state.justEvaluated = false;
  state.expression += '.';
}

function inputConstant(display, value) {
  if (state.justEvaluated) clearAll();
  state.justEvaluated = false;
  state.expression += display;
}

function applyFunction(prefix) {
  if (state.justEvaluated) {
    state.expression = prefix;
    state.justEvaluated = false;
  } else {
    state.expression += prefix;
  }
  state.openParens++;
}

function applyPostfix(op) {
  state.expression += op;
  state.justEvaluated = false;
}

function smartParen() {
  if (state.openParens > 0 && (/[0-9π)!]$/.test(state.expression) || state.expression === '')) {
    inputChar(')');
    state.openParens--;
  } else {
    inputChar('(');
    state.openParens++;
  }
}

function negate() {
  if (state.justEvaluated && state.lastResult !== null) {
    const v = -state.lastResult;
    state.expression = formatNumber(v);
    state.lastResult = v;
    updateDisplay();
    return;
  }
  if (state.expression && /[0-9π)]$/.test(state.expression)) {
    state.expression = '-(' + state.expression + ')';
    state.openParens++;
  } else {
    inputChar('-');
  }
}

function backspace() {
  const removed = state.expression.slice(-1);
  state.expression = state.expression.slice(0, -1);
  if (removed === '(') state.openParens = Math.max(0, state.openParens - 1);
}

function clearAll() {
  state.expression = '';
  state.lastResult = null;
  state.justEvaluated = false;
  state.openParens = 0;
  $result.classList.remove('error');
}

function updateDisplay() {
  $expr.textContent = state.expression || '';
  if (state.justEvaluated && state.lastResult !== null) {
    $result.textContent = formatNumber(state.lastResult);
    $result.classList.remove('error');
  } else if (!state.expression) {
    $result.textContent = '0';
    $result.classList.remove('error');
  }
}

function formatNumber(n) {
  if (typeof n !== 'number' || !isFinite(n)) return String(n);
  if (Number.isInteger(n) && Math.abs(n) < 1e15) return n.toLocaleString('en-US');
  const s = parseFloat(n.toPrecision(12));
  return s.toLocaleString('en-US', { maximumFractionDigits: 10 });
}

// ==================== Shunting-yard 算法 ====================

// 转义并预处理表达式
function preprocessExpression(expr) {
  let s = expr;
  // 替换显示字符
  s = s.replace(/π/g, '(' + Math.PI + ')');
  s = s.replace(/×/g, '*');
  s = s.replace(/÷/g, '/');
  s = s.replace(/−/g, '-');
  // 隐式乘法: 2π → 2*π, 3( → 3*(, )2 → )*2, )( → )*(, 数字紧跟函数名
  s = s.replace(/(\d)(\()/g, '$1*$2');
  s = s.replace(/(\))(\d)/g, '$1*$2');
  s = s.replace(/(\))(\()/g, '$1*$2');
  s = s.replace(/(\d)([a-zA-Z])/g, '$1*$2');
  s = s.replace(/(\))([a-zA-Z])/g, '$1*$2');
  return s;
}

function tokenize(expr) {
  const tokens = [];
  let i = 0;
  while (i < expr.length) {
    const ch = expr[i];
    if (/\d/.test(ch) || (ch === '.' && i + 1 < expr.length && /\d/.test(expr[i + 1]))) {
      let num = '';
      while (i < expr.length && (/\d/.test(expr[i]) || expr[i] === '.')) {
        num += expr[i++];
      }
      tokens.push({ type: 'number', value: num });
      continue;
    }
    if (/[a-zA-Z]/.test(ch)) {
      let name = '';
      while (i < expr.length && /[a-zA-Z]/.test(expr[i])) {
        name += expr[i++];
      }
      // 判断是否函数名
      if (i < expr.length && expr[i] === '(') {
        tokens.push({ type: 'function', value: name });
      } else if (name === 'e') {
        tokens.push({ type: 'number', value: String(Math.E) });
      } else if (name === 'pi') {
        tokens.push({ type: 'number', value: String(Math.PI) });
      } else {
        throw new Error('未知标识符: ' + name);
      }
      continue;
    }
    if ('+-*/%^'.includes(ch)) {
      // 一元正负号处理
      if ((ch === '+' || ch === '-') && (tokens.length === 0 || tokens[tokens.length - 1].type === 'operator' || tokens[tokens.length - 1].value === '(')) {
        if (ch === '-') {
          tokens.push({ type: 'unary', value: 'neg' });
        }
        i++;
        continue;
      }
      tokens.push({ type: 'operator', value: ch });
      i++;
      continue;
    }
    if (ch === '(') { tokens.push({ type: 'paren', value: '(' }); i++; continue; }
    if (ch === ')') { tokens.push({ type: 'paren', value: ')' }); i++; continue; }
    if (ch === ' ') { i++; continue; }
    throw new Error('未知字符: ' + ch);
  }
  return tokens;
}

// 运算符优先级和结合性
const OP_INFO = {
  '+':  { prec: 2, assoc: 'left' },
  '-':  { prec: 2, assoc: 'left' },
  '*':  { prec: 3, assoc: 'left' },
  '/':  { prec: 3, assoc: 'left' },
  '%':  { prec: 3, assoc: 'left' },
  '^':  { prec: 4, assoc: 'right' },
};

function shuntingYard(tokens) {
  const output = [];
  const operators = [];
  for (const token of tokens) {
    if (token.type === 'number') {
      output.push(token);
    } else if (token.type === 'function') {
      operators.push(token);
    } else if (token.type === 'unary') {
      operators.push(token);
    } else if (token.type === 'operator') {
      const info = OP_INFO[token.value];
      while (operators.length > 0) {
        const top = operators[operators.length - 1];
        if (top.type === 'operator') {
          const topInfo = OP_INFO[top.value];
          if ((info.assoc === 'left' && info.prec <= topInfo.prec) ||
              (info.assoc === 'right' && info.prec < topInfo.prec)) {
            output.push(operators.pop());
            continue;
          }
        } else if (top.type === 'function' || top.type === 'unary') {
          output.push(operators.pop());
          continue;
        }
        break;
      }
      operators.push(token);
    } else if (token.value === '(') {
      operators.push(token);
    } else if (token.value === ')') {
      while (operators.length > 0 && operators[operators.length - 1].value !== '(') {
        output.push(operators.pop());
      }
      if (operators.length === 0) throw new Error('括号不匹配');
      operators.pop(); // 弹出 '('
      if (operators.length > 0 && operators[operators.length - 1].type === 'function') {
        output.push(operators.pop());
      }
    }
  }
  while (operators.length > 0) {
    const op = operators.pop();
    if (op.value === '(' || op.value === ')') throw new Error('括号不匹配');
    output.push(op);
  }
  return output;
}

// ==================== 求值 ====================
function factorial(n) {
  if (n < 0) throw new Error('负数没有阶乘');
  if (n === 0 || n === 1) return 1;
  if (n > 170) return Infinity;
  if (!Number.isInteger(n)) throw new Error('阶乘仅支持整数');
  let result = 1;
  for (let i = 2; i <= n; i++) result *= i;
  return result;
}

function toAngle(val) {
  return state.degMode ? val * Math.PI / 180 : val;
}

function fromAngle(val) {
  return state.degMode ? val * 180 / Math.PI : val;
}

function evalRPN(rpn) {
  const stack = [];
  for (const token of rpn) {
    if (token.type === 'number') {
      stack.push(parseFloat(token.value));
    } else if (token.type === 'unary') {
      if (stack.length < 1) throw new Error('表达式错误');
      const a = stack.pop();
      if (token.value === 'neg') stack.push(-a);
    } else if (token.type === 'function') {
      if (stack.length < 1) throw new Error('表达式错误');
      const a = stack.pop();
      switch (token.value) {
        case 'sin':  stack.push(Math.sin(toAngle(a))); break;
        case 'cos':  stack.push(Math.cos(toAngle(a))); break;
        case 'tan': {
          const cosA = Math.cos(toAngle(a));
          if (Math.abs(cosA) < 1e-15) throw new Error('tan 未定义');
          stack.push(Math.sin(toAngle(a)) / cosA);
          break;
        }
        case 'asin':
          if (a < -1 || a > 1) throw new Error('asin 定义域: [-1, 1]');
          stack.push(fromAngle(Math.asin(a)));
          break;
        case 'acos':
          if (a < -1 || a > 1) throw new Error('acos 定义域: [-1, 1]');
          stack.push(fromAngle(Math.acos(a)));
          break;
        case 'atan': stack.push(fromAngle(Math.atan(a))); break;
        case 'log':
          if (a <= 0) throw new Error('log 定义域: (0, +∞)');
          stack.push(Math.log10(a));
          break;
        case 'ln':
          if (a <= 0) throw new Error('ln 定义域: (0, +∞)');
          stack.push(Math.log(a));
          break;
        case 'sqrt':
          if (a < 0) throw new Error('不能对负数开方');
          stack.push(Math.sqrt(a));
          break;
        case 'cbrt': stack.push(Math.cbrt(a)); break;
        case 'abs': stack.push(Math.abs(a)); break;
        case 'floor': stack.push(Math.floor(a)); break;
        case 'ceil': stack.push(Math.ceil(a)); break;
        case 'fact': stack.push(factorial(a)); break;
        default: throw new Error('未知函数: ' + token.value);
      }
    } else if (token.type === 'operator') {
      if (stack.length < 2) throw new Error('表达式错误');
      const b = stack.pop();
      const a = stack.pop();
      switch (token.value) {
        case '+': stack.push(a + b); break;
        case '-': stack.push(a - b); break;
        case '*': stack.push(a * b); break;
        case '/':
          if (b === 0) throw new Error('不能除以零');
          stack.push(a / b);
          break;
        case '%':
          if (b === 0) throw new Error('不能除以零');
          stack.push(a % b);
          break;
        case '^':
          stack.push(Math.pow(a, b));
          break;
        default: throw new Error('未知运算符: ' + token.value);
      }
    }
  }
  if (stack.length !== 1) throw new Error('表达式不完整');
  return stack[0];
}

function evaluate() {
  if (!state.expression) return;
  try {
    const preprocessed = preprocessExpression(state.expression);
    const tokens = tokenize(preprocessed);
    const rpn = shuntingYard(tokens);
    const result = evalRPN(rpn);
    state.lastResult = result;
    state.justEvaluated = true;
    addHistory(state.expression, result);
    $result.classList.remove('error');
    $result.textContent = formatNumber(result);
  } catch (err) {
    state.justEvaluated = true;
    $result.classList.add('error');
    $result.textContent = err.message || '计算错误';
  }
}

// ==================== 历史记录 ====================
function addHistory(expr, result) {
  state.history.unshift({ expr, result, time: new Date() });
  if (state.history.length > 100) state.history.pop();
  renderHistory();
}

function renderHistory() {
  if (state.history.length === 0) {
    $historyList.innerHTML = '<div class="history-empty">暂无计算记录</div>';
    return;
  }
  $historyList.innerHTML = state.history.map((item, i) => `
    <div class="history-item" data-index="${i}">
      <div class="history-expr">${escapeHtml(item.expr)}</div>
      <div class="history-result">= ${escapeHtml(formatNumber(item.result))}</div>
    </div>
  `).join('');
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

$historyList.addEventListener('click', (e) => {
  const item = e.target.closest('.history-item');
  if (!item) return;
  const idx = parseInt(item.dataset.index);
  const record = state.history[idx];
  state.expression = String(record.result);
  state.lastResult = record.result;
  state.justEvaluated = false;
  updateDisplay();
});

$clearHistory.addEventListener('click', () => {
  state.history = [];
  renderHistory();
});

// ==================== 键盘支持 ====================
document.addEventListener('keydown', (e) => {
  // 如果焦点在输入框，不拦截
  if (e.target.tagName === 'INPUT') return;

  const key = e.key;
  if (/^[0-9]$/.test(key)) { inputChar(key); updateDisplay(); e.preventDefault(); return; }
  switch (key) {
    case '+': inputChar('+'); break;
    case '-': inputChar('-'); break;
    case '*': inputChar('*'); break;
    case '/': inputChar('/'); break;
    case '%': inputChar('%'); break;
    case '^': inputChar('^'); break;
    case '.': inputDot(); break;
    case '(': inputChar('('); state.openParens++; break;
    case ')': if (state.openParens > 0) { inputChar(')'); state.openParens--; } break;
    case 'Enter':
    case '=': evaluate(); e.preventDefault(); return;
    case 'Backspace': backspace(); break;
    case 'Escape': clearAll(); break;
    case 'p': inputConstant('π', String(Math.PI)); break;
    default: return;
  }
  updateDisplay();
  e.preventDefault();
});

// ==================== 主题切换 ====================
document.querySelectorAll('.theme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.documentElement.setAttribute('data-theme', btn.dataset.theme);
    document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    // 重绘绘图
    if (currentPlotFn) drawPlot(currentPlotFn);
  });
});

// ==================== 函数绘图 ====================
let currentPlotFn = null;
let plotState = { cx: 0, cy: 0, scaleX: 40, scaleY: 40, dragging: false, lastX: 0, lastY: 0 };

function parsePlotExpression(exprStr) {
  // 简化处理: 用户输入如 x^2, sin(x), x^3-3*x+1 等
  // 转为可执行的 JS 函数
  let s = exprStr.trim();
  if (!s) return null;

  // 去掉 y= 前缀
  s = s.replace(/^y\s*=\s*/i, '');
  // 替换 ^ 为 **
  s = s.replace(/\^/g, '**');
  // 替换数学函数为 Math.xxx
  const fns = ['sin','cos','tan','asin','acos','atan','log','ln','sqrt','cbrt','abs','floor','ceil','exp'];
  fns.forEach(fn => {
    const replacement = fn === 'ln' ? 'Math.log' : `Math.${fn}`;
    s = s.replace(new RegExp('\\b' + fn + '\\b', 'g'), replacement);
  });
  // 替换常量
  s = s.replace(/\bpi\b/gi, String(Math.PI));
  s = s.replace(/\be\b/g, String(Math.E));
  // 隐式乘法
  s = s.replace(/(\d)(x)/g, '$1*$2');
  s = s.replace(/(\d)(Math)/g, '$1*$2');
  s = s.replace(/(x)(Math)/g, '$1*$2');
  s = s.replace(/(x)\(/g, '$1*(');
  s = s.replace(/\)([\dx])/g, ')*$1');
  s = s.replace(/\)\(/g, ')*(');

  try {
    return new Function('x', 'return ' + s);
  } catch (e) {
    return null;
  }
}

function drawPlot(fn) {
  const canvas = $plotCanvas;
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + 'px';
  canvas.style.height = rect.height + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W = rect.width;
  const H = rect.height;
  const { cx, cy, scaleX, scaleY } = plotState;

  // 获取CSS变量中的颜色
  const cs = getComputedStyle(document.documentElement);
  const bgColor = cs.getPropertyValue('--canvas-bg').trim() || '#0f3460';
  const gridColor = cs.getPropertyValue('--grid-color').trim() || 'rgba(233,69,96,0.15)';
  const plotColor = cs.getPropertyValue('--plot-color').trim() || '#e94560';
  const textColor = cs.getPropertyValue('--text-secondary').trim() || '#a0a0b0';

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  // 数学坐标 → 像素
  const toScreenX = (mx) => W / 2 + (mx - cx) * scaleX;
  const toScreenY = (my) => H / 2 - (my - cy) * scaleY;
  const toMathX = (sx) => cx + (sx - W / 2) / scaleX;
  const toMathY = (sy) => cy - (sy - H / 2) / scaleY;

  // 网格线
  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 0.5;

  // 计算合适的网格间距
  const minPixelGap = 50;
  const rawStepX = minPixelGap / scaleX;
  const rawStepY = minPixelGap / scaleY;
  const stepX = niceStep(rawStepX);
  const stepY = niceStep(rawStepY);

  const mathLeft = toMathX(0);
  const mathRight = toMathX(W);
  const mathTop = toMathY(0);
  const mathBottom = toMathY(H);

  // 垂直网格线
  let gx = Math.floor(mathLeft / stepX) * stepX;
  while (gx <= mathRight) {
    const sx = toScreenX(gx);
    ctx.beginPath();
    ctx.moveTo(sx, 0);
    ctx.lineTo(sx, H);
    ctx.stroke();
    gx += stepX;
  }

  // 水平网格线
  let gy = Math.floor(mathBottom / stepY) * stepY;
  while (gy <= mathTop) {
    const sy = toScreenY(gy);
    ctx.beginPath();
    ctx.moveTo(0, sy);
    ctx.lineTo(W, sy);
    ctx.stroke();
    gy += stepY;
  }

  // 坐标轴
  ctx.strokeStyle = textColor;
  ctx.lineWidth = 1;

  // X 轴
  const yAxisScreen = toScreenY(0);
  if (yAxisScreen >= 0 && yAxisScreen <= H) {
    ctx.beginPath();
    ctx.moveTo(0, yAxisScreen);
    ctx.lineTo(W, yAxisScreen);
    ctx.stroke();
  }

  // Y 轴
  const xAxisScreen = toScreenX(0);
  if (xAxisScreen >= 0 && xAxisScreen <= W) {
    ctx.beginPath();
    ctx.moveTo(xAxisScreen, 0);
    ctx.lineTo(xAxisScreen, H);
    ctx.stroke();
  }

  // 刻度标签
  ctx.fillStyle = textColor;
  ctx.font = '11px system-ui';
  ctx.textAlign = 'center';

  gx = Math.floor(mathLeft / stepX) * stepX;
  while (gx <= mathRight) {
    if (Math.abs(gx) > stepX * 0.01) {
      const sx = toScreenX(gx);
      const labelY = Math.min(Math.max(yAxisScreen + 14, 14), H - 4);
      ctx.fillText(formatTick(gx), sx, labelY);
    }
    gx += stepX;
  }

  ctx.textAlign = 'right';
  gy = Math.floor(mathBottom / stepY) * stepY;
  while (gy <= mathTop) {
    if (Math.abs(gy) > stepY * 0.01) {
      const sy = toScreenY(gy);
      const labelX = Math.min(Math.max(xAxisScreen - 6, 30), W - 4);
      ctx.fillText(formatTick(gy), labelX, sy + 4);
    }
    gy += stepY;
  }

  // 原点标签
  if (xAxisScreen >= 0 && xAxisScreen <= W && yAxisScreen >= 0 && yAxisScreen <= H) {
    ctx.textAlign = 'right';
    ctx.fillText('0', xAxisScreen - 6, yAxisScreen + 14);
  }

  // 绘制函数
  ctx.strokeStyle = plotColor;
  ctx.lineWidth = 2;
  ctx.beginPath();
  let started = false;

  for (let px = 0; px < W; px++) {
    const mx = toMathX(px + 0.5);
    try {
      const my = fn(mx);
      if (!isFinite(my)) { started = false; continue; }
      const sy = toScreenY(my);
      if (sy < -2000 || sy > H + 2000) { started = false; continue; }
      if (!started) {
        ctx.moveTo(px + 0.5, sy);
        started = true;
      } else {
        ctx.lineTo(px + 0.5, sy);
      }
    } catch {
      started = false;
    }
  }
  ctx.stroke();
}

function niceStep(raw) {
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const norm = raw / pow;
  let nice;
  if (norm <= 1) nice = 1;
  else if (norm <= 2) nice = 2;
  else if (norm <= 5) nice = 5;
  else nice = 10;
  return nice * pow;
}

function formatTick(v) {
  if (Number.isInteger(v)) return String(v);
  const s = parseFloat(v.toPrecision(6));
  return String(s);
}

// 绘图按钮
$plotBtn.addEventListener('click', () => {
  const fn = parsePlotExpression($plotInput.value);
  if (!fn) {
    $plotInput.style.borderColor = '#ff6b6b';
    setTimeout(() => $plotInput.style.borderColor = '', 1500);
    return;
  }
  currentPlotFn = fn;
  plotState = { cx: 0, cy: 0, scaleX: 40, scaleY: 40 };
  drawPlot(fn);
});

$plotInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') $plotBtn.click();
});

// 画布拖拽 & 缩放
$plotCanvas.addEventListener('mousedown', (e) => {
  plotState.dragging = true;
  plotState.lastX = e.clientX;
  plotState.lastY = e.clientY;
});
window.addEventListener('mousemove', (e) => {
  if (!plotState.dragging) return;
  const dx = e.clientX - plotState.lastX;
  const dy = e.clientY - plotState.lastY;
  plotState.cx -= dx / plotState.scaleX;
  plotState.cy += dy / plotState.scaleY;
  plotState.lastX = e.clientX;
  plotState.lastY = e.clientY;
  if (currentPlotFn) drawPlot(currentPlotFn);
});
window.addEventListener('mouseup', () => { plotState.dragging = false; });

$plotCanvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  plotState.scaleX *= factor;
  plotState.scaleY *= factor;
  plotState.scaleX = Math.max(2, Math.min(500, plotState.scaleX));
  plotState.scaleY = Math.max(2, Math.min(500, plotState.scaleY));
  if (currentPlotFn) drawPlot(currentPlotFn);
}, { passive: false });

// 触摸支持
$plotCanvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    plotState.dragging = true;
    plotState.lastX = e.touches[0].clientX;
    plotState.lastY = e.touches[0].clientY;
  }
}, { passive: true });
$plotCanvas.addEventListener('touchmove', (e) => {
  if (!plotState.dragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - plotState.lastX;
  const dy = e.touches[0].clientY - plotState.lastY;
  plotState.cx -= dx / plotState.scaleX;
  plotState.cy += dy / plotState.scaleY;
  plotState.lastX = e.touches[0].clientX;
  plotState.lastY = e.touches[0].clientY;
  if (currentPlotFn) drawPlot(currentPlotFn);
}, { passive: true });
$plotCanvas.addEventListener('touchend', () => { plotState.dragging = false; });

// 窗口大小变化时重绘
window.addEventListener('resize', () => {
  if (currentPlotFn) drawPlot(currentPlotFn);
});

// 初始化
updateDisplay();
</script>
