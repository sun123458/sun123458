<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微信聊天</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #ededed;
            height: 100vh;
            overflow: hidden;
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 640px;
            margin: 0 auto;
            background-color: #ededed;
            position: relative;
        }

        /* 顶部导航栏 */
        .header {
            background-color: #ededed;
            border-bottom: 1px solid #dcdcdc;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: relative;
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
        }

        .back-btn {
            font-size: 20px;
            margin-right: 12px;
            cursor: pointer;
        }

        .header-title {
            font-size: 17px;
            font-weight: 500;
            color: #000;
        }

        .header-right {
            font-size: 18px;
        }

        /* 消息列表区域 */
        .message-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }

        .message-list::-webkit-scrollbar {
            width: 4px;
        }

        .message-list::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 2px;
        }

        /* 时间戳 */
        .timestamp {
            text-align: center;
            margin: 12px 0;
        }

        .timestamp-text {
            background-color: rgba(0, 0, 0, 0.1);
            color: #fff;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 12px;
            display: inline-block;
        }

        /* 消息气泡 */
        .message {
            display: flex;
            margin-bottom: 16px;
            align-items: flex-start;
        }

        .message.other {
            flex-direction: row;
        }

        .message.self {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 4px;
            flex-shrink: 0;
            background-size: cover;
            background-position: center;
        }

        .message.other .avatar {
            margin-right: 10px;
        }

        .message.self .avatar {
            margin-left: 10px;
        }

        .message-content {
            max-width: 220px;
            padding: 10px 14px;
            border-radius: 4px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            word-wrap: break-word;
        }

        .message.other .message-content {
            background-color: #fff;
            color: #000;
        }

        .message.self .message-content {
            background-color: #95ec69;
            color: #000;
        }

        /* 输入区域 */
        .input-area {
            background-color: #f7f7f7;
            border-top: 1px solid #dcdcdc;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            z-index: 10;
        }

        .input-icons {
            display: flex;
            gap: 12px;
            font-size: 26px;
        }

        .icon-btn {
            cursor: pointer;
            user-select: none;
        }

        .input-wrapper {
            flex: 1;
            background-color: #fff;
            border-radius: 4px;
            padding: 8px 10px;
            min-height: 36px;
            display: flex;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            border: none;
            outline: none;
            font-size: 15px;
            background: transparent;
            resize: none;
            max-height: 100px;
            font-family: inherit;
            line-height: 1.5;
        }

        .send-btn {
            background-color: #ededed;
            color: #07c160;
            border: none;
            padding: 8px 14px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: #d9d9d9;
        }

        .send-btn.active {
            background-color: #07c160;
            color: #fff;
        }

        .emoji-btn {
            cursor: pointer;
            font-size: 24px;
        }

        @media (max-width: 480px) {
            .message-content {
                max-width: 65%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- 顶部导航 -->
        <div class="header">
            <div class="header-left">
                <span class="back-btn">‹</span>
                <span class="header-title">张三</span>
            </div>
            <div class="header-right">
                <span>⋯</span>
            </div>
        </div>

        <!-- 消息列表 -->
        <div class="message-list" id="messageList">
            <div class="timestamp">
                <span class="timestamp-text">昨天 12:30</span>
            </div>

            <div class="message other">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=other')"></div>
                <div class="message-content">你好！最近怎么样？</div>
            </div>

            <div class="timestamp">
                <span class="timestamp-text">今天 09:15</span>
            </div>

            <div class="message self">
                <div class="message-content">挺好的，谢谢关心！你呢？</div>
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=self')"></div>
            </div>

            <div class="message other">
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=other')"></div>
                <div class="message-content">我也不错，周末有空吗？想约你出来聊聊</div>
            </div>

            <div class="message self">
                <div class="message-content">好啊，周末什么时候都可以</div>
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=self')"></div>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-icons">
                <span class="icon-btn">🔊</span>
                <span class="icon-btn">📎</span>
            </div>
            <div class="input-wrapper">
                <textarea id="messageInput" placeholder="" rows="1"></textarea>
            </div>
            <span class="emoji-btn">😊</span>
            <button class="send-btn" id="sendBtn">发送</button>
        </div>
    </div>

    <script>
        const messageList = document.getElementById('messageList');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // 自动滚动到底部
        function scrollToBottom() {
            messageList.scrollTop = messageList.scrollHeight;
        }

        // 初始化滚动到底部
        scrollToBottom();

        // 监听输入框，自动发送按钮状态
        messageInput.addEventListener('input', function() {
            if (this.value.trim()) {
                sendBtn.classList.add('active');
            } else {
                sendBtn.classList.remove('active');
            }

            // 自动调整高度
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 100) + 'px';
        });

        // 监听回车发送
        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 发送消息函数
        function sendMessage() {
            const content = messageInput.value.trim();
            if (!content) return;

            // 创建消息 elements
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message self';

            const avatarTime = new Date().toLocaleString('zh-CN', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            messageDiv.innerHTML = `
                <div class="message-content">${escapeHtml(content)}</div>
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=self')"></div>
            `;

            messageList.appendChild(messageDiv);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.classList.remove('active');

            scrollToBottom();

            // 模拟对方回复（可选）
            // setTimeout(() => {
            //     receiveReply();
            // }, 1000 + Math.random() * 2000);
        }

        // 接收回复（模拟）
        function receiveReply() {
            const replies = [
                '好的，收到！',
                '明白了',
                '嗯嗯',
                '👌',
                '我知道了',
                '没问题！'
            ];

            const replyContent = replies[Math.floor(Math.random() * replies.length)];

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message other';

            messageDiv.innerHTML = `
                <div class="avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=other')"></div>
                <div class="message-content">${replyContent}</div>
            `;

            messageList.appendChild(messageDiv);
            scrollToBottom();
        }

        // HTML转义防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 发送按钮点击事件
        sendBtn.addEventListener('click', sendMessage);

        // emoji按钮事件（简单示例）
        document.querySelector('.emoji-btn').addEventListener('click', function() {
            const emojis = ['😊', '😂', '😍', '👍', '🎉', '🤔', '😭', '😡'];
            const randomEmoji = emojis[Math.floor(Math.random() * emojis.length)];
            messageInput.value += randomEmoji;
            messageInput.dispatchEvent(new Event('input'));
            messageInput.focus();
        });
    </script>
</body>
</html>
