<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>简易地图 - Leaflet</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }

    #map { width: 100%; height: 100%; }

    /* 底图切换面板 */
    .basemap-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.18);
      padding: 10px 12px;
    }
    .basemap-panel label {
      display: block;
      font-size: 13px;
      padding: 5px 0;
      cursor: pointer;
      color: #333;
    }
    .basemap-panel label:hover { color: #1a73e8; }
    .basemap-panel input[type="radio"] { margin-right: 6px; }
    .basemap-panel .panel-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }

    /* 定位按钮 */
    .locate-btn {
      position: absolute;
      bottom: 28px;
      right: 12px;
      z-index: 1000;
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.22);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: background .2s;
    }
    .locate-btn:hover { background: #f0f0f0; }
    .locate-btn.locating { background: #e3f0ff; }

    /* 自定义弹窗 */
    .leaflet-popup-content-wrapper {
      border-radius: 10px;
      box-shadow: 0 3px 14px rgba(0,0,0,.2);
    }
    .popup-card { min-width: 200px; }
    .popup-card h3 {
      font-size: 15px;
      margin-bottom: 6px;
      color: #1a73e8;
    }
    .popup-card p {
      font-size: 13px;
      color: #555;
      line-height: 1.6;
    }
    .popup-card .tag {
      display: inline-block;
      margin-top: 6px;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 4px;
      background: #e8f0fe;
      color: #1a73e8;
    }
  </style>
</head>
<body>

<div id="map"></div>

<!-- 底图切换 -->
<div class="basemap-panel">
  <div class="panel-title">底图样式</div>
  <label><input type="radio" name="basemap" value="standard" checked /> 标准地图</label>
  <label><input type="radio" name="basemap" value="satellite" /> 卫星影像</label>
  <label><input type="radio" name="basemap" value="topo" /> 地形地图</label>
  <label><input type="radio" name="basemap" value="dark" /> 暗色地图</label>
</div>

<!-- 定位按钮 -->
<button class="locate-btn" id="locateBtn" title="定位到当前位置">&#x1F4CD;</button>

<script>
  // ========== 示例标记数据 ==========
  const places = [
    { lat: 39.9042, lng: 116.4074, name: "天安门广场", desc: "中国北京的标志性景点，世界上最大的城市广场之一。", tag: "地标" },
    { lat: 31.2397, lng: 121.4998, name: "东方明珠", desc: "上海标志性建筑，高468米，集观光、餐饮、娱乐于一体。", tag: "景点" },
    { lat: 30.2741, lng: 120.1551, name: "西湖", desc: "杭州著名风景名胜，2011年列入世界文化遗产名录。", tag: "自然" },
    { lat: 22.5431, lng: 114.0579, name: "深圳市民中心", desc: "深圳市政府所在地，建筑造型如大鹏展翅。", tag: "建筑" },
    { lat: 23.1291, lng: 113.2644, name: "广州塔", desc: "昵称"小蛮腰"，总高度600米，是中国第一高塔。", tag: "建筑" },
    { lat: 29.5630, lng: 106.5516, name: "洪崖洞", desc: "重庆热门景点，巴渝传统吊脚楼建筑群，夜景尤为壮观。", tag: "景点" },
    { lat: 34.2279, lng: 108.9425, name: "大雁塔", desc: "西安著名古建筑，始建于唐代，为玄奘藏经而建。", tag: "古迹" },
    { lat: 25.2900, lng: 110.2860, name: "漓江", desc: "桂林山水甲天下，漓江是其精华所在，两岸喀斯特地貌闻名于世。", tag: "自然" },
  ];

  // ========== 底图配置 ==========
  const basemaps = {
    standard: {
      url: "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      attr: '&copy; <a href="https://openstreetmap.org">OpenStreetMap</a>'
    },
    satellite: {
      url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      attr: '&copy; <a href="https://www.esri.com">Esri</a>'
    },
    topo: {
      url: "https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png",
      attr: '&copy; <a href="https://opentopomap.org">OpenTopoMap</a>'
    },
    dark: {
      url: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
      attr: '&copy; <a href="https://carto.com">CARTO</a>'
    }
  };

  // ========== 初始化地图 ==========
  const map = L.map("map", {
    center: [35.86, 104.19],
    zoom: 5,
    zoomControl: true
  });

  let currentLayer = L.tileLayer(basemaps.standard.url, {
    attribution: basemaps.standard.attr,
    maxZoom: 18
  }).addTo(map);

  // ========== 底图切换 ==========
  document.querySelectorAll("input[name='basemap']").forEach(radio => {
    radio.addEventListener("change", (e) => {
      const key = e.target.value;
      map.removeLayer(currentLayer);
      currentLayer = L.tileLayer(basemaps[key].url, {
        attribution: basemaps[key].attr,
        maxZoom: 18
      }).addTo(map);
    });
  });

  // ========== 添加标记与弹窗 ==========
  const customIcon = L.divIcon({
    className: "",
    html: `<svg width="30" height="40" viewBox="0 0 30 40">
             <path d="M15 0C6.7 0 0 6.7 0 15c0 11.3 15 25 15 25s15-13.7 15-25C30 6.7 23.3 0 15 0z" fill="#1a73e8"/>
             <circle cx="15" cy="14" r="6" fill="#fff"/>
           </svg>`,
    iconSize: [30, 40],
    iconAnchor: [15, 40],
    popupAnchor: [0, -42]
  });

  places.forEach(p => {
    L.marker([p.lat, p.lng], { icon: customIcon })
      .addTo(map)
      .bindPopup(`
        <div class="popup-card">
          <h3>${p.name}</h3>
          <p>${p.desc}</p>
          <span class="tag">${p.tag}</span>
        </div>
      `, { maxWidth: 280 });
  });

  // ========== 定位功能 ==========
  let locMarker = null;

  document.getElementById("locateBtn").addEventListener("click", () => {
    const btn = document.getElementById("locateBtn");
    if (!navigator.geolocation) {
      alert("您的浏览器不支持定位功能");
      return;
    }
    btn.classList.add("locating");
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const { latitude, longitude } = pos.coords;
        map.flyTo([latitude, longitude], 14, { duration: 1.5 });

        if (locMarker) map.removeLayer(locMarker);
        locMarker = L.circleMarker([latitude, longitude], {
          radius: 10,
          fillColor: "#4285f4",
          fillOpacity: 0.9,
          color: "#fff",
          weight: 3
        }).addTo(map).bindPopup(`
          <div class="popup-card">
            <h3>我的位置</h3>
            <p>纬度: ${latitude.toFixed(5)}<br>经度: ${longitude.toFixed(5)}</p>
          </div>
        `).openPopup();

        btn.classList.remove("locating");
      },
      (err) => {
        alert("定位失败: " + err.message);
        btn.classList.remove("locating");
      },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  });
</script>
</body>
</html>
