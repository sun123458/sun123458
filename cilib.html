<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>磁力连线粒子背景</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    overflow: hidden;
    background: #0a0e17;
    cursor: none;
  }
  canvas {
    display: block;
  }
  /* 自定义光标 */
  #cursor-ring {
    position: fixed;
    width: 40px;
    height: 40px;
    border: 2px solid rgba(100, 200, 255, 0.5);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: width 0.2s, height 0.2s, border-color 0.2s;
    z-index: 10;
  }
  #cursor-dot {
    position: fixed;
    width: 6px;
    height: 6px;
    background: rgba(100, 200, 255, 0.9);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 10;
  }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="cursor-ring"></div>
<div id="cursor-dot"></div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const cursorRing = document.getElementById('cursor-ring');
const cursorDot = document.getElementById('cursor-dot');

let W, H;
let mouse = { x: -9999, y: -9999 };
let particles = [];

// ── 配置参数 ──
const CONFIG = {
  count: 160,                // 粒子数量
  maxSpeed: 0.6,             // 最大速度
  linkDistance: 150,          // 连线最大距离
  mouseRepelRadius: 180,     // 鼠标排斥半径
  mouseRepelForce: 8,        // 排斥力强度
  particleMinR: 1.2,         // 粒子最小半径
  particleMaxR: 3,           // 粒子最大半径
  colors: [
    [100, 200, 255],         // 蓝色
    [130, 230, 200],         // 青绿
    [180, 160, 255],         // 淡紫
    [255, 200, 120],         // 暖黄
  ],
};

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

// ── 粒子类 ──
class Particle {
  constructor() {
    this.reset();
  }

  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * CONFIG.maxSpeed * 2;
    this.vy = (Math.random() - 0.5) * CONFIG.maxSpeed * 2;
    this.baseR = CONFIG.particleMinR + Math.random() * (CONFIG.particleMaxR - CONFIG.particleMinR);
    this.r = this.baseR;
    const c = CONFIG.colors[Math.floor(Math.random() * CONFIG.colors.length)];
    this.color = c;
    this.alpha = 0.4 + Math.random() * 0.5;
    // 呼吸效果参数
    this.breathPhase = Math.random() * Math.PI * 2;
    this.breathSpeed = 0.005 + Math.random() * 0.01;
  }

  update() {
    // 呼吸效果
    this.breathPhase += this.breathSpeed;
    const breathScale = 1 + Math.sin(this.breathPhase) * 0.15;
    this.r = this.baseR * breathScale;

    // 鼠标排斥
    const dx = this.x - mouse.x;
    const dy = this.y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if (dist < CONFIG.mouseRepelRadius && dist > 0) {
      const force = (1 - dist / CONFIG.mouseRepelRadius) * CONFIG.mouseRepelForce;
      const angle = Math.atan2(dy, dx);
      this.vx += Math.cos(angle) * force * 0.1;
      this.vy += Math.sin(angle) * force * 0.1;
    }

    // 速度阻尼
    this.vx *= 0.99;
    this.vy *= 0.99;

    // 限速
    const speed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
    if (speed > CONFIG.maxSpeed * 3) {
      this.vx = (this.vx / speed) * CONFIG.maxSpeed * 3;
      this.vy = (this.vy / speed) * CONFIG.maxSpeed * 3;
    }

    this.x += this.vx;
    this.y += this.vy;

    // 边界环绕
    if (this.x < -50) this.x = W + 50;
    if (this.x > W + 50) this.x = -50;
    if (this.y < -50) this.y = H + 50;
    if (this.y > H + 50) this.y = -50;
  }

  draw() {
    // 发光层
    const glowR = this.r * 4;
    const glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    glow.addColorStop(0, `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${this.alpha * 0.3})`);
    glow.addColorStop(1, `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, 0)`);
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI * 2);
    ctx.fillStyle = glow;
    ctx.fill();

    // 核心粒子
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${this.color[0]}, ${this.color[1]}, ${this.color[2]}, ${this.alpha})`;
    ctx.fill();
  }
}

// ── 初始化 ──
function init() {
  resize();
  particles = [];
  const count = Math.min(CONFIG.count, Math.floor((W * H) / 8000));
  for (let i = 0; i < count; i++) {
    particles.push(new Particle());
  }
}

// ── 绘制连线 ──
function drawLinks() {
  const ld = CONFIG.linkDistance;
  const ldSq = ld * ld;

  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const distSq = dx * dx + dy * dy;

      if (distSq < ldSq) {
        const dist = Math.sqrt(distSq);
        const t = 1 - dist / ld; // 0 ~ 1，越近越大

        // 混合两个粒子的颜色
        const c1 = particles[i].color;
        const c2 = particles[j].color;
        const r = Math.round((c1[0] + c2[0]) / 2);
        const g = Math.round((c1[1] + c2[1]) / 2);
        const b = Math.round((c1[2] + c2[2]) / 2);

        const alpha = t * 0.6;
        const lineWidth = t * 2.2;

        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
        ctx.lineWidth = lineWidth;
        ctx.stroke();
      }
    }
  }
}

// ── 鼠标与粒子的连线 ──
function drawMouseLinks() {
  const mld = CONFIG.mouseRepelRadius;

  for (let i = 0; i < particles.length; i++) {
    const dx = particles[i].x - mouse.x;
    const dy = particles[i].y - mouse.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < mld && dist > 0) {
      const t = 1 - dist / mld;
      const c = particles[i].color;
      ctx.beginPath();
      ctx.moveTo(mouse.x, mouse.y);
      ctx.lineTo(particles[i].x, particles[i].y);
      ctx.strokeStyle = `rgba(${c[0]}, ${c[1]}, ${c[2]}, ${t * 0.35})`;
      ctx.lineWidth = t * 1.5;
      ctx.stroke();
    }
  }
}

// ── 鼠标排斥力场可视化 ──
function drawMouseField() {
  if (mouse.x < 0 || mouse.y < 0) return;
  const r = CONFIG.mouseRepelRadius;
  const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, r);
  grad.addColorStop(0, 'rgba(100, 200, 255, 0.04)');
  grad.addColorStop(0.7, 'rgba(100, 200, 255, 0.015)');
  grad.addColorStop(1, 'rgba(100, 200, 255, 0)');
  ctx.beginPath();
  ctx.arc(mouse.x, mouse.y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();
}

// ── 主循环 ──
function animate() {
  ctx.clearRect(0, 0, W, H);

  // 背景微弱渐变
  const bg = ctx.createRadialGradient(W / 2, H / 2, 0, W / 2, H / 2, Math.max(W, H) * 0.7);
  bg.addColorStop(0, '#0f1626');
  bg.addColorStop(1, '#070a12');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  drawMouseField();
  drawLinks();
  drawMouseLinks();

  for (const p of particles) {
    p.update();
    p.draw();
  }

  requestAnimationFrame(animate);
}

// ── 事件监听 ──
window.addEventListener('resize', () => {
  resize();
});

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursorRing.style.left = e.clientX + 'px';
  cursorRing.style.top = e.clientY + 'px';
  cursorDot.style.left = e.clientX + 'px';
  cursorDot.style.top = e.clientY + 'px';
});

window.addEventListener('mouseleave', () => {
  mouse.x = -9999;
  mouse.y = -9999;
});

// 触摸支持
window.addEventListener('touchmove', (e) => {
  e.preventDefault();
  mouse.x = e.touches[0].clientX;
  mouse.y = e.touches[0].clientY;
}, { passive: false });

window.addEventListener('touchend', () => {
  mouse.x = -9999;
  mouse.y = -9999;
});

// 启动
init();
animate();
</script>
</body>
</html>
