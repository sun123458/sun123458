<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>捕虫大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #gameContainer {
            position: relative;
            border: 4px solid #1a1a2e;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #gameCanvas {
            display: block;
            background: #7ec850;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 2px 2px 0 #000;
            font-size: 18px;
        }

        #bugCounter {
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 5px;
            border: 2px solid #f39c12;
        }

        #instructions {
            margin-top: 20px;
            color: #ecf0f1;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
        }

        #instructions h3 {
            color: #f39c12;
            margin-bottom: 10px;
        }

        .key {
            display: inline-block;
            background: #34495e;
            padding: 3px 8px;
            border-radius: 3px;
            margin: 2px;
            border: 1px solid #7f8c8d;
        }

        #dialogBox {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 3px solid #f39c12;
            border-radius: 10px;
            padding: 15px 20px;
            color: white;
            min-width: 400px;
            display: none;
            z-index: 100;
        }

        #dialogBox.show {
            display: block;
        }

        #dialogName {
            color: #f39c12;
            font-weight: bold;
            margin-bottom: 5px;
        }

        #dialogText {
            line-height: 1.5;
        }

        #dialogHint {
            color: #95a5a6;
            font-size: 12px;
            margin-top: 10px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div id="bugCounter">🐛 捕虫数量: <span id="bugCount">0</span></div>
        </div>
        <div id="dialogBox">
            <div id="dialogName">NPC 名称</div>
            <div id="dialogText">对话内容</div>
            <div id="dialogHint">按 E 关闭</div>
        </div>
    </div>

    <div id="instructions">
        <h3>🎮 游戏操作</h3>
        <p><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> 或 <span class="key">↑</span><span class="key">←</span><span class="key">↓</span><span class="key">→</span> 移动角色</p>
        <p><span class="key">E</span> 与 NPC 对话</p>
        <p><span class="key">Space</span> 使用捕虫网捕捉虫子</p>
    </div>

    <script src="game.js"></script>
</body>
</html>
