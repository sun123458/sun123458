<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态彩虹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
        }

        canvas {
            display: block;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .controls button {
            padding: 10px 20px;
            font-size: 14px;
            border: none;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }

        .controls button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="rainbowCanvas"></canvas>

    <div class="controls">
        <button onclick="toggleAnimation()">播放/暂停</button>
        <button onclick="changeStyle()">切换样式</button>
        <button onclick="toggleRaindrops()">雨滴</button>
    </div>

    <script>
        const canvas = document.getElementById('rainbowCanvas');
        const ctx = canvas.getContext('2d');

        let isAnimating = true;
        let currentStyle = 0;
        let showRaindrops = false;
        let animationFrame;
        let time = 0;

        // 彩虹颜色
        const rainbowColors = [
            { color: '#FF0000', name: '红' },
            { color: '#FF7F00', name: '橙' },
            { color: '#FFFF00', name: '黄' },
            { color: '#00FF00', name: '绿' },
            { color: '#00FFFF', name: '青' },
            { color: '#0000FF', name: '蓝' },
            { color: '#8B00FF', name: '紫' }
        ];

        // 雨滴数组
        let raindrops = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initRaindrops() {
            raindrops = [];
            for (let i = 0; i < 100; i++) {
                raindrops.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 3 + 2,
                    length: Math.random() * 20 + 10
                });
            }
        }

        function drawRainbow(style) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height - 100;
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.8;
            const bandWidth = maxRadius / 15;

            // 添加光晕效果
            ctx.save();
            ctx.globalCompositeOperation = 'screen';

            rainbowColors.forEach((band, index) => {
                const outerRadius = maxRadius - (index * bandWidth);
                const innerRadius = outerRadius - bandWidth + 5;

                // 动态透明度
                const alpha = 0.6 + Math.sin(time * 0.02 + index * 0.5) * 0.3;

                ctx.beginPath();
                ctx.arc(centerX, centerY, outerRadius, Math.PI, 0, false);
                ctx.arc(centerX, centerY, innerRadius, 0, Math.PI, true);
                ctx.closePath();

                // 创建渐变
                const gradient = ctx.createRadialGradient(
                    centerX, centerY, innerRadius,
                    centerX, centerY, outerRadius
                );

                switch(style) {
                    case 0: // 默认样式
                        gradient.addColorStop(0, band.color + '00');
                        gradient.addColorStop(0.5, band.color + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
                        gradient.addColorStop(1, band.color + Math.floor(alpha * 200).toString(16).padStart(2, '0'));
                        break;
                    case 1: // 发光样式
                        gradient.addColorStop(0, band.color + '00');
                        gradient.addColorStop(0.3, band.color + '40');
                        gradient.addColorStop(0.7, band.color + 'FF');
                        gradient.addColorStop(1, band.color + '80');
                        break;
                    case 2: // 渐变混合样式
                        const nextColor = rainbowColors[(index + 1) % rainbowColors.length].color;
                        gradient.addColorStop(0, band.color + '00');
                        gradient.addColorStop(0.5, band.color + 'CC');
                        gradient.addColorStop(1, nextColor + '66');
                        break;
                }

                ctx.fillStyle = gradient;
                ctx.fill();

                // 添加光晕边缘
                ctx.strokeStyle = band.color + '33';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            ctx.restore();
        }

        function drawParticles() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height - 100;
            const maxRadius = Math.min(canvas.width, canvas.height) * 0.8;

            ctx.save();

            for (let i = 0; i < 50; i++) {
                const angle = Math.PI + (Math.random() * Math.PI);
                const radius = maxRadius + Math.random() * 50 - 25;
                const x = centerX + Math.cos(angle) * radius;
                const y = centerY + Math.sin(angle) * radius;
                const size = Math.random() * 3 + 1;
                const colorIndex = Math.floor(Math.random() * rainbowColors.length);

                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fillStyle = rainbowColors[colorIndex].color + 'AA';
                ctx.fill();
            }

            ctx.restore();
        }

        function drawRaindrops() {
            if (!showRaindrops) return;

            ctx.save();
            ctx.strokeStyle = 'rgba(174, 194, 224, 0.6)';
            ctx.lineWidth = 2;

            raindrops.forEach(drop => {
                ctx.beginPath();
                ctx.moveTo(drop.x, drop.y);
                ctx.lineTo(drop.x, drop.y + drop.length);
                ctx.stroke();

                drop.y += drop.speed;

                if (drop.y > canvas.height) {
                    drop.y = -drop.length;
                    drop.x = Math.random() * canvas.width;
                }
            });

            ctx.restore();
        }

        function drawStars() {
            ctx.save();

            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height * 0.7;
                const radius = Math.random() * 1.5;
                const twinkle = Math.sin(time * 0.05 + i) * 0.5 + 0.5;

                ctx.beginPath();
                ctx.arc(x, y, radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${twinkle * 0.8})`;
                ctx.fill();
            }

            ctx.restore();
        }

        function animate() {
            // 清除画布
            ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制星星背景
            if (Math.random() < 0.05) {
                drawStars();
            }

            // 绘制彩虹
            drawRainbow(currentStyle);

            // 绘制粒子效果
            drawParticles();

            // 绘制雨滴
            drawRaindrops();

            time++;

            if (isAnimating) {
                animationFrame = requestAnimationFrame(animate);
            }
        }

        function toggleAnimation() {
            isAnimating = !isAnimating;
            if (isAnimating) {
                animate();
            } else {
                cancelAnimationFrame(animationFrame);
            }
        }

        function changeStyle() {
            currentStyle = (currentStyle + 1) % 3;
        }

        function toggleRaindrops() {
            showRaindrops = !showRaindrops;
            if (showRaindrops && raindrops.length === 0) {
                initRaindrops();
            }
        }

        // 初始化
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        initRaindrops();
        animate();
    </script>
</body>
</html>
