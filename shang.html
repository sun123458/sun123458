<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品详情</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 750px;
            margin: 0 auto;
            background: #fff;
            min-height: 100vh;
            padding-bottom: 80px;
        }

        .carousel {
            position: relative;
            width: 100%;
            height: 375px;
            overflow: hidden;
            background: #f0f0f0;
        }

        .carousel-wrapper {
            display: flex;
            transition: transform 0.3s ease;
            height: 100%;
        }

        .carousel-item {
            min-width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #ccc;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .carousel-item:nth-child(2) {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .carousel-item:nth-child(3) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .carousel-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
        }

        .carousel-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: all 0.3s;
        }

        .carousel-dot.active {
            background: #fff;
            width: 20px;
            border-radius: 4px;
        }

        .product-info {
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        .product-price {
            color: #ff4d4f;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .product-price .original {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
            margin-left: 8px;
            font-weight: normal;
        }

        .product-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .product-desc {
            font-size: 14px;
            color: #666;
        }

        .section {
            padding: 16px;
            border-bottom: 1px solid #eee;
        }

        .section-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }

        .spec-group {
            margin-bottom: 16px;
        }

        .spec-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        .spec-options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .spec-option {
            padding: 8px 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            background: #fff;
            min-width: 60px;
            text-align: center;
        }

        .spec-option:hover {
            border-color: #ff4d4f;
        }

        .spec-option.selected {
            border-color: #ff4d4f;
            background: #fff0f0;
            color: #ff4d4f;
        }

        .spec-option.disabled {
            color: #ccc;
            border-color: #eee;
            cursor: not-allowed;
        }

        .quantity-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            border: 1px solid #ddd;
            border-radius: 4px;
            overflow: hidden;
        }

        .quantity-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            font-size: 18px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .quantity-btn:hover {
            background: #e5e5e5;
        }

        .quantity-btn:disabled {
            color: #ccc;
            cursor: not-allowed;
        }

        .quantity-input {
            width: 50px;
            height: 36px;
            border: none;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            text-align: center;
            font-size: 14px;
            outline: none;
        }

        .summary {
            padding: 16px;
            background: #fafafa;
            border-top: 1px solid #eee;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .summary-row.total {
            font-size: 16px;
            font-weight: bold;
            color: #ff4d4f;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px dashed #ddd;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            border-top: 1px solid #eee;
            padding: 10px 16px;
            display: flex;
            gap: 10px;
            max-width: 750px;
            margin: 0 auto;
            z-index: 100;
        }

        .btn-cart {
            flex: 1;
            height: 44px;
            border: 1px solid #ff4d4f;
            background: #fff;
            color: #ff4d4f;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cart:hover {
            background: #fff0f0;
        }

        .btn-buy {
            flex: 1;
            height: 44px;
            border: none;
            background: linear-gradient(135deg, #ff4d4f 0%, #ff6b6b 100%);
            color: #fff;
            border-radius: 22px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-buy:hover {
            opacity: 0.9;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
        }

        .product-detail {
            padding: 16px;
        }

        .detail-image {
            width: 100%;
            height: 300px;
            background: linear-gradient(135deg, #e0e0e0 0%, #f5f5f5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="carousel">
            <div class="carousel-wrapper" id="carouselWrapper">
                <div class="carousel-item">商品图片 1</div>
                <div class="carousel-item">商品图片 2</div>
                <div class="carousel-item">商品图片 3</div>
            </div>
            <div class="carousel-dots" id="carouselDots"></div>
        </div>

        <div class="product-info">
            <div class="product-price">
                ¥<span id="currentPrice">299</span>
                <span class="original">¥399</span>
            </div>
            <div class="product-title">无线蓝牙耳机 降噪款</div>
            <div class="product-desc">智能降噪、超长续航、舒适佩戴、高清音质</div>
        </div>

        <div class="section">
            <div class="section-title">选择规格</div>
            <div class="spec-group">
                <div class="spec-label">颜色</div>
                <div class="spec-options" id="colorOptions">
                    <div class="spec-option selected" data-value="black" data-price="0">黑色</div>
                    <div class="spec-option" data-value="white" data-price="0">白色</div>
                    <div class="spec-option" data-value="pink" data-price="20">粉色 +¥20</div>
                </div>
            </div>
            <div class="spec-group">
                <div class="spec-label">内存</div>
                <div class="spec-options" id="storageOptions">
                    <div class="spec-option selected" data-value="32gb" data-price="0">32GB</div>
                    <div class="spec-option" data-value="64gb" data-price="100">64GB +¥100</div>
                    <div class="spec-option" data-value="128gb" data-price="200">128GB +¥200</div>
                </div>
            </div>
            <div class="spec-group">
                <div class="spec-label">套餐</div>
                <div class="spec-options" id="packageOptions">
                    <div class="spec-option selected" data-value="standard" data-price="0">标准版</div>
                    <div class="spec-option" data-value="gift" data-price="50">礼盒版 +¥50</div>
                    <div class="spec-option" data-price="80">至尊版 +¥80</div>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">数量</div>
            <div class="quantity-section">
                <div>库存：<span id="stock">168</span> 件</div>
                <div class="quantity-control">
                    <button class="quantity-btn" id="decreaseBtn">−</button>
                    <input type="number" class="quantity-input" id="quantityInput" value="1" min="1" max="99">
                    <button class="quantity-btn" id="increaseBtn">+</button>
                </div>
            </div>
        </div>

        <div class="summary">
            <div class="summary-row">
                <span>商品价格</span>
                <span>¥<span id="itemPrice">299</span></span>
            </div>
            <div class="summary-row">
                <span>规格加价</span>
                <span>¥<span id="specAddPrice">0</span></span>
            </div>
            <div class="summary-row">
                <span>数量</span>
                <span>× <span id="summaryQuantity">1</span></span>
            </div>
            <div class="summary-row total">
                <span>合计</span>
                <span>¥<span id="totalPrice">299</span></span>
            </div>
        </div>

        <div class="product-detail">
            <div class="section-title">商品详情</div>
            <div class="detail-image">详情图片占位</div>
            <div class="detail-image">详情图片占位</div>
            <div class="detail-image">详情图片占位</div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn-cart" id="addCartBtn">加入购物车</button>
        <button class="btn-buy" id="buyBtn">立即购买</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const BASE_PRICE = 299;
        let currentState = {
            quantity: 1,
            color: { value: 'black', addPrice: 0 },
            storage: { value: '32gb', addPrice: 0 },
            package: { value: 'standard', addPrice: 0 }
        };

        const carouselWrapper = document.getElementById('carouselWrapper');
        const carouselDots = document.getElementById('carouselDots');
        const totalImages = 3;
        let currentSlide = 0;
        let autoPlayInterval;

        function initCarousel() {
            for (let i = 0; i < totalImages; i++) {
                const dot = document.createElement('div');
                dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(i));
                carouselDots.appendChild(dot);
            }
            startAutoPlay();
        }

        function goToSlide(index) {
            currentSlide = index;
            carouselWrapper.style.transform = `translateX(-${index * 100}%)`;
            updateDots();
        }

        function nextSlide() {
            goToSlide((currentSlide + 1) % totalImages);
        }

        function updateDots() {
            const dots = carouselDots.querySelectorAll('.carousel-dot');
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === currentSlide);
            });
        }

        function startAutoPlay() {
            autoPlayInterval = setInterval(nextSlide, 3000);
        }

        function stopAutoPlay() {
            clearInterval(autoPlayInterval);
        }

        document.querySelector('.carousel').addEventListener('mouseenter', stopAutoPlay);
        document.querySelector('.carousel').addEventListener('mouseleave', startAutoPlay);

        function initSpecSelection() {
            const specGroups = document.querySelectorAll('.spec-options');
            specGroups.forEach(group => {
                const options = group.querySelectorAll('.spec-option');
                options.forEach(option => {
                    option.addEventListener('click', () => {
                        if (option.classList.contains('disabled')) return;
                        options.forEach(opt => opt.classList.remove('selected'));
                        option.classList.add('selected');
                        updateSpecState(group.id, option);
                        calculatePrice();
                    });
                });
            });
        }

        function updateSpecState(groupId, option) {
            const value = option.dataset.value || option.textContent;
            const addPrice = parseInt(option.dataset.price) || 0;
            
            if (groupId === 'colorOptions') {
                currentState.color = { value, addPrice };
            } else if (groupId === 'storageOptions') {
                currentState.storage = { value, addPrice };
            } else if (groupId === 'packageOptions') {
                currentState.package = { value, addPrice };
            }
        }

        function initQuantityControl() {
            const decreaseBtn = document.getElementById('decreaseBtn');
            const increaseBtn = document.getElementById('increaseBtn');
            const quantityInput = document.getElementById('quantityInput');
            const stock = parseInt(document.getElementById('stock').textContent);

            decreaseBtn.addEventListener('click', () => {
                if (currentState.quantity > 1) {
                    currentState.quantity--;
                    updateQuantityDisplay();
                    calculatePrice();
                }
            });

            increaseBtn.addEventListener('click', () => {
                if (currentState.quantity < Math.min(99, stock)) {
                    currentState.quantity++;
                    updateQuantityDisplay();
                    calculatePrice();
                }
            });

            quantityInput.addEventListener('change', () => {
                let value = parseInt(quantityInput.value) || 1;
                value = Math.max(1, Math.min(99, value));
                currentState.quantity = value;
                updateQuantityDisplay();
                calculatePrice();
            });
        }

        function updateQuantityDisplay() {
            document.getElementById('quantityInput').value = currentState.quantity;
            document.getElementById('summaryQuantity').textContent = currentState.quantity;
        }

        function calculatePrice() {
            const specAddPrice = currentState.color.addPrice + 
                               currentState.storage.addPrice + 
                               currentState.package.addPrice;
            const unitPrice = BASE_PRICE + specAddPrice;
            const total = unitPrice * currentState.quantity;

            document.getElementById('currentPrice').textContent = unitPrice;
            document.getElementById('itemPrice').textContent = unitPrice;
            document.getElementById('specAddPrice').textContent = specAddPrice;
            document.getElementById('totalPrice').textContent = total;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2000);
        }

        function getSelectedSpecs() {
            return `颜色: ${currentState.color.value}, 存储: ${currentState.storage.value}, 套餐: ${currentState.package.value}`;
        }

        function initButtons() {
            document.getElementById('addCartBtn').addEventListener('click', () => {
                showToast(`已加入购物车：${getSelectedSpecs()} × ${currentState.quantity}`);
            });

            document.getElementById('buyBtn').addEventListener('click', () => {
                showToast(`下单成功：共 ¥${document.getElementById('totalPrice').textContent}`);
            });
        }

        initCarousel();
        initSpecSelection();
        initQuantityControl();
        initButtons();
        calculatePrice();
    </script>
</body>
</html>
