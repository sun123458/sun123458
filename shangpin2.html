<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品详情</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f5f5f5;
    color: #333;
    line-height: 1.6;
  }

  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
  }

  /* ===== 图片轮播 ===== */
  .carousel-wrapper {
    position: relative;
    width: 480px;
    height: 480px;
    overflow: hidden;
    border-radius: 12px;
    background: #fff;
    flex-shrink: 0;
  }
  .carousel-track {
    display: flex;
    height: 100%;
    transition: transform .4s ease;
  }
  .carousel-track img {
    width: 480px;
    height: 480px;
    object-fit: cover;
    flex-shrink: 0;
  }
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,.35);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    opacity: 0;
    transition: opacity .3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .carousel-wrapper:hover .carousel-btn { opacity: 1; }
  .carousel-btn.prev { left: 12px; }
  .carousel-btn.next { right: 12px; }
  .carousel-dots {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
  }
  .carousel-dots span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,.5);
    cursor: pointer;
    transition: all .3s;
  }
  .carousel-dots span.active {
    width: 24px;
    border-radius: 4px;
    background: #fff;
  }

  /* 缩略图 */
  .thumbs {
    display: flex;
    gap: 10px;
    margin-top: 12px;
    width: 480px;
  }
  .thumbs img {
    width: 72px; height: 72px;
    object-fit: cover;
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    opacity: .5;
    transition: all .3s;
  }
  .thumbs img.active {
    border-color: #ff4d4f;
    opacity: 1;
  }

  /* ===== 详情区域 ===== */
  .main {
    display: flex;
    gap: 32px;
    margin-top: 20px;
  }
  .detail {
    flex: 1;
    min-width: 0;
  }
  .price-tag {
    font-size: 28px;
    font-weight: 700;
    color: #ff4d4f;
  }
  .price-tag .original {
    font-size: 14px;
    color: #999;
    text-decoration: line-through;
    font-weight: 400;
    margin-left: 10px;
  }
  .price-tag .discount {
    font-size: 12px;
    background: #ff4d4f;
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 8px;
    font-weight: 400;
    vertical-align: middle;
  }
  .product-title {
    margin: 16px 0;
    font-size: 20px;
    font-weight: 600;
    line-height: 1.5;
  }
  .product-desc {
    color: #888;
    font-size: 14px;
    margin-bottom: 24px;
  }

  /* ===== 规格选择 ===== */
  .spec-group {
    margin-bottom: 18px;
  }
  .spec-group .label {
    font-size: 14px;
    color: #666;
    margin-bottom: 8px;
  }
  .spec-options {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .spec-options .spec-btn {
    padding: 6px 18px;
    border: 1px solid #d9d9d9;
    border-radius: 20px;
    background: #fff;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
  }
  .spec-options .spec-btn:hover {
    border-color: #ff4d4f;
    color: #ff4d4f;
  }
  .spec-options .spec-btn.active {
    border-color: #ff4d4f;
    color: #ff4d4f;
    background: #fff1f0;
  }
  .spec-options .spec-btn.disabled {
    color: #ccc;
    cursor: not-allowed;
    background: #fafafa;
    border-color: #eee;
  }

  /* ===== 数量与价格计算 ===== */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 28px;
    padding-top: 24px;
    border-top: 1px solid #f0f0f0;
  }
  .qty-control {
    display: flex;
    align-items: center;
    border: 1px solid #d9d9d9;
    border-radius: 8px;
    overflow: hidden;
    user-select: none;
  }
  .qty-control button {
    width: 36px; height: 36px;
    border: none;
    background: #fafafa;
    font-size: 18px;
    cursor: pointer;
    transition: background .2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qty-control button:hover { background: #f0f0f0; }
  .qty-control button:disabled { color: #ccc; cursor: not-allowed; }
  .qty-control input {
    width: 48px; height: 36px;
    border: none;
    border-left: 1px solid #d9d9d9;
    border-right: 1px solid #d9d9d9;
    text-align: center;
    font-size: 14px;
    outline: none;
  }
  .total-price {
    margin-left: auto;
    text-align: right;
  }
  .total-price .label {
    font-size: 13px;
    color: #999;
  }
  .total-price .value {
    font-size: 26px;
    font-weight: 700;
    color: #ff4d4f;
  }

  /* 购物车按钮 */
  .cart-btn {
    margin-top: 24px;
    display: flex;
    gap: 12px;
  }
  .btn {
    flex: 1;
    height: 48px;
    border: none;
    border-radius: 24px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #ff4d4f, #ff7875);
    color: #fff;
  }
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(255, 77, 79, .35);
  }
  .btn-outline {
    background: #fff;
    color: #ff4d4f;
    border: 1px solid #ff4d4f;
  }
  .btn-outline:hover { background: #fff1f0; }

  /* Toast */
  .toast {
    position: fixed;
    top: 40px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: rgba(0,0,0,.72);
    color: #fff;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    opacity: 0;
    transition: all .35s;
    z-index: 999;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* 浮动购物车 */
  .floating-cart {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #ff4d4f, #ff7875);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    box-shadow: 0 4px 20px rgba(255,77,79,.35);
    cursor: pointer;
    transition: transform .3s;
    z-index: 100;
  }
  .floating-cart:hover { transform: scale(1.1); }
  .floating-cart .badge {
    position: absolute;
    top: -4px; right: -4px;
    min-width: 20px; height: 20px;
    border-radius: 10px;
    background: #333;
    color: #fff;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    transition: all .3s;
  }
  .floating-cart .badge.bounce {
    animation: badgePop .4s ease;
  }
  @keyframes badgePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* 响应式 */
  @media (max-width: 768px) {
    .main { flex-direction: column; }
    .carousel-wrapper, .carousel-wrapper img,
    .thumbs { width: 100%; }
    .carousel-wrapper, .carousel-track img { height: 360px; }
    .thumbs img { width: 60px; height: 60px; }
    .action-bar { flex-wrap: wrap; }
    .total-price { margin-left: 0; width: 100%; text-align: left; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="main">
    <!-- 左侧：轮播 -->
    <div>
      <div class="carousel-wrapper" id="carousel">
        <div class="carousel-track" id="track"></div>
        <button class="carousel-btn prev" onclick="slide(-1)">&#10094;</button>
        <button class="carousel-btn next" onclick="slide(1)">&#10095;</button>
        <div class="carousel-dots" id="dots"></div>
      </div>
      <div class="thumbs" id="thumbs"></div>
    </div>

    <!-- 右侧：详情 -->
    <div class="detail">
      <div class="price-tag">
        <span id="curPrice">¥299</span>
        <span class="original" id="originalPrice">¥599</span>
        <span class="discount">5折</span>
      </div>
      <h1 class="product-title">极简轻奢无线蓝牙耳机 主动降噪 长续航高音质</h1>
      <p class="product-desc">40dB深度降噪 | 蓝牙5.3 | 36小时续航 | Hi-Res认证 | 多设备无缝切换</p>

      <!-- 规格选择 -->
      <div id="specArea"></div>

      <!-- 数量 & 总价 -->
      <div class="action-bar">
        <div>
          <span style="font-size:14px;color:#666;">数量</span>
          <div class="qty-control" style="margin-top:6px;">
            <button id="decBtn" onclick="changeQty(-1)">−</button>
            <input id="qtyInput" type="number" value="1" min="1" max="99" onchange="setQty(this.value)">
            <button onclick="changeQty(1)">+</button>
          </div>
        </div>
        <div class="total-price">
          <div class="label">小计</div>
          <div class="value" id="totalPrice">¥299</div>
        </div>
      </div>

      <!-- 按钮 -->
      <div class="cart-btn">
        <button class="btn btn-outline" onclick="showToast('已加入收藏')">收藏</button>
        <button class="btn btn-primary" onclick="addToCart()">加入购物车</button>
        <button class="btn btn-primary" style="background:linear-gradient(135deg,#333,#555);" onclick="buyNow()">立即购买</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- 浮动购物车 -->
<div class="floating-cart" onclick="showToast('查看购物车')">
  🛒
  <span class="badge" id="cartBadge">0</span>
</div>

<script>
// ===== 商品数据 =====
const product = {
  basePrice: 599,
  baseDiscount: 0.5,
  images: [
    'https://picsum.photos/seed/earphone1/480/480',
    'https://picsum.photos/seed/earphone2/480/480',
    'https://picsum.photos/seed/earphone3/480/480',
    'https://picsum.photos/seed/earphone4/480/480',
    'https://picsum.photos/seed/earphone5/480/480',
  ],
  specs: [
    {
      name: '颜色',
      key: 'color',
      options: [
        { label: '星空黑', skuExtra: 0 },
        { label: '云瓷白', skuExtra: 20 },
        { label: '暮光蓝', skuExtra: 30 },
        { label: '樱花粉', skuExtra: 30, disabled: true },
      ]
    },
    {
      name: '版本',
      key: 'version',
      options: [
        { label: '标准版', skuExtra: 0 },
        { label: '降噪增强版', skuExtra: 100 },
        { label: '旗舰版', skuExtra: 250 },
      ]
    },
    {
      name: '套装',
      key: 'bundle',
      options: [
        { label: '单耳机', skuExtra: 0 },
        { label: '耳机+充电座', skuExtra: 60 },
        { label: '耳机+保护壳+充电座', skuExtra: 120 },
      ]
    }
  ]
};

// ===== 状态 =====
let currentSlide = 0;
let selectedSpecs = {};  // key -> index
let quantity = 1;
let cartCount = 0;

// ===== 初始化轮播 =====
function initCarousel() {
  const track = document.getElementById('track');
  const dots = document.getElementById('dots');
  const thumbs = document.getElementById('thumbs');

  product.images.forEach((src, i) => {
    track.innerHTML += `<img src="${src}" alt="商品图${i + 1}">`;
    dots.innerHTML += `<span data-i="${i}" class="${i === 0 ? 'active' : ''}" onclick="goSlide(${i})"></span>`;
    thumbs.innerHTML += `<img src="${src}" alt="缩略图${i + 1}" class="${i === 0 ? 'active' : ''}" onclick="goSlide(${i})">`;
  });
}

function goSlide(i) {
  currentSlide = i;
  document.getElementById('track').style.transform = `translateX(-${i * 480}px)`;
  document.querySelectorAll('.carousel-dots span').forEach((d, idx) =>
    d.classList.toggle('active', idx === i));
  document.querySelectorAll('.thumbs img').forEach((d, idx) =>
    d.classList.toggle('active', idx === i));
}

function slide(dir) {
  const total = product.images.length;
  let next = currentSlide + dir;
  if (next < 0) next = total - 1;
  if (next >= total) next = 0;
  goSlide(next);
}

// 自动轮播
let autoTimer = setInterval(() => slide(1), 4000);
document.getElementById('carousel').addEventListener('mouseenter', () => clearInterval(autoTimer));
document.getElementById('carousel').addEventListener('mouseleave', () => {
  autoTimer = setInterval(() => slide(1), 4000);
});

// ===== 初始化规格 =====
function initSpecs() {
  const area = document.getElementById('specArea');
  product.specs.forEach(group => {
    // 默认选中第一个非 disabled 项
    const defaultIdx = group.options.findIndex(o => !o.disabled);
    selectedSpecs[group.key] = defaultIdx >= 0 ? defaultIdx : 0;

    let html = `<div class="spec-group"><div class="label">${group.name}</div><div class="spec-options">`;
    group.options.forEach((opt, i) => {
      const cls = [
        i === selectedSpecs[group.key] ? 'active' : '',
        opt.disabled ? 'disabled' : ''
      ].filter(Boolean).join(' ');
      html += `<button class="spec-btn ${cls}" data-key="${group.key}" data-idx="${i}"
        onclick="selectSpec(this, '${group.key}', ${i})"
        ${opt.disabled ? 'disabled' : ''}>${opt.label}</button>`;
    });
    html += '</div></div>';
    area.innerHTML += html;
  });
}

function selectSpec(el, key, idx) {
  if (el.classList.contains('disabled')) return;
  selectedSpecs[key] = idx;
  el.parentElement.querySelectorAll('.spec-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  updatePrice();
}

// ===== 价格计算 =====
function getSkuExtra() {
  let extra = 0;
  for (const group of product.specs) {
    const idx = selectedSpecs[group.key];
    extra += group.options[idx]?.skuExtra || 0;
  }
  return extra;
}

function updatePrice() {
  const extra = getSkuExtra();
  const unitPrice = product.basePrice * product.baseDiscount + extra;
  const total = unitPrice * quantity;

  document.getElementById('curPrice').textContent = `¥${unitPrice}`;
  document.getElementById('originalPrice').textContent = `¥${product.basePrice + extra}`;
  const discountVal = Math.round((1 - unitPrice / (product.basePrice + extra)) * 100);
  document.querySelector('.price-tag .discount').textContent = `${discountVal >= 0 ? discountVal + '折' : ''}`;

  document.getElementById('totalPrice').textContent = `¥${total.toFixed(0)}`;
  document.getElementById('decBtn').disabled = quantity <= 1;
  return unitPrice;
}

// ===== 数量控制 =====
function changeQty(delta) {
  let v = quantity + delta;
  if (v < 1) v = 1;
  if (v > 99) v = 99;
  quantity = v;
  document.getElementById('qtyInput').value = v;
  updatePrice();
}

function setQty(val) {
  let v = parseInt(val) || 1;
  if (v < 1) v = 1;
  if (v > 99) v = 99;
  quantity = v;
  document.getElementById('qtyInput').value = v;
  updatePrice();
}

// ===== 购物车 =====
function addToCart() {
  cartCount += quantity;
  const badge = document.getElementById('cartBadge');
  badge.textContent = cartCount;
  badge.classList.remove('bounce');
  void badge.offsetWidth; // reflow
  badge.classList.add('bounce');

  const specSummary = product.specs.map(g =>
    `${g.name}: ${g.options[selectedSpecs[g.key]].label}`
  ).join(' / ');
  showToast(`已加入购物车 × ${quantity}  (${specSummary})`);
}

function buyNow() {
  const specSummary = product.specs.map(g =>
    `${g.name}: ${g.options[selectedSpecs[g.key]].label}`
  ).join(' / ');
  showToast(`结算 ${quantity} 件  (${specSummary}) — 总计 ¥${document.getElementById('totalPrice').textContent.slice(1)}`);
}

// ===== Toast =====
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._timer);
  el._timer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ===== 启动 =====
initCarousel();
initSpecs();
updatePrice();
</script>
</body>
</html>
