<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaflet 简易地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #map { width: 100%; height: 100%; }

    .toolbar {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      display: flex;
      gap: 6px;
    }
    .toolbar button {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      transition: background .2s;
      color: #fff;
      background: #4a90d9;
    }
    .toolbar button:hover { background: #3a7bc8; }
    .toolbar button.active { background: #2c5f9e; outline: 2px solid #fff; }
    .toolbar button.locate { background: #e74c3c; }
    .toolbar button.locate:hover { background: #c0392b; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="toolbar">
  <button class="locate" onclick="locateUser()" title="定位到当前位置">📍 定位</button>
  <button onclick="switchBasemap('standard', this)" class="active" title="标准底图">标准</button>
  <button onclick="switchBasemap('dark', this)" title="暗色底图">暗色</button>
  <button onclick="switchBasemap('satellite', this)" title="卫星底图">卫星</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // === 底图定义 ===
  const basemaps = {
    standard: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
      maxZoom: 19
    }),
    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19
    }),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '&copy; Esri &mdash; Source: Esri, Maxar, Earthstar Geographics',
      maxZoom: 18
    })
  };

  // === 地图初始化：居中中国，缩放级别 4 ===
  const map = L.map('map', { zoomControl: false }).setView([35.86, 104.19], 4);
  L.control.zoom({ position: 'bottomright' }).addTo(map);
  basemaps.standard.addTo(map);
  let currentBasemap = basemaps.standard;

  // === 底图切换 ===
  function switchBasemap(name, btn) {
    if (currentBasemap === basemaps[name]) return;
    map.removeLayer(currentBasemap);
    currentBasemap = basemaps[name];
    currentBasemap.addTo(map);
    document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  // === 自定义图标 ===
  const cityIcon = L.divIcon({
    html: '<svg width="24" height="34" viewBox="0 0 24 34" xmlns="http://www.w3.org/2000/svg"><path d="M12 0C5.4 0 0 5.4 0 12c0 9 12 22 12 22s12-13 12-22C24 5.4 18.6 0 12 0zm0 17c-2.8 0-5-2.2-5-5s2.2-5 5-5 5 2.2 5 5-2.2 5-5 5z" fill="#e74c3c"/></svg>',
    iconSize: [24, 34],
    iconAnchor: [12, 34],
    popupAnchor: [0, -34],
    className: ''
  });

  const userIcon = L.divIcon({
    html: '<div style="width:16px;height:16px;background:#3498db;border:3px solid #fff;border-radius:50%;box-shadow:0 0 6px rgba(0,0,0,.4);"></div>',
    iconSize: [16, 16],
    iconAnchor: [8, 8],
    className: ''
  });

  // === 预设城市标记 ===
  const cities = [
    { name: '北京', lat: 39.9042, lng: 116.4074, desc: '中国首都，政治与文化中心', pop: '约 2189 万' },
    { name: '上海', lat: 31.2304, lng: 121.4737, desc: '国际金融中心，中国最大城市', pop: '约 2487 万' },
    { name: '广州', lat: 23.1291, lng: 113.2644, desc: '华南门户，千年商都', pop: '约 1881 万' },
    { name: '成都', lat: 30.5728, lng: 104.0668, desc: '天府之国，美食与休闲之都', pop: '约 2127 万' }
  ];

  cities.forEach(c => {
    const popup = `
      <div style="font-family:sans-serif;min-width:180px">
        <strong style="font-size:15px">${c.name}</strong><br>
        <span style="color:#666">${c.desc}</span><br>
        <hr style="border:none;border-top:1px solid #eee;margin:6px 0">
        📍 ${c.lat.toFixed(4)}, ${c.lng.toFixed(4)}<br>
        👥 常住人口 ${c.pop}
      </div>`;
    L.marker([c.lat, c.lng], { icon: cityIcon })
      .addTo(map)
      .bindPopup(popup);
  });

  // === 用户定位 ===
  let userMarker = null;

  function locateUser() {
    if (!navigator.geolocation) {
      alert('您的浏览器不支持定位功能');
      return;
    }
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude: lat, longitude: lng } = pos.coords;
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([lat, lng], { icon: userIcon })
          .addTo(map)
          .bindPopup(`<div style="font-family:sans-serif"><strong>📍 您的位置</strong><br>${lat.toFixed(6)}, ${lng.toFixed(6)}</div>`)
          .openPopup();
        map.flyTo([lat, lng], 14, { duration: 1.5 });
      },
      () => alert('无法获取位置，请检查浏览器定位权限'),
      { enableHighAccuracy: true }
    );
  }
</script>
</body>
</html>
