<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>平台游戏 - 状态机演示</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    color: #eee;
    overflow: hidden;
  }
  canvas {
    border: 2px solid #444;
    border-radius: 6px;
    box-shadow: 0 0 30px rgba(100, 140, 255, 0.25);
    image-rendering: pixelated;
  }
  #hud {
    display: flex;
    gap: 16px;
    margin-top: 14px;
    font-size: 13px;
    color: #888;
  }
  #hud span { background: #2a2a3e; padding: 4px 12px; border-radius: 4px; }
  #hud .active { color: #7cf; border: 1px solid #7cf; }
</style>
</head>
<body>
<canvas id="game" width="800" height="500"></canvas>
<div id="hud">
  <span id="h-state">状态: 静止</span>
  <span id="h-ctrl">方向键/WASD 移动 · 空格 跳跃 · Shift 跑步 · H 受伤 · R 重置</span>
</div>
<script>
// ─── 画布 & 上下文 ──────────────────────────────────────────
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// roundRect 兼容
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, radii) {
    const r = typeof radii === 'number' ? radii : (radii[0] || 0);
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}

// ─── 输入管理 ───────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  // 跳跃只响应按下瞬间
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ─── 平台数据 ──────────────────────────────────────────────
const platforms = [
  { x: 0,    y: 440, w: 800, h: 60, color: '#3a5f3a' },   // 地面
  { x: 140,  y: 340, w: 130, h: 20, color: '#5a4a3a' },
  { x: 370,  y: 280, w: 140, h: 20, color: '#5a4a3a' },
  { x: 600,  y: 330, w: 130, h: 20, color: '#5a4a3a' },
  { x: 50,   y: 210, w: 110, h: 20, color: '#5a4a3a' },
  { x: 280,  y: 150, w: 120, h: 20, color: '#5a4a3a' },
  { x: 530,  y: 190, w: 110, h: 20, color: '#5a4a3a' },
];

// ─── 摄像机 ────────────────────────────────────────────────
const camera = {
  x: 0, y: 0,
  shakeX: 0, shakeY: 0,
  shakeDuration: 0,
  shakeIntensity: 0,

  shake(intensity, duration) {
    this.shakeIntensity = intensity;
    this.shakeDuration = duration;
  },
  update(dt) {
    if (this.shakeDuration > 0) {
      this.shakeDuration -= dt;
      const decay = this.shakeDuration / 500;
      this.shakeX = (Math.random() * 2 - 1) * this.shakeIntensity * decay;
      this.shakeY = (Math.random() * 2 - 1) * this.shakeIntensity * decay;
    } else {
      this.shakeX = 0;
      this.shakeY = 0;
    }
  }
};

// ─── 精灵图帧生成（占位符）─────────────────────────────────
// 每个状态生成 4 帧，每帧 32×48 的像素画角色
const FRAME_W = 32, FRAME_H = 48;
const spriteCache = {};

function createSpriteSheet(state) {
  if (spriteCache[state]) return spriteCache[state];

  const frames = 4;
  const c = document.createElement('canvas');
  c.width = FRAME_W * frames;
  c.height = FRAME_H;
  const g = c.getContext('2d');

  for (let f = 0; f < frames; f++) {
    const ox = f * FRAME_W;
    drawCharacterFrame(g, ox, 0, state, f);
  }
  spriteCache[state] = c;
  return c;
}

function drawCharacterFrame(g, ox, oy, state, frame) {
  const cx = ox + 16; // 角色中心 x

  // 身体颜色根据状态
  const bodyColors = { idle: '#4a90d9', walk: '#4a90d9', run: '#d9904a', jump: '#4ad9d9', hurt: '#ff4444' };
  const bodyColor = bodyColors[state] || '#4a90d9';

  // 腿部偏移（动画帧）
  const legPhase = Math.sin((frame / 4) * Math.PI * 2);
  let leftLegY = 0, rightLegY = 0;
  let leftLegX = 0, rightLegX = 0;

  if (state === 'walk') {
    leftLegY = legPhase * 4;
    rightLegY = -legPhase * 4;
  } else if (state === 'run') {
    leftLegY = legPhase * 8;
    rightLegY = -legPhase * 8;
    leftLegX = legPhase * 2;
    rightLegX = -legPhase * 2;
  } else if (state === 'jump') {
    leftLegY = -6;
    rightLegY = -4;
    leftLegX = 2;
    rightLegX = -3;
  }

  // 头
  g.fillStyle = '#ffe0b2';
  roundRect(g, ox + 8, oy + 2, 16, 14, 4);

  // 眼睛
  g.fillStyle = '#333';
  g.fillRect(ox + 12, oy + 7, 3, 3);
  g.fillRect(ox + 19, oy + 7, 3, 3);

  // 嘴巴
  if (state === 'hurt') {
    g.fillStyle = '#ff0000';
    g.beginPath();
    g.arc(cx, oy + 13, 3, 0, Math.PI);
    g.fill();
  } else {
    g.fillStyle = '#c06050';
    g.fillRect(ox + 13, oy + 12, 6, 1);
  }

  // 身体
  g.fillStyle = bodyColor;
  roundRect(g, ox + 9, oy + 16, 14, 16, 3);

  // 领口装饰
  g.fillStyle = '#ffffff44';
  g.fillRect(ox + 12, oy + 16, 8, 2);

  // 手臂动画
  const armSwing = (state === 'walk') ? legPhase * 5 :
                   (state === 'run') ? legPhase * 10 :
                   (state === 'jump') ? -8 : Math.sin(frame * 0.8) * 2;

  // 左臂
  g.fillStyle = '#ffe0b2';
  g.save();
  g.translate(ox + 9, oy + 18);
  g.rotate(armSwing * Math.PI / 180);
  g.fillRect(-3, 0, 5, 12);
  g.restore();

  // 右臂
  g.save();
  g.translate(ox + 23, oy + 18);
  g.rotate(-armSwing * Math.PI / 180);
  g.fillRect(-2, 0, 5, 12);
  g.restore();

  // 左腿
  g.fillStyle = '#3a3a5e';
  g.fillRect(ox + 10 + leftLegX, oy + 32 + leftLegY, 5, 12);
  // 鞋
  g.fillStyle = '#8b4513';
  g.fillRect(ox + 8 + leftLegX, oy + 42 + leftLegY, 7, 4);

  // 右腿
  g.fillStyle = '#3a3a5e';
  g.fillRect(ox + 17 + rightLegX, oy + 32 + rightLegY, 5, 12);
  g.fillStyle = '#8b4513';
  g.fillRect(ox + 15 + rightLegX, oy + 42 + rightLegY, 7, 4);

  // 跑步时的特效线
  if (state === 'run') {
    g.strokeStyle = 'rgba(255, 200, 100, 0.6)';
    g.lineWidth = 1;
    if (frame % 2 === 0) {
      for (let i = 0; i < 3; i++) {
        const ly = oy + 20 + i * 8;
        g.beginPath();
        g.moveTo(ox - 2, ly);
        g.lineTo(ox - 6 - i * 2, ly);
        g.stroke();
      }
    }
  }

  // 跳跃时的阴影
  if (state === 'jump') {
    g.fillStyle = 'rgba(100, 200, 255, 0.25)';
    g.beginPath();
    g.ellipse(cx, oy + 47, 8, 2, 0, 0, Math.PI * 2);
    g.fill();
  }
}

function roundRect(g, x, y, w, h, r) {
  g.beginPath();
  g.moveTo(x + r, y);
  g.lineTo(x + w - r, y);
  g.quadraticCurveTo(x + w, y, x + w, y + r);
  g.lineTo(x + w, y + h - r);
  g.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  g.lineTo(x + r, y + h);
  g.quadraticCurveTo(x, y + h, x, y + h - r);
  g.lineTo(x, y + r);
  g.quadraticCurveTo(x, y, x + r, y);
  g.closePath();
  g.fill();
}

// 预生成所有精灵表
for (const st of ['idle', 'walk', 'run', 'jump', 'hurt']) createSpriteSheet(st);

// ─── 有限状态机 ────────────────────────────────────────────
const PlayerState = {
  IDLE:  'idle',
  WALK:  'walk',
  RUN:   'run',
  JUMP:  'jump',
  HURT:  'hurt',
};

const stateNames = {
  idle: '静止', walk: '行走', run: '跑步', jump: '跳跃', hurt: '受伤'
};

// 状态配置
const stateConfig = {
  idle:  { speed: 0,   frameInterval: 200, loop: true  },
  walk:  { speed: 160, frameInterval: 120, loop: true  },
  run:   { speed: 280, frameInterval: 80,  loop: true  },
  jump:  { speed: 180, frameInterval: 150, loop: false },
  hurt:  { speed: 0,   frameInterval: 100, loop: false },
};

// 转换规则：允许目标状态列表
const transitions = {
  idle:  ['walk', 'run', 'jump', 'hurt'],
  walk:  ['idle', 'run', 'jump', 'hurt'],
  run:   ['idle', 'walk', 'jump', 'hurt'],
  jump:  ['idle', 'walk', 'run', 'hurt'],
  hurt:  ['idle', 'walk', 'run', 'jump'],
};

// ─── 玩家 ──────────────────────────────────────────────────
const player = {
  x: 100, y: 300,
  vx: 0, vy: 0,
  w: 28, h: 44,
  facing: 1,      // 1=右, -1=左
  grounded: false,

  state: PlayerState.IDLE,
  prevJumpKey: false,

  // 动画
  animFrame: 0,
  animTimer: 0,

  // 受伤
  hurtTimer: 0,
  hurtFlashes: 0,

  // 粒子
  particles: [],
};

const GRAVITY = 900;
const JUMP_FORCE = -420;

function setState(newState) {
  if (newState === player.state) return;
  if (!transitions[player.state].includes(newState)) return;
  player.state = newState;
  player.animFrame = 0;
  player.animTimer = 0;
}

function playerUpdate(dt) {
  dt = Math.min(dt, 0.05); // 防止帧间隔过大

  const moveLeft  = keys['ArrowLeft']  || keys['KeyA'];
  const moveRight = keys['ArrowRight'] || keys['KeyD'];
  const jumpKey   = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
  const runKey    = keys['ShiftLeft'] || keys['ShiftRight'];

  // ── 受伤处理 ──
  if (player.state === PlayerState.HURT) {
    player.hurtTimer -= dt;
    if (player.hurtTimer <= 0) {
      player.hurtTimer = 0;
      player.hurtFlashes = 0;
      setState(player.grounded ? PlayerState.IDLE : PlayerState.JUMP);
    }
  }

  // 生成受伤粒子
  if (player.state === PlayerState.HURT) {
    if (Math.random() < 0.3) {
      player.particles.push({
        x: player.x + player.w / 2, y: player.y + player.h / 2,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200,
        life: 0.4 + Math.random() * 0.3,
        maxLife: 0.4 + Math.random() * 0.3,
        size: 2 + Math.random() * 3,
        color: Math.random() > 0.5 ? '#ff4444' : '#ff8800',
      });
    }
  }

  // 按下 H 受伤
  if (keys['KeyH'] && player.state !== PlayerState.HURT) {
    setState(PlayerState.HURT);
    player.hurtTimer = 0.5;
    player.hurtFlashes = 0;
    camera.shake(8, 300);
    player.vx *= -0.3;
    player.vy = -100;

    // 爆发粒子
    for (let i = 0; i < 12; i++) {
      player.particles.push({
        x: player.x + player.w / 2, y: player.y + player.h / 2,
        vx: (Math.random() - 0.5) * 300,
        vy: (Math.random() - 0.5) * 300,
        life: 0.3 + Math.random() * 0.4,
        maxLife: 0.3 + Math.random() * 0.4,
        size: 2 + Math.random() * 4,
        color: Math.random() > 0.3 ? '#ff2222' : '#ffaa00',
      });
    }
  }

  // ── 受伤时只应用重力，不受输入控制 ──
  if (player.state !== PlayerState.HURT) {
    // 水平移动
    const inputX = (moveRight ? 1 : 0) - (moveLeft ? 1 : 0);

    if (inputX !== 0) {
      player.facing = inputX;
      if (runKey) {
        setState(PlayerState.RUN);
      } else {
        setState(PlayerState.WALK);
      }
    } else if (player.grounded) {
      setState(PlayerState.IDLE);
    }

    // 跳跃（只在按下瞬间触发）
    if (jumpKey && !player.prevJumpKey && player.grounded) {
      player.vy = JUMP_FORCE;
      player.grounded = false;
      setState(PlayerState.JUMP);

      // 跳跃尘土
      for (let i = 0; i < 6; i++) {
        player.particles.push({
          x: player.x + player.w / 2,
          y: player.y + player.h,
          vx: (Math.random() - 0.5) * 120,
          vy: -Math.random() * 60,
          life: 0.3 + Math.random() * 0.2,
          maxLife: 0.3 + Math.random() * 0.2,
          size: 2 + Math.random() * 2,
          color: '#a0a090',
        });
      }
    }
    player.prevJumpKey = jumpKey;

    // 速度
    const cfg = stateConfig[player.state];
    player.vx = inputX * cfg.speed;
  } else {
    player.prevJumpKey = jumpKey;
  }

  // 重力
  player.vy += GRAVITY * dt;
  player.y += player.vy * dt;
  player.x += player.vx * dt;

  // 碰撞检测
  player.grounded = false;
  for (const p of platforms) {
    if (player.x + player.w > p.x && player.x < p.x + p.w) {
      // 从上方落下
      if (player.vy >= 0 && player.y + player.h >= p.y && player.y + player.h <= p.y + p.h + player.vy * dt + 2) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.grounded = true;
        if (player.state === PlayerState.JUMP) {
          setState(PlayerState.IDLE);
        }
      }
    }
  }

  // 世界边界
  player.x = Math.max(0, Math.min(W - player.w, player.x));
  if (player.y > H + 100) {
    player.x = 100;
    player.y = 300;
    player.vy = 0;
    setState(PlayerState.IDLE);
  }

  // ── 动画更新 ──
  const cfg = stateConfig[player.state];
  player.animTimer += dt * 1000;
  if (player.animTimer >= cfg.frameInterval) {
    player.animTimer = 0;
    if (cfg.loop) {
      player.animFrame = (player.animFrame + 1) % 4;
    } else {
      player.animFrame = Math.min(player.animFrame + 1, 3);
    }
  }

  // 受伤闪烁计数
  if (player.state === PlayerState.HURT) {
    player.hurtFlashes += dt * 1000;
  }

  // 粒子更新
  for (let i = player.particles.length - 1; i >= 0; i--) {
    const p = player.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt;
    if (p.life <= 0) player.particles.splice(i, 1);
  }
}

// ─── 渲染 ──────────────────────────────────────────────────
function drawPlatform(p) {
  // 主体
  ctx.fillStyle = p.color;
  const r = p.h > 30 ? 0 : 4;
  ctx.beginPath();
  ctx.roundRect(p.x, p.y, p.w, p.h, r);
  ctx.fill();

  // 顶部高光
  const grad = ctx.createLinearGradient(p.x, p.y, p.x, p.y + 6);
  grad.addColorStop(0, 'rgba(255,255,255,0.15)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(p.x + 2, p.y, p.w - 4, 6);

  if (p.h > 30) {
    // 地面纹理
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    for (let i = 0; i < p.w; i += 20) {
      ctx.fillRect(p.x + i, p.y + 10, 12, 2);
      ctx.fillRect(p.x + i + 8, p.y + 25, 14, 2);
    }
    // 草
    ctx.fillStyle = '#4a8f4a';
    for (let i = 0; i < p.w; i += 8) {
      const gh = 4 + Math.sin(i * 0.3) * 3;
      ctx.fillRect(p.x + i, p.y - gh, 2, gh);
    }
  }
}

function drawParticles() {
  for (const p of player.particles) {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // 天空渐变
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#1a1a3e');
  grad.addColorStop(0.5, '#2a2a4e');
  grad.addColorStop(1, '#1a2a1a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // 星星
  ctx.fillStyle = '#ffffff66';
  const starSeed = [23,67,120,200,310,450,520,680,50,170,390,600,710];
  const starY    = [30,60,25,70,20,50,35,45,90,15,80,10,55];
  for (let i = 0; i < starSeed.length; i++) {
    const twinkle = Math.sin(performance.now() * 0.003 + i) * 0.5 + 0.5;
    ctx.globalAlpha = 0.3 + twinkle * 0.5;
    ctx.fillRect(starSeed[i], starY[i], 2, 2);
  }
  ctx.globalAlpha = 1;

  // 远山
  ctx.fillStyle = '#1e2e1e';
  ctx.beginPath();
  ctx.moveTo(0, 380);
  for (let x = 0; x <= W; x += 40) {
    ctx.lineTo(x, 380 - Math.sin(x * 0.008) * 40 - Math.sin(x * 0.02) * 15);
  }
  ctx.lineTo(W, 440);
  ctx.lineTo(0, 440);
  ctx.fill();

  // 近山
  ctx.fillStyle = '#1a2a1a';
  ctx.beginPath();
  ctx.moveTo(0, 420);
  for (let x = 0; x <= W; x += 30) {
    ctx.lineTo(x, 420 - Math.sin(x * 0.012 + 1) * 25 - Math.sin(x * 0.03) * 10);
  }
  ctx.lineTo(W, 440);
  ctx.lineTo(0, 440);
  ctx.fill();
}

function drawPlayer() {
  const sheet = createSpriteSheet(player.state);
  const frame = player.animFrame;

  ctx.save();
  ctx.translate(player.x + player.w / 2, player.y + player.h / 2);

  // 翻转方向
  if (player.facing === -1) {
    ctx.scale(-1, 1);
  }

  // 受伤红色闪烁叠加
  const isHurt = player.state === PlayerState.HURT;
  const flashOn = isHurt ? Math.floor(player.hurtFlashes / 60) % 2 === 0 : true;

  if (isHurt && flashOn) {
    // 绘制红色叠加版本
    ctx.globalCompositeOperation = 'source-over';
    ctx.drawImage(sheet, frame * FRAME_W, 0, FRAME_W, FRAME_H, -FRAME_W / 2, -FRAME_H / 2, FRAME_W, FRAME_H);
    ctx.globalCompositeOperation = 'source-atop';
    ctx.fillStyle = 'rgba(255, 50, 50, 0.6)';
    ctx.fillRect(-FRAME_W / 2, -FRAME_H / 2, FRAME_W, FRAME_H);
    ctx.globalCompositeOperation = 'source-over';
  } else if (isHurt && !flashOn) {
    // 闪烁关 - 正常绘制但半透明
    ctx.globalAlpha = 0.3;
    ctx.drawImage(sheet, frame * FRAME_W, 0, FRAME_W, FRAME_H, -FRAME_W / 2, -FRAME_H / 2, FRAME_W, FRAME_H);
    ctx.globalAlpha = 1;
  } else {
    ctx.drawImage(sheet, frame * FRAME_W, 0, FRAME_W, FRAME_H, -FRAME_W / 2, -FRAME_H / 2, FRAME_W, FRAME_H);
  }

  ctx.restore();

  // 角色阴影
  if (player.grounded) {
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.ellipse(player.x + player.w / 2, player.y + player.h + 2, 14, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // 空中阴影（在最近平台表面）
    let shadowY = player.y + player.h;
    for (const p of platforms) {
      if (player.x + player.w > p.x && player.x < p.x + p.w && p.y > player.y) {
        shadowY = Math.min(shadowY, p.y);
      }
    }
    const dist = shadowY - (player.y + player.h);
    const alpha = Math.max(0, 0.15 - dist * 0.002);
    if (alpha > 0.01) {
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      ctx.beginPath();
      ctx.ellipse(player.x + player.w / 2, shadowY + 2, 12, 3, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

function drawHUD() {
  // 状态指示器
  const stateEl = document.getElementById('h-state');
  stateEl.textContent = '状态: ' + stateNames[player.state];
  stateEl.className = 'active';

  // 在画布上绘制简单状态机图
  const boxW = 60, boxH = 22, startY = 10, gap = 8;
  const states = ['idle', 'walk', 'run', 'jump', 'hurt'];
  const boxColors = {
    idle: '#4a90d9', walk: '#4a90d9', run: '#d9904a', jump: '#4ad9d9', hurt: '#ff4444'
  };

  ctx.save();
  ctx.setTransform(1,0,0,1,0,0); // 忽略摄像机变换
  ctx.globalAlpha = 0.85;

  let totalW = states.length * boxW + (states.length - 1) * gap;
  let startX = (W - totalW) / 2;

  // 连接线
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  for (let i = 0; i < states.length - 1; i++) {
    const x1 = startX + i * (boxW + gap) + boxW;
    const x2 = startX + (i + 1) * (boxW + gap);
    ctx.beginPath();
    ctx.moveTo(x1, startY + boxH / 2);
    ctx.lineTo(x2, startY + boxH / 2);
    ctx.stroke();
  }

  // 状态框
  for (let i = 0; i < states.length; i++) {
    const x = startX + i * (boxW + gap);
    const isCurrent = player.state === states[i];

    ctx.fillStyle = isCurrent ? boxColors[states[i]] : '#2a2a3e';
    ctx.strokeStyle = isCurrent ? '#fff' : '#555';
    ctx.lineWidth = isCurrent ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(x, startY, boxW, boxH, 4);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = isCurrent ? '#fff' : '#888';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(stateNames[states[i]], x + boxW / 2, startY + boxH / 2);
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

// ─── 主循环 ────────────────────────────────────────────────
let lastTime = 0;

function gameLoop(time) {
  const dt = Math.min((time - lastTime) / 1000, 0.05);
  lastTime = time;

  // 更新
  playerUpdate(dt);
  camera.update(dt * 1000);

  // 摄像机跟随玩家
  const targetCamX = player.x + player.w / 2 - W / 2;
  const targetCamY = player.y + player.h / 2 - H / 2 + 60;
  camera.x += (targetCamX - camera.x) * 0.08;
  camera.y += (Math.max(0, targetCamY) - camera.y) * 0.08;
  // 限制摄像机范围
  camera.x = Math.max(0, Math.min(0, camera.x)); // 单屏游戏，不做水平滚动
  camera.y = Math.max(0, Math.min(0, camera.y)); // 固定竖直位置

  // 渲染
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(camera.shakeX, camera.shakeY);

  drawBackground();

  // 平台
  for (const p of platforms) drawPlatform(p);

  // 粒子（角色之后）
  drawParticles();

  // 角色
  drawPlayer();

  ctx.restore();

  // HUD
  drawHUD();

  requestAnimationFrame(gameLoop);
}

// 启动
requestAnimationFrame(gameLoop);
</script>
