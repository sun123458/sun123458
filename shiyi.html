<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 虚拟试衣间</title>
  <link rel="stylesheet" href="css/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <p>加载中...</p>
  </div>

  <div id="controls">
    <button id="btn-autorotate">自动旋转: 关</button>
    <button id="btn-reset">重置视角</button>
  </div>

  <div id="garment-bar">
    <button data-garment="tshirt">T 恤</button>
    <button data-garment="longshirt">长袖衬衫</button>
    <button data-garment="dress">连衣裙</button>
    <button data-garment="skirt">半身裙</button>
    <button data-garment="hoodie">连帽卫衣</button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
