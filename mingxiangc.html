<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>沉浸式 VR 自然冥想空间</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; }
  canvas { display: block; }

  /* === 加载界面 === */
  #loader {
    position: fixed; inset: 0; z-index: 1000;
    background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 50%, #0d1b2e 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 1s ease;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
  #loader h1 {
    font-size: 2.5rem; color: #e0f0ff; margin-bottom: 0.5rem;
    text-shadow: 0 0 30px rgba(100,180,255,0.5);
    animation: breathe 3s ease-in-out infinite;
  }
  #loader p { color: #80a0c0; font-size: 1rem; margin-bottom: 2rem; }
  #loader .spinner {
    width: 60px; height: 60px; border: 3px solid rgba(100,180,255,0.2);
    border-top-color: #64b4ff; border-radius: 50%; animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes breathe { 0%,100% { opacity: 0.8; } 50% { opacity: 1; } }

  /* === UI 控制面板 === */
  #ui-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 10;
    transition: opacity 0.5s;
  }
  #ui-overlay > * { pointer-events: auto; }

  /* 顶部信息栏 */
  #top-bar {
    position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(10,20,40,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,180,255,0.15); border-radius: 20px;
    padding: 8px 24px; display: flex; align-items: center; gap: 16px;
    font-size: 0.85rem; color: #b0d0f0;
  }
  #top-bar .divider { width: 1px; height: 16px; background: rgba(100,180,255,0.2); }

  /* 天气切换按钮组 */
  #weather-panel {
    position: absolute; top: 20px; right: 20px;
    background: rgba(10,20,40,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,180,255,0.15); border-radius: 16px;
    padding: 12px; display: flex; flex-direction: column; gap: 8px;
  }
  #weather-panel label {
    font-size: 0.75rem; color: #80a0c0; text-align: center; margin-bottom: 2px;
  }
  .weather-btn {
    width: 44px; height: 44px; border: 1px solid rgba(100,180,255,0.2);
    background: rgba(20,40,70,0.6); border-radius: 12px; color: #b0d0f0;
    cursor: pointer; font-size: 1.2rem; display: flex; align-items: center;
    justify-content: center; transition: all 0.3s;
  }
  .weather-btn:hover { background: rgba(60,100,160,0.4); border-color: rgba(100,180,255,0.4); }
  .weather-btn.active { background: rgba(60,120,200,0.4); border-color: #64b4ff; box-shadow: 0 0 15px rgba(100,180,255,0.3); }

  /* 场景切换 */
  #scene-panel {
    position: absolute; top: 20px; left: 20px;
    background: rgba(10,20,40,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,180,255,0.15); border-radius: 16px;
    padding: 12px; display: flex; flex-direction: column; gap: 8px;
  }
  #scene-panel label {
    font-size: 0.75rem; color: #80a0c0; text-align: center; margin-bottom: 2px;
  }
  .scene-btn {
    padding: 8px 14px; border: 1px solid rgba(100,180,255,0.2);
    background: rgba(20,40,70,0.6); border-radius: 10px; color: #b0d0f0;
    cursor: pointer; font-size: 0.8rem; transition: all 0.3s; white-space: nowrap;
  }
  .scene-btn:hover { background: rgba(60,100,160,0.4); }
  .scene-btn.active { background: rgba(60,120,200,0.4); border-color: #64b4ff; }

  /* 冥想控制 */
  #meditation-panel {
    position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
    background: rgba(10,20,40,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,180,255,0.15); border-radius: 20px;
    padding: 14px 24px; display: flex; align-items: center; gap: 16px;
  }
  .med-btn {
    padding: 8px 16px; border: 1px solid rgba(100,180,255,0.2);
    background: rgba(20,40,70,0.6); border-radius: 12px; color: #b0d0f0;
    cursor: pointer; font-size: 0.85rem; transition: all 0.3s;
  }
  .med-btn:hover { background: rgba(60,100,160,0.4); }
  .med-btn.active { background: rgba(80,60,180,0.5); border-color: #a080ff; }
  #timer-display {
    font-size: 1.5rem; color: #e0f0ff; font-variant-numeric: tabular-nums;
    min-width: 80px; text-align: center;
  }
  #breath-indicator {
    width: 40px; height: 40px; border-radius: 50%;
    border: 2px solid rgba(160,200,255,0.4);
    transition: transform 1s ease-in-out, background 1s;
  }

  /* 音量控制 */
  #volume-control {
    position: absolute; bottom: 30px; right: 20px;
    background: rgba(10,20,40,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,180,255,0.15); border-radius: 12px;
    padding: 10px 14px; display: flex; align-items: center; gap: 8px;
  }
  #volume-control input[type="range"] {
    width: 80px; accent-color: #64b4ff;
  }
  #volume-icon { color: #b0d0f0; font-size: 1rem; }

  /* 提示操作 */
  #controls-hint {
    position: absolute; bottom: 30px; left: 20px;
    background: rgba(10,20,40,0.7); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,180,255,0.15); border-radius: 12px;
    padding: 10px 14px; color: #80a0c0; font-size: 0.75rem; line-height: 1.6;
  }
  #controls-hint kbd {
    background: rgba(40,60,100,0.5); border: 1px solid rgba(100,180,255,0.2);
    border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; color: #b0d0f0;
  }

  /* 十字准星 */
  #crosshair {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
    width: 6px; height: 6px; border: 1.5px solid rgba(255,255,255,0.5);
    border-radius: 50%; pointer-events: none; z-index: 5;
  }

  /* 通知 Toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(10,20,40,0.85); backdrop-filter: blur(10px);
    border: 1px solid rgba(100,180,255,0.2); border-radius: 12px;
    padding: 10px 20px; color: #e0f0ff; font-size: 0.9rem;
    animation: toastIn 0.3s ease, toastOut 0.3s ease 2s forwards;
    z-index: 100;
  }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }
</style>
</head>
<body>

<!-- 加载界面 -->
<div id="loader">
  <h1>自然冥想空间</h1>
  <p>正在构建你的宁静世界...</p>
  <div class="spinner"></div>
</div>

<!-- 十字准星 -->
<div id="crosshair"></div>

<!-- UI 叠加层 -->
<div id="ui-overlay" style="opacity:0">
  <!-- 顶部信息 -->
  <div id="top-bar">
    <span id="scene-name">森林</span>
    <div class="divider"></div>
    <span id="weather-name">晴天</span>
    <div class="divider"></div>
    <span id="time-display">06:00</span>
  </div>

  <!-- 场景选择 -->
  <div id="scene-panel">
    <label>场景</label>
    <button class="scene-btn active" data-scene="forest">森林</button>
    <button class="scene-btn" data-scene="lake">湖泊</button>
    <button class="scene-btn" data-scene="mountain">雪山</button>
    <button class="scene-btn" data-scene="meadow">草甸</button>
  </div>

  <!-- 天气选择 -->
  <div id="weather-panel">
    <label>天气</label>
    <button class="weather-btn active" data-weather="clear" title="晴天">&#9728;</button>
    <button class="weather-btn" data-weather="rain" title="雨天">&#127783;</button>
    <button class="weather-btn" data-weather="snow" title="雪天">&#10052;</button>
    <button class="weather-btn" data-weather="fog" title="雾天">&#127787;</button>
  </div>

  <!-- 冥想控制 -->
  <div id="meditation-panel">
    <div id="breath-indicator"></div>
    <div id="timer-display">00:00</div>
    <button class="med-btn" id="med-start">开始冥想</button>
    <button class="med-btn" id="med-5min">5 分钟</button>
    <button class="med-btn" id="med-10min">10 分钟</button>
    <button class="med-btn" id="med-20min">20 分钟</button>
  </div>

  <!-- 音量 -->
  <div id="volume-control">
    <span id="volume-icon">&#128266;</span>
    <input type="range" id="volume-slider" min="0" max="100" value="60">
  </div>

  <!-- 操作提示 -->
  <div id="controls-hint">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动 &nbsp;
    <kbd>鼠标</kbd> 环顾<br>
    <kbd>Shift</kbd> 加速 &nbsp;
    <kbd>Space</kbd> 上升 &nbsp;
    <kbd>H</kbd> 隐藏UI
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ============================
// 全局状态
// ============================
const state = {
  currentScene: 'forest',
  currentWeather: 'clear',
  isMeditating: false,
  meditationStart: 0,
  meditationDuration: 0,
  masterVolume: 0.6,
  uiVisible: true,
  timeOfDay: 0.25,
};

// ============================
// Three.js 基础
// ============================
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
camera.position.set(0, 5, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// 第一人称控制
const controls = new PointerLockControls(camera, document.body);
renderer.domElement.addEventListener('click', () => controls.lock());

const moveState = { forward: false, backward: false, left: false, right: false, up: false, shift: false };
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

document.addEventListener('keydown', (e) => {
  switch(e.code) {
    case 'KeyW': moveState.forward = true; break;
    case 'KeyS': moveState.backward = true; break;
    case 'KeyA': moveState.left = true; break;
    case 'KeyD': moveState.right = true; break;
    case 'Space': moveState.up = true; e.preventDefault(); break;
    case 'ShiftLeft': case 'ShiftRight': moveState.shift = true; break;
    case 'KeyH': toggleUI(); break;
  }
});
document.addEventListener('keyup', (e) => {
  switch(e.code) {
    case 'KeyW': moveState.forward = false; break;
    case 'KeyS': moveState.backward = false; break;
    case 'KeyA': moveState.left = false; break;
    case 'KeyD': moveState.right = false; break;
    case 'Space': moveState.up = false; break;
    case 'ShiftLeft': case 'ShiftRight': moveState.shift = false; break;
  }
});

function toggleUI() {
  state.uiVisible = !state.uiVisible;
  document.getElementById('ui-overlay').style.opacity = state.uiVisible ? '1' : '0';
}

// ============================
// 光照系统
// ============================
const ambientLight = new THREE.AmbientLight(0x446688, 0.4);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
sunLight.position.set(50, 80, 30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 300;
sunLight.shadow.camera.left = -100;
sunLight.shadow.camera.right = 100;
sunLight.shadow.camera.top = 100;
sunLight.shadow.camera.bottom = -100;
scene.add(sunLight);

const hemiLight = new THREE.HemisphereLight(0x87ceeb, 0x2d5a27, 0.5);
scene.add(hemiLight);

// ============================
// 雾
// ============================
scene.fog = new THREE.FogExp2(0x88bbdd, 0.008);

// ============================
// 天空穹顶
// ============================
function createSky() {
  const skyGeo = new THREE.SphereGeometry(800, 32, 32);
  const skyMat = new THREE.ShaderMaterial({
    uniforms: {
      topColor: { value: new THREE.Color(0x0055aa) },
      bottomColor: { value: new THREE.Color(0x88bbdd) },
      offset: { value: 20 },
      exponent: { value: 0.4 },
      sunPosition: { value: new THREE.Vector3(0, 0.5, 0.5) },
      sunColor: { value: new THREE.Color(0xffffff) },
    },
    vertexShader: `
      varying vec3 vWorldPosition;
      varying vec3 vDirection;
      void main() {
        vec4 worldPos = modelMatrix * vec4(position, 1.0);
        vWorldPosition = worldPos.xyz;
        vDirection = normalize(position);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 topColor;
      uniform vec3 bottomColor;
      uniform float offset;
      uniform float exponent;
      uniform vec3 sunPosition;
      uniform vec3 sunColor;
      varying vec3 vWorldPosition;
      varying vec3 vDirection;
      void main() {
        float h = normalize(vWorldPosition + offset).y;
        float t = max(pow(max(h, 0.0), exponent), 0.0);
        vec3 sky = mix(bottomColor, topColor, t);

        // 太阳光晕
        float sunDot = max(dot(normalize(vDirection), normalize(sunPosition)), 0.0);
        float sunGlow = pow(sunDot, 128.0) * 2.0;
        float sunHalo = pow(sunDot, 8.0) * 0.3;
        sky += sunColor * (sunGlow + sunHalo);

        gl_FragColor = vec4(sky, 1.0);
      }
    `,
    side: THREE.BackSide,
  });
  return new THREE.Mesh(skyGeo, skyMat);
}
const sky = createSky();
scene.add(sky);

// ============================
// 分形噪声
// ============================
function fbm(x, z) {
  let value = 0, amplitude = 1, frequency = 1;
  for (let i = 0; i < 5; i++) {
    value += amplitude * noise2D(x * frequency, z * frequency);
    amplitude *= 0.5;
    frequency *= 2;
  }
  return value;
}

function noise2D(x, z) {
  const n = Math.sin(x * 127.1 + z * 311.7) * 43758.5453;
  return (n - Math.floor(n)) * 2 - 1;
}

// ============================
// 地形生成
// ============================
function createTerrain(options = {}) {
  const { width = 400, depth = 400, segments = 200, heightScale = 15, color1 = 0x2d5a27, color2 = 0x4a7a3a } = options;
  const geo = new THREE.PlaneGeometry(width, depth, segments, segments);
  geo.rotateX(-Math.PI / 2);

  const vertices = geo.attributes.position.array;
  for (let i = 0; i < vertices.length; i += 3) {
    const x = vertices[i];
    const z = vertices[i + 2];
    vertices[i + 1] = fbm(x * 0.02, z * 0.02) * heightScale
      + fbm(x * 0.005, z * 0.005) * heightScale * 2;
  }
  geo.computeVertexNormals();

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      color1: { value: new THREE.Color(color1) },
      color2: { value: new THREE.Color(color2) },
      maxHeight: { value: heightScale * 3 },
    },
    vertexShader: `
      varying float vHeight;
      varying vec3 vNormal;
      void main() {
        vHeight = position.y;
        vNormal = normalMatrix * normal;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 color1;
      uniform vec3 color2;
      uniform float maxHeight;
      varying float vHeight;
      varying vec3 vNormal;
      void main() {
        float t = clamp(vHeight / maxHeight, 0.0, 1.0);
        vec3 col = mix(color1, color2, t);
        float light = dot(vNormal, normalize(vec3(0.5, 1.0, 0.3))) * 0.5 + 0.5;
        col *= light * 0.7 + 0.3;
        gl_FragColor = vec4(col, 1.0);
      }
    `,
  });

  return new THREE.Mesh(geo, mat);
}

// ============================
// 树木生成
// ============================
function createTree(x, z, type = 'pine') {
  const group = new THREE.Group();

  if (type === 'pine') {
    const trunkGeo = new THREE.CylinderGeometry(0.15, 0.25, 3, 8);
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x5c3a1e });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 1.5;
    trunk.castShadow = true;
    group.add(trunk);

    const layers = 3 + Math.floor(Math.random() * 2);
    for (let i = 0; i < layers; i++) {
      const radius = 2.0 - i * 0.4;
      const coneGeo = new THREE.ConeGeometry(radius, 2.5, 8);
      const shade = 0.15 + Math.random() * 0.15;
      const coneMat = new THREE.MeshLambertMaterial({
        color: new THREE.Color(shade * 0.5, shade + 0.2, shade * 0.3)
      });
      const cone = new THREE.Mesh(coneGeo, coneMat);
      cone.position.y = 3.5 + i * 1.5;
      cone.castShadow = true;
      group.add(cone);
    }
  } else if (type === 'oak') {
    const trunkGeo = new THREE.CylinderGeometry(0.2, 0.35, 4, 8);
    const trunkMat = new THREE.MeshLambertMaterial({ color: 0x6b4226 });
    const trunk = new THREE.Mesh(trunkGeo, trunkMat);
    trunk.position.y = 2;
    trunk.castShadow = true;
    group.add(trunk);

    const crownGeo = new THREE.SphereGeometry(2.5, 10, 10);
    const shade = 0.2 + Math.random() * 0.15;
    const crownMat = new THREE.MeshLambertMaterial({
      color: new THREE.Color(shade * 0.4, shade + 0.25, shade * 0.2)
    });
    const crown = new THREE.Mesh(crownGeo, crownMat);
    crown.position.y = 5.5;
    crown.castShadow = true;
    group.add(crown);
  }

  const scale = 0.7 + Math.random() * 0.8;
  group.scale.set(scale, scale, scale);
  group.position.set(x, 0, z);
  group.rotation.y = Math.random() * Math.PI * 2;

  return group;
}

// ============================
// 萤火虫 / 花粉粒子
// ============================
function createFireflies(count = 80) {
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  const phases = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 80;
    positions[i * 3 + 1] = 1 + Math.random() * 8;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 80;
    sizes[i] = 0.3 + Math.random() * 0.5;
    phases[i] = Math.random() * Math.PI * 2;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0xaaffaa) },
    },
    vertexShader: `
      attribute float size;
      attribute float aPhase;
      uniform float uTime;
      varying float vAlpha;
      void main() {
        vec3 pos = position;
        pos.y += sin(uTime * 0.5 + aPhase) * 0.5;
        pos.x += sin(uTime * 0.3 + aPhase * 2.0) * 0.3;
        vAlpha = sin(uTime * 1.5 + aPhase) * 0.5 + 0.5;
        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = size * (200.0 / -mvPos.z);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float glow = exp(-d * d * 3.0);
        gl_FragColor = vec4(uColor, glow * vAlpha * 0.8);
      }
    `,
    transparent: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
  });

  return new THREE.Points(geo, mat);
}

// ============================
// 水面
// ============================
function createWater(size = 200) {
  const geo = new THREE.PlaneGeometry(size, size, 128, 128);
  geo.rotateX(-Math.PI / 2);

  const mat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor1: { value: new THREE.Color(0x003366) },
      uColor2: { value: new THREE.Color(0x1a6699) },
      uOpacity: { value: 0.75 },
    },
    vertexShader: `
      uniform float uTime;
      varying vec2 vUv;
      varying float vWave;
      void main() {
        vUv = uv;
        vec3 pos = position;
        float wave = sin(pos.x * 0.1 + uTime) * 0.15
                   + sin(pos.z * 0.15 + uTime * 0.7) * 0.1
                   + sin((pos.x + pos.z) * 0.08 + uTime * 1.3) * 0.05;
        pos.y += wave;
        vWave = wave;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor1;
      uniform vec3 uColor2;
      uniform float uTime;
      uniform float uOpacity;
      varying vec2 vUv;
      varying float vWave;
      void main() {
        vec3 col = mix(uColor1, uColor2, vWave * 3.0 + 0.5);
        float spec = pow(max(vWave * 5.0, 0.0), 4.0) * 0.3;
        col += vec3(spec);
        float fresnel = pow(1.0 - abs(vWave) * 5.0, 3.0) * 0.2;
        col += vec3(fresnel);
        gl_FragColor = vec4(col, uOpacity);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide,
  });

  const water = new THREE.Mesh(geo, mat);
  water.position.y = -0.5;
  return water;
}

// ============================
// 天气粒子系统
// ============================
let rainParticles = null;
let snowParticles = null;

function createRain() {
  const count = 5000;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const velocities = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 200;
    positions[i * 3 + 1] = Math.random() * 100;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
    velocities[i] = 0.5 + Math.random() * 0.5;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aVelocity', new THREE.BufferAttribute(velocities, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float aVelocity;
      uniform float uTime;
      varying float vAlpha;
      void main() {
        vec3 pos = position;
        pos.y = mod(pos.y - uTime * aVelocity * 30.0, 100.0);
        vAlpha = aVelocity;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = 1.5;
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        gl_FragColor = vec4(0.7, 0.8, 1.0, vAlpha * 0.6);
      }
    `,
    transparent: true,
    depthWrite: false,
  });

  const rain = new THREE.Points(geo, mat);
  rain.visible = false;
  return rain;
}

function createSnow() {
  const count = 3000;
  const geo = new THREE.BufferGeometry();
  const positions = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  const phases = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 200;
    positions[i * 3 + 1] = Math.random() * 80;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 200;
    sizes[i] = 1.0 + Math.random() * 2.0;
    phases[i] = Math.random() * Math.PI * 2;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
  geo.setAttribute('aPhase', new THREE.BufferAttribute(phases, 1));

  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float size;
      attribute float aPhase;
      uniform float uTime;
      varying float vAlpha;
      void main() {
        vec3 pos = position;
        float t = mod(uTime * 0.5 + aPhase, 80.0);
        pos.y = 80.0 - t;
        pos.x += sin(uTime * 0.3 + aPhase) * 2.0;
        pos.z += cos(uTime * 0.2 + aPhase * 1.5) * 2.0;
        vAlpha = smoothstep(0.0, 10.0, pos.y) * smoothstep(80.0, 70.0, pos.y);
        vec4 mvPos = modelViewMatrix * vec4(pos, 1.0);
        gl_PointSize = size * (100.0 / -mvPos.z);
        gl_Position = projectionMatrix * mvPos;
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = smoothstep(1.0, 0.0, d) * vAlpha;
        gl_FragColor = vec4(1.0, 1.0, 1.0, alpha * 0.8);
      }
    `,
    transparent: true,
    depthWrite: false,
  });

  const snow = new THREE.Points(geo, mat);
  snow.visible = false;
  return snow;
}

// ============================
// 场景构建
// ============================
const worldObjects = new THREE.Group();
scene.add(worldObjects);

let terrain = null;
let water = null;
const treeGroups = [];

function buildScene(sceneType) {
  // 清除旧场景
  while (worldObjects.children.length > 0) {
    const obj = worldObjects.children[0];
    worldObjects.remove(obj);
    obj.traverse(child => {
      if (child.geometry) child.geometry.dispose();
      if (child.material) {
        if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
        else child.material.dispose();
      }
    });
  }
  treeGroups.length = 0;

  const configs = {
    forest: {
      terrain: { heightScale: 8, color1: 0x2d5a27, color2: 0x5a8a47 },
      sky: { top: 0x1155aa, bottom: 0x88ccee },
      fog: { color: 0x88bbdd, density: 0.008 },
      trees: { count: 120, types: ['pine', 'oak'], radius: 80 },
    },
    lake: {
      terrain: { heightScale: 4, color1: 0x3a6b30, color2: 0x6a9a55 },
      sky: { top: 0x0044aa, bottom: 0x99ccee },
      fog: { color: 0x99bbcc, density: 0.006 },
      hasWater: true,
      trees: { count: 60, types: ['oak'], radius: 70 },
    },
    mountain: {
      terrain: { heightScale: 30, color1: 0x667788, color2: 0xeeeeff },
      sky: { top: 0x1a2a66, bottom: 0xaabbdd },
      fog: { color: 0xbbccdd, density: 0.005 },
      trees: { count: 50, types: ['pine'], radius: 90 },
    },
    meadow: {
      terrain: { heightScale: 3, color1: 0x4a8a30, color2: 0x8abb55 },
      sky: { top: 0x2266bb, bottom: 0xaaddff },
      fog: { color: 0xaaccee, density: 0.004 },
      trees: { count: 30, types: ['oak'], radius: 100 },
    },
  };

  const cfg = configs[sceneType];

  terrain = createTerrain(cfg.terrain);
  worldObjects.add(terrain);

  sky.material.uniforms.topColor.value.set(cfg.sky.top);
  sky.material.uniforms.bottomColor.value.set(cfg.sky.bottom);

  scene.fog.color.set(cfg.fog.color);
  scene.fog.density = cfg.fog.density;

  if (cfg.hasWater) {
    water = createWater(120);
    water.position.set(0, 0.3, 0);
    worldObjects.add(water);
  } else {
    water = null;
  }

  if (cfg.trees) {
    for (let i = 0; i < cfg.trees.count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 10 + Math.random() * cfg.trees.radius;
      const x = Math.cos(angle) * dist;
      const z = Math.sin(angle) * dist;
      const type = cfg.trees.types[Math.floor(Math.random() * cfg.trees.types.length)];
      const tree = createTree(x, z, type);
      treeGroups.push(tree);
      worldObjects.add(tree);
    }
  }

  const fireflies = createFireflies(sceneType === 'meadow' ? 120 : 60);
  fireflies.name = 'fireflies';
  if (sceneType === 'meadow') {
    fireflies.material.uniforms.uColor.value.set(0xffddaa);
  }
  worldObjects.add(fireflies);

  if (sceneType === 'meadow') createFlowers();
  if (sceneType === 'mountain') createMountains();
  createRocks();

  state.currentScene = sceneType;
  document.getElementById('scene-name').textContent =
    { forest: '森林', lake: '湖泊', mountain: '雪山', meadow: '草甸' }[sceneType];
}

function createFlowers() {
  const flowerColors = [0xff6688, 0xffaa44, 0xaa66ff, 0xff4466, 0xffff66, 0x66aaff];
  for (let i = 0; i < 200; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 5 + Math.random() * 60;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;

    const flowerGeo = new THREE.SphereGeometry(0.15, 6, 6);
    const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
    const flowerMat = new THREE.MeshLambertMaterial({ color });
    const flower = new THREE.Mesh(flowerGeo, flowerMat);

    const stemGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4, 4);
    const stemMat = new THREE.MeshLambertMaterial({ color: 0x228822 });
    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.position.y = -0.2;

    const group = new THREE.Group();
    group.add(flower);
    group.add(stem);
    group.position.set(x, 0.4, z);
    worldObjects.add(group);
  }
}

function createMountains() {
  for (let i = 0; i < 5; i++) {
    const angle = (i / 5) * Math.PI * 2 + Math.random() * 0.5;
    const dist = 80 + Math.random() * 40;
    const height = 30 + Math.random() * 40;

    const mtnGeo = new THREE.ConeGeometry(15 + Math.random() * 15, height, 6 + Math.floor(Math.random() * 4));
    const mtnMat = new THREE.MeshLambertMaterial({
      color: new THREE.Color().setHSL(0.08, 0.1, 0.5 + Math.random() * 0.3)
    });
    const mountain = new THREE.Mesh(mtnGeo, mtnMat);
    mountain.position.set(Math.cos(angle) * dist, height / 2, Math.sin(angle) * dist);
    mountain.castShadow = true;
    worldObjects.add(mountain);

    if (height > 40) {
      const snowGeo = new THREE.ConeGeometry(8, height * 0.3, 6);
      const snowMat = new THREE.MeshLambertMaterial({ color: 0xeeeeff });
      const snowCap = new THREE.Mesh(snowGeo, snowMat);
      snowCap.position.y = height * 0.35;
      mountain.add(snowCap);
    }
  }
}

function createRocks() {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist = 8 + Math.random() * 60;
    const size = 0.3 + Math.random() * 1.0;

    const rockGeo = new THREE.DodecahedronGeometry(size, 0);
    const shade = 0.3 + Math.random() * 0.2;
    const rockMat = new THREE.MeshLambertMaterial({
      color: new THREE.Color(shade, shade, shade * 0.9)
    });
    const rock = new THREE.Mesh(rockGeo, rockMat);
    rock.position.set(Math.cos(angle) * dist, size * 0.3, Math.sin(angle) * dist);
    rock.rotation.set(Math.random(), Math.random(), Math.random());
    rock.scale.y *= 0.5 + Math.random() * 0.5;
    rock.castShadow = true;
    worldObjects.add(rock);
  }
}

// ============================
// 云朵
// ============================
function createClouds() {
  const cloudGroup = new THREE.Group();
  cloudGroup.name = 'clouds';
  for (let i = 0; i < 15; i++) {
    const cloud = createSingleCloud();
    cloud.position.set(
      (Math.random() - 0.5) * 400,
      40 + Math.random() * 30,
      (Math.random() - 0.5) * 400
    );
    cloud.userData.speed = 0.5 + Math.random() * 1.5;
    cloudGroup.add(cloud);
  }
  scene.add(cloudGroup);
}

function createSingleCloud() {
  const group = new THREE.Group();
  const puffCount = 4 + Math.floor(Math.random() * 4);
  for (let i = 0; i < puffCount; i++) {
    const size = 4 + Math.random() * 6;
    const geo = new THREE.SphereGeometry(size, 8, 8);
    const mat = new THREE.MeshLambertMaterial({
      color: 0xffffff,
      transparent: true,
      opacity: 0.7 + Math.random() * 0.3,
    });
    const puff = new THREE.Mesh(geo, mat);
    puff.position.set(
      (Math.random() - 0.5) * 10,
      (Math.random() - 0.5) * 3,
      (Math.random() - 0.5) * 6
    );
    puff.scale.y *= 0.5;
    group.add(puff);
  }
  return group;
}

// ============================
// 音频系统 (Web Audio API)
// ============================
let audioCtx = null;
const audioNodes = {};

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const masterGain = audioCtx.createGain();
  masterGain.gain.value = state.masterVolume;
  masterGain.connect(audioCtx.destination);
  audioNodes.master = masterGain;

  createWindSound(masterGain);
  createBirdSound(masterGain);
  createWaterSound(masterGain);
  createRainSound(masterGain);
}

function createWindSound(destination) {
  const bufferSize = 2 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  noise.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 400;
  filter.Q.value = 0.5;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.15;

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(destination);
  noise.start();

  audioNodes.wind = { source: noise, filter, gain };
}

function createBirdSound(destination) {
  const gain = audioCtx.createGain();
  gain.gain.value = 0.06;
  gain.connect(destination);
  audioNodes.bird = { gain };

  function chirp() {
    if (!audioNodes.bird || !audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const oscGain = audioCtx.createGain();

    osc.type = 'sine';
    const baseFreq = 2000 + Math.random() * 2000;
    osc.frequency.setValueAtTime(baseFreq, now);
    osc.frequency.linearRampToValueAtTime(baseFreq + 500 + Math.random() * 500, now + 0.05);
    osc.frequency.linearRampToValueAtTime(baseFreq - 200, now + 0.1);

    oscGain.gain.setValueAtTime(0, now);
    oscGain.gain.linearRampToValueAtTime(0.1, now + 0.02);
    oscGain.gain.linearRampToValueAtTime(0, now + 0.12);

    osc.connect(oscGain);
    oscGain.connect(audioNodes.bird.gain);
    osc.start(now);
    osc.stop(now + 0.15);
  }

  audioNodes.bird.interval = setInterval(() => {
    if (!state.isMeditating && state.currentWeather === 'clear') chirp();
  }, 2000 + Math.random() * 3000);
}

function createWaterSound(destination) {
  const bufferSize = 2 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  noise.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.value = 800;
  filter.Q.value = 1.5;

  const gain = audioCtx.createGain();
  gain.gain.value = 0.04;

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(destination);
  noise.start();

  audioNodes.water = { source: noise, filter, gain };
}

function createRainSound(destination) {
  const bufferSize = 2 * audioCtx.sampleRate;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;
  noise.loop = true;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 2000;

  const gain = audioCtx.createGain();
  gain.gain.value = 0;

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(destination);
  noise.start();

  audioNodes.rain = { source: noise, filter, gain };
}

function playBell() {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 528;
  gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 3);
  osc.connect(gain);
  gain.connect(audioNodes.master);
  osc.start(audioCtx.currentTime);
  osc.stop(audioCtx.currentTime + 3);
}

// ============================
// 天气系统
// ============================
function setWeather(type) {
  state.currentWeather = type;

  document.querySelectorAll('.weather-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.weather === type);
  });

  document.getElementById('weather-name').textContent =
    { clear: '晴天', rain: '雨天', snow: '雪天', fog: '雾天' }[type];

  if (rainParticles) rainParticles.visible = (type === 'rain');
  if (snowParticles) snowParticles.visible = (type === 'snow');

  const fogDensity = { clear: 0.006, rain: 0.015, snow: 0.01, fog: 0.035 }[type];
  scene.fog.density = fogDensity;

  const lightIntensity = { clear: 1.2, rain: 0.5, snow: 0.8, fog: 0.4 }[type];
  sunLight.intensity = lightIntensity;

  const skyTop = { clear: 0x1155aa, rain: 0x334455, snow: 0x667788, fog: 0x888888 }[type];
  const skyBottom = { clear: 0x88ccee, rain: 0x556677, snow: 0x99aabb, fog: 0xaaaaaa }[type];
  sky.material.uniforms.topColor.value.set(skyTop);
  sky.material.uniforms.bottomColor.value.set(skyBottom);

  if (audioNodes.rain) {
    audioNodes.rain.gain.gain.linearRampToValueAtTime(
      type === 'rain' ? 0.15 : 0, audioCtx.currentTime + 1
    );
  }
  if (audioNodes.wind) {
    const windVol = { clear: 0.1, rain: 0.2, snow: 0.15, fog: 0.25 }[type];
    audioNodes.wind.gain.gain.linearRampToValueAtTime(windVol, audioCtx.currentTime + 1);
    audioNodes.wind.filter.frequency.value = { clear: 300, rain: 600, snow: 200, fog: 500 }[type];
  }

  renderer.toneMappingExposure = { clear: 1.0, rain: 0.7, snow: 0.9, fog: 0.6 }[type];

  showToast(`天气已切换为：${{ clear: '晴天', rain: '雨天', snow: '雪天', fog: '雾天' }[type]}`);
}

// 冥想系统
// ============================
function startMeditation(minutes = 0) {
  state.isMeditating = true;
  state.meditationStart = Date.now();
  state.meditationDuration = minutes * 60;
  document.getElementById('med-start').textContent = '停止冥想';
  document.getElementById('med-start').classList.add('active');
  playBell();
  showToast(minutes > 0 ? `冥想 ${minutes} 分钟已开始` : '自由冥想已开始');
}

function stopMeditation() {
  state.isMeditating = false;
  document.getElementById('med-start').textContent = '开始冥想';
  document.getElementById('med-start').classList.remove('active');
  document.getElementById('timer-display').textContent = '00:00';
  playBell();
  showToast('冥想结束');
}

// ============================
// Toast 通知
// ============================
function showToast(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 2500);
}

// ============================
// 动画循环
// ============================
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.1);
  const elapsed = clock.getElapsedTime();

  // 玩家移动
  if (controls.isLocked) {
    const speed = moveState.shift ? 30 : 12;
    direction.z = Number(moveState.forward) - Number(moveState.backward);
    direction.x = Number(moveState.right) - Number(moveState.left);
    direction.normalize();

    if (moveState.forward || moveState.backward) controls.moveForward(direction.z * speed * delta);
    if (moveState.left || moveState.right) controls.moveRight(direction.x * speed * delta);
    if (moveState.up) camera.position.y += speed * delta;

    camera.position.y = Math.max(2, Math.min(50, camera.position.y));
  }

  // 天空跟随相机
  sky.position.copy(camera.position);

  // 水面动画
  if (water) water.material.uniforms.uTime.value = elapsed;

  // 萤火虫
  worldObjects.children.forEach(obj => {
    if (obj.name === 'fireflies' && obj.material && obj.material.uniforms) {
      obj.material.uniforms.uTime.value = elapsed;
    }
  });

  // 天气粒子跟随相机
  if (rainParticles && rainParticles.visible) {
    rainParticles.material.uniforms.uTime.value = elapsed;
    rainParticles.position.copy(camera.position);
  }
  if (snowParticles && snowParticles.visible) {
    snowParticles.material.uniforms.uTime.value = elapsed;
    snowParticles.position.copy(camera.position);
  }

  // 云朵飘动
  const clouds = scene.getObjectByName('clouds');
  if (clouds) {
    clouds.children.forEach(cloud => {
      cloud.position.x += cloud.userData.speed * delta;
      if (cloud.position.x > 250) cloud.position.x = -250;
    });
  }

  // 树木微风摇摆
  treeGroups.forEach((tree, i) => {
    tree.rotation.z = Math.sin(elapsed * 0.5 + i * 0.7) * 0.02;
    tree.rotation.x = Math.cos(elapsed * 0.3 + i * 0.5) * 0.015;
  });

  // 时间流逝
  state.timeOfDay = (state.timeOfDay + delta * 0.005) % 1;
  updateTimeOfDay();

  // 冥想计时
  if (state.isMeditating) {
    const elapsed2 = (Date.now() - state.meditationStart) / 1000;
    const minutes = Math.floor(elapsed2 / 60);
    const seconds = Math.floor(elapsed2 % 60);
    document.getElementById('timer-display').textContent =
      `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;

    // 呼吸指示器
    const breathCycle = 8;
    const breathPhase = (elapsed2 % breathCycle) / breathCycle;
    const indicator = document.getElementById('breath-indicator');
    if (breathPhase < 0.4) {
      const t = breathPhase / 0.4;
      indicator.style.transform = `scale(${0.5 + t * 0.8})`;
      indicator.style.background = `rgba(100,180,255,${t * 0.3})`;
      indicator.style.borderColor = `rgba(100,180,255,${0.4 + t * 0.4})`;
    } else if (breathPhase < 0.6) {
      indicator.style.background = 'rgba(100,180,255,0.3)';
    } else {
      const t = (breathPhase - 0.6) / 0.4;
      indicator.style.transform = `scale(${1.3 - t * 0.8})`;
      indicator.style.background = `rgba(100,180,255,${0.3 - t * 0.3})`;
    }

    if (state.meditationDuration > 0 && elapsed2 >= state.meditationDuration) {
      stopMeditation();
    }
  }

  // 太阳位置
  const sunAngle = state.timeOfDay * Math.PI * 2;
  sunLight.position.set(Math.cos(sunAngle) * 100, Math.sin(sunAngle) * 100, 30);
  sky.material.uniforms.sunPosition.value.copy(sunLight.position).normalize();

  renderer.render(scene, camera);
}

function updateTimeOfDay() {
  const t = state.timeOfDay;
  const hours = Math.floor(t * 24);
  const minutes = Math.floor((t * 24 - hours) * 60);
  document.getElementById('time-display').textContent =
    `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;

  const ambientR = t < 0.5 ? 0.15 + t * 0.8 : 0.55 - (t - 0.5) * 0.4;
  const ambientG = t < 0.5 ? 0.15 + t * 0.6 : 0.45 - (t - 0.5) * 0.3;
  const ambientB = t < 0.5 ? 0.2 + t * 0.5 : 0.45 - (t - 0.5) * 0.2;
  ambientLight.color.setRGB(ambientR, ambientG, ambientB);
  ambientLight.intensity = 0.2 + Math.sin(t * Math.PI) * 0.5;
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
</body>
</html>
