<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>两个小球同时下落实验</title>
<style>
  :root {
    --bg: #0f1729;
    --panel: #182038;
    --card: #1e2a4a;
    --border: #2a3a5c;
    --accent: #4f8ef7;
    --accent2: #f7724f;
    --text: #e0e6f0;
    --muted: #8899bb;
    --ok: #34d399;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 顶部标题栏 */
  header {
    background: linear-gradient(135deg, #1a2550 0%, #0f1729 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    text-align: center;
  }
  header h1 {
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(90deg, var(--accent), #8cb8ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header p {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  /* 主体布局 */
  .main {
    display: flex;
    height: calc(100vh - 76px);
  }

  /* 左侧控制面板 */
  .panel {
    width: 320px;
    min-width: 320px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    padding: 24px 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .panel::-webkit-scrollbar { width: 4px; }
  .panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--muted);
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }

  .control-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .control-group label {
    font-size: 13px;
    color: var(--text);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .control-group label span.val {
    color: var(--accent);
    font-weight: 600;
    font-size: 12px;
    font-family: 'Consolas', monospace;
  }

  select {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
    cursor: pointer;
    outline: none;
    transition: border-color .2s;
  }
  select:focus { border-color: var(--accent); }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    background: var(--card);
    border-radius: 3px;
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px rgba(79,142,247,.5);
    cursor: pointer;
  }

  .toggle-row {
    display: flex; align-items: center; gap: 12px;
    font-size: 14px; cursor: pointer; user-select: none;
  }
  .toggle {
    width: 44px; height: 24px;
    background: var(--card);
    border-radius: 12px;
    position: relative;
    transition: background .3s;
    border: 1px solid var(--border);
    cursor: pointer;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: var(--muted);
    border-radius: 50%;
    transition: all .3s;
  }
  .toggle.on {
    background: rgba(79,142,247,.25);
    border-color: var(--accent);
  }
  .toggle.on::after {
    left: 22px;
    background: var(--accent);
  }

  .divider {
    height: 1px;
    background: var(--border);
  }

  /* 右侧实验区 */
  .experiment {
    flex: 1;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  /* Canvas区域 */
  .canvas-wrap {
    flex: 1;
    position: relative;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  /* 底部栏 */
  .bottom-bar {
    background: var(--panel);
    border-top: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .btn-group {
    display: flex; gap: 10px; flex-shrink: 0;
  }
  .btn {
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-start {
    background: linear-gradient(135deg, var(--accent), #6a9df7);
    color: #fff;
  }
  .btn-start:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(79,142,247,.4); }
  .btn-start:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-reset {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-reset:hover { background: var(--border); }

  .results {
    display: flex; gap: 24px; flex: 1; margin-left: 20px;
  }
  .result-card {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 18px;
    text-align: center;
    min-width: 0;
  }
  .result-card .rc-label {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 4px;
    white-space: nowrap;
  }
  .result-card .rc-value {
    font-size: 18px;
    font-weight: 700;
    font-family: 'Consolas', monospace;
  }
  .result-card.obj-a .rc-value { color: var(--accent); }
  .result-card.obj-b .rc-value { color: var(--accent2); }
  .result-card.conclusion .rc-value { color: var(--ok); font-size: 14px; }

  /* 预设按钮 */
  .presets {
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .preset-btn {
    padding: 6px 12px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    transition: all .2s;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* 动画闪烁指示 */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .5; }
  }
  .running-indicator {
    display: inline-block;
    width: 8px; height: 8px;
    background: var(--ok);
    border-radius: 50%;
    margin-right: 6px;
    animation: pulse 1s infinite;
  }
</style>
</head>
<body>

<header>
  <h1>自由落体实验 — 两个物体同时下落</h1>
  <p>通过调节参数，观察重力与空气阻力对不同物体下落速度的影响</p>
</header>

<div class="main">

  <!-- 左侧控制面板 -->
  <aside class="panel">
    <div class="section-title">快速预设</div>
    <div class="presets">
      <button class="preset-btn" onclick="applyPreset('moon')">月球实验</button>
      <button class="preset-btn" onclick="applyPreset('vacuum')">真空管实验</button>
      <button class="preset-btn" onclick="applyPreset('earth')">地面对比</button>
      <button class="preset-btn" onclick="applyPreset('jupiter')">木星重力</button>
    </div>

    <div class="divider"></div>
    <div class="section-title">物体 A（蓝色）</div>
    <div class="control-group">
      <label>物体类型</label>
      <select id="typeA" onchange="updateTypeA()">
        <option value="steel">铁球</option>
        <option value="rubber">橡胶球</option>
        <option value="wood">木球</option>
        <option value="feather">羽毛</option>
      </select>
    </div>
    <div class="control-group">
      <label>质量 <span class="val" id="massAVal">5.0 kg</span></label>
      <input type="range" id="massA" min="0.01" max="100" step="0.01" value="5" oninput="document.getElementById('massAVal').textContent=this.value+' kg'">
    </div>

    <div class="divider"></div>
    <div class="section-title">物体 B（橙色）</div>
    <div class="control-group">
      <label>物体类型</label>
      <select id="typeB" onchange="updateTypeB()">
        <option value="feather" selected>羽毛</option>
        <option value="steel">铁球</option>
        <option value="rubber">橡胶球</option>
        <option value="wood">木球</option>
      </select>
    </div>
    <div class="control-group">
      <label>质量 <span class="val" id="massBVal">0.003 kg</span></label>
      <input type="range" id="massB" min="0.001" max="100" step="0.001" value="0.003" oninput="document.getElementById('massBVal').textContent=this.value+' kg'">
    </div>

    <div class="divider"></div>
    <div class="section-title">环境参数</div>
    <div class="control-group">
      <div class="toggle-row" onclick="toggleVacuum()">
        <div class="toggle" id="vacuumToggle"></div>
        <span>真空环境</span>
      </div>
    </div>
    <div class="control-group" id="dragGroup">
      <label>空气密度 <span class="val" id="airDensityVal">1.225 kg/m³</span></label>
      <input type="range" id="airDensity" min="0" max="5" step="0.001" value="1.225" oninput="document.getElementById('airDensityVal').textContent=parseFloat(this.value).toFixed(3)+' kg/m³'">
    </div>
    <div class="control-group" id="dragGroup2">
      <label>阻力系数 倍率 <span class="val" id="dragCoeffVal">1.0x</span></label>
      <input type="range" id="dragCoeff" min="0.1" max="5" step="0.1" value="1" oninput="document.getElementById('dragCoeffVal').textContent=parseFloat(this.value).toFixed(1)+'x'">
    </div>
    <div class="control-group">
      <label>重力加速度 g <span class="val" id="gravityVal">9.8 m/s²</span></label>
      <input type="range" id="gravity" min="0.5" max="30" step="0.1" value="9.8" oninput="document.getElementById('gravityVal').textContent=parseFloat(this.value).toFixed(1)+' m/s²'">
    </div>
    <div class="control-group">
      <label>下落高度 <span class="val" id="heightVal">50 m</span></label>
      <input type="range" id="dropHeight" min="10" max="500" step="1" value="50" oninput="document.getElementById('heightVal').textContent=this.value+' m'">
    </div>
  </aside>

  <!-- 右侧实验显示区 -->
  <div class="experiment">
    <div class="canvas-wrap">
      <canvas id="simCanvas"></canvas>
    </div>
    <div class="bottom-bar">
      <div class="btn-group">
        <button class="btn btn-start" id="startBtn" onclick="startSimulation()">开始实验</button>
        <button class="btn btn-reset" id="resetBtn" onclick="resetSimulation()">重置</button>
      </div>
      <div class="results">
        <div class="result-card obj-a">
          <div class="rc-label" id="labelA">铁球 A</div>
          <div class="rc-value" id="timeA">— —</div>
        </div>
        <div class="result-card obj-b">
          <div class="rc-label" id="labelB">羽毛 B</div>
          <div class="rc-value" id="timeB">— —</div>
        </div>
        <div class="result-card conclusion">
          <div class="rc-label">实验结论</div>
          <div class="rc-value" id="conclusion">— —</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ============ 物体类型定义 ============
const TYPES = {
  steel:   { name: '铁球',   radius: 0.05,  cd: 0.47, density: 7874, color: '#6688bb', shape: 'circle' },
  rubber:  { name: '橡胶球', radius: 0.04,  cd: 0.47, density: 1100, color: '#cc5555', shape: 'circle' },
  wood:    { name: '木球',   radius: 0.04,  cd: 0.47, density: 600,  color: '#aa8844', shape: 'circle' },
  feather: { name: '羽毛',   radius: 0.03,  cd: 1.50, density: 2.5,  color: '#eeddaa', shape: 'feather' }
};

// ============ 状态变量 ============
let isVacuum = false;
let isRunning = false;
let animId = null;
let simStartTime = 0;

// 物体状态
let objA = { y: 0, vy: 0, t: 0, landed: false, landTime: 0 };
let objB = { y: 0, vy: 0, t: 0, landed: false, landTime: 0 };

// 轨迹记录
let trailA = [];
let trailB = [];

const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');

// ============ 初始化 ============
function init() {
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  updateTypeA();
  updateTypeB();
  draw();
}

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  if (!isRunning) draw();
}

// ============ 控件逻辑 ============
function toggleVacuum() {
  isVacuum = !isVacuum;
  const el = document.getElementById('vacuumToggle');
  el.classList.toggle('on', isVacuum);
  document.getElementById('dragGroup').style.opacity = isVacuum ? 0.3 : 1;
  document.getElementById('dragGroup2').style.opacity = isVacuum ? 0.3 : 1;
  document.querySelector('#dragGroup input').disabled = isVacuum;
  document.querySelector('#dragGroup2 input').disabled = isVacuum;
}

function updateTypeA() {
  const t = TYPES[document.getElementById('typeA').value];
  document.getElementById('massA').value = calcMass(t).toFixed(2);
  document.getElementById('massAVal').textContent = calcMass(t).toFixed(2) + ' kg';
  document.getElementById('labelA').textContent = t.name + ' A';
  if (!isRunning) draw();
}
function updateTypeB() {
  const t = TYPES[document.getElementById('typeB').value];
  document.getElementById('massB').value = calcMass(t).toFixed(3);
  document.getElementById('massBVal').textContent = calcMass(t).toFixed(3) + ' kg';
  document.getElementById('labelB').textContent = t.name + ' B';
  if (!isRunning) draw();
}

function calcMass(typeObj) {
  // m = (4/3)πr³·ρ, 限制显示
  const vol = (4 / 3) * Math.PI * Math.pow(typeObj.radius, 3);
  let m = vol * typeObj.density;
  if (m > 100) m = 100;
  if (m < 0.001) m = 0.003;
  return m;
}

function getParams() {
  return {
    typeA: document.getElementById('typeA').value,
    typeB: document.getElementById('typeB').value,
    massA: parseFloat(document.getElementById('massA').value),
    massB: parseFloat(document.getElementById('massB').value),
    airDensity: isVacuum ? 0 : parseFloat(document.getElementById('airDensity').value),
    dragMult: parseFloat(document.getElementById('dragCoeff').value),
    gravity: parseFloat(document.getElementById('gravity').value),
    height: parseFloat(document.getElementById('dropHeight').value)
  };
}

// ============ 预设 ============
function applyPreset(name) {
  resetSimulation();
  switch (name) {
    case 'moon':
      document.getElementById('typeA').value = 'steel';
      document.getElementById('typeB').value = 'feather';
      document.getElementById('gravity').value = 1.62;
      document.getElementById('gravityVal').textContent = '1.6 m/s²';
      document.getElementById('airDensity').value = 0;
      document.getElementById('airDensityVal').textContent = '0.000 kg/m³';
      isVacuum = true;
      document.getElementById('vacuumToggle').classList.add('on');
      document.getElementById('dragGroup').style.opacity = 0.3;
      document.getElementById('dragGroup2').style.opacity = 0.3;
      document.getElementById('dropHeight').value = 50;
      document.getElementById('heightVal').textContent = '50 m';
      break;
    case 'vacuum':
      document.getElementById('typeA').value = 'steel';
      document.getElementById('typeB').value = 'feather';
      document.getElementById('gravity').value = 9.8;
      document.getElementById('gravityVal').textContent = '9.8 m/s²';
      isVacuum = true;
      document.getElementById('vacuumToggle').classList.add('on');
      document.getElementById('dragGroup').style.opacity = 0.3;
      document.getElementById('dragGroup2').style.opacity = 0.3;
      document.getElementById('dropHeight').value = 50;
      document.getElementById('heightVal').textContent = '50 m';
      break;
    case 'earth':
      document.getElementById('typeA').value = 'steel';
      document.getElementById('typeB').value = 'feather';
      document.getElementById('gravity').value = 9.8;
      document.getElementById('gravityVal').textContent = '9.8 m/s²';
      document.getElementById('airDensity').value = 1.225;
      document.getElementById('airDensityVal').textContent = '1.225 kg/m³';
      isVacuum = false;
      document.getElementById('vacuumToggle').classList.remove('on');
      document.getElementById('dragGroup').style.opacity = 1;
      document.getElementById('dragGroup2').style.opacity = 1;
      document.getElementById('dropHeight').value = 50;
      document.getElementById('heightVal').textContent = '50 m';
      break;
    case 'jupiter':
      document.getElementById('typeA').value = 'steel';
      document.getElementById('typeB').value = 'wood';
      document.getElementById('gravity').value = 24.8;
      document.getElementById('gravityVal').textContent = '24.8 m/s²';
      document.getElementById('airDensity').value = 1.3;
      document.getElementById('airDensityVal').textContent = '1.300 kg/m³';
      isVacuum = false;
      document.getElementById('vacuumToggle').classList.remove('on');
      document.getElementById('dragGroup').style.opacity = 1;
      document.getElementById('dragGroup2').style.opacity = 1;
      document.getElementById('dropHeight').value = 50;
      document.getElementById('heightVal').textContent = '50 m';
      break;
  }
  updateTypeA();
  updateTypeB();
}

// ============ 物理模拟 ============
function simulate(p) {
  const dt = 1 / 60; // 固定时间步长（秒）
  const areaA = Math.PI * Math.pow(TYPES[p.typeA].radius, 2);
  const areaB = Math.PI * Math.pow(TYPES[p.typeB].radius, 2);
  const cdA = TYPES[p.typeA].cd * p.dragMult;
  const cdB = TYPES[p.typeB].cd * p.dragMult;

  function step(obj, mass, cd, area) {
    if (obj.landed) return;
    const drag = 0.5 * cd * p.airDensity * area * obj.vy * Math.abs(obj.vy);
    const accel = p.gravity - drag / mass;
    obj.vy += accel * dt;
    obj.y += obj.vy * dt;
    obj.t += dt;
    if (obj.y >= p.height) {
      obj.y = p.height;
      obj.landed = true;
      obj.landTime = obj.t;
    }
  }

  step(objA, p.massA, cdA, areaA);
  step(objB, p.massB, cdB, areaB);
}

// ============ 绘制 ============
function draw() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  const p = getParams();

  // 清空
  ctx.clearRect(0, 0, w, h);

  // 背景渐变
  const bgGrad = ctx.createLinearGradient(0, 0, 0, h);
  if (isVacuum) {
    bgGrad.addColorStop(0, '#0a0e1a');
    bgGrad.addColorStop(1, '#111827');
  } else {
    bgGrad.addColorStop(0, '#0e1628');
    bgGrad.addColorStop(1, '#162040');
  }
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, w, h);

  // 布局
  const marginTop = 50;
  const marginBottom = 60;
  const usableH = h - marginTop - marginBottom;
  const laneW = Math.min(140, w / 4);
  const centerX = w / 2;
  const laneAx = centerX - laneW * 1.2;
  const laneBx = centerX + laneW * 0.2;

  // 绘制刻度线
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 10; i++) {
    const yy = marginTop + (i / 10) * usableH;
    ctx.beginPath();
    ctx.moveTo(0, yy);
    ctx.lineTo(w, yy);
    ctx.stroke();
    // 标注高度
    const mVal = (p.height * i / 10).toFixed(0);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.font = '10px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(mVal + 'm', 8, yy - 3);
  }

  // 地面
  const groundY = marginTop + usableH;
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, groundY + marginBottom);
  groundGrad.addColorStop(0, 'rgba(79,142,247,0.15)');
  groundGrad.addColorStop(1, 'rgba(79,142,247,0)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, w, marginBottom);
  ctx.strokeStyle = 'rgba(79,142,247,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  ctx.lineTo(w, groundY);
  ctx.stroke();

  // 虚线参考线（真空理论落点）
  if (isRunning && objA.landed && objB.landed) {
    ctx.setLineDash([4, 6]);
    ctx.strokeStyle = 'rgba(52,211,153,0.3)';
    ctx.lineWidth = 1;
    const theoryT = Math.sqrt(2 * p.height / p.gravity);
    const theoryY = 0; // already drawn ground line
    ctx.strokeRect(centerX - 60, marginTop, 2, usableH); // just a reference line center
    ctx.setLineDash([]);
  }

  // 起始线
  ctx.strokeStyle = 'rgba(255,255,255,0.1)';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(0, marginTop);
  ctx.lineTo(w, marginTop);
  ctx.stroke();
  ctx.setLineDash([]);

  // 起始标签
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '11px sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('起始位置  0m', 8, marginTop - 6);
  ctx.fillStyle = 'rgba(79,142,247,0.5)';
  ctx.fillText('地面  ' + p.height + 'm', 8, groundY - 6);

  // 物体绘制位置
  const yToScreen = (y) => marginTop + (y / p.height) * usableH;
  const screenYA = yToScreen(objA.y);
  const screenYB = yToScreen(objB.y);

  // 绘制轨迹
  drawTrail(trailA, laneAx + laneW / 2, '#4f8ef7');
  drawTrail(trailB, laneBx + laneW / 2, '#f7724f');

  // 落地标记
  if (objA.landed) {
    drawLandMark(laneAx + laneW / 2, groundY, '#4f8ef7', objA.landTime);
  }
  if (objB.landed) {
    drawLandMark(laneBx + laneW / 2, groundY, '#f7724f', objB.landTime);
  }

  // 绘制物体
  drawObject(p.typeA, laneAx + laneW / 2, screenYA, '#4f8ef7', objA.vy);
  drawObject(p.typeB, laneBx + laneW / 2, screenYB, '#f7724f', objB.vy);

  // 标签
  ctx.textAlign = 'center';
  ctx.font = 'bold 13px sans-serif';
  ctx.fillStyle = '#4f8ef7';
  ctx.fillText(TYPES[p.typeA].name + ' A', laneAx + laneW / 2, marginTop - 25);
  ctx.fillStyle = '#f7724f';
  ctx.fillText(TYPES[p.typeB].name + ' B', laneBx + laneW / 2, marginTop - 25);

  // 实时速度标注
  if (isRunning) {
    ctx.font = '11px monospace';
    ctx.fillStyle = 'rgba(79,142,247,0.7)';
    ctx.fillText(objA.vy.toFixed(1) + ' m/s', laneAx + laneW / 2, screenYA - 24);
    ctx.fillStyle = 'rgba(247,114,79,0.7)';
    ctx.fillText(objB.vy.toFixed(1) + ' m/s', laneBx + laneW / 2, screenYB - 24);

    // 时间
    const curTime = Math.max(objA.t, objB.t);
    ctx.font = 'bold 16px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.textAlign = 'right';
    ctx.fillText('t = ' + curTime.toFixed(2) + 's', w - 20, marginTop + 10);
  }

  // 真空标签
  if (isVacuum) {
    ctx.font = 'bold 12px sans-serif';
    ctx.fillStyle = 'rgba(52,211,153,0.6)';
    ctx.textAlign = 'right';
    ctx.fillText('☁ 真空环境', w - 20, marginTop + 30);
  } else {
    ctx.font = 'bold 12px sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.textAlign = 'right';
    ctx.fillText('🌬 有空气', w - 20, marginTop + 30);
  }
}

function drawTrail(trail, x, color) {
  if (trail.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(trail[0].sx, trail[0].sy);
  for (let i = 1; i < trail.length; i++) {
    ctx.lineTo(trail[i].sx, trail[i].sy);
  }
  ctx.strokeStyle = color.replace(')', ',0.15)').replace('rgb', 'rgba').replace('#', '');
  // 用rgba
  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);
  ctx.strokeStyle = `rgba(${r},${g},${b},0.2)`;
  ctx.lineWidth = 2;
  ctx.stroke();

  // 渐变尾巴
  const last = trail[trail.length - 1];
  const glow = ctx.createRadialGradient(x, last.sy, 0, x, last.sy, 20);
  glow.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
  glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = glow;
  ctx.fillRect(x - 20, last.sy - 20, 40, 40);
}

function drawLandMark(x, groundY, color, time) {
  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);

  // 波纹效果
  ctx.beginPath();
  ctx.ellipse(x, groundY, 20, 6, 0, 0, Math.PI * 2);
  ctx.strokeStyle = `rgba(${r},${g},${b},0.3)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  // 时间标签
  ctx.font = 'bold 12px monospace';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(time.toFixed(2) + 's', x, groundY + 20);
}

function drawObject(typeKey, x, y, color, velocity) {
  const type = TYPES[typeKey];
  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);
  const size = type.shape === 'feather' ? 18 : 14;

  // 光晕
  const glow = ctx.createRadialGradient(x, y, 0, x, y, size * 2.5);
  glow.addColorStop(0, `rgba(${r},${g},${b},0.2)`);
  glow.addColorStop(1, `rgba(${r},${g},${b},0)`);
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, y, size * 2.5, 0, Math.PI * 2);
  ctx.fill();

  if (type.shape === 'feather') {
    // 绘制羽毛
    drawFeather(x, y, size, color, velocity);
  } else {
    // 绘制球体
    const grad = ctx.createRadialGradient(x - 3, y - 3, 0, x, y, size);
    grad.addColorStop(0, `rgba(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)},1)`);
    grad.addColorStop(0.7, color);
    grad.addColorStop(1, `rgba(${Math.floor(r*0.5)},${Math.floor(g*0.5)},${Math.floor(b*0.5)},1)`);
    ctx.beginPath();
    ctx.arc(x, y, size, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // 高光
    ctx.beginPath();
    ctx.arc(x - size * 0.3, y - size * 0.3, size * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fill();
  }
}

function drawFeather(x, y, size, color, velocity) {
  ctx.save();
  // 羽毛摆动
  const wobble = isRunning ? Math.sin(objB.t * 8 + objB.y * 0.5) * 15 : 0;
  ctx.translate(x, y);
  ctx.rotate((wobble * Math.PI) / 180);

  ctx.beginPath();
  ctx.moveTo(0, -size * 1.4);
  ctx.bezierCurveTo(size * 0.8, -size * 0.6, size * 0.6, size * 0.6, 0, size * 1.4);
  ctx.bezierCurveTo(-size * 0.6, size * 0.6, -size * 0.8, -size * 0.6, 0, -size * 1.4);
  ctx.fillStyle = color;
  ctx.fill();

  // 羽轴
  ctx.beginPath();
  ctx.moveTo(0, -size * 1.4);
  ctx.lineTo(0, size * 1.4);
  ctx.strokeStyle = 'rgba(0,0,0,0.2)';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

// ============ 动画循环 ============
let frameCount = 0;

function loop() {
  if (!isRunning) return;

  const p = getParams();
  simulate(p);

  // 记录轨迹
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  const marginTop = 50;
  const marginBottom = 60;
  const usableH = h - marginTop - marginBottom;
  const laneW = Math.min(140, w / 4);
  const centerX = w / 2;
  const yToScreen = (y) => marginTop + (y / p.height) * usableH;

  if (!objA.landed) {
    trailA.push({ sx: centerX - laneW * 1.2 + laneW / 2, sy: yToScreen(objA.y) });
    if (trailA.length > 200) trailA.shift();
  }
  if (!objB.landed) {
    trailB.push({ sx: centerX + laneW * 0.2 + laneW / 2, sy: yToScreen(objB.y) });
    if (trailB.length > 200) trailB.shift();
  }

  draw();

  // 更新实时数据
  document.getElementById('timeA').textContent = objA.landed ? objA.landTime.toFixed(3) + 's' : objA.t.toFixed(2) + 's';
  document.getElementById('timeB').textContent = objB.landed ? objB.landTime.toFixed(3) + 's' : objB.t.toFixed(2) + 's';

  // 判断是否都着陆
  if (objA.landed && objB.landed) {
    isRunning = false;
    document.getElementById('startBtn').disabled = false;
    document.getElementById('startBtn').textContent = '开始实验';

    // 结论
    const tA = objA.landTime;
    const tB = objB.landTime;
    const diff = Math.abs(tA - tB);
    const concl = document.getElementById('conclusion');
    if (diff < 0.001) {
      concl.textContent = '同时到达！';
      concl.style.color = '#34d399';
    } else if (tA < tB) {
      concl.textContent = TYPES[p.typeA].name + ' 先落地';
      concl.style.color = '#4f8ef7';
    } else {
      concl.textContent = TYPES[p.typeB].name + ' 先落地';
      concl.style.color = '#f7724f';
    }
    return;
  }

  animId = requestAnimationFrame(loop);
}

// ============ 控制函数 ============
function startSimulation() {
  if (isRunning) return;

  resetState();

  isRunning = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '实验中...';
  document.getElementById('conclusion').textContent = '⏳ 观察中...';
  document.getElementById('conclusion').style.color = 'var(--muted)';

  loop();
}

function resetSimulation() {
  isRunning = false;
  if (animId) cancelAnimationFrame(animId);
  resetState();
  document.getElementById('startBtn').disabled = false;
  document.getElementById('startBtn').textContent = '开始实验';
  document.getElementById('timeA').textContent = '— —';
  document.getElementById('timeB').textContent = '— —';
  document.getElementById('conclusion').textContent = '— —';
  document.getElementById('conclusion').style.color = 'var(--ok)';
  draw();
}

function resetState() {
  objA = { y: 0, vy: 0, t: 0, landed: false, landTime: 0 };
  objB = { y: 0, vy: 0, t: 0, landed: false, landTime: 0 };
  trailA = [];
  trailB = [];
}

// 启动
init();
</script>
