<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台游戏状态机演示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            color: #fff;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #gameCanvas {
            border: 3px solid #4a4a6a;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: linear-gradient(180deg, #87CEEB 0%, #E0F6FF 50%, #90EE90 50%, #228B22 100%);
        }

        .controls {
            margin-top: 15px;
            padding: 15px 25px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .controls h3 {
            margin-bottom: 10px;
            text-align: center;
            color: #ffd700;
        }

        .key-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px 30px;
            font-size: 14px;
        }

        .key-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .key {
            display: inline-block;
            padding: 3px 10px;
            background: #4a4a6a;
            border-radius: 4px;
            border: 1px solid #6a6a8a;
            font-family: monospace;
            font-weight: bold;
            min-width: 30px;
            text-align: center;
        }

        .state-info {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
        }

        .state-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .state-idle { background: #4CAF50; }
        .state-walk { background: #2196F3; }
        .state-run { background: #FF9800; }
        .state-jump { background: #9C27B0; }
        .state-hurt { background: #f44336; animation: pulse 0.2s infinite; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <h1>平台游戏状态机演示</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div class="controls">
        <h3>操作说明</h3>
        <div class="key-list">
            <div class="key-item"><span class="key">A</span> / <span class="key">←</span> 向左移动</div>
            <div class="key-item"><span class="key">D</span> / <span class="key">→</span> 向右移动</div>
            <div class="key-item"><span class="key">Shift</span> 按住奔跑</div>
            <div class="key-item"><span class="key">Space</span> / <span class="key">W</span> / <span class="key">↑</span> 跳跃</div>
            <div class="key-item"><span class="key">H</span> 受伤（红色闪烁+镜头震动）</div>
            <div class="key-item"><span class="key">R</span> 重置位置</div>
        </div>
        <div class="state-info">
            当前状态: <span id="stateBadge" class="state-badge state-idle">静止</span>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            GRAVITY: 0.6,
            FRICTION: 0.85,
            WALK_SPEED: 4,
            RUN_SPEED: 8,
            JUMP_FORCE: -14,
            GROUND_Y: 500,
            CANVAS_WIDTH: 800,
            CANVAS_HEIGHT: 600,
            HURT_DURATION: 500,
            SHAKE_DURATION: 500,
            SHAKE_INTENSITY: 10
        };

        // ==================== 输入管理器 ====================
        class InputManager {
            constructor() {
                this.keys = {};
                this.setupEventListeners();
            }

            setupEventListeners() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    this.keys[e.code] = true;
                });

                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                    this.keys[e.code] = false;
                });
            }

            isPressed(key) {
                return this.keys[key.toLowerCase()] || this.keys[key];
            }

            isShiftPressed() {
                return this.keys['ShiftLeft'] || this.keys['ShiftRight'] || this.keys['shift'];
            }
        }

        // ==================== 动画精灵类 ====================
        class SpriteAnimator {
            constructor() {
                this.frame = 0;
                this.frameTimer = 0;
                this.frameInterval = 100; // 毫秒
            }

            update(deltaTime, animationSpeed = 1) {
                this.frameTimer += deltaTime;
                if (this.frameTimer >= this.frameInterval / animationSpeed) {
                    this.frame = (this.frame + 1) % 4; // 4帧循环
                    this.frameTimer = 0;
                }
            }

            reset() {
                this.frame = 0;
                this.frameTimer = 0;
            }
        }

        // ==================== 粒子效果 ====================
        class ParticleSystem {
            constructor() {
                this.particles = [];
            }

            spawn(x, y, color, count = 5) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 8,
                        vy: (Math.random() - 0.5) * 8 - 2,
                        life: 1.0,
                        color: color,
                        size: Math.random() * 6 + 2
                    });
                }
            }

            update() {
                this.particles = this.particles.filter(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.3; // 重力
                    p.life -= 0.02;
                    return p.life > 0;
                });
            }

            draw(ctx) {
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.globalAlpha = 1;
            }
        }

        // ==================== 角色类 ====================
        class Player {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 40;
                this.height = 60;
                this.vx = 0;
                this.vy = 0;
                this.facing = 1; // 1 = 右, -1 = 左
                this.grounded = false;

                // 状态机
                this.stateMachine = new PlayerStateMachine(this);

                // 动画
                this.animator = new SpriteAnimator();

                // 受伤效果
                this.isHurt = false;
                this.hurtTimer = 0;
                this.hurtFlash = false;

                // 粒子系统（跳跃/落地效果）
                this.particles = new ParticleSystem();
            }

            update(deltaTime, input) {
                // 更新状态机
                this.stateMachine.update(deltaTime, input);

                // 应用物理
                this.vy += CONFIG.GRAVITY;
                this.vx *= CONFIG.FRICTION;

                this.x += this.vx;
                this.y += this.vy;

                // 地面碰撞
                if (this.y + this.height > CONFIG.GROUND_Y) {
                    if (!this.grounded && this.vy > 0) {
                        // 刚落地，生成粒子
                        this.particles.spawn(this.x + this.width/2, CONFIG.GROUND_Y, '#8B4513', 8);
                    }
                    this.y = CONFIG.GROUND_Y - this.height;
                    this.vy = 0;
                    this.grounded = true;
                } else {
                    this.grounded = false;
                }

                // 边界限制
                this.x = Math.max(0, Math.min(CONFIG.CANVAS_WIDTH - this.width, this.x));

                // 更新动画
                const speed = Math.abs(this.vx) > 5 ? 2 : 1;
                this.animator.update(deltaTime, speed);

                // 更新受伤效果
                if (this.isHurt) {
                    this.hurtTimer -= deltaTime;
                    this.hurtFlash = Math.floor(this.hurtTimer / 50) % 2 === 0;
                    if (this.hurtTimer <= 0) {
                        this.isHurt = false;
                    }
                }

                // 更新粒子
                this.particles.update();
            }

            draw(ctx) {
                ctx.save();

                // 受伤闪烁效果
                if (this.isHurt && this.hurtFlash) {
                    ctx.fillStyle = '#ff0000';
                    ctx.shadowColor = '#ff0000';
                    ctx.shadowBlur = 20;
                }

                // 绘制角色（使用占位符图形，带有动画帧效果）
                this.drawCharacter(ctx);

                ctx.restore();

                // 绘制粒子
                this.particles.draw(ctx);
            }

            drawCharacter(ctx) {
                const frame = this.animator.frame;
                const bounce = Math.sin(frame * Math.PI / 2) * 3;

                ctx.save();
                ctx.translate(this.x + this.width/2, this.y + this.height);
                ctx.scale(this.facing, 1);

                // 身体颜色根据状态变化
                let bodyColor = '#4CAF50'; // 默认绿色（静止）
                let eyeColor = '#fff';

                switch (this.stateMachine.currentState.name) {
                    case 'Walk':
                        bodyColor = '#2196F3'; // 蓝色（行走）
                        break;
                    case 'Run':
                        bodyColor = '#FF9800'; // 橙色（奔跑）
                        break;
                    case 'Jump':
                        bodyColor = '#9C27B0'; // 紫色（跳跃）
                        break;
                }

                if (this.isHurt && this.hurtFlash) {
                    bodyColor = '#ff0000';
                    eyeColor = '#ffff00';
                }

                // 身体（带呼吸/跑步动画）
                ctx.fillStyle = bodyColor;
                const bodyYOffset = this.stateMachine.currentState.name === 'Run' ? -bounce : 0;
                ctx.fillRect(-15, -50 + bodyYOffset, 30, 40);

                // 条纹装饰（根据状态）
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                if (this.stateMachine.currentState.name === 'Run') {
                    // 奔跑时显示速度线
                    ctx.fillRect(-10, -45 + bodyYOffset, 20, 3);
                    ctx.fillRect(-10, -35 + bodyYOffset, 20, 3);
                    ctx.fillRect(-10, -25 + bodyYOffset, 20, 3);
                } else if (this.stateMachine.currentState.name === 'Walk') {
                    ctx.fillRect(-10, -35 + bodyYOffset, 20, 5);
                }

                // 头部
                ctx.fillStyle = bodyColor;
                ctx.beginPath();
                ctx.arc(0, -55 + bodyYOffset, 18, 0, Math.PI * 2);
                ctx.fill();

                // 眼睛
                ctx.fillStyle = eyeColor;
                ctx.beginPath();
                ctx.arc(6, -58 + bodyYOffset, 6, 0, Math.PI * 2);
                ctx.fill();

                // 瞳孔
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(8, -58 + bodyYOffset, 3, 0, Math.PI * 2);
                ctx.fill();

                // 腿部动画
                ctx.fillStyle = bodyColor;
                const legOffset1 = Math.sin(frame * Math.PI / 2) * 10;
                const legOffset2 = Math.sin(frame * Math.PI / 2 + Math.PI) * 10;

                if (Math.abs(this.vx) > 0.5 && this.grounded) {
                    // 行走/跑步腿部动画
                    ctx.fillRect(-12 + legOffset1, -10, 8, 15);
                    ctx.fillRect(4 + legOffset2, -10, 8, 15);
                } else {
                    // 静止腿部
                    ctx.fillRect(-12, -10, 8, 10);
                    ctx.fillRect(4, -10, 8, 10);
                }

                // 手臂
                const armOffset = this.stateMachine.currentState.name === 'Jump' ? -15 :
                                 (this.stateMachine.currentState.name === 'Run' ? legOffset2 : 0);
                ctx.fillRect(-22, -45 + bodyYOffset + armOffset * 0.3, 7, 20);
                ctx.fillRect(15, -45 + bodyYOffset - armOffset * 0.3, 7, 20);

                ctx.restore();
            }

            takeDamage() {
                if (this.isHurt) return;

                this.isHurt = true;
                this.hurtTimer = CONFIG.HURT_DURATION;

                // 受伤时弹起
                this.vy = -8;
                this.vx = -this.facing * 3;

                // 生成受伤粒子
                this.particles.spawn(this.x + this.width/2, this.y + this.height/2, '#ff0000', 15);

                // 触发相机震动
                return true; // 表示需要触发震动
            }

            reset(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.isHurt = false;
                this.stateMachine.changeState('Idle');
            }
        }

        // ==================== 有限状态机 ====================
        class PlayerStateMachine {
            constructor(player) {
                this.player = player;
                this.states = {
                    'Idle': new IdleState(),
                    'Walk': new WalkState(),
                    'Run': new RunState(),
                    'Jump': new JumpState()
                };
                this.currentState = this.states['Idle'];
                this.currentState.enter(player);
            }

            changeState(stateName) {
                if (this.currentState === this.states[stateName]) return;

                this.currentState.exit(this.player);
                this.currentState = this.states[stateName];
                this.currentState.enter(this.player);

                // 更新UI
                this.updateUI(stateName);
            }

            update(deltaTime, input) {
                this.currentState.update(this.player, deltaTime, input, this);
            }

            updateUI(stateName) {
                const badge = document.getElementById('stateBadge');
                const stateNames = {
                    'Idle': '静止',
                    'Walk': '行走',
                    'Run': '奔跑',
                    'Jump': '跳跃'
                };

                badge.textContent = stateNames[stateName];
                badge.className = 'state-badge state-' + stateName.toLowerCase();
            }
        }

        // ==================== 状态基类 ====================
        class State {
            constructor(name) {
                this.name = name;
            }

            enter(player) {}
            update(player, deltaTime, input, stateMachine) {}
            exit(player) {}
        }

        // ==================== 静止状态 ====================
        class IdleState extends State {
            constructor() {
                super('Idle');
            }

            enter(player) {
                player.animator.reset();
            }

            update(player, deltaTime, input, stateMachine) {
                // 检查跳跃
                if ((input.isPressed(' ') || input.isPressed('w') || input.isPressed('ArrowUp')) && player.grounded) {
                    stateMachine.changeState('Jump');
                    return;
                }

                // 检查左右移动
                const left = input.isPressed('a') || input.isPressed('ArrowLeft');
                const right = input.isPressed('d') || input.isPressed('ArrowRight');

                if (left || right) {
                    if (input.isShiftPressed()) {
                        stateMachine.changeState('Run');
                    } else {
                        stateMachine.changeState('Walk');
                    }
                }
            }
        }

        // ==================== 行走状态 ====================
        class WalkState extends State {
            constructor() {
                super('Walk');
            }

            enter(player) {
                player.animator.reset();
            }

            update(player, deltaTime, input, stateMachine) {
                // 检查跳跃
                if ((input.isPressed(' ') || input.isPressed('w') || input.isPressed('ArrowUp')) && player.grounded) {
                    stateMachine.changeState('Jump');
                    return;
                }

                const left = input.isPressed('a') || input.isPressed('ArrowLeft');
                const right = input.isPressed('d') || input.isPressed('ArrowRight');

                if (!left && !right) {
                    stateMachine.changeState('Idle');
                    return;
                }

                if (input.isShiftPressed()) {
                    stateMachine.changeState('Run');
                    return;
                }

                // 应用行走速度
                if (left) {
                    player.vx = -CONFIG.WALK_SPEED;
                    player.facing = -1;
                }
                if (right) {
                    player.vx = CONFIG.WALK_SPEED;
                    player.facing = 1;
                }
            }

            exit(player) {
                player.vx = 0;
            }
        }

        // ==================== 奔跑状态 ====================
        class RunState extends State {
            constructor() {
                super('Run');
            }

            enter(player) {
                player.animator.reset();
                // 奔跑时产生粒子
                player.particles.spawn(player.x + player.width/2, CONFIG.GROUND_Y, '#8B4513', 3);
            }

            update(player, deltaTime, input, stateMachine) {
                // 检查跳跃
                if ((input.isPressed(' ') || input.isPressed('w') || input.isPressed('ArrowUp')) && player.grounded) {
                    stateMachine.changeState('Jump');
                    return;
                }

                const left = input.isPressed('a') || input.isPressed('ArrowLeft');
                const right = input.isPressed('d') || input.isPressed('ArrowRight');

                if (!left && !right) {
                    stateMachine.changeState('Idle');
                    return;
                }

                if (!input.isShiftPressed()) {
                    stateMachine.changeState('Walk');
                    return;
                }

                // 应用奔跑速度
                if (left) {
                    player.vx = -CONFIG.RUN_SPEED;
                    player.facing = -1;
                }
                if (right) {
                    player.vx = CONFIG.RUN_SPEED;
                    player.facing = 1;
                }

                // 奔跑时偶尔产生粒子
                if (Math.random() < 0.1) {
                    player.particles.spawn(player.x + player.width/2, CONFIG.GROUND_Y, '#8B4513', 1);
                }
            }

            exit(player) {
                player.vx *= 0.5; // 退出奔跑时减速
            }
        }

        // ==================== 跳跃状态 ====================
        class JumpState extends State {
            constructor() {
                super('Jump');
                this.hasJumped = false;
            }

            enter(player) {
                player.animator.reset();
                if (player.grounded && !this.hasJumped) {
                    player.vy = CONFIG.JUMP_FORCE;
                    player.grounded = false;
                    this.hasJumped = true;

                    // 跳跃粒子效果
                    player.particles.spawn(player.x + player.width/2, CONFIG.GROUND_Y, '#90EE90', 10);
                }
            }

            update(player, deltaTime, input, stateMachine) {
                const left = input.isPressed('a') || input.isPressed('ArrowLeft');
                const right = input.isPressed('d') || input.isPressed('ArrowRight');

                // 空中控制
                if (left) {
                    player.vx = Math.max(player.vx - 0.5, -CONFIG.WALK_SPEED);
                    player.facing = -1;
                }
                if (right) {
                    player.vx = Math.min(player.vx + 0.5, CONFIG.WALK_SPEED);
                    player.facing = 1;
                }

                // 落地检测
                if (player.grounded) {
                    this.hasJumped = false;
                    // 根据速度判断回到什么状态
                    if (Math.abs(player.vx) < 1) {
                        stateMachine.changeState('Idle');
                    } else if (input.isShiftPressed()) {
                        stateMachine.changeState('Run');
                    } else {
                        stateMachine.changeState('Walk');
                    }
                }
            }

            exit(player) {
                this.hasJumped = false;
            }
        }

        // ==================== 相机类 ====================
        class Camera {
            constructor() {
                this.shakeTimer = 0;
                this.shakeIntensity = 0;
                this.offsetX = 0;
                this.offsetY = 0;
            }

            shake(duration = CONFIG.SHAKE_DURATION, intensity = CONFIG.SHAKE_INTENSITY) {
                this.shakeTimer = duration;
                this.shakeIntensity = intensity;
            }

            update(deltaTime) {
                if (this.shakeTimer > 0) {
                    this.shakeTimer -= deltaTime;
                    this.offsetX = (Math.random() - 0.5) * this.shakeIntensity * 2;
                    this.offsetY = (Math.random() - 0.5) * this.shakeIntensity * 2;

                    // 震动强度随时间衰减
                    this.shakeIntensity *= 0.95;
                } else {
                    this.offsetX = 0;
                    this.offsetY = 0;
                }
            }

            apply(ctx) {
                ctx.translate(this.offsetX, this.offsetY);
            }

            reset(ctx) {
                ctx.translate(-this.offsetX, -this.offsetY);
            }
        }

        // ==================== 游戏主类 ====================
        class Game {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.input = new InputManager();
                this.player = new Player(400, 300);
                this.camera = new Camera();

                this.lastTime = 0;
                this.accumulatedTime = 0;
                this.fixedDeltaTime = 1000 / 60; // 60 FPS

                this.keysPressed = {};
                this.setupInputHandling();

                // 开始游戏循环
                requestAnimationFrame((t) => this.gameLoop(t));
            }

            setupInputHandling() {
                window.addEventListener('keydown', (e) => {
                    const key = e.key.toLowerCase();

                    // 受伤键（只在按下时触发一次）
                    if (key === 'h' && !this.keysPressed[key]) {
                        this.keysPressed[key] = true;
                        const shouldShake = this.player.takeDamage();
                        if (shouldShake) {
                            this.camera.shake();
                        }
                    }

                    // 重置键
                    if (key === 'r' && !this.keysPressed[key]) {
                        this.keysPressed[key] = true;
                        this.player.reset(400, 300);
                    }
                });

                window.addEventListener('keyup', (e) => {
                    this.keysPressed[e.key.toLowerCase()] = false;
                });
            }

            gameLoop(timestamp) {
                const deltaTime = timestamp - this.lastTime;
                this.lastTime = timestamp;

                this.update(deltaTime);
                this.draw();

                requestAnimationFrame((t) => this.gameLoop(t));
            }

            update(deltaTime) {
                // 限制最大deltaTime防止卡顿
                const dt = Math.min(deltaTime, 50);

                this.player.update(dt, this.input);
                this.camera.update(dt);
            }

            draw() {
                // 清空画布
                this.ctx.clearRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);

                // 应用相机震动
                this.ctx.save();
                this.camera.apply(this.ctx);

                // 绘制背景
                this.drawBackground();

                // 绘制地面
                this.drawGround();

                // 绘制玩家
                this.player.draw(this.ctx);

                // 恢复相机变换
                this.camera.reset(this.ctx);
                this.ctx.restore();

                // 绘制UI（不受相机震动影响）
                this.drawUI();
            }

            drawBackground() {
                // 天空渐变
                const gradient = this.ctx.createLinearGradient(0, 0, 0, CONFIG.GROUND_Y);
                gradient.addColorStop(0, '#87CEEB');
                gradient.addColorStop(1, '#E0F6FF');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.GROUND_Y);

                // 绘制云朵
                this.drawCloud(100, 80, 60);
                this.drawCloud(300, 120, 80);
                this.drawCloud(550, 60, 70);
                this.drawCloud(700, 100, 50);
            }

            drawCloud(x, y, size) {
                this.ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                this.ctx.beginPath();
                this.ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
                this.ctx.arc(x + size * 0.3, y, size * 0.4, 0, Math.PI * 2);
                this.ctx.arc(x - size * 0.3, y, size * 0.4, 0, Math.PI * 2);
                this.ctx.arc(x, y - size * 0.3, size * 0.35, 0, Math.PI * 2);
                this.ctx.fill();
            }

            drawGround() {
                // 草地
                const gradient = this.ctx.createLinearGradient(0, CONFIG.GROUND_Y, 0, CONFIG.CANVAS_HEIGHT);
                gradient.addColorStop(0, '#90EE90');
                gradient.addColorStop(1, '#228B22');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, CONFIG.GROUND_Y, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT - CONFIG.GROUND_Y);

                // 草地边缘装饰
                this.ctx.fillStyle = '#228B22';
                for (let i = 0; i < CONFIG.CANVAS_WIDTH; i += 20) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i, CONFIG.GROUND_Y);
                    this.ctx.lineTo(i + 10, CONFIG.GROUND_Y - 8);
                    this.ctx.lineTo(i + 20, CONFIG.GROUND_Y);
                    this.ctx.fill();
                }

                // 地面纹理
                this.ctx.fillStyle = 'rgba(0,0,0,0.1)';
                for (let i = 0; i < CONFIG.CANVAS_WIDTH; i += 100) {
                    this.ctx.fillRect(i, CONFIG.GROUND_Y + 20, 80, 10);
                }
            }

            drawUI() {
                // 绘制速度指示器
                this.ctx.fillStyle = 'rgba(0,0,0,0.5)';
                this.ctx.fillRect(10, 10, 150, 60);
                this.ctx.fillStyle = '#fff';
                this.ctx.font = '14px monospace';
                this.ctx.fillText(`速度: ${this.player.vx.toFixed(2)}`, 20, 30);
                this.ctx.fillText(`Y速度: ${this.player.vy.toFixed(2)}`, 20, 50);
                this.ctx.fillText(`地面: ${this.player.grounded ? '是' : '否'}`, 20, 70);

                // 绘制震动状态
                if (this.camera.shakeTimer > 0) {
                    this.ctx.fillStyle = 'rgba(255,0,0,0.7)';
                    this.ctx.fillRect(CONFIG.CANVAS_WIDTH - 120, 10, 110, 30);
                    this.ctx.fillStyle = '#fff';
                    this.ctx.fillText('镜头震动中!', CONFIG.CANVAS_WIDTH - 110, 30);
                }
            }
        }

        // 启动游戏
        window.onload = () => {
            new Game();
        };
    </script>
</body>
</html>
