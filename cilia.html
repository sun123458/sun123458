<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>磁力连线粒子背景</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: #0a0a1a;
        }
        canvas {
            display: block;
            position: fixed; top: 0; left: 0;
        }
        .overlay {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center; color: #fff; z-index: 1;
            pointer-events: none;
        }
        .overlay h1 {
            font-size: 3rem; font-weight: 200;
            letter-spacing: 1rem; text-shadow: 0 0 30px rgba(100,180,255,0.5);
        }
        .overlay p {
            font-size: 1rem; opacity: 0.5; margin-top: 1rem;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div class="overlay">
        <h1>粒子宇宙</h1>
        <p>移动鼠标与粒子互动</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let W, H, particles, mouse;
        const PARTICLE_COUNT = 120;
        const MAX_DIST = 150;       // 粒子间最大连线距离
        const MOUSE_RADIUS = 200;   // 鼠标影响半径
        const MOUSE_FORCE = 0.8;    // 鼠标排斥力度
        const FRICTION = 0.97;      // 速度衰减
        const EPS = 0.0001;

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * W;
                this.y = Math.random() * H;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
                this.radius = Math.random() * 2 + 1;
                // 粒子颜色：青蓝到紫色的渐变
                const hue = Math.random() * 60 + 190; // 190~250
                this.color = `hsl(${hue}, 80%, 65%)`;
                this.glowColor = `hsla(${hue}, 90%, 60%, 0.3)`;
            }

            update() {
                // 鼠标排斥力
                if (mouse.x !== null) {
                    const dx = this.x - mouse.x;
                    const dy = this.y - mouse.y;
                    const dist = Math.sqrt(dx * dx + dy * dy) || EPS;
                    if (dist < MOUSE_RADIUS) {
                        const force = (MOUSE_RADIUS - dist) / MOUSE_RADIUS;
                        const angle = Math.atan2(dy, dx);
                        this.vx += Math.cos(angle) * force * MOUSE_FORCE;
                        this.vy += Math.sin(angle) * force * MOUSE_FORCE;
                    }
                }

                // 速度衰减
                this.vx *= FRICTION;
                this.vy *= FRICTION;

                // 位置更新
                this.x += this.vx;
                this.y += this.vy;

                // 边界反弹
                if (this.x < 0 || this.x > W) { this.vx *= -1; this.x = Math.max(0, Math.min(W, this.x)); }
                if (this.y < 0 || this.y > H) { this.vy *= -1; this.y = Math.max(0, Math.min(H, this.y)); }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();

                // 发光效果
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 3, 0, Math.PI * 2);
                ctx.fillStyle = this.glowColor;
                ctx.fill();
            }
        }

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }

        function init() {
            resize();
            mouse = { x: null, y: null };
            particles = [];
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }
        }

        function drawLines() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < MAX_DIST) {
                        // 距离越近，不透明度越高，线条越粗
                        const alpha = 1 - dist / MAX_DIST;
                        const lineWidth = alpha * 2.5 + 0.3;

                        // 颜色混合：根据两个粒子颜色做渐变
                        const gradient = ctx.createLinearGradient(
                            particles[i].x, particles[i].y,
                            particles[j].x, particles[j].y
                        );
                        gradient.addColorStop(0, `rgba(100, 180, 255, ${alpha * 0.6})`);
                        gradient.addColorStop(1, `rgba(180, 100, 255, ${alpha * 0.6})`);

                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.strokeStyle = gradient;
                        ctx.lineWidth = lineWidth;
                        ctx.stroke();
                    }
                }
            }
        }

        function drawMouseLines() {
            if (mouse.x === null) return;
            particles.forEach(p => {
                const dx = p.x - mouse.x;
                const dy = p.y - mouse.y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < MOUSE_RADIUS) {
                    const alpha = 1 - dist / MOUSE_RADIUS;
                    ctx.beginPath();
                    ctx.moveTo(mouse.x, mouse.y);
                    ctx.lineTo(p.x, p.y);
                    ctx.strokeStyle = `rgba(255, 150, 50, ${alpha * 0.4})`;
                    ctx.lineWidth = alpha * 1.5 + 0.2;
                    ctx.stroke();
                }
            });
        }

        function animate() {
            // 拖尾效果
            ctx.fillStyle = 'rgba(10, 10, 26, 0.15)';
            ctx.fillRect(0, 0, W, H);

            drawLines();
            drawMouseLines();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // 事件监听
        window.addEventListener('resize', resize);
        window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('mouseleave', () => { mouse.x = null; mouse.y = null; });
        // 触屏支持
        window.addEventListener('touchmove', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: true });
        window.addEventListener('touchend', () => { mouse.x = null; mouse.y = null; });

        init();
        animate();
    </script>
</body>
</html>
