<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>商品详情页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    .product-page {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      gap: 40px;
      padding: 30px 20px;
    }

    /* ===== 图片轮播 ===== */
    .carousel-section {
      flex: 1;
      min-width: 0;
    }

    .carousel-main {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .carousel-main img {
      width: 100%;
      height: 420px;
      object-fit: cover;
      display: none;
    }

    .carousel-main img.active { display: block; }

    .carousel-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.35);
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .carousel-arrow:hover { background: rgba(0,0,0,0.6); }
    .carousel-arrow.prev { left: 12px; }
    .carousel-arrow.next { right: 12px; }

    .carousel-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 14px 0 0;
    }

    .carousel-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ddd;
      cursor: pointer;
      transition: background 0.3s;
    }

    .carousel-dots span.active { background: #e63946; }

    .carousel-thumbs {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: center;
    }

    .carousel-thumbs img {
      width: 64px;
      height: 64px;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.2s;
    }

    .carousel-thumbs img:hover { opacity: 1; }
    .carousel-thumbs img.active {
      border-color: #e63946;
      opacity: 1;
    }

    /* ===== 商品信息 ===== */
    .info-section {
      width: 400px;
      flex-shrink: 0;
    }

    .product-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 12px;
    }

    .product-subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }

    .price-box {
      background: linear-gradient(135deg, #fff5f5, #ffe8e8);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }

    .price-current {
      color: #e63946;
      font-size: 32px;
      font-weight: 800;
    }

    .price-current small {
      font-size: 16px;
    }

    .price-original {
      font-size: 14px;
      color: #999;
      text-decoration: line-through;
      margin-left: 10px;
    }

    .price-tip {
      font-size: 13px;
      color: #e63946;
      margin-top: 4px;
    }

    /* ===== 规格选择 ===== */
    .spec-group {
      margin-bottom: 20px;
    }

    .spec-label {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .spec-label .selected-val {
      font-weight: 400;
      color: #666;
    }

    .spec-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .spec-option {
      padding: 8px 18px;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
      user-select: none;
    }

    .spec-option:hover { border-color: #e63946; color: #e63946; }

    .spec-option.selected {
      border-color: #e63946;
      background: #fff5f5;
      color: #e63946;
      font-weight: 600;
    }

    .spec-option.disabled {
      border-color: #eee;
      color: #ccc;
      cursor: not-allowed;
      background: #fafafa;
    }

    /* ===== 购物车 ===== */
    .cart-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #eee;
    }

    .quantity-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .quantity-label {
      font-size: 14px;
      font-weight: 600;
    }

    .quantity-control {
      display: flex;
      align-items: center;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    .quantity-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: #fff;
      font-size: 18px;
      cursor: pointer;
      color: #333;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quantity-btn:hover:not(:disabled) { background: #f0f0f0; }
    .quantity-btn:disabled { color: #ccc; cursor: not-allowed; }

    .quantity-num {
      width: 50px;
      height: 40px;
      text-align: center;
      border: none;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
      font-size: 16px;
      font-weight: 600;
      outline: none;
    }

    .stock-info {
      font-size: 13px;
      color: #999;
    }

    .total-price {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .total-label { font-size: 14px; color: #666; }
    .total-amount {
      font-size: 28px;
      font-weight: 800;
      color: #e63946;
    }
    .total-amount small { font-size: 14px; }

    .cart-actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      height: 48px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }

    .btn-cart {
      background: #ff8c00;
      color: #fff;
    }

    .btn-buy {
      background: #e63946;
      color: #fff;
    }

    .btn-cart:hover { background: #e67e00; }
    .btn-buy:hover { background: #d62d3b; }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: #333;
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 9999;
      transition: transform 0.35s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }

    /* 响应式 */
    @media (max-width: 768px) {
      .product-page {
        flex-direction: column;
        gap: 20px;
        padding: 16px;
      }
      .info-section { width: 100%; }
      .carousel-main img { height: 280px; }
      .price-current { font-size: 26px; }
      .total-amount { font-size: 22px; }
    }
  </style>
</head>
<body>

<div class="product-page">

  <!-- ===== 左侧：图片轮播 ===== -->
  <div class="carousel-section">
    <div class="carousel-main">
      <img class="active" src="https://picsum.photos/600/420?random=1" alt="商品图1">
      <img src="https://picsum.photos/600/420?random=2" alt="商品图2">
      <img src="https://picsum.photos/600/420?random=3" alt="商品图3">
      <img src="https://picsum.photos/600/420?random=4" alt="商品图4">
      <button class="carousel-arrow prev" onclick="changeSlide(-1)">&#10094;</button>
      <button class="carousel-arrow next" onclick="changeSlide(1)">&#10095;</button>
    </div>
    <div class="carousel-thumbs">
      <img src="https://picsum.photos/64/64?random=1" alt="" class="active" onclick="goToSlide(0)">
      <img src="https://picsum.photos/64/64?random=2" alt="" onclick="goToSlide(1)">
      <img src="https://picsum.photos/64/64?random=3" alt="" onclick="goToSlide(2)">
      <img src="https://picsum.photos/64/64?random=3" alt="" onclick="goToSlide(3)">
    </div>
  </div>

  <!-- ===== 右侧：商品信息 + 规格 + 购物车 ===== -->
  <div class="info-section">
    <h1 class="product-title">Apple MacBook Pro 14英寸 M3 Pro 芯片</h1>
    <p class="product-subtitle">18GB统一内存 · 512GB固态硬盘 · 深空灰色</p>

    <div class="price-box">
      <span class="price-current"><small>¥</small><span id="displayPrice">12999</span></span>
      <span class="price-original">¥14999</span>
      <div class="price-tip" id="priceTip">已优惠 ¥2000</div>
    </div>

    <!-- 颜色规格 -->
    <div class="spec-group">
      <div class="spec-label">颜色 <span class="selected-val" id="colorText">请选择</span></div>
      <div class="spec-options" id="colorOptions"></div>
    </div>

    <!-- 内存规格 -->
    <div class="spec-group">
      <div class="spec-label">内存 <span class="selected-val" id="memoryText">请选择</span></div>
      <div class="spec-options" id="memoryOptions"></div>
    </div>

    <!-- 存储规格 -->
    <div class="spec-group">
      <div class="spec-label">存储 <span class="selected-val" id="storageText">请选择</span></div>
      <div class="spec-options" id="storageOptions"></div>
    </div>

    <!-- 购物车操作 -->
    <div class="cart-section">
      <div class="quantity-row">
        <span class="quantity-label">数量</span>
        <div class="quantity-control">
          <button class="quantity-btn" id="btnMinus" onclick="changeQty(-1)">-</button>
          <input type="text" class="quantity-num" id="qtyInput" value="1" readonly>
          <button class="quantity-btn" id="btnPlus" onclick="changeQty(1)">+</button>
        </div>
        <span class="stock-info" id="stockInfo">库存充足</span>
      </div>

      <div class="total-price">
        <span class="total-label">合计：</span>
        <span class="total-amount"><small>¥</small><span id="totalPrice">12,999</span></span>
      </div>

      <div class="cart-actions">
        <button class="btn btn-cart" onclick="addToCart()">加入购物车</button>
        <button class="btn btn-buy" onclick="buyNow()">立即购买</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ========== 商品数据 ==========
const product = {
  basePrice: 12999,
  images: [
    'https://picsum.photos/600/420?random=1',
    'https://picsum.photos/600/420?random=2',
    'https://picsum.photos/600/420?random=3',
    'https://picsum.photos/600/420?random=4'
  ],
  specs: {
    colors: [
      { name: '深空灰色', stock: 100 },
      { name: '银色',     stock: 50 },
      { name: '星光色',   stock: 30 }
    ],
    memory: [
      { name: '18GB', extra: 0, stock: 80 },
      { name: '36GB', extra: 2000, stock: 40 }
    ],
    storage: [
      { name: '512GB', extra: 0,    stock: 60 },
      { name: '1TB',   extra: 2000, stock: 35 },
      { name: '2TB',   extra: 4000, stock: 10 }
    ]
  },
  maxStock: 99
};

// ========== 状态 ==========
let state = {
  currentSlide: 0,
  color: null,
  memory: null,
  storage: null,
  quantity: 1
};

// ========== 图片轮播 ==========
function goToSlide(index) {
  const imgs = document.querySelectorAll('.carousel-main img');
  const thumbs = document.querySelectorAll('.carousel-thumbs img');
  imgs[state.currentSlide].classList.remove('active');
  thumbs[state.currentSlide].classList.remove('active');
  state.currentSlide = index;
  imgs[state.currentSlide].classList.add('active');
  thumbs[state.currentSlide].classList.add('active');
}

function changeSlide(dir) {
  let next = state.currentSlide + dir;
  if (next < 0) next = product.images.length - 1;
  if (next >= product.images.length) next = 0;
  goToSlide(next);
}

// 自动轮播
let autoPlay = setInterval(() => changeSlide(1), 3500);
document.querySelector('.carousel-main').addEventListener('mouseenter', () => clearInterval(autoPlay));
document.querySelector('.carousel-main').addEventListener('mouseleave', () => {
  autoPlay = setInterval(() => changeSlide(1), 3500);
});

// ========== 规格渲染 ==========
function renderSpecs() {
  // 颜色
  const colorOpts = document.getElementById('colorOptions');
  product.specs.colors.forEach((c, i) => {
    const el = document.createElement('span');
    el.className = 'spec-option' + (state.color === i ? ' selected' : '');
    el.textContent = c.name;
    el.onclick = () => selectSpec('color', i);
    colorOpts.appendChild(el);
  });

  // 内存
  const memOpts = document.getElementById('memoryOptions');
  product.specs.memory.forEach((m, i) => {
    const el = document.createElement('span');
    el.className = 'spec-option' + (state.memory === i ? ' selected' : '');
    el.textContent = m.name + (m.extra > 0 ? ' (+' + m.extra + ')' : '');
    el.onclick = () => selectSpec('memory', i);
    memOpts.appendChild(el);
  });

  // 存储
  const storOpts = document.getElementById('storageOptions');
  product.specs.storage.forEach((s, i) => {
    const el = document.createElement('span');
    el.className = 'spec-option' + (state.storage === i ? ' selected' : '');
    el.textContent = s.name + (s.extra > 0 ? ' (+' + s.extra + ')' : '');
    el.onclick = () => selectSpec('storage', i);
    storOpts.appendChild(el);
  });
}

function selectSpec(type, index) {
  state[type] = index;
  // 更新UI
  const container = document.getElementById(type + 'Options');
  container.querySelectorAll('.spec-option').forEach((el, i) => {
    el.classList.toggle('selected', i === index);
  });
  // 更新标签文字
  const items = product.specs[type === 'color' ? 'colors' : type === 'memory' ? 'memory' : 'storage'];
  const textEl = document.getElementById(type + 'Text');
  textEl.textContent = items[index].name;
  updatePrice();
}

// ========== 价格计算 ==========
function calcPrice() {
  let price = product.basePrice;
  if (state.memory !== null) price += product.specs.memory[state.memory].extra;
  if (state.storage !== null) price += product.specs.storage[state.storage].extra;
  return price;
}

function updatePrice() {
  const price = calcPrice();
  document.getElementById('displayPrice').textContent = price.toLocaleString();

  const total = price * state.quantity;
  document.getElementById('totalPrice').textContent = total.toLocaleString();

  const saved = 14999 - price;
  const tipEl = document.getElementById('priceTip');
  tipEl.textContent = saved > 0 ? '已优惠 ¥' + saved.toLocaleString() : '热卖中';

  updateStockInfo();
}

function updateStockInfo() {
  let stock = product.maxStock;
  if (state.color !== null) stock = Math.min(stock, product.specs.colors[state.color].stock);
  if (state.memory !== null) stock = Math.min(stock, product.specs.memory[state.memory].stock);
  if (state.storage !== null) stock = Math.min(stock, product.specs.storage[state.storage].stock);

  const stockEl = document.getElementById('stockInfo');
  if (stock <= 0) {
    stockEl.textContent = '已售罄';
    stockEl.style.color = '#e63946';
  } else if (stock < 10) {
    stockEl.textContent = '仅剩 ' + stock + ' 件';
    stockEl.style.color = '#ff8c00';
  } else {
    stockEl.textContent = '库存充足';
    stockEl.style.color = '#999';
  }
}

// ========== 数量控制 ==========
function changeQty(delta) {
  let newQty = state.quantity + delta;
  if (newQty < 1) newQty = 1;
  // 检查库存上限
  let maxStock = product.maxStock;
  if (state.color !== null) maxStock = Math.min(maxStock, product.specs.colors[state.color].stock);
  if (newQty > maxStock) newQty = maxStock;
  state.quantity = newQty;
  document.getElementById('qtyInput').value = state.quantity;
  updatePrice();
}

// ========== 购物车 / 购买 ==========
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

function addToCart() {
  if (state.color === null || state.memory === null || state.storage === null) {
    showToast('请先选择完整的商品规格');
    return;
  }
  const total = calcPrice() * state.quantity;
  showToast('已添加 ' + state.quantity + ' 件到购物车，合计 ¥' + total.toLocaleString());
}

function buyNow() {
  if (state.color === null || state.memory === null || state.storage === null) {
    showToast('请先选择完整的商品规格');
    return;
  }
  const total = calcPrice() * state.quantity;
  showToast('即将结算，合计 ¥' + total.toLocaleString());
}

// ========== 初始化 ==========
renderSpecs();
updatePrice();
</script>

</body>
</html>
