<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态彩虹 Canvas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
        }
        canvas {
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <canvas id="rainbowCanvas"></canvas>

    <script>
        const canvas = document.getElementById('rainbowCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布大小
        canvas.width = 800;
        canvas.height = 600;

        // 彩虹颜色配置
        const rainbowColors = [
            { color: '#FF0000', name: '红' },
            { color: '#FF7F00', name: '橙' },
            { color: '#FFFF00', name: '黄' },
            { color: '#00FF00', name: '绿' },
            { color: '#0000FF', name: '蓝' },
            { color: '#4B0082', name: '靛' },
            { color: '#9400D3', name: '紫' }
        ];

        // 动画参数
        let time = 0;
        let particles = [];

        // 粒子类 - 用于彩虹闪烁效果
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.angle = Math.random() * Math.PI; // 只在彩虹的弧形区域
                this.colorIndex = Math.floor(Math.random() * rainbowColors.length);
                this.speed = 0.5 + Math.random() * 1.5;
                this.size = 2 + Math.random() * 3;
                this.alpha = 0.3 + Math.random() * 0.7;
                this.twinkle = Math.random() * Math.PI * 2;
            }

            update() {
                this.twinkle += 0.05;
                this.alpha = 0.3 + Math.sin(this.twinkle) * 0.3;
            }

            draw(centerX, centerY, maxRadius) {
                const radius = maxRadius - this.colorIndex * 15 - 40;
                const x = centerX + Math.cos(this.angle) * radius;
                const y = centerY - Math.sin(this.angle) * radius * 0.3;

                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = rainbowColors[this.colorIndex].color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = rainbowColors[this.colorIndex].color;
                ctx.beginPath();
                ctx.arc(x, y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // 初始化粒子
        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        // 绘制彩虹
        function drawRainbow(offsetY) {
            const centerX = canvas.width / 2;
            const centerY = canvas.height - 100 + Math.sin(time * 0.02) * 10;

            // 绘制彩虹弧形
            rainbowColors.forEach((item, index) => {
                const outerRadius = 280 - index * 15;
                const innerRadius = outerRadius - 12;

                // 创建渐变效果
                const gradient = ctx.createRadialGradient(
                    centerX, centerY, innerRadius,
                    centerX, centerY, outerRadius
                );
                gradient.addColorStop(0, item.color + 'CC');
                gradient.addColorStop(0.5, item.color);
                gradient.addColorStop(1, item.color + 'CC');

                // 绘制弧形
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, outerRadius, Math.PI, 0, true);
                ctx.arc(centerX, centerY, innerRadius, 0, Math.PI, false);
                ctx.closePath();

                ctx.fillStyle = gradient;
                ctx.shadowBlur = 15 + Math.sin(time * 0.05 + index) * 5;
                ctx.shadowColor = item.color;
                ctx.fill();
                ctx.restore();
            });

            return centerY;
        }

        // 绘制背景云朵
        function drawClouds() {
            const cloudOffset = Math.sin(time * 0.01) * 20;

            ctx.save();
            ctx.globalAlpha = 0.3;
            ctx.fillStyle = '#FFFFFF';

            // 左侧云
            drawCloud(150, 100 + cloudOffset, 1);
            drawCloud(200, 120 + cloudOffset, 0.7);

            // 右侧云
            drawCloud(650, 80 + cloudOffset, 0.8);
            drawCloud(600, 110 + cloudOffset, 1.2);

            ctx.restore();
        }

        function drawCloud(x, y, scale) {
            ctx.save();
            ctx.translate(x, y);
            ctx.scale(scale, scale);
            ctx.beginPath();
            ctx.arc(0, 0, 30, 0, Math.PI * 2);
            ctx.arc(25, -10, 25, 0, Math.PI * 2);
            ctx.arc(50, 0, 30, 0, Math.PI * 2);
            ctx.arc(25, 10, 20, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }

        // 绘制星星背景
        function drawStars() {
            ctx.save();
            for (let i = 0; i < 50; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23) % (canvas.height - 200);
                const twinkle = Math.sin(time * 0.03 + i) * 0.5 + 0.5;

                ctx.globalAlpha = twinkle * 0.8;
                ctx.fillStyle = '#FFFFFF';
                ctx.shadowBlur = 5;
                ctx.shadowColor = '#FFFFFF';
                ctx.beginPath();
                ctx.arc(x, y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
        }

        // 主动画循环
        function animate() {
            // 清除画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景星星
            drawStars();

            // 绘制云朵
            drawClouds();

            // 绘制彩虹
            const centerY = drawRainbow();

            // 更新和绘制粒子
            particles.forEach(particle => {
                particle.update();
                particle.draw(canvas.width / 2, centerY, 280);
            });

            // 增加时间
            time += 1;

            // 绘制标题
            ctx.save();
            ctx.font = 'bold 24px Arial';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            ctx.textAlign = 'center';
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'rgba(255, 255, 255, 0.5)';
            ctx.fillText('✨ 动态彩虹 ✨', canvas.width / 2, 40);
            ctx.restore();

            requestAnimationFrame(animate);
        }

        // 启动动画
        initParticles();
        animate();
    </script>
</body>
</html>
